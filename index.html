    <style>

        .modal-content { background: white; border-radius: 20px; padding: 18px; width: 90%; max-width: 450px; max-height: 85vh; overflow-y: auto; }

    </style>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `self.addEventListener('install', event => { self.skipWaiting(); event.waitUntil(caches.open('mandir-v1').then(cache => cache.addAll(['/'])); }); self.addEventListener('fetch', event => { event.respondWith(caches.match(event.request).then(response => response || fetch(event.request))); });`;
                const swBlob = new Blob([swCode], {type: 'application/javascript'});
                const swURL = URL.createObjectURL(swBlob);
                navigator.serviceWorker.register(swURL).then(reg => console.log('SW registered')).catch(err => console.log('SW failed:', err));
            });
        }
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; const btn = document.getElementById('installAppBtn'); if(btn) btn.style.display = 'inline-flex'; });
        function installApp() { if(deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(() => { deferredPrompt = null; const btn = document.getElementById('installAppBtn'); if(btn) btn.style.display = 'none'; }); } }
        function refreshPage() { window.location.reload(); }
        
        function shareApp() {
            let url = window.location.href;
            let msg = `🚩 *भव्य मन्दिर निर्माण समिति* 🚩\n\n📱 *ऐप इंस्टॉल करने के लिए लिंक:*\n${url}\n\n👇 *लॉगिन करें:*\nसुपर एडमिन: super@mandir.com / super123\nएडमिन: admin@mandir.com / admin123\nऑपरेटर: operator@mandir.com / oper123\nव्यूअर: viewer@mandir.com / view123\n\n🙏 जय श्री राम`;
            if (navigator.share) {
                navigator.share({ title: "मन्दिर समिति ऐप", text: "ऐप इंस्टॉल करें", url: url });
            } else {
                navigator.clipboard.writeText(msg);
                showToast("📋 लिंक कॉपी हो गया! WhatsApp पर शेयर करें");
                window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
            }
        }
        
        let recognition = null;
        function startVoiceSearch() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                showToast("🔊 वॉयस सर्च आपके ब्राउज़र में सपोर्ट नहीं है", true);
                return;
            }
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'hi-IN';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;
            const btn = document.getElementById('voiceSearchBtn');
            if(btn) btn.classList.add('listening');
            recognition.start();
            recognition.onresult = (event) => {
                const speechResult = event.results[0][0].transcript;
                if(btn) btn.classList.remove('listening');
                showToast("🔊 खोज: " + speechResult);
                if (currentSub === 'memberList') {
                    const searchBox = document.getElementById('searchAny');
                    if (searchBox) { searchBox.value = speechResult; filterMembers(); }
                } else {
                    switchSub('memberList');
                    setTimeout(() => {
                        const searchBox = document.getElementById('searchAny');
                        if (searchBox) { searchBox.value = speechResult; filterMembers(); }
                    }, 500);
                }
            };
            recognition.onerror = () => { if(btn) btn.classList.remove('listening'); showToast("🔊 बोलें नहीं सुनाई दिया, कृपया फिर try करें", true); };
            recognition.onend = () => { if(btn) btn.classList.remove('listening'); };
        }
        
        function exportToExcel() {
            const wsData = [['नाम', 'मोबाइल', 'गाँव', 'पिता', 'मासिक राशि', 'बकाया', 'एडवांस', 'ज्वाइन डेट', 'स्टेटस']];
            appData.members.forEach(m => { wsData.push([m.name, m.mobile || '', m.village || '', m.father || '', m.monthlyAmount, m.pending || 0, m.advanceBalance || 0, m.joinDate, m.status]); });
            const ws = XLSX.utils.aoa_to_sheet(wsData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'सदस्य');
            XLSX.writeFile(wb, `mandir_members_${new Date().toISOString().slice(0,10)}.xlsx`);
            showToast("📊 एक्सेल डाउनलोड हो गया");
        }
        
        function printReport(type) {
            let printContent = '';
            if (type === 'members') {
                printContent = '<h2>🚩 सदस्य सूची</h2><table border="1" cellpadding="5" cellspacing="0" width="100%"><thead><tr><th>#</th><th>नाम</th><th>गाँव</th><th>मोबाइल</th><th>मासिक</th><th>बकाया</th></tr></thead><tbody>';
                appData.members.filter(m=>m.status==='active').forEach((m, i) => {
                    printContent += `<tr><td style="color:#FF9933;">${i+1}</td><td style="color:#333;">${m.name}</td><td style="color:#17a2b8;">${m.village||'-'}</td><td style="color:#6c757d;">${m.mobile||'-'}</td><td style="color:#20c997;">₹${m.monthlyAmount}</td><td style="color:#dc3545;">₹${m.pending||0}</td></tr>`;
                });
                printContent += '</tbody></table>';
            } else if (type === 'ledger') {
                let totalIncome = appData.donations.reduce((s,d)=>s+d.amount,0);
                let totalExpense = appData.expenses.reduce((s,e)=>s+e.amount,0);
                printContent = `<h2>📒 लेजर रिपोर्ट</h2><p>कुल आय: ₹${totalIncome}</p><p>कुल व्यय: ₹${totalExpense}</p><p>शेष: ₹${totalIncome - totalExpense}</p>`;
            } else if (type === 'pending') {
                printContent = '<h2>⚠️ बकाया सूची</h2><table border="1" cellpadding="5" cellspacing="0" width="100%"><thead><tr><th>#</th><th>नाम</th><th>बकाया</th></td></thead><tbody>';
                appData.members.filter(m=>m.pending>0 && m.status==='active').forEach((m, i) => {

    function getAllMonthsFromJoinTillNow(joinDate) { 
        const join = new Date(joinDate); const now = new Date(); 
        const monthsList = ['जनवरी', 'फरवरी', 'मार्च', 'अप्रैल', 'मई', 'जून', 'जुलाई', 'अगस्त', 'सितम्बर', 'अक्टूबर', 'नवम्बर', 'दिसम्बर']; 
        let all = []; 
        for(let y = join.getFullYear(); y <= now.getFullYear(); y++) { 
            let sm = (y === join.getFullYear()) ? join.getMonth() : 0; 
            let em = (y === now.getFullYear()) ? now.getMonth() : 11; 
            for(let m = sm; m <= em; m++) { all.push({ year: y, month: monthsList[m], monthIndex: m }); } 
        } 
        return all; 
    }
    
    function getMonthlyAmountForDate(member, date) { 
        if(!member.monthlyAmountHistory || member.monthlyAmountHistory.length === 0) return member.monthlyAmount; 
        let sorted = [...member.monthlyAmountHistory].sort((a,b) => new Date(a.effectiveDate) - new Date(b.effectiveDate)); 
        let effective = sorted[0].amount; 
        for(let h of sorted) { if(new Date(h.effectiveDate) <= new Date(date)) effective = h.amount; } 
        return effective; 
    }
    
    function computeAdvanceAndPending() { 
        for(let m of appData.members) { 
            if(m.status !== 'active') continue; 
            let monthlyDonations = appData.donations.filter(d => d.memberId === m.id && d.type === 'monthly'); 
            let advanceDonations = appData.donations.filter(d => d.memberId === m.id && d.type === 'advance'); 
            let totalAdvance = advanceDonations.reduce((sum, d) => sum + d.amount, 0); 
            let allMonths = getAllMonthsFromJoinTillNow(m.joinDate); 
            let expected = 0, paid = 0; 
            for(let mon of allMonths) { 
                let monthDate = new Date(mon.year, mon.monthIndex, 1); 
                expected += getMonthlyAmountForDate(m, monthDate); 
            } 
            paid = monthlyDonations.reduce((s,d)=>s+d.amount,0); 
            let pending = expected - paid; 
            let advBal = totalAdvance; 
            if(advBal > 0 && pending > 0) { 
                if(advBal >= pending) { advBal -= pending; pending = 0; } 
                else { pending -= advBal; advBal = 0; } 
            } 
            m.pending = pending > 0 ? pending : 0; 
            m.advanceBalance = advBal > 0 ? advBal : 0; 
        } 
        saveToLocal(); 
    }

        if(!currentUser) return false;
        if(currentUser.role === 'super_admin') return true;
        if(currentUser.role === 'admin') return true;
        if(currentUser.role === 'operator' && (actionType === 'add' || actionType === 'edit')) return true;
        if(currentUser.role === 'viewer' && actionType === 'view') return true;
        return false;
    }

    function canDelete() { return currentUser?.role === 'super_admin' || currentUser?.role === 'admin'; }
    function canEditUser() { return currentUser?.role === 'super_admin'; }
    function canSendReceipt() { return ['super_admin', 'admin', 'operator'].includes(currentUser?.role); }
    function canSendBulkMessage() { return ['super_admin', 'admin'].includes(currentUser?.role); }

    function generateDetailedReminderMessage(m) { 
        const allMonths = getAllMonthsFromJoinTillNow(m.joinDate); 
        let monthStatus = ''; 
        let totalPaid = 0; 
        for(let item of allMonths) { 
            let isPaid = appData.donations.some(d => d.memberId === m.id && d.month === item.month && d.year === item.year && d.type === 'monthly'); 
            if(isPaid) { 
                monthStatus += `🗓️ ${item.month} ${item.year}: ✅ ₹${getMonthlyAmountForDate(m, new Date(item.year, item.monthIndex, 1))} (जमा है)\n`; 
                totalPaid += getMonthlyAmountForDate(m, new Date(item.year, item.monthIndex, 1)); 
            } else { 
                monthStatus += `🗓️ ${item.month} ${item.year}: ⭕ ₹${getMonthlyAmountForDate(m, new Date(item.year, item.monthIndex, 1))} शेष राशि (देय है)\n`; 
            } 
        } 
        let upiUrl = `upi://pay?pa=${appData.settings.upiId}&pn=${encodeURIComponent(m.name)}&am=${m.pending}&cu=INR`;
        let qrHtml = `\n\n👇 *QR कोड स्कैन करें:*\n${upiUrl}\n`;
        return `🚩 *जय श्री राम* 🚩\n\nआदरणीय *${m.name} जी*,\nभव्य मन्दिर निर्माण समिति आपके निरंतर सहयोग हेतु हृदय से आभारी है।\n\nआपका मासिक विवरण (ज्वाइन डेट: ${m.joinDate}) इस प्रकार है:\n\n${monthStatus}\n--------------------------------\n💰 *कुल प्राप्त सहयोग: ₹${totalPaid}*\n⚠️ *कुल शेष बकाया: ₹${m.pending}*\n💸 *UPI ID: ${appData.settings.upiId}*\n${qrHtml}\n--------------------------------\n🙏 *करबद्ध निवेदन:* कृपया अपनी शेष राशि *₹${m.pending}* जमा करें।\n\nभवदीय,\n${appData.settings.president} (अध्यक्ष)\n${appData.settings.secretary} (सचिव)`; 
    }
    
    let bulkInterval = null, bulkIndex = 0, bulkMembers = [];
    function startBulkMessage() { 
        if(!canSendBulkMessage()) { showToast("⚠️ आप बल्क मैसेज नहीं भेज सकते", true); return; } 
        if(bulkInterval) clearInterval(bulkInterval); 
        bulkMembers = appData.members.filter(m => m.status === 'active' && m.mobile); 
        if(bulkMembers.length === 0) { showToast("⚠️ कोई सदस्य नहीं है", true); return; } 
        bulkIndex = 0; 
        showToast(`📨 बल्क मैसेज शुरू... ${bulkMembers.length} सदस्य, 20 सेकंड का अंतराल`); 
        sendNextBulk(); 
        bulkInterval = setInterval(() => sendNextBulk(), 20000); 
    }
    
    function sendNextBulk() { 
        if(bulkIndex >= bulkMembers.length) { 
            clearInterval(bulkInterval); bulkInterval = null; 
            showToast("✅ सभी सदस्यों को मैसेज भेज दिया गया!"); 
            addAuditLog("बल्क_मैसेज", `कुल ${bulkMembers.length} सदस्य`); 
            return; 
        } 
        let m = bulkMembers[bulkIndex]; 
        let msg = generateDetailedReminderMessage(m); 
        window.open(`https://wa.me/91${m.mobile}?text=${encodeURIComponent(msg)}`, '_blank'); 
        showToast(`📤 ${bulkIndex+1}/${bulkMembers.length}: ${m.name}`); 
        addAuditLog("बल्क_मैसेज_भेजा", m.name); 
        bulkIndex++; 
    }
    
    function stopBulkMessage() { if(bulkInterval) { clearInterval(bulkInterval); bulkInterval = null; showToast("⏹️ बल्क मैसेज रोक दिया गया"); } }

    function renderTopDonors() {

        let html = `<div class="modal"><div class="modal-content"><h3>➕ नया यूजर</h3><input id="newUserName" placeholder="नाम" class="form-control"><input id="newUserEmail" placeholder="ईमेल" class="form-control"><input type="password" id="newUserPass" placeholder="पासवर्ड" class="form-control"><select id="newUserRole" class="form-control"><option value="admin">एडमिन</option><option value="operator">ऑपरेटर</option><option value="viewer">व्यूअर</option></select><button class="btn btn-primary" onclick="addNewUser()">बनाएं</button><button class="btn btn-secondary" onclick="closeModal()">रद्द</button></div></div>`;

    function addNewUser() { 
        let user = { id: Date.now(), name: document.getElementById('newUserName').value, email: document.getElementById('newUserEmail').value, password: document.getElementById('newUserPass').value, role: document.getElementById('newUserRole').value, created_by: currentUser.name, created_at: new Date().toISOString() }; 
        appData.users.push(user); 
        saveToLocal(); 
        closeModal(); 
        showToast("✅ नया यूजर जुड़ गया"); 
        addAuditLog("ADD_USER", user.name);

    function openEditUserModal(userId) { 
        let u = appData.users.find(u=>u.id===userId); 
        if(!u) return; 
        let html = `<div class="modal"><div class="modal-content"><h3>✏️ यूजर - ${u.name}</h3><input id="editName" value="${u.name}" class="form-control"><input id="editEmail" value="${u.email}" class="form-control"><input type="password" id="editUserPass" placeholder="नया पासवर्ड" class="form-control"><select id="editUserRole" class="form-control"><option ${u.role==='admin'?'selected':''}>एडमिन</option><option ${u.role==='operator'?'selected':''}>ऑपरेटर</option><option ${u.role==='viewer'?'selected':''}>व्यूअर</option></select><input id="editUserReason" placeholder="कारण" class="form-control"><button class="btn btn-primary" onclick="saveUserEdit(${userId})">सेव करें</button><button class="btn btn-secondary" onclick="closeModal()">रद्द</button></div></div>`; 
        document.body.insertAdjacentHTML('beforeend', html); 
    }
    
    function saveUserEdit(userId) { 
        let u = appData.users.find(u=>u.id===userId); 
        if(!u) return; 
        let reason = document.getElementById('editUserReason')?.value || "कोई कारण नहीं"; 
        let oldData = { name: u.name, email: u.email, password: u.password, role: u.role }; 
        if(document.getElementById('editName').value) u.name = document.getElementById('editName').value; 
        if(document.getElementById('editEmail').value) u.email = document.getElementById('editEmail').value; 
        if(document.getElementById('editUserPass').value) u.password = document.getElementById('editUserPass').value; 
        u.role = document.getElementById('editUserRole').value; 
        u.updated_by = currentUser.name; 
        u.updated_at = new Date().toISOString(); 
        addEditHistory(u, 'यूजर', oldData, { name: u.name, email: u.email, role: u.role }, reason); 
        saveToLocal(); 
        closeModal(); 
        showToast("✅ यूजर अपडेट हो गया"); 
        renderUserManagement(); 
        addAuditLog("EDIT_USER", u.name); 
    }
    
    function deleteUser(id) { 
        if(confirm("क्या आप इस यूजर को हटाना चाहते हैं?")) { 
            appData.users = appData.users.filter(u=>u.id!==id); 
            saveToLocal(); 
            renderUserManagement(); 
            showToast("✅ यूजर हटा दिया गया"); 
        } 
    }
    
    let selectedMembers = [];
    function renderMemberList() { 
        computeAdvanceAndPending(); 
        selectedMembers = [];
        let membersHtml = appData.members.map(m => `<div class="member-card"><div class="member-info-flex"><div>${m.photo ? `<img src="${m.photo}" class="photo-preview">` : `<div class="photo-preview" style="background:#ddd; display:flex; align-items:center; justify-content:center;">👤</div>`}<div><strong>${m.name}</strong> ${m.status !== 'active' ? '<span class="badge-inactive">निष्क्रिय</span>' : ''}<br><span style="font-size:11px;">${m.village}</span> | ₹${m.monthlyAmount}/माह<br>बकाया: <span class="badge-pending">₹${m.pending||0}</span> | एडवांस: <span class="badge-advance">₹${m.advanceBalance||0}</span></div></div><div>${canEdit() ? `<button class="btn-sm btn-primary" onclick="editMember(${m.id})">✏️</button>` : ''}<button class="btn-sm btn-secondary" onclick="toggleMemberStatus(${m.id})"><i class="fas ${m.status === 'active' ? 'fa-ban' : 'fa-check'}"></i></button><button class="btn-sm btn-success" onclick="openDonationForMember(${m.id})">💰</button><button class="btn-sm btn-info" onclick="openAdvanceModal(${m.id})">⭐</button><button class="btn-sm btn-secondary" onclick="showQRCode(${m.id})"><i class="fas fa-qrcode"></i></button><button class="btn-sm btn-warning" onclick="showMemberPaymentHistory(${m.id})">📜</button>${canSendReminder() ? `<button class="btn-sm btn-warning" onclick="sendReminder(${m.id})">📱</button>` : ''}${canDelete() ? `<button class="btn-sm btn-danger" onclick="deleteMember(${m.id})">🗑️</button>` : ''}<input type="checkbox" class="member-select" value="${m.id}" onchange="toggleMemberSelect(${m.id})" style="margin-left:8px; width:18px; height:18px;"></div></div>`).join(''); 
        document.getElementById('contentArea').innerHTML = `<div class="flex-between"><h2>👥 सदस्य सूची</h2>${canEdit() ? '<div><button class="btn btn-primary" onclick="switchSub(\'addMember\')">+</button><button class="btn btn-danger bulk-delete-btn" id="bulkDeleteBtn" style="display:none;" onclick="bulkDeleteMembers()"><i class="fas fa-trash"></i> हटाएं</button></div>' : ''}</div>
        <div class="advance-search"><input type="text" id="searchAny" placeholder="🔍 नाम / मोबाइल / गाँव से खोजें" class="form-control" onkeyup="filterMembers()"></div>
        <div id="memberListContainer">${membersHtml}</div>

        <div class="mt-2"><button class="btn btn-success" onclick="shareMemberList()"><i class="fab fa-whatsapp"></i> भेजें</button><button class="btn btn-info" onclick="printReport('members')"><i class="fas fa-print"></i> प्रिंट</button><button class="btn btn-primary" onclick="exportToExcel()"><i class="fas fa-file-excel"></i> एक्सेल</button></div>`; 
        renderEditRequests(); 
    }
    
    function filterMembers() {
        let searchTerm = document.getElementById('searchAny')?.value.toLowerCase().trim() || '';
        let filtered = appData.members.filter(m => {
            if (!searchTerm) return true;
            return (m.name || '').toLowerCase().includes(searchTerm) ||
                   (m.mobile || '').includes(searchTerm) ||
                   (m.village || '').toLowerCase().includes(searchTerm);
        });
        let container = filtered.map(m => `<div class="member-card"><div><div><strong>${m.name}</strong> ${m.status !== 'active' ? '<span class="badge-inactive">निष्क्रिय</span>' : ''}<br>${m.village} | बकाया: ₹${m.pending||0}</div></div><div><button class="btn-sm btn-success" onclick="openDonationForMember(${m.id})">💰</button><button class="btn-sm btn-info" onclick="showQRCode(${m.id})"><i class="fas fa-qrcode"></i></button><button class="btn-sm btn-warning" onclick="showMemberPaymentHistory(${m.id})">📜</button>${canSendReminder() ? `<button class="btn-sm btn-warning" onclick="sendReminder(${m.id})">📱</button>` : ''}<input type="checkbox" class="member-select" value="${m.id}" onchange="toggleMemberSelect(${m.id})" style="margin-left:8px; width:18px; height:18px;"></div></div>`).join('');
        document.getElementById('memberListContainer').innerHTML = container || '<div>कोई सदस्य नहीं</div>';
    }
    
    function toggleMemberSelect(id) {
        let cb = document.querySelector(`.member-select[value="${id}"]`);
        if(cb && cb.checked) {
            if(!selectedMembers.includes(id)) selectedMembers.push(id);
        } else {
            selectedMembers = selectedMembers.filter(i => i !== id);
        }
        let btn = document.getElementById('bulkDeleteBtn');
        if(btn) btn.style.display = selectedMembers.length > 0 ? 'inline-block' : 'none';
    }
    
    function bulkDeleteMembers() {
        if(selectedMembers.length === 0) return;
        if(confirm(`क्या आप ${selectedMembers.length} सदस्यों को हटाना चाहते हैं?`)) {
            appData.members = appData.members.filter(m => !selectedMembers.includes(m.id));
            saveToLocal();
            showToast(`✅ ${selectedMembers.length} सदस्य हटा दिए गए`);
            selectedMembers = [];
            renderMemberList();
            addAuditLog("बल्क_हटाएं", `${selectedMembers.length} सदस्य हटाए गए`);
        }
    }
    
    function deleteMember(id) {
        if(confirm("क्या आप सदस्य को हटाना चाहते हैं?")) {
            appData.members = appData.members.filter(m => m.id !== id);
            saveToLocal();
            renderMemberList();
            showToast("✅ सदस्य हटा दिया गया");
            addAuditLog("DELETE_MEMBER", `सदस्य ID: ${id} हटाया गया`);
        }
    }
    
    function toggleMemberStatus(id) {
        let m = appData.members.find(x=>x.id===id);
        if(m) {
            m.status = m.status === 'active' ? 'inactive' : 'active';
            saveToLocal();
            showToast(`${m.name} ${m.status === 'active' ? 'सक्रिय' : 'निष्क्रिय'} कर दिया गया`);
            renderMemberList();
            addAuditLog("TOGGLE_STATUS", `${m.name} -> ${m.status}`);
        }
    }
    
    function showMemberPaymentHistory(id) {
        let m = appData.members.find(x=>x.id===id);
        let payments = appData.donations.filter(d => d.memberId === id);
        let total = payments.reduce((s,d)=>s+d.amount,0);
        let html = `<div class="modal"><div class="modal-content"><h3>📜 ${m.name} का भुगतान इतिहास</h3><p><strong>कुल दान:</strong> ₹${total}</p><div class="payment-history"><div style="overflow-x:auto;"><table class="data-table"><thead><th>तिथि</th><th>राशि</th><th>मोड</th><th>रसीद नं.</th></thead><tbody>`;
        if(payments.length === 0) html += `<tr><td colspan="4">कोई भुगतान नहीं</td></tr>`;
        else payments.reverse().forEach(p => { html += `<tr><td style="color:var(--saffron);">${new Date(p.date).toLocaleDateString('hi-IN')}</td><td style="color:var(--success);">₹${p.amount}</td><td style="color:var(--gray);">${p.mode || 'कैश'}</td><td style="color:var(--gray);">${p.receiptNo || '-'}</td></tr>`; });
        html += `</tbody></table></div><button class="btn btn-primary mt-2" onclick="printMemberPaymentHistory(${id})"><i class="fas fa-print"></i> प्रिंट करें</button><button class="btn btn-secondary mt-2" onclick="closeModal()">बंद करें</button></div></div>`;
        document.body.insertAdjacentHTML('beforeend', html);
    }

        let m = appData.members.find(x=>x.id===id);

        let total = payments.reduce((s,d)=>s+d.amount,0);

        let req = appData.pendingEdits.find(r => r.id === id);

        m.updated_at = new Date().toISOString(); 
        addEditHistory(m, 'सदस्य', oldData, { [req.field]: req.newValue }, req.reason);

        saveToLocal(); 
        renderMemberList(); 
        showToast("✅ एडिट approved");

    function previewBulkCsv() { 
        let csvData = document.getElementById('bulkCsvData').value; 
        let lines = csvData.split('\n'); 
        bulkMembersList = []; 
        for(let line of lines) { 
            line = line.trim(); 
            if(!line) continue; 
            let parts = line.split(','); 
            if(parts.length >= 1 && parts[0].trim()) { 
                let name = parts[0]?.trim() || ''; 
                let mobile = parts[1]?.trim() || ''; 
                let amount = parts[2] ? parseFloat(parts[2].trim()) : appData.settings.defaultMonthly; 
                if(name && mobile && isValidMobile(mobile) && !isDuplicateMobile(mobile)) bulkMembersList.push({ name, father: "", mobile, village: "", amount, joinDate: new Date().toISOString().slice(0,10), photo: "" }); 
                else if(mobile && !isValidMobile(mobile)) showToast(`⚠️ ${mobile} गलत मोबाइल नंबर`, true); 
                else if(mobile && isDuplicateMobile(mobile)) showToast(`⚠️ ${mobile} पहले से रजिस्टर है`, true); 
            } 
        } 
        if(bulkMembersList.length === 0) { showToast("⚠️ कोई वैलिड डेटा नहीं", true); return; } 
        let previewHtml = `<h4>${bulkMembersList.length} सदस्य मिले:</h4>`; 
        bulkMembersList.slice(0,20).forEach((m, idx) => { previewHtml += `<div class="bulk-list-item"><span><strong>${m.name}</strong> - ${m.mobile} - ₹${m.amount}</span></div>`; }); 
        document.getElementById('bulkPreviewContainer').innerHTML = previewHtml; 
        document.getElementById('bulkPreviewContainer').style.display = 'block'; 
        document.getElementById('saveBulkBtn').style.display = 'inline-block'; 
    }
    
    function saveBulkCsv() { 
        if(bulkMembersList.length === 0) { showToast("⚠️ कोई सदस्य नहीं", true); return; } 
        for(let m of bulkMembersList) { 
            appData.members.push({ id: Date.now() + Math.random(), name: m.name, father: m.father, mobile: m.mobile, village: m.village, monthlyAmount: m.amount, monthlyAmountHistory: [{ amount: m.amount, effectiveDate: m.joinDate }], joinDate: m.joinDate, status: 'active', photo: m.photo, advanceBalance: 0, pending: 0, created_by: currentUser.name, created_at: new Date().toISOString(), editHistory: [] }); 
        } 
        computeAdvanceAndPending(); 
        saveToLocal(); 
        showToast(bulkMembersList.length + " सदस्य जुड़ गए"); 
        bulkMembersList = []; 
        document.getElementById('bulkPreviewContainer').style.display = 'none'; 
        document.getElementById('saveBulkBtn').style.display = 'none'; 
        document.getElementById('bulkCsvData').value = ''; 
        switchSub('memberList'); 
    }

    function addCommittee() { 
        if(!canEdit()) { showToast("⚠️ आप समिति नहीं जोड़ सकते", true); return; } 
        let year = prompt("वर्ष:", new Date().getFullYear()); 
        if(year) { 
            let members = [];
            let addMore = true;
            while(addMore) {
                let post = prompt("पद (जैसे: अध्यक्ष, सचिव, कोषाध्यक्ष, सदस्य)");
                if(!post) break;
                let name = prompt(`${post} का नाम`);
                if(name) members.push({ name, post });
                addMore = confirm("और सदस्य जोड़ें?");
            }
            if(members.length === 0) {
                let president = prompt("अध्यक्ष का नाम:");
                let secretary = prompt("सचिव का नाम:");
                if(president) members.push({ name: president, post: "अध्यक्ष" });
                if(secretary) members.push({ name: secretary, post: "सचिव" });
            }
            appData.committees.push({ id: Date.now(), year: parseInt(year), members: members, created_by: currentUser.name, created_at: new Date().toISOString() }); 
            saveToLocal(); 
            renderCommittees(); 
            showToast("✅ नई समिति जोड़ दी गई");

    function saveAmountChange(memberId) { 
        let m = appData.members.find(x=>x.id===memberId);

        let effectiveDate = document.getElementById('effectiveDate').value; 
        let reason = document.getElementById('changeReason').value || "राशि बदली गई"; 
        if(isNaN(newAmount) || newAmount <= 0) { showToast("⚠️ सही राशि डालें", true); return; }

        m.monthlyAmount = newAmount; 
        m.updated_by = currentUser.name; 
        m.updated_at = new Date().toISOString(); 
        addEditHistory(m, 'राशि_बदली', { amount: oldAmount }, { amount: newAmount, effectiveDate: effectiveDate }, reason); 
        computeAdvanceAndPending(); 
        saveToLocal();

        members.forEach(m => {

            const pendingTotal = pendingMonths.length * m.monthlyAmount; 
            panelHtml += `<div class="member-card"><div><strong>${m.name}</strong> <span class="badge-pending">${pendingMonths.length} माह (₹${pendingTotal})</span></div><div><button class="btn-sm btn-success" onclick="openPaymentModal(${m.id})">💳 भुगतान</button><button class="btn-sm btn-info" onclick="openMultiYearPaymentModal(${m.id})">📅 सभी</button><button class="btn-sm btn-warning" onclick="showMemberPaymentHistory(${m.id})">📜 इतिहास</button></div></div>`; 
        }); 
        document.getElementById('membersDonationPanel').innerHTML = panelHtml; 
        let historyRows = [...appData.donations].sort((a,b)=>b.id-a.id).slice(0,30).map(d=>`<div class="donation-row"><span><strong>${d.memberName}</strong> - ₹${d.amount} | ${d.mode} | ${d.receiptNo}</span></div>`).join(''); 
        document.getElementById('donationHistoryList').innerHTML = historyRows; 
    }
    
    function getPendingMonthsForMember(memberId, selectedYear = null) { 
        let m = appData.members.find(x=>x.id===memberId); 
        if(!m) return []; 
        const allMonths = getAllMonthsFromJoinTillNow(m.joinDate); 
        const paidMonths = appData.donations.filter(d => d.memberId === m.id && d.type === 'monthly').map(d => ({ year: d.year, month: d.month })); 
        let pending = []; 
        for(let item of allMonths) { 
            if(selectedYear && item.year !== selectedYear) continue; 
            if(!paidMonths.some(p => p.year === item.year && p.month === item.month)) pending.push(item); 
        } 
        return pending; 
    }
    
    function openPaymentModal(memberId) {
        let m = appData.members.find(x=>x.id===memberId);
        if(!m) return;
        let amount = prompt(`₹ राशि दर्ज करें (${m.name})`);
        if(amount && !isNaN(amount) && parseFloat(amount) > 0) {
            let donation = { id: Date.now(), memberId, memberName: m.name, type: "monthly", amount: parseFloat(amount), receiptNo: getNextReceiptNo(), date: new Date().toISOString().slice(0,10), mode: "cash", created_by: currentUser.name };
            appData.donations.push(donation);
            computeAdvanceAndPending();
            saveToLocal();
            let currentMonth = new Date().toLocaleString('default', { month: 'long' });
            let currentYear = new Date().getFullYear();
            generateReceipt(m, [{ month: currentMonth, year: currentYear, amount: parseFloat(amount) }], parseFloat(amount), "cash", "मासिक भुगतान");
            showToast(`✅ ₹${amount} का भुगतान सफल`);
            addAuditLog("PAYMENT", `${m.name} - ₹${amount}`);
            renderCurrentPage();
        } else {
            showToast("⚠️ सही राशि डालें", true);
        }
    }
    
    function openMultiYearPaymentModal(memberId) { 
        let m = appData.members.find(x=>x.id===memberId); 
        let allMonths = getAllMonthsFromJoinTillNow(m.joinDate); 
        let paidMonths = appData.donations.filter(d => d.memberId === m.id && d.type === 'monthly').map(d => ({ year: d.year, month: d.month })); 
        let pendingItems = []; 
        for(let item of allMonths) { 
            if(!paidMonths.some(p => p.year === item.year && p.month === item.month)) { 
                pendingItems.push({ year: item.year, month: item.month }); 
            } 
        } 
        if(pendingItems.length === 0) { showToast("⚠️ कोई बकाया नहीं है", true); return; } 
        let totalAmount = pendingItems.length * m.monthlyAmount;
        if(confirm(`कुल ${pendingItems.length} महीने बकाया हैं। कुल राशि: ₹${totalAmount}। क्या आप भुगतान करना चाहते हैं?`)) {
            let paidMonthsList = [];
            for(let p of pendingItems) {
                let donation = { id: Date.now(), memberId, memberName: m.name, type: "monthly", month: p.month, year: p.year, amount: m.monthlyAmount, receiptNo: getNextReceiptNo(), date: new Date().toISOString().slice(0,10), mode: "cash", created_by: currentUser.name };
                appData.donations.push(donation);
                paidMonthsList.push({ month: p.month, year: p.year, amount: m.monthlyAmount });
            }
            computeAdvanceAndPending();
            saveToLocal();
            generateReceipt(m, paidMonthsList, totalAmount, "cash", "मासिक भुगतान (सभी बकाया)");
            showToast(`✅ ₹${totalAmount} का भुगतान सफल`);
            addAuditLog("MULTI_PAYMENT", `${m.name} - ${pendingItems.length} महीने`);
            renderCurrentPage();
        }
    }

    function renderLedger() {
        let currentYear = new Date().getFullYear();

        let months = ['जनवरी', 'फरवरी', 'मार्च', 'अप्रैल', 'मई', 'जून', 'जुलाई', 'अगस्त', 'सितम्बर', 'अक्टूबर', 'नवम्बर', 'दिसम्बर'];

        let html = `<div class="card"><div class="card-title">📒 लेजर (वर्षवार)</div><div class="flex-between"><label>📅 वर्ष: </label><select id="ledgerYearSelect" class="form-control" style="width:auto;">${yearOptions}</select><button class="btn-sm btn-primary" onclick="renderLedger()">देखें</button></div><div id="ledgerContent"></div><div class="mt-2"><button class="btn btn-success" onclick="shareLedger()"><i class="fab fa-whatsapp"></i> भेजें</button><button class="btn btn-info" onclick="printReport('ledger')"><i class="fas fa-print"></i> प्रिंट</button><button class="btn btn-primary" onclick="exportToExcel()"><i class="fas fa-file-excel"></i> एक्सेल</button></div></div>`;
        document.getElementById('contentArea').innerHTML = html;
        function updateLedgerContent() {
            let year = parseInt(document.getElementById('ledgerYearSelect').value);
            let monthlyRows = '';
            let totalIncome = 0;
            let totalExpense = 0;
            for(let i = 0; i < 12; i++) {
                let income = appData.donations.filter(d => { let dDate = new Date(d.date); return dDate.getMonth() === i && dDate.getFullYear() === year; }).reduce((s, d) => s + d.amount, 0);
                let expense = appData.expenses.filter(e => { let eDate = new Date(e.date); return eDate.getMonth() === i && eDate.getFullYear() === year; }).reduce((s, e) => s + e.amount, 0);
                totalIncome += income;
                totalExpense += expense;
                monthlyRows += `<tr><td style="color:var(--saffron);">${months[i]}<td style="color:var(--success);">₹${income.toFixed(2)}<td style="color:var(--danger);">₹${expense.toFixed(2)}<td style="color:${income - expense >= 0 ? 'var(--success)' : 'var(--danger)'};">₹${(income - expense).toFixed(2)}</td>`;
            }
            let contentHtml = `<div class="yearly-stats"><div class="yearly-stat-card"><h4>कुल आय</h4><p style="color:var(--success);">₹${totalIncome.toFixed(2)}</p></div><div class="yearly-stat-card"><h4>कुल व्यय</h4><p style="color:var(--danger);">₹${totalExpense.toFixed(2)}</p></div><div class="yearly-stat-card"><h4>शेष</h4><p style="color:var(--saffron);">₹${(totalIncome - totalExpense).toFixed(2)}</p></div></div><div style="overflow-x:auto;"><table class="data-table"><thead><th>महीना</th><th>आय (₹)</th><th>व्यय (₹)</th><th>लाभ/हानि</th></thead><tbody>${monthlyRows}</tbody><tfoot><tr style="background:#f0f0f0; font-weight:bold;"><th>कुल योग</th><td style="color:var(--success);">₹${totalIncome.toFixed(2)}</th><td style="color:var(--danger);">₹${totalExpense.toFixed(2)}</th><td style="color:${totalIncome - totalExpense >= 0 ? 'var(--success)' : 'var(--danger)'};">₹${(totalIncome - totalExpense).toFixed(2)}</th></tr></tfoot></div>`;
            document.getElementById('ledgerContent').innerHTML = contentHtml;
        }
        updateLedgerContent();
        document.getElementById('ledgerYearSelect').addEventListener('change', updateLedgerContent);
    }

        let years = [...new Set([...appData.donations.map(d=>new Date(d.date).getFullYear()), new Date().getFullYear()])].sort();
        let yearOptions = years.map(y => `<option value="${y}" ${y === years[years.length-1] ? 'selected' : ''}>${y}</option>`).join('');
        let html = `<div class="card"><div class="card-title">📈 ट्रेंड रिपोर्ट</div>
        <div class="flex-between"><label>वर्ष:</label><select id="trendYearSelect" class="form-control" style="width:120px;">${yearOptions}</select><button class="btn btn-primary" onclick="updateTrendChart()">देखें</button></div>
        <canvas id="trendChartCanvas" style="height:200px; margin-top:15px;"></canvas>
        <div id="trendStats"></div>
        </div>`;
        document.getElementById('contentArea').innerHTML = html;
        updateTrendChart();
    }
    
    function updateTrendChart() {
        let year = parseInt(document.getElementById('trendYearSelect').value);
        let months = ['जन', 'फर', 'मार्च', 'अप्रैल', 'मई', 'जून', 'जुलाई', 'अग', 'सित', 'अक्टू', 'नव', 'दिस'];
        let monthlyIncome = months.map((_,idx) => appData.donations.filter(d=>new Date(d.date).getMonth()===idx && new Date(d.date).getFullYear()===year).reduce((s,d)=>s+d.amount,0));
        let monthlyExpense = months.map((_,idx) => appData.expenses.filter(e=>new Date(e.date).getMonth()===idx && new Date(e.date).getFullYear()===year).reduce((s,e)=>s+e.amount,0));
        const ctx = document.getElementById('trendChartCanvas')?.getContext('2d');
        if(ctx) { if(charts.trend) charts.trend.destroy(); charts.trend = new Chart(ctx, { type:'line', data:{ labels:months, datasets:[{ label:'आय (₹)', data:monthlyIncome, borderColor:'#28a745', fill:false }, { label:'व्यय (₹)', data:monthlyExpense, borderColor:'#dc3545', fill:false }] }, options: { responsive: true } }); }
        let totalIncome = monthlyIncome.reduce((a,b)=>a+b,0);
        let totalExpense = monthlyExpense.reduce((a,b)=>a+b,0);
        document.getElementById('trendStats').innerHTML = `<div class="yearly-stats"><div class="yearly-stat-card"><h4>कुल आय</h4><p style="color:green;">₹${totalIncome}</p></div><div class="yearly-stat-card"><h4>कुल व्यय</h4><p style="color:red;">₹${totalExpense}</p></div><div class="yearly-stat-card"><h4>शेष</h4><p style="color:orange;">₹${totalIncome-totalExpense}</p></div></div>`;
    }
    
    function renderProfitLoss() {
        let years = [...new Set([...appData.donations.map(d=>new Date(d.date).getFullYear()), new Date().getFullYear()])].sort();
        let rows = years.map(y => {
            let income = appData.donations.filter(d=>new Date(d.date).getFullYear()===y).reduce((s,d)=>s+d.amount,0);
            let expense = appData.expenses.filter(e=>new Date(e.date).getFullYear()===y).reduce((s,e)=>s+e.amount,0);
            return `<tr><td style="color:var(--saffron);">${y}</td><td style="color:var(--success);">₹${income}</td><td style="color:var(--danger);">₹${expense}</td><td style="color:${income-expense>=0?'var(--success)':'var(--danger)'};">₹${income-expense}</td></tr>`;
        }).join('');
        let totalIncome = appData.donations.reduce((s,d)=>s+d.amount,0);
        let totalExpense = appData.expenses.reduce((s,e)=>s+e.amount,0);
        let html = `<div class="card"><div class="card-title">📊 लाभ/हानि रिपोर्ट</div>
        <div style="overflow-x:auto;"><table class="data-table"><thead><th>वर्ष</th><th>आय (₹)</th><th>व्यय (₹)</th><th>लाभ/हानि (₹)</th></thead><tbody>${rows}</tbody>
        <tfoot><tr style="background:#f0f0f0; font-weight:bold;"><th>कुल</th><td style="color:var(--success);">₹${totalIncome}</td><td style="color:var(--danger);">₹${totalExpense}</td><td style="color:${totalIncome-totalExpense>=0?'var(--success)':'var(--danger)'};">₹${totalIncome-totalExpense}</td></tr></tfoot>
        </table></div></div>`;
        document.getElementById('contentArea').innerHTML = html;
    }
    
    function renderGeneralSettings() { 
        let pendingRequestsHtml = ''; 
        if(currentUser.role === 'super_admin' && appData.pendingLogoRequests && appData.pendingLogoRequests.length > 0) { 
            pendingRequestsHtml = `<div class="card"><div class="card-title">⏳ लोगो अनुमति रिक्वेस्ट</div>${appData.pendingLogoRequests.map(req => `<div class="member-card"><div><strong>${req.requestedBy}</strong><br>कारण: ${req.reason}<br><img src="${req.newLogo}" width="40" height="40" style="border-radius:50%;"></div><div><button class="btn-sm btn-success" onclick="approveLogoRequest(${req.id})">✅</button><button class="btn-sm btn-danger" onclick="rejectLogoRequest(${req.id})">❌</button></div></div>`).join('')}</div>`; 
        } 
        document.getElementById('contentArea').innerHTML = pendingRequestsHtml + `<div class="card"><div class="card-title">⚙️ सेटिंग्स</div><input id="setName" value="${appData.settings.committeeName}" class="form-control"><input id="setSub" value="${appData.settings.committeeSubtitle}" class="form-control"><input id="setUpi" value="${appData.settings.upiId}" class="form-control"><input id="president" value="${appData.settings.president}" class="form-control"><input id="presidentMobile" value="${appData.settings.presidentMobile}" class="form-control"><input id="secretary" value="${appData.settings.secretary}" class="form-control"><input type="file" id="logoUpload" accept="image/*" class="form-control">${currentUser.role === 'admin' ? '<input id="logoChangeReason" placeholder="लोगो बदलने का कारण" class="form-control">' : ''}<button class="btn btn-primary" onclick="saveGeneralSettings()">सेव करें</button></div>`; 
        if(appData.settings.logo) document.querySelector('#contentArea .card').innerHTML += `<img src="${appData.settings.logo}" style="width:50px;height:50px;border-radius:50%;margin-top:10px;">`; 
    }
    
    function saveGeneralSettings() { 
        let logoFile = document.getElementById('logoUpload').files[0]; 
        let saveSettings = (logoUrl) => { 
            appData.settings.committeeName = document.getElementById('setName').value; 
            appData.settings.committeeSubtitle = document.getElementById('setSub').value; 
            appData.settings.upiId = document.getElementById('setUpi').value; 
            appData.settings.president = document.getElementById('president').value; 
            appData.settings.presidentMobile = document.getElementById('presidentMobile').value; 
            appData.settings.secretary = document.getElementById('secretary').value; 
            if(logoUrl) { 
                if(currentUser.role === 'super_admin') { 
                    appData.settings.logo = logoUrl; 
                    saveToLocal(); 
                    document.getElementById('committeeLogoImg').src = logoUrl; 
                    showToast("✅ लोगो बदल दिया गया"); 
                    addAuditLog("LOGO_CHANGED", currentUser.name); 
                } else if(currentUser.role === 'admin') { 
                    let reason = document.getElementById('logoChangeReason')?.value || "लोगो बदलने की अनुमति"; 
                    if(!appData.pendingLogoRequests) appData.pendingLogoRequests = []; 
                    appData.pendingLogoRequests.push({ id: Date.now(), requestedBy: currentUser.name, reason: reason, newLogo: logoUrl }); 
                    saveToLocal(); 
                    showToast("✅ लोगो बदलने की रिक्वेस्ट भेज दी गई"); 
                    addAuditLog("LOGO_CHANGE_REQUEST", `${currentUser.name} - कारण: ${reason}`); 
                } 
            } else { 
                saveToLocal(); 
                showToast("✅ सेटिंग्स सेव हो गईं"); 
            } 
            document.getElementById('headerTitle').innerHTML = appData.settings.committeeName; 
            renderGeneralSettings(); 
        }; 
        if(logoFile) { let reader = new FileReader(); reader.onload = e => saveSettings(e.target.result); reader.readAsDataURL(logoFile); } else { saveSettings(null); } 
    }
    
    function approveLogoRequest(id) { 
        let req = appData.pendingLogoRequests.find(r => r.id === id); 
        if(req) { 
            appData.settings.logo = req.newLogo; 
            appData.pendingLogoRequests = appData.pendingLogoRequests.filter(r => r.id !== id); 
            saveToLocal(); 
            document.getElementById('committeeLogoImg').src = req.newLogo; 
            showToast("✅ लोगो बदलने की अनुमति दे दी गई"); 
            addAuditLog("LOGO_CHANGE_APPROVED", `${currentUser.name} ने ${req.requestedBy} को अनुमति दी`); 
            renderGeneralSettings(); 
        } 
    }
    
    function rejectLogoRequest(id) { 
        appData.pendingLogoRequests = appData.pendingLogoRequests.filter(r => r.id !== id); 
        saveToLocal(); 
        showToast("❌ लोगो बदलने की अनुमति अस्वीकृत कर दी गई"); 
        renderGeneralSettings(); 
    }
    
    function renderSocialSettings() { 
        if(!canEdit()) { document.getElementById('contentArea').innerHTML = '<div class="card">❌ आप सोशल सेटिंग्स नहीं बदल सकते</div>'; return; } 
        document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-title">🔗 सोशल सेटिंग्स</div><input id="fbLink" value="${appData.settings.facebookLink || ''}" placeholder="फेसबुक" class="form-control"><input id="instaLink" value="${appData.settings.instagramLink || ''}" placeholder="इंस्टाग्राम" class="form-control"><input id="youtubeLink" value="${appData.settings.youtubeLink || ''}" placeholder="यूट्यूब" class="form-control"><button class="btn btn-primary" onclick="saveSocialSettings()">सेव करें</button></div>`; 
    }
    
    function saveSocialSettings() { 
        appData.settings.facebookLink = document.getElementById('fbLink').value; 
        appData.settings.instagramLink = document.getElementById('instaLink').value; 
        appData.settings.youtubeLink = document.getElementById('youtubeLink').value; 
        saveToLocal(); 
        showToast("✅ सेव हो गया"); 
        addAuditLog("SOCIAL_SETTINGS_CHANGED", currentUser.name); 
    }
    
    function renderGoogleSheets() { 
        if(!canEdit()) { document.getElementById('contentArea').innerHTML = '<div class="card">❌ आप Google Sheets सेटिंग्स नहीं बदल सकते</div>'; return; } 
        document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-title">📊 Google Sheets</div><button class="btn btn-primary" onclick="exportToExcel()"><i class="fas fa-file-excel"></i> एक्सेल डाउनलोड करें</button><div class="install-guide mt-2"><i class="fas fa-info-circle"></i> एक्सेल फाइल डाउनलोड करें, फिर Google Sheets में इम्पोर्ट करें।</div></div>`; 
    }
    
    function renderBackup() { 
        document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-title">📦 बैकअप</div><button class="btn btn-success" onclick="exportToExcel()"><i class="fas fa-file-excel"></i> एक्सेल बैकअप</button><button class="btn btn-info" onclick="backupToGoogleDrive()"><i class="fab fa-google-drive"></i> Google Drive बैकअप</button><div class="install-guide"><i class="fas fa-cloud"></i> सारा डेटा Firebase Cloud पर सेव है। कोई डेटा लॉस नहीं होगा!</div></div>`; 
    }
    
    function renderUsers() { 
        if(!canEditUser()) { document.getElementById('contentArea').innerHTML = '<div class="card">❌ केवल सुपर एडमिन</div>'; return; } 
        let userHtml = appData.users.map(u=>`<div class="member-card"><div>${u.name} (${u.role})<br><span style="font-size:10px;">बनाया: ${u.created_by}</span></div><button class="btn-sm btn-danger" onclick="deleteUser(${u.id})">🗑️</button></div>`).join(''); 
        document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-title">👥 यूजर प्रबंधन</div>${userHtml}<button class="btn btn-primary" onclick="openAddUserModal()">+ नया यूजर</button></div>`; 
    }
    
    function renderTheme() { 
        document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-title">🎨 थीम</div><div style="display:flex; justify-content:center; gap:15px; padding:10px;"><div class="theme-icon" onclick="changeTheme('#FF9933')" style="color:#FF9933;"><i class="fas fa-palette fa-2x"></i><div>भगवा</div></div><div class="theme-icon" onclick="changeTheme('#28a745')" style="color:#28a745;"><i class="fas fa-palette fa-2x"></i><div>हरा</div></div><div class="theme-icon" onclick="changeTheme('#dc3545')" style="color:#dc3545;"><i class="fas fa-palette fa-2x"></i><div>लाल</div></div><div class="theme-icon" onclick="changeTheme('#007bff')" style="color:#007bff;"><i class="fas fa-palette fa-2x"></i><div>नीला</div></div></div><button class="btn btn-primary" onclick="document.body.classList.toggle('dark')">🌙 डार्क मोड</button></div>`; 
    }
    
    function changeTheme(color) { 
        document.documentElement.style.setProperty('--saffron', color); 
        document.documentElement.style.setProperty('--saffron-dark', color); 
        document.documentElement.style.setProperty('--gold', color); 
        showToast("✅ थीम बदल दी गई"); 
        addAuditLog("THEME_CHANGED", color); 
    }
    
    function renderDigitalSignature() {
        if(!canEditUser()) { document.getElementById('contentArea').innerHTML = '<div class="card">❌ केवल सुपर एडमिन</div>'; return; }
        let html = `<div class="card"><div class="card-title">🖊️ डिजिटल सिग्नेचर</div>
            <p>अध्यक्ष का डिजिटल सिग्नेचर रसीद पर दिखेगा</p>
            ${appData.settings.digitalSignature ? `<img src="${appData.settings.digitalSignature}" style="width:150px; border:1px solid #ddd; border-radius:10px; margin:10px 0;">` : ''}
            <input type="file" id="signatureUpload" accept="image/*" class="form-control">
            <button class="btn btn-primary" onclick="uploadSignature()">अपलोड करें</button>
        </div>`;
        document.getElementById('contentArea').innerHTML = html;
    }
    
    function uploadSignature() {
        let file = document.getElementById('signatureUpload').files[0];
        if(file) {
            let reader = new FileReader();
            reader.onload = (e) => {
                appData.settings.digitalSignature = e.target.result;
                saveToLocal();
                showToast("✅ डिजिटल सिग्नेचर अपलोड हो गया");
                renderDigitalSignature();
            };
            reader.readAsDataURL(file);
        } else { showToast("⚠️ फाइल चुनें", true); }
    }
    
    function renderPendingRequests() {
        let html = `<div class="card"><div class="card-title">⏳ लंबित रिक्वेस्ट (${appData.pendingRequests.length})</div>`;
        appData.pendingRequests.forEach(req => {
            html += `<div class="request-card"><div><strong>${req.requestedBy}</strong> (${req.requestedByRole})<br>कार्य: ${req.action}<br>डाटा प्रकार: ${req.dataType}<br><small>${new Date(req.createdAt).toLocaleString()}</small></div><div><button class="btn-sm btn-success" onclick="approveRequest(${req.id})">✅ स्वीकार</button><button class="btn-sm btn-danger" onclick="rejectRequest(${req.id})">❌ अस्वीकार</button></div></div>`;
        });
        html += `</div><div class="card"><div class="card-title">📝 डाटा शिकायत रिक्वेस्ट (${appData.dataChangeRequests.length})</div>`;
        appData.dataChangeRequests.forEach(req => {
            html += `<div class="request-card"><div><strong>${req.requestedBy}</strong> (${req.requestedByRole})<br>${req.details || "डाटा गलत है"}<br><small>${new Date(req.createdAt).toLocaleString()}</small></div><div><button class="btn-sm btn-success" onclick="approveDataRequest(${req.id})">✅ स्वीकार</button><button class="btn-sm btn-danger" onclick="rejectDataRequest(${req.id})">❌ अस्वीकार</button></div></div>`;
        });
        html += `</div>`;
        document.getElementById('contentArea').innerHTML = html;
    }
    
    function approveRequest(requestId) {
        let req = appData.pendingRequests.find(r => r.id === requestId);
        if(req) {
            appData.pendingRequests = appData.pendingRequests.filter(r => r.id !== requestId);
            saveAllToFirebase();
            showToast(`✅ रिक्वेस्ट स्वीकृत`);
            updatePendingBadge();
            renderCurrentPage();
        }
    }
    
    function rejectRequest(requestId) {
        appData.pendingRequests = appData.pendingRequests.filter(r => r.id !== requestId);
        saveAllToFirebase();
        showToast(`❌ रिक्वेस्ट अस्वीकृत`);
        updatePendingBadge();
        renderCurrentPage();
    }
    
    function approveDataRequest(requestId) {
        appData.dataChangeRequests = appData.dataChangeRequests.filter(r => r.id !== requestId);
        saveAllToFirebase();
        showToast(`✅ शिकायत स्वीकार`);
        updatePendingBadge();
        renderPendingRequests();
    }
    
    function rejectDataRequest(requestId) {
        appData.dataChangeRequests = appData.dataChangeRequests.filter(r => r.id !== requestId);
        saveAllToFirebase();
        showToast(`❌ शिकायत अस्वीकृत`);
        updatePendingBadge();
        renderPendingRequests();
    }
    
    function renderCurrentPage() { 
        if(!dataLoaded && currentUser) return; 
        const pages = { 
            home: { dashboard: renderDashboard, profile: renderProfile, userManagement: renderUserManagement, topDonors: renderTopDonors, loginHistory: renderLoginHistory, pendingRequests: renderPendingRequests, announcements: renderAnnouncements }, 
            members: { memberList: renderMemberList, addMember: renderAddMember, bulkImport: renderBulkImport, updateMissingFields: renderUpdateMissingFields, memberHistory: renderMemberHistory, committees: renderCommittees, changeAmount: renderChangeAmount }, 
            finance: { donations: renderDonations, pending: renderPendingList, receipts: renderReceipts, receiptsList: renderReceiptsList, generalDonations: renderGeneralDonations, advancePayment: renderAdvancePayment, expenses: renderExpenses, ledger: renderLedger }, 
            temple: { ramcharitmanas: renderRamcharitmanas, events: renderEvents, construction: renderConstruction, gallery: renderGallery, socialLinks: renderSocialLinks, groups: renderGroups, channel: renderChannel, meetings: renderMeetings }, 
            reports: { monthlyReport: renderMonthlyReport, yearlyReport: renderYearlyReport, pendingReport: renderPendingReport, auditReport: renderAuditReport, trendReport: renderTrendReport, profitLoss: renderProfitLoss }, 
            settings: { generalSettings: renderGeneralSettings, socialSettings: renderSocialSettings, googleSheets: renderGoogleSheets, backup: renderBackup, users: renderUsers, theme: renderTheme, digitalSignature: renderDigitalSignature } 
        }; 
        if(pages[currentMain] && pages[currentMain][currentSub]) pages[currentMain][currentSub](); 
        else renderDashboard(); 
    }
    
    document.getElementById('darkModeToggle')?.addEventListener('click', () => { document.body.classList.toggle('dark'); addAuditLog("DARK_MODE", document.body.classList.contains('dark') ? "चालू" : "बंद"); });
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches && !localStorage.getItem('theme')) document.body.classList.add('dark');
    
    loadAllDataFromFirebase();
    initSampleData();
    ensureDefaultUsers();
</script>
</body>
</html>
