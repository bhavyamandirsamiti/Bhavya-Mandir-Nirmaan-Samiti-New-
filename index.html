<!-- ✅ Firebase REST API - No SDK needed, pure fetch() based sync -->
<script>
// ============================================================
// FIREBASE REST API SYNC (No external SDK required)
// Uses Firebase Realtime Database REST API with fetch()
// ============================================================
(function setupFirebaseREST() {

    var DB_URL  = 'https://new-samiti-aap-default-rtdb.asia-southeast1.firebasedatabase.app';
    var API_KEY = 'AIzaSyDBRscvXfuhZe9WKb6ZZloJDfcWggnuTCg';
    var PATH    = '/mandirAppV14';
    var TOKEN   = null;
    var _syncTimer = null;
    var _tokenExpiry = 0; // token expiry timestamp

    // ---- Anonymous sign-in (Firebase Auth REST) ----
    function signInAnonymously(cb) {
        fetch('https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=' + API_KEY, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ returnSecureToken: true })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if(data.idToken) {
                TOKEN = data.idToken;
                // Token valid for 1 hour
                _tokenExpiry = Date.now() + (55 * 60 * 1000);
                cb(true);
            } else {
                TOKEN = null;
                cb(false);
            }
        })
        .catch(function() { TOKEN = null; cb(false); });
    }

    // ---- Ensure token is fresh ----
    function ensureToken(cb) {
        if(TOKEN && Date.now() < _tokenExpiry) { cb(); return; }
        signInAnonymously(function() { cb(); });
    }

    // ---- Build URL with optional auth ----
    function buildUrl(path) {
        return DB_URL + path + '.json' + (TOKEN ? '?auth=' + TOKEN : '');
    }

    // ---- Read from Firebase ----
    function fbRead(cb) {
        ensureToken(function() {
            fetch(buildUrl(PATH))
            .then(function(r) {
                if(!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            })
            .then(function(data) { cb(null, data); })
            .catch(function(e) { cb(e, null); });
        });
    }

    // ---- Write to Firebase (PUT) ----
    function fbWrite(data, cb) {
        ensureToken(function() {
            // Strip large binary data (photos) before pushing to Firebase
            var payload = JSON.parse(JSON.stringify(data));
            // Remove base64 photos to keep payload small
            if(payload.members) payload.members.forEach(function(m) {
                if(m.photo && m.photo.length > 5000) m.photo = '';
            });
            if(payload.settings && payload.settings.logo && payload.settings.logo.length > 5000) {
                payload.settings.logo = '';
            }
            if(payload.gallery) payload.gallery = [];
            if(payload.mediaFiles) payload.mediaFiles = [];

            fetch(buildUrl(PATH), {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(function(r) {
                if(!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            })
            .then(function() { if(cb) cb(null); })
            .catch(function(e) { if(cb) cb(e); });
        });
    }

    // ---- Test connectivity ----
    function checkOnline(cb) {
        if(!navigator.onLine) { cb(false); return; }
        fetch(DB_URL + '/.json?shallow=true&timeout=5s')
        .then(function(r) { cb(r.ok || r.status === 401); })
        .catch(function() { cb(false); });
    }

    // ---- Start sync ----
    window.connectFirebase = function() {
        checkOnline(function(online) {
            if(!online) { updateSyncIndicator(false); return; }

            signInAnonymously(function(authed) {
                firebaseConnected = true;
                updateSyncIndicator(true);
                showSyncStatus('🔗 Firebase से जुड़ रहे हैं...');

                // Read latest data from Firebase
                fbRead(function(err, fbData) {
                    if(!err && fbData && typeof fbData === 'object' && Object.keys(fbData).length > 0) {
                        // Smart merge: Firebase wins for most fields, but keep local photos
                        var localPhotos = {};
                        if(appData.members) appData.members.forEach(function(m) {
                            if(m.photo) localPhotos[m.id] = m.photo;
                        });
                        appData = Object.assign({}, appData, fbData);
                        // Restore local photos
                        if(appData.members) appData.members.forEach(function(m) {
                            if(!m.photo && localPhotos[m.id]) m.photo = localPhotos[m.id];
                        });
                        saveToLocalStorageOnly();
                        computeAllPending();
                        if(currentUser && currentMain) { renderNavigation(); renderCurrentPage(); }
                        showSyncStatus('✅ Firebase sync हुआ');
                        showToast('☁️ Firebase से data sync हुआ!');
                    } else if(err) {
                        showSyncStatus('⚠️ Read error: ' + err.message);
                    } else {
                        // Firebase empty - push local data up
                        fbWrite(appData, function(werr) {
                            if(!werr) showSyncStatus('✅ LocalStorage → Firebase push हुआ');
                        });
                    }
                });

                // Flush offline queue
                if(offlineQueue.length > 0) {
                    var latest = offlineQueue[offlineQueue.length - 1];
                    fbWrite(latest, function(err) {
                        if(!err) {
                            offlineQueue = [];
                            var badge = document.getElementById('offlineQueueBadge');
                            if(badge) badge.innerHTML = '0';
                        }
                    });
                }

                // Poll every 30s for connection
                clearInterval(_syncTimer);
                _syncTimer = setInterval(function() {
                    checkOnline(function(ok) {
                        if(ok !== firebaseConnected) {
                            firebaseConnected = ok;
                            updateSyncIndicator(ok);
                            if(ok) window.connectFirebase(); // reconnect
                        }
                    });
                }, 30000);
            });
        });
    };

    // ---- Manual sync (☁️ button) ----
    window.manualFirebaseSync = function() {
        if(!navigator.onLine) { showToast('📴 Internet नहीं है', true); return; }
        showToast('☁️ Firebase sync हो रहा है...');
        fbWrite(appData, function(err) {
            if(err) {
                showToast('⚠️ Sync error: ' + err.message, true);
            } else {
                var now = new Date().toLocaleString('hi-IN');
                localStorage.setItem('mandirLastFirebaseSync', now);
                showToast('✅ Firebase sync सफल! 🟢');
                offlineQueue = [];
                var badge = document.getElementById('offlineQueueBadge');
                if(badge) badge.innerHTML = '0';
                _refreshStoragePanel();
            }
        });
    };

    // ---- Patch saveToLocalStorage to also sync Firebase (debounced 2s) ----
    window.saveToLocalStorage = function() {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); } catch(e) {}
        _refreshStoragePanel();
        if(window._fbSaveTimer) clearTimeout(window._fbSaveTimer);
        window._fbSaveTimer = setTimeout(function() {
            if(firebaseConnected) {
                fbWrite(appData, function(err) {
                    if(!err) {
                        var now = new Date().toLocaleString('hi-IN');
                        localStorage.setItem('mandirLastFirebaseSync', now);
                        offlineQueue = [];
                    } else {
                        offlineQueue.push(JSON.parse(JSON.stringify(appData)));
                    }
                    var badge = document.getElementById('offlineQueueBadge');
                    if(badge) badge.innerHTML = offlineQueue.length;
                    _refreshStoragePanel();
                });
            } else {
                offlineQueue.push(JSON.parse(JSON.stringify(appData)));
                var badge = document.getElementById('offlineQueueBadge');
                if(badge) badge.innerHTML = offlineQueue.length;
                _refreshStoragePanel();
            }
        }, 2000);
    };

    window.saveToLocalStorageOnly = function() {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); } catch(e) {}
    };

    window.fbWriteAppData = function(data, cb) { fbWrite(data, cb); };
    window.initFirebaseWhenReady = function() { window.connectFirebase(); };

    // ---- Auto start ----
    window.initFirebaseWhenReady();

})();
</script>
