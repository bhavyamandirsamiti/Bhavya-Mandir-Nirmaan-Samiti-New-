// ==================== IMAGE COMPRESSION ====================
function compressImage(file, maxSizeKB, callback) {
    let reader = new FileReader();
    reader.onload = function(e) {
        let img = new Image();
        img.onload = function() {
            let canvas = document.createElement('canvas');
            let MAX_DIM = 600;
            let w = img.width, h = img.height;
            if(w > MAX_DIM || h > MAX_DIM) {
                if(w > h) { h = Math.round(h * MAX_DIM / w); w = MAX_DIM; }
                else { w = Math.round(w * MAX_DIM / h); h = MAX_DIM; }
            }
            canvas.width = w; canvas.height = h;
            let ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            let quality = 0.8;
            let dataUrl = canvas.toDataURL('image/jpeg', quality);
            // Reduce quality until under maxSizeKB
            while(dataUrl.length > maxSizeKB * 1024 * 1.37 && quality > 0.2) {
                quality -= 0.1;
                dataUrl = canvas.toDataURL('image/jpeg', quality);
            }
            callback(dataUrl);
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

// ==================== EFFECTIVE DATE CALCULATION ====================
function getAmountForMonth(member, year, month) {
    if(!member.monthlyAmountHistory || member.monthlyAmountHistory.length === 0) {
        return member.monthlyAmount;
    }
    let currentDate = new Date(year, month, 1);
    let sortedHistory = [...member.monthlyAmountHistory].sort((a,b) => new Date(a.effectiveDate) - new Date(b.effectiveDate));
    let applicableAmount = sortedHistory[0].amount;
    for(let i = sortedHistory.length - 1; i >= 0; i--) {
        let effectiveDate = new Date(sortedHistory[i].effectiveDate);
        if(currentDate >= effectiveDate) {
            applicableAmount = sortedHistory[i].amount;
            break;
        }
    }
    return applicableAmount;
}

function isMonthInPausedPeriod(member, year, month) {
    if(!member.donationPauseHistory || member.donationPauseHistory.length === 0) return false;
    let date = new Date(year, month, 1);
    for(let period of member.donationPauseHistory) {
        let pauseStart = new Date(period.pausedFrom);
        if(period.resumedFrom) { let resumeDate = new Date(period.resumedFrom); if(date >= pauseStart && date < resumeDate) return true; }
        else { if(date >= pauseStart) return true; }
    }
    return false;
}

// ==================== YOY GROWTH ====================
function calculateYoYGrowth() {
    let thisYear = new Date().getFullYear();
    let thisMonth = new Date().getMonth();
    let thisYearCollection = appData.donations.filter(d => new Date(d.date).getFullYear() === thisYear && new Date(d.date).getMonth() === thisMonth).reduce((s,d) => s+d.amount, 0);
    let lastYearCollection = appData.donations.filter(d => new Date(d.date).getFullYear() === thisYear-1 && new Date(d.date).getMonth() === thisMonth).reduce((s,d) => s+d.amount, 0);
    let growth = lastYearCollection ? ((thisYearCollection - lastYearCollection) / lastYearCollection * 100).toFixed(1) : 0;
    let icon = growth >= 0 ? '📈' : '📉';
    let color = growth >= 0 ? '#28a745' : '#dc3545';
    return { growth, icon, color, thisYearCollection, lastYearCollection };
}

// ==================== ✅ FIXED v2: CENTRALIZED LEDGER PENDING CALCULATION ====================
function isMonthPaid(member, year, monthIndex, isCommittee = false) {
    if(isCommittee) {
        return (member.donations || []).some(d => d.year === year && d.monthIndex === monthIndex);
    } else {
        return appData.donations.some(d => 
            d.memberId === member.id && 
            d.type === 'monthly' && 
            d.year === year && 
            d.monthIndex === monthIndex
        );
    }
}

function computeAutoPendingForMember(member, isCommittee = false) {
    let current = getCurrentYearMonth();
    let joinDate = new Date(member.joinDate);
    let startYear = joinDate.getFullYear();
    let startMonth = joinDate.getMonth();
    
    // Step 1: Calculate total due for unpaid, non-paused months only
    let totalDue = 0;
    for(let y = startYear; y <= current.year; y++) {
        let sm = (y === startYear) ? startMonth : 0;
        let em = (y === current.year) ? current.month : 11;
        for(let m = sm; m <= em; m++) {
            if(isMonthInPausedPeriod(member, y, m)) continue;
            if(!isMonthPaid(member, y, m, isCommittee)) {
                totalDue += getAmountForMonth(member, y, m);
            }
        }
    }
    
    // Step 2: Get advance balance
    let totalAdvance = isCommittee 
        ? (member.advanceDonations || []).reduce((s,d) => s + d.amount, 0) 
        : appData.donations.filter(d => d.memberId === member.id && d.type === 'advance').reduce((s,d) => s + d.amount, 0);
    
    // Step 3: Apply advance to reduce pending
    let pending = Math.max(0, totalDue - totalAdvance);
    let advanceBalance = Math.max(0, totalAdvance - totalDue);
    
    member.pending = pending;
    member.advanceBalance = advanceBalance;
    return { pending: member.pending, advanceBalance: member.advanceBalance };
}

function computeAllPending() {
    for(let m of appData.members) if(m.status === 'active' && !m.hidden) computeAutoPendingForMember(m, false);
    for(let cm of appData.committeeMembers) if(cm.status === 'active') computeAutoPendingForMember(cm, true);
    saveToLocalStorage();
}

function formatReminderMessage(member, pendingAmount, yearWiseDetails, isCommittee = false) {
    let msg = `🚩 *जय श्री राम* 🚩\n\nआदरणीय *${member.name} जी*,\nभव्य मंदिर निर्माण समिति आपके निरंतर सहयोग हेतु हृदय से आभारी है। *आप पर और आपके परिवार पर हनुमान जी की कृपा और आशीर्वाद हमेशा बना रहे।* \n\nआपका मासिक विवरण इस प्रकार है:\n\n`;
    for(let item of yearWiseDetails) { 
        let status = item.isPaid ? "✅" : (item.isPaused ? "⏸️ बंद" : "⭕"); 
        msg += `🗓️ ${item.monthName} ${item.year}: ${status} ₹${item.amount} (${item.isPaid ? "जमा" : (item.isPaused ? "दान बंद" : "देय है")})\n`; 
    }
    let totalReceived = yearWiseDetails.filter(i => i.isPaid).reduce((s,i) => s + i.amount, 0);
    msg += `--------------------------------\n💰 *कुल प्राप्त सहयोग (कुल): ₹${totalReceived}*\n⚠️ *कुल शेष बकाया: ₹${pendingAmount}*\n💸 *UPI ID: ${appData.settings.upiId}*\n--------------------------------\n🙏 *करबद्ध निवेदन:* धर्म की इस पावन ज्योति को प्रज्वलित रखने हेतु अपनी शेष राशि *₹${pendingAmount}* जमा कर समिति को अनुग्रहित करें।\n\nभवदीय,\n${appData.settings.president} (अध्यक्ष)\n${appData.settings.secretary} (सचिव)`;
    return msg;
}

function getYearlyDetailsForMember(member, isCommittee = false) {
    let current = getCurrentYearMonth();
    let joinDate = new Date(member.joinDate);
    let months = ['जनवरी','फरवरी','मार्च','अप्रैल','मई','जून','जुलाई','अगस्त','सितम्बर','अक्टूबर','नवम्बर','दिसम्बर'];
    let details = [];
    for(let y = joinDate.getFullYear(); y <= current.year; y++) {
        for(let m = 0; m <= 11; m++) {
            let date = new Date(y, m, 1);
            if(date < new Date(joinDate.getFullYear(), joinDate.getMonth(), 1)) continue;
            if(y === current.year && m > current.month) continue;
            let monthlyAmountForThisMonth = getAmountForMonth(member, y, m);
            let isPaused = isMonthInPausedPeriod(member, y, m);
            let isPaid = isPaused ? false : isMonthPaid(member, y, m, isCommittee);
            details.push({ monthName: months[m], year: y, amount: monthlyAmountForThisMonth, isPaid: isPaid, isPaused: isPaused });
        }
    }
    return details;
}

function sendReminderMsg(id, isCommittee = false) {
    let member = isCommittee ? appData.committeeMembers.find(x=>x.id===id) : appData.members.find(x=>x.id===id);
    if(!member || !member.mobile) { showToast("मोबाइल नंबर नहीं है", true); return; }
    let details = getYearlyDetailsForMember(member, isCommittee);
    let msg = formatReminderMessage(member, member.pending, details, isCommittee);
    // Add penalty info
    let memberPenalties = (appData.penalties||[]).filter(p => p.memberId === member.id && p.status === 'unpaid');
    let totalPenalty = memberPenalties.reduce((s,p)=>s+p.amount,0);
    if(totalPenalty > 0) {
        msg += `\n\n⚖️ *जुर्माना बकाया: ₹${totalPenalty}*\nकारण: ${memberPenalties.map(p=>p.reason).join(', ')}`;
    }
    // Add UPI QR link
    let upiUrl = `upi://pay?pa=${appData.settings.upiId}&pn=${encodeURIComponent(member.name)}&am=${(member.pending||0)+totalPenalty}&cu=INR`;
    msg += `\n\n💸 *UPI ID: ${appData.settings.upiId}*\n📱 <क्लिक करें UPI ऐप खोलें: ${upiUrl}>`;
    window.open(`https://wa.me/91${member.mobile}?text=${encodeURIComponent(msg)}`, '_blank');
    showToast(`📱 रिमाइंडर भेजा`);
    addAuditLog("REMINDER_SENT", `${member.name} को रिमाइंडर`);
}

function showPaymentQR(id, isCommittee = false) {
    let member = isCommittee ? appData.committeeMembers.find(x=>x.id===id) : appData.members.find(x=>x.id===id);

function filterMembers() {
    let name = document.getElementById('searchName')?.value.toLowerCase()||'';

    let village = document.getElementById('searchVillage')?.value.toLowerCase()||'';

    let filtered = appData.members.filter(m=>!m.hidden);
    if(name) filtered = filtered.filter(m=>m.name.toLowerCase().includes(name));
    if(mobile) filtered = filtered.filter(m=>m.mobile.includes(mobile));
    if(village) filtered = filtered.filter(m=>m.village.toLowerCase().includes(village));
    if(rangeFilter > 0) filtered = filtered.filter(m=>m.pending >= rangeFilter);
    currentFiltered = filtered;
    let tbody = document.getElementById('memberTableBody');
    if(tbody) tbody.innerHTML = filtered.map((m,idx)=>`<tr class="${getRowClass(m)}"><tr><input type="checkbox" class="member-checkbox" onchange="toggleMemberSelection(${m.id}, this.checked)"><\/td><td style="color:#FF9933">${idx+1}<\/td>

    <td><div class="action-dropdown"><button class="action-dropdown-btn" onclick="toggleDropdown(event, ${m.id})">⚙️ क्लिक <i class="fas fa-chevron-down"></i></button><div id="dropdown-${m.id}" class="action-dropdown-content"><button onclick="openPaymentModal(${m.id}, false)">💰 भुगतान</button><button onclick="openAdvanceModal(${m.id}, false)">⭐ एडवांस</button><button onclick="editMember(${m.id})">✏️ एडिट</button><button onclick="sendReminderMsg(${m.id}, false)">📱 रिमाइंडर</button><button onclick="openCustomReminderModal(${m.id}, false)">✏️📱 कस्टम</button><button onclick="showPaymentQR(${m.id}, false)"><i class="fas fa-qrcode"></i> QR</button><button onclick="toggleHide(${m.id})">${m.hidden?'👁️ अनहाइड':'🙈 हाइड'}</button><button onclick="uploadMemberPhoto(${m.id})">📷 फोटो</button>${canAddPenalty() ? `<button onclick="openPenaltyModal(${m.id})" style="color:#dc3545">⚖️ जुर्माना</button>` : ''}${canEditMember() && m.donationStatus !== 'paused' ? `<button onclick="pauseDonation(${m.id}, false)">⏸️ दान बंद</button>` : ''}${canEditMember() && m.donationStatus === 'paused' ? `<button onclick="resumeDonation(${m.id}, false)">▶️ दान चालू</button>` : ''}${canEditMember() && m.donationPauseHistory && m.donationPauseHistory.length > 0 ? `<button onclick="viewPauseHistory(${m.id}, false)">📋 बंद/चालू इतिहास</button>` : ''}</div></div><\/td><\/tr>`).join('');

}

function toggleDropdown(event, id) {
    event.stopPropagation();
    document.querySelectorAll('.action-dropdown-content').forEach(drop => {
        if(drop.id !== `dropdown-${id}`) drop.classList.remove('show-dropdown');
    });
    let dropdown = document.getElementById(`dropdown-${id}`);
    dropdown.classList.toggle('show-dropdown');
    setTimeout(() => {
        document.addEventListener('click', function closeDropdown(e) {
            if(!dropdown.contains(e.target) && !e.target.closest('.action-dropdown-btn')) {
                dropdown.classList.remove('show-dropdown');
                document.removeEventListener('click', closeDropdown);
            }
        });
    }, 100);
}

function twoUserDeleteConfirm(action) {
    return new Promise(resolve => {
        let html = `<div class="modal"><div class="modal-content"><h3 style="color:#dc3545">🔐 डिलीट कन्फर्मेशन: ${action}</h3>
        <p style="color:#666;margin-bottom:15px;">इस क्रिया को पूर्ण करने के लिए <strong>दो अधिकृत यूज़र</strong> को अनुमोदन देना होगा।</p>
        <div style="background:#fff3cd;padding:12px;border-radius:8px;margin-bottom:15px;">
        <p><strong>पहली पुष्टि (आप):</strong></p>
        <input type="password" id="twoDelPwd1" placeholder="आपका पासवर्ड" class="form-control">
        </div>
        <div style="background:#f8d7da;padding:12px;border-radius:8px;margin-bottom:15px;">
        <p><strong>दूसरी पुष्टि (दूसरा अधिकृत यूज़र):</strong></p>
        <select id="twoDelUser2" class="form-control">
        <option value="">-- दूसरा यूज़र चुनें --</option>
        ${appData.users.filter(u => u.email !== currentUser?.email && (u.role === 'super_admin' || u.role === 'admin')).map(u => `<option value="${u.email}">${u.name} (${u.role})</option>`).join('')}
        </select>
        <input type="password" id="twoDelPwd2" placeholder="दूसरे यूज़र का पासवर्ड" class="form-control" style="margin-top:8px;">
        </div>
        <p style="font-size:12px;color:#888;">🔒 यह कार्यवाही ऑडिट लॉग में दर्ज होगी</p>
        <div class="flex-between" style="margin-top:15px;">
        <button class="btn btn-danger" onclick="window._twoDelResolve(true)">✅ दोनों पुष्टि करें</button>
        <button class="btn btn-secondary" onclick="window._twoDelResolve(false)">❌ रद्द</button>
        </div></div></div>`;
        document.body.insertAdjacentHTML('beforeend', html);
        window._twoDelResolve = (confirmed) => {
            if(confirmed) {
                let pwd1 = document.getElementById('twoDelPwd1')?.value;
                let user2Email = document.getElementById('twoDelUser2')?.value;
                let pwd2 = document.getElementById('twoDelPwd2')?.value;
                let user1Valid = appData.users.find(u => u.email === currentUser?.email && u.password === pwd1);
                let user2 = appData.users.find(u => u.email === user2Email && u.password === pwd2);
                closeModal();
                if(!user1Valid){ showToast("⚠️ पहला पासवर्ड गलत", true); resolve(false); return; }
                if(!user2){ showToast("⚠️ दूसरा पासवर्ड गलत या यूज़र नहीं मिला", true); resolve(false); return; }
                addAuditLog("TWO_USER_DELETE", `${action} - अनुमोदन: ${currentUser.name} + ${user2.name}`);
                resolve(true);
            } else { closeModal(); resolve(false); }
        };
    });
}

function saveMemberEdit(id) { 
    let m = appData.members.find(x=>x.id===id); 
    let reason = document.getElementById('editReason').value; 
    if(!reason){ showToast("⚠️ कारण लिखें", true); return; }
    let newMobile = document.getElementById('editMobile').value;
    if(newMobile && !isValidMobile(newMobile)){ showToast("⚠️ मोबाइल नंबर 10 अंकों का होना चाहिए (6-9 से शुरू)", true); return; }
    let oldData = { name: m.name, mobile: m.mobile, village: m.village, father: m.father, monthlyAmount: m.monthlyAmount, joinDate: m.joinDate, photo: m.photo }; 
    m.name = document.getElementById('editName').value; 
    m.mobile = document.getElementById('editMobile').value; 
    m.village = document.getElementById('editVillage').value; 
    m.father = document.getElementById('editFather').value; 
    let newJoinDate = document.getElementById('editJoinDate').value; 
    if(newJoinDate) m.joinDate = newJoinDate; 
    let newAmt = parseFloat(document.getElementById('editAmount').value); 
    let effDate = document.getElementById('editEffDate').value; 
    if(!isNaN(newAmt) && newAmt>0 && newAmt !== m.monthlyAmount){ 
        if(!m.monthlyAmountHistory) m.monthlyAmountHistory = []; 
        m.monthlyAmountHistory.push({ amount: newAmt, effectiveDate: effDate, changedBy: currentUser.name, reason: reason, changedAt: new Date().toISOString() }); 
        m.monthlyAmountHistory.sort((a,b) => new Date(a.effectiveDate) - new Date(b.effectiveDate));
        m.monthlyAmount = newAmt; 
        addAuditLog("AMOUNT_CHANGED", `${m.name}: ₹${newAmt} from ${effDate} - ${reason}`);
    } 
    let photoFile = document.getElementById('editPhoto').files[0]; 
    let saveUpdate = (photoUrl) => { 
        if(photoUrl) m.photo = photoUrl; 
        let newData = { name: m.name, mobile: m.mobile, village: m.village, father: m.father, monthlyAmount: m.monthlyAmount, joinDate: m.joinDate, photo: m.photo }; 
        addEditHistory(m, 'सदस्य', oldData, newData, reason); 
        computeAllPending(); 
        saveToLocalStorage(); 
        closeModal(); 
        showToast("✅ सदस्य अपडेट हो गया"); 
        renderMemberList(); 
        refreshDashboardCharts(); 
    }; 
    if(photoFile) { let r = new FileReader(); r.onload = e => saveUpdate(e.target.result); r.readAsDataURL(photoFile); } 
    else { saveUpdate(null); } 
}

function openPaymentModal(memberId, isCommittee) { 
    if(!canAddDonation()){ showToast("⚠️ आप भुगतान नहीं जोड़ सकते",true); return; } 
    let member = isCommittee ? appData.committeeMembers.find(x=>x.id===memberId) : appData.members.find(x=>x.id===memberId); 
    if(!member) return; 
    let current = getCurrentYearMonth();
    let joinDate = new Date(member.joinDate);
    let pendingMonths = [];
    for(let y = joinDate.getFullYear(); y <= current.year; y++) {
        let sm = (y === joinDate.getFullYear()) ? joinDate.getMonth() : 0;
        let em = (y === current.year) ? current.month : 11;
        for(let mo = sm; mo <= em; mo++) {
            let isPaused = isMonthInPausedPeriod(member, y, mo);
            if(isPaused) continue;
            // ✅ Use centralized isMonthPaid
            if(!isMonthPaid(member, y, mo, isCommittee)) {
                let monthlyAmountForThisMonth = getAmountForMonth(member, y, mo);
                pendingMonths.push({ year: y, monthIndex: mo, monthName: ['जनवरी','फरवरी','मार्च','अप्रैल','मई','जून','जुलाई','अगस्त','सितम्बर','अक्टूबर','नवम्बर','दिसम्बर'][mo], amount: monthlyAmountForThisMonth });
            }
        }
    }
    if(pendingMonths.length===0){ showToast("✅ कोई बकाया नहीं"); return; }
    let html = `<div class="modal"><div class="modal-content" style="max-width:700px"><h3>💰 भुगतान - ${member.name}</h3><div class="balance-card" style="margin-bottom:15px;padding:10px;background:#e8f5e9;border-radius:12px"><strong>⭐ एडवांस शेष:</strong> ₹${member.advanceBalance}<br><small>पहले एडवांस उपयोग होगा, फिर नया भुगतान</small></div><button class="select-all-btn" onclick="toggleSelectAllMonths()">✅ सभी चुनें / हटाएं</button><div id="multiYearChecklist" class="checklist"></div><div class="flex-between"><select id="payMode" class="form-control" style="width:120px"><option>कैश</option><option>UPI</option></select></div><div id="totalAmountDisplay" class="total-display"></div><div class="flex-between"><button class="btn btn-primary" onclick="processPayment(${memberId}, ${isCommittee})">✅ भुगतान करें</button><button class="btn btn-secondary" onclick="closeModal()">रद्द</button></div></div></div>`; 
    document.body.insertAdjacentHTML('beforeend', html); 
    let container = document.getElementById('multiYearChecklist'); 
    let groups = {};
    for(let mon of pendingMonths) { if(!groups[mon.year]) groups[mon.year] = []; groups[mon.year].push(mon); }
    let years = Object.keys(groups).sort();
    let html2 = '';
    for(let y of years) {
        html2 += `<div class="year-group"><div class="year-header" onclick="toggleYear('${y}')"><div><input type="checkbox" class="yearCheckbox" data-year="${y}" onchange="selectYear('${y}', this.checked)"> <strong>📅 ${y}</strong> (${groups[y].length} महीने)</div><i class="fas fa-chevron-down"></i></div><div class="year-months" id="yearMonths_${y}" style="display:block;">`;
        for(let mon of groups[y]) { 
            let amountChanged = getAmountForMonth(member, mon.year, mon.monthIndex) !== member.monthlyAmount;
            html2 += `<div class="month-item"><input type="checkbox" class="monthCb" data-year="${mon.year}" data-month="${mon.monthIndex}" data-name="${mon.monthName}" data-amount="${mon.amount}"> <label>${mon.monthName} ${mon.year} - ₹${mon.amount}${amountChanged ? ' <span class="amount-history-badge">(बदली हुई राशि)</span>' : ''}</label></div>`; 
        }
        html2 += `</div></div>`;
    }
    container.innerHTML = html2;
    document.querySelectorAll('.monthCb').forEach(cb => cb.addEventListener('change', updateTotal));
    document.querySelectorAll('.yearCheckbox').forEach(cb => cb.addEventListener('change', function(e) { let year = this.dataset.year; document.querySelectorAll(`.monthCb[data-year="${year}"]`).forEach(c => c.checked = this.checked); updateTotal(); }));
    updateTotal();
    window.toggleYear = function(year) { let div = document.getElementById(`yearMonths_${year}`); if(div) div.style.display = div.style.display === 'none' ? 'block' : 'none'; };
    window.selectYear = function(year, checked) { document.querySelectorAll(`.monthCb[data-year="${year}"]`).forEach(cb => cb.checked = checked); updateTotal(); };
    window.toggleSelectAllMonths = function() { let allCb = document.querySelectorAll('.monthCb'); let anyChecked = Array.from(allCb).some(cb => cb.checked); allCb.forEach(cb => cb.checked = !anyChecked); updateTotal(); };
    function updateTotal() { let total = 0; document.querySelectorAll('.monthCb:checked').forEach(cb => { total += parseFloat(cb.dataset.amount); }); document.getElementById('totalAmountDisplay').innerHTML = `💰 कुल राशि: ₹${total}`; }
}

function processPayment(id, isCommittee) { 
    let member = isCommittee ? appData.committeeMembers.find(x=>x.id===id) : appData.members.find(x=>x.id===id); 
    let selected = Array.from(document.querySelectorAll('.monthCb:checked')).map(cb=>({ 
        year: parseInt(cb.dataset.year), 
        monthIndex: parseInt(cb.dataset.month),  // ✅ FIX: was cb.dataset.monthIndex, correct is data-month
        monthName: cb.dataset.name, 
        amount: parseFloat(cb.dataset.amount) 
    })); 
    if(selected.length===0){ showToast("⚠️ महीना चुनें", true); return; } 
    let mode = document.getElementById('payMode').value; 
    let remainingAdvance = member.advanceBalance; 
    let totalNewPayment = 0; 
    let paidList = []; 
    for(let s of selected) { 
        if(remainingAdvance > 0) { 
            if(remainingAdvance >= s.amount) { 
                remainingAdvance -= s.amount; 
                paidList.push({ month: s.monthName, year: s.year, amount: s.amount, paidFrom: "advance" }); 
            } else { 
                let fromNew = s.amount - remainingAdvance; 
                remainingAdvance = 0; 
                totalNewPayment += fromNew; 
                if(isCommittee) { 
                    if(!member.donations) member.donations = []; 
                    member.donations.push({ id: Date.now(), year: s.year, monthIndex: s.monthIndex, month: s.monthName, amount: fromNew, date: new Date().toISOString().slice(0,10), mode: mode }); 
                } else { 
                    appData.donations.push({ id: Date.now(), memberId: member.id, memberName: member.name, type: "monthly", month: s.monthName, monthIndex: s.monthIndex, year: s.year, amount: fromNew, date: new Date().toISOString().slice(0,10), mode: mode }); 
                } 
                paidList.push({ month: s.monthName, year: s.year, amount: s.amount, fromNew: fromNew }); 
            } 
        } else { 
            totalNewPayment += s.amount; 
            if(isCommittee) { 
                if(!member.donations) member.donations = []; 
                member.donations.push({ id: Date.now(), year: s.year, monthIndex: s.monthIndex, month: s.monthName, amount: s.amount, date: new Date().toISOString().slice(0,10), mode: mode }); 
            } else { 
                appData.donations.push({ id: Date.now(), memberId: member.id, memberName: member.name, type: "monthly", month: s.monthName, monthIndex: s.monthIndex, year: s.year, amount: s.amount, date: new Date().toISOString().slice(0,10), mode: mode }); 
            } 
            paidList.push({ month: s.monthName, year: s.year, amount: s.amount }); 
        } 
    } 
    if(remainingAdvance !== member.advanceBalance) { 
        if(isCommittee) { 
            let advanceDonations = member.advanceDonations || []; 
            let usedAdvance = member.advanceBalance - remainingAdvance; 
            let toReduce = usedAdvance; 
            for(let adv of advanceDonations) { 
                if(toReduce <= 0) break; 
                if(adv.amount <= toReduce) { toReduce -= adv.amount; adv.amount = 0; } 
                else { adv.amount -= toReduce; toReduce = 0; } 
            } 
            member.advanceDonations = advanceDonations.filter(adv => adv.amount > 0); 
        } else { 
            let advanceDonations = appData.donations.filter(d => d.memberId === member.id && d.type === 'advance').sort((a,b)=>new Date(a.date)-new Date(b.date)); 
            let usedAdvance = member.advanceBalance - remainingAdvance; 
            let toReduce = usedAdvance; 
            for(let adv of advanceDonations) { 
                if(toReduce <= 0) break; 
                if(adv.amount <= toReduce) { toReduce -= adv.amount; adv.amount = 0; } 
                else { adv.amount -= toReduce; toReduce = 0; } 
            } 
            appData.donations = appData.donations.filter(d => !(d.type==='advance' && d.amount===0)); 
        } 
    } 
    computeAllPending(); 
    saveToLocalStorage(); 
    closeModal(); 
    if(totalNewPayment > 0) generateReceipt(member, paidList.filter(p=>p.fromNew !== undefined || !p.paidFrom), totalNewPayment, mode, "मासिक भुगतान", isCommittee); 
    else showToast(`✅ सभी चयनित महीने एडवांस से कवर हो गए!`); 
    if(isCommittee) renderCommitteeMembers(); 
    else renderMemberList(); 
    refreshDashboardCharts(); 
}

function openAdvanceModal(id, isCommittee) { if(!canAddDonation()){ showToast("⚠️ आप एडवांस नहीं जोड़ सकते",true); return; } let member = isCommittee ? appData.committeeMembers.find(x=>x.id===id) : appData.members.find(x=>x.id===id); let html = `<div class="modal"><div class="modal-content"><h3>⭐ एडवांस - ${member.name}</h3><p>वर्तमान एडवांस शेष: ₹${member.advanceBalance}</p><p>वर्तमान बकाया: ₹${member.pending}</p><input id="advAmt" type="number" placeholder="राशि" class="form-control"><select id="advMode" class="form-control"><option>कैश</option><option>UPI</option></select><textarea id="advReason" placeholder="कारण (वैकल्पिक)" class="form-control"></textarea><div class="flex-between"><button class="btn btn-primary" onclick="processAdvance(${id}, ${isCommittee})">जमा करें</button><button class="btn btn-secondary" onclick="closeModal()">रद्द</button></div></div></div>`; document.body.insertAdjacentHTML('beforeend', html); }
function processAdvance(id, isCommittee) { let member = isCommittee ? appData.committeeMembers.find(x=>x.id===id) : appData.members.find(x=>x.id===id); let amt = parseFloat(document.getElementById('advAmt').value); let mode = document.getElementById('advMode').value; let reason = document.getElementById('advReason')?.value || "एडवांस जमा"; if(isNaN(amt) || amt<=0){ showToast("⚠️ सही राशि", true); return; } if(isCommittee) { if(!member.advanceDonations) member.advanceDonations = []; member.advanceDonations.push({ id: Date.now(), amount: amt, date: new Date().toISOString().slice(0,10), mode: mode, reason: reason }); } else { appData.donations.push({ id: Date.now(), memberId: member.id, memberName: member.name, type: "advance", amount: amt, date: new Date().toISOString().slice(0,10), mode: mode, reason: reason }); } computeAllPending(); saveToLocalStorage(); closeModal(); generateReceipt(member, null, amt, mode, "⭐ एडवांस जमा", isCommittee); if(isCommittee) renderCommitteeMembers(); else renderMemberList(); refreshDashboardCharts(); }

function generateReceipt(member, paidList, total, mode, purpose, isCommittee = false, penaltyPaid = 0) { let receiptNo = `आरआईएस-${String(appData.nextReceiptCounter++).padStart(5,'0')}`; let logo = appData.settings.logo || "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23FF9933' width='100' height='100'/%3E%3Ctext x='50' y='70' font-size='60' text-anchor='middle' fill='white'%3E🚩%3C/text%3E%3C/svg%3E"; let memberPhotoHtml = member.photo ? `<img src="${member.photo}" style="width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid #FF9933;" />` : ''; let monthsHtml = paidList && paidList.length>0 ? paidList.map(p=>`<li>${p.month} ${p.year} - ₹${p.amount}</li>`).join('') : '<li>⭐ एडवांस जमा</li>'; let penaltyHtml = penaltyPaid > 0 ? `<p><strong>⚖️ जुर्माना जमा:</strong> <span style="color:#dc3545;font-weight:bold">₹${penaltyPaid}</span></p>` : ''; let upiUrl = `upi://pay?pa=${appData.settings.upiId}&pn=${encodeURIComponent(member.name)}&am=${member.pending||0}&cu=INR`; let win = window.open('', '_blank'); win.document.write(`<!DOCTYPE html><html><head><title>रसीद ${receiptNo}</title><script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"><\/script><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',Arial;padding:20px;background:#f0f0f0}.receipt{max-width:750px;margin:auto;background:white;border:2px solid #FF9933;border-radius:15px;padding:25px}.header{text-align:center;border-bottom:2px solid #FF9933;padding-bottom:15px;margin-bottom:15px;display:flex;align-items:center;justify-content:center;gap:15px;flex-wrap:wrap}.logo-img{width:60px;height:60px;border-radius:50%}.amount{color:#28a745;font-size:22px;font-weight:bold}.signature{margin-top:25px;display:flex;justify-content:space-between;border-top:1px dashed #ddd;padding-top:15px}.footer{text-align:center;margin-top:20px;font-size:12px;color:#666}@media print{body{padding:0;background:white}.receipt{border:none;padding:0}button{display:none}}</style></head><body><div class="receipt"><div class="header"><img src="${logo}" class="logo-img">${memberPhotoHtml}<div><h2>${appData.settings.committeeName}</h2><p>${appData.settings.committeeSubtitle}</p><h3>दान रसीद</h3><strong>${receiptNo}</strong><p>${new Date().toLocaleDateString('hi-IN')}</p></div></div><table class="details-table"><tr><td style="width:40%"><strong>सदस्य नाम:</strong><\/td><td>${member.name}<\/td><\/tr><tr><td style="width:40%"><strong>पिता/पद:</strong><\/td><td>${member.father || member.post || ''}<\/td><\/tr><tr><td style="width:40%"><strong>मोबाइल:</strong><\/td><td>${member.mobile}<\/td><\/tr><\/table><div><strong>${purpose}:</strong><ul>${monthsHtml}</ul></div><p><strong>राशि:</strong> <span class="amount">₹${total}</span></p><p><strong>मोड:</strong> ${mode}</p>${penaltyHtml}<p><strong>शेष बकाया:</strong> ₹${member.pending}</p><p><strong>एडवांस शेष:</strong> ₹${member.advanceBalance}</p><p><strong>UPI ID:</strong> ${appData.settings.upiId}</p><div id="qrDiv" style="text-align:center;margin:15px 0;"></div><div class="signature"><div>......................<br>${appData.settings.president}<br>(अध्यक्ष)</div><div>......................<br>${appData.settings.secretary}<br>(सचिव)</div></div><div class="footer"><p>🙏 जय श्री राम 🙏</p></div><div style="text-align:center;margin-top:20px"><button onclick="window.print();setTimeout(()=>window.close(),500);" style="background:#FF9933;padding:10px 20px;border:none;border-radius:8px">🖨️ प्रिंट करें</button> <button onclick="window.close()">बंद</button></div></div><script>setTimeout(() => { if(typeof QRCode !== 'undefined') new QRCode(document.getElementById("qrDiv"),{text:"${upiUrl}",width:160,height:160}); else document.getElementById("qrDiv").innerHTML = '<a href="${upiUrl}" target="_blank" style="color:#25D366">📱 क्लिक करें UPI ऐप खोलें</a>'; }, 200);<\/script></body></html>`); win.document.close(); let waMsg = `🚩 *जय श्री राम* 🚩\n\n✅ *रसीद:* ${receiptNo}\n👤 *स function filterCommitteeList() { let search = document.getElementById('searchCommittee')?.value.toLowerCase()||''; let filtered = appData.committeeMembers.filter(cm=>search?cm.name.toLowerCase().includes(search):true); let tbody = document.getElementById('committeeTableBody'); if(tbody) tbody.innerHTML = filtered.map((cm,idx)=>`<tr><td style="color:#FF9933">${idx+1}<\/td><td><strong>${cm.name}<\/strong><\/td><td><span class="badge-active">${cm.post}<\/span><\/td><td>${cm.mobile}<\/td><td>₹${cm.monthlyAmount}<\/td><td class="badge-pending">₹${cm.pending}<\/td><td class="badge-advance">₹${cm.advanceBalance}<\/td><td class="action-col"><div class="action-dropdown"><button class="action-dropdown-btn" onclick="toggleDropdown(event, ${cm.id})">⚙️ क्लिक <i class="fas fa-chevron-down"></i></button><div id="dropdown-${cm.id}" class="action-dropdown-content"><button onclick="openPaymentModal(${cm.id}, true)">💰 भुगतान</button><button onclick="openAdvanceModal(${cm.id}, true)">⭐ एडवांस</button><button onclick="editCommitteeMember(${cm.id})">✏️ एडिट</button><button onclick="sendReminderMsg(${cm.id}, true)">📱 रिमाइंडर</button><button onclick="openCustomReminderModal(${cm.id}, true)">✏️📱 कस्टम</button><button onclick="showPaymentQR(${cm.id}, true)"><i class="fas fa-qrcode"></i> QR</button>${canEditMember() && cm.donationStatus !== 'paused' ? `<button onclick="pauseDonation(${cm.id}, true)">⏸️ दान बंद</button>` : ''}${canEditMember() && cm.donationStatus === 'paused' ? `<button onclick="resumeDonation(${cm.id}, true)">▶️ दान चालू</button>` : ''}${canEditMember() && cm.donationPauseHistory && cm.donationPauseHistory.length > 0 ? `<button onclick="viewPauseHistory(${cm.id}, true)">📋 बंद/चालू इतिहास</button>` : ''}</div></div><\/td><\/tr>`).join(''); saveToLocalStorage(); }
function clearCommitteeSearch() { if(document.getElementById('searchCommittee')) document.getElementById('searchCommittee').value=''; filterCommitteeList(); }
function printCommitteeMembers() { let rows = appData.committeeMembers.map((cm,i)=>[i+1, cm.name, cm.post, cm.mobile, '₹'+cm.monthlyAmount, '₹'+cm.pending, '₹'+cm.advanceBalance, cm.donationStatus === 'paused' ? 'दान बंद' : 'सक्रिय']); printGenericReport('समिति सदस्य सूची', ['क्र.', 'नाम', 'पद', 'मोबाइल', 'मासिक', 'बकाया', 'एडवांस', 'स्थिति'], rows); }
function sendCommitteeReportToPresident() { let totalPending = appData.committeeMembers.reduce((s,cm)=>s+cm.pending,0); let pausedCount = appData.committeeMembers.filter(cm=>cm.donationStatus === 'paused').length; let data = `🏛️ समिति रिपोर्ट\n─────────────────\n👥 कुल सदस्य: ${appData.committeeMembers.length}\n⏸️ दान बंद: ${pausedCount}\n💰 कुल बकाया: ₹${totalPending}`; sendToPresident('समिति रिपोर्ट', data); }

function updateCommitteeMember(id) { let cm = appData.committeeMembers.find(x=>x.id===id); let reason = document.getElementById('editCmReason').value; if(!reason){ showToast("⚠️ कारण लिखें", true); return; } let oldData = { name: cm.name, post: cm.post, mobile: cm.mobile, monthlyAmount: cm.monthlyAmount }; cm.name = document.getElementById('editCmName').value; cm.post = document.getElementById('editCmPost').value; cm.mobile = document.getElementById('editCmMobile').value; let newAmt = parseFloat(document.getElementById('editCmAmount').value); let effDate = document.getElementById('editCmEffDate').value; if(!isNaN(newAmt) && newAmt>0 && newAmt !== cm.monthlyAmount) { if(!cm.monthlyAmountHistory) cm.monthlyAmountHistory = []; cm.monthlyAmountHistory.push({ amount: newAmt, effectiveDate: effDate, changedBy: currentUser.name, reason: reason, changedAt: new Date().toISOString() }); cm.monthlyAmountHistory.sort((a,b) => new Date(a.effectiveDate) - new Date(b.effectiveDate)); cm.monthlyAmount = newAmt; } let newData = { name: cm.name, post: cm.post, mobile: cm.mobile, monthlyAmount: cm.monthlyAmount }; addEditHistory(cm, 'समिति सदस्य', oldData, newData, reason); computeAllPending(); saveToLocalStorage(); closeModal(); showToast("✅ अपडेट"); renderCommitteeMembers(); refreshDashboardCharts(); }

// ==================== AMOUNT HISTORY TAB ====================
function renderAmountHistory() {
    let allHistory = [];
    
    appData.members.forEach(m => {
        if(m.monthlyAmountHistory && m.monthlyAmountHistory.length > 0) {
            allHistory.push({ type: 'सदस्य', name: m.name, id: m.id, history: m.monthlyAmountHistory });
        }
    });
    
    appData.committeeMembers.forEach(cm => {
        if(cm.monthlyAmountHistory && cm.monthlyAmountHistory.length > 0) {
            allHistory.push({ type: 'समिति सदस्य', name: `${cm.name} (${cm.post})`, id: cm.id, history: cm.monthlyAmountHistory });
        }
    });
    
    let html = `<div class="card"><div class="card-title">📜 राशि परिवर्तन इतिहास (Effective Date के साथ)</div>`;
    
    allHistory.forEach(item => {
        html += `<div class="member-card" style="margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
            <strong>${item.type}: ${item.name}</strong>
            <div class="amount-history-list" style="max-height: 200px; overflow-y: auto; margin-top: 8px;">`;
        
        item.history.forEach((h,idx) => {
            html += `<div class="edit-history-item">📅 <strong>${h.effectiveDate}</strong> से: ₹${h.amount} (${h.changedBy || 'सिस्टम'})<br>📝 कारण: ${h.reason || '-'}<button class="delete-history-btn" onclick="deleteAmountHistoryItem('${item.id}', '${item.type}', ${idx})">🗑️ हटाएँ</button></div>`;
        });
        
        html += `</div></div>`;
    });
    
    html += `</div>`;
    document.getElementById('contentArea').innerHTML = html;
    saveToLocalStorage();
}

function deleteAmountHistoryItem(itemId, type, historyIndex) {
    if(!verifySecretCode()) return;
    
    let item = null;
    if(type === 'सदस्य') item = appData.members.find(m => m.id == itemId);
    else if(type === 'समिति सदस्य') item = appData.committeeMembers.find(m => m.id == itemId);
    
    if(item && item.monthlyAmountHistory && item.monthlyAmountHistory[historyIndex]) {
        item.monthlyAmountHistory.splice(historyIndex, 1);
        if(item.monthlyAmountHistory.length > 0) {
            item.monthlyAmount = item.monthlyAmountHistory[item.monthlyAmountHistory.length-1].amount;
        }
        saveToLocalStorage();
        showToast("✅ राशि इतिहास हटा दिया गया");
        renderAmountHistory();
        if(currentSub === 'memberList') renderMemberList();
        else if(currentSub === 'committeeMembers') renderCommitteeMembers();
    }
}

// ==================== COMMITTEE TRANSACTIONS ====================
function renderCommitteeTransactions() { let totalDeposit = appData.committeeTransactions.filter(t=>t.type==='deposit').reduce((s,t)=>s+t.amount,0); let totalWithdraw = appData.committeeTransactions.filter(t=>t.type==='withdraw').reduce((s,t)=>s+t.amount,0); let balance = totalDeposit - totalWithdraw; let html = `<div class="card"><div class="card-title">💰 समिति सदस्यों के बीच लेनदेन<div><button class="print-btn" onclick="printCommitteeTransactions()"><i class="fas fa-print"></i> प्रिंट</button><button class="whatsapp-president-btn" onclick="sendCommitteeTransactionsToPresident()"><i class="fab fa-whatsapp"></i> अध्यक्ष को भेजें</button></div></div><div class="balance-card"><h3>समिति निधि बैलेंस</h3><p style="font-size:32px; font-weight:bold; color:#FF9933">₹${balance}</p><p>कुल जमा: ₹${totalDeposit} | कुल निकासी: ₹${totalWithdraw}</p></div><div class="flex-between"><button class="btn btn-success" onclick="openCommitteeTransactionModal('deposit')"><i class="fas fa-plus-circle"></i> जमा</button><button class="btn btn-danger" onclick="openCommitteeTransactionModal('withdraw')"><i class="fas fa-minus-circle"></i> निकासी</button></div><div class="table-wrapper"><table class="data-table"><thead><th>तिथि</th><th>रसीद नं.</th><th>प्रकार</th><th>राशि</th><th>किसके साथ</th><th>विवरण</th><th>कार्य</th></thead><tbody id="committeeTransactionBody"></tbody></table></div></div>`; document.getElementById('contentArea').innerHTML = html; renderCommitteeTransactionsList(); }
function renderCommitteeTransactionsList() { let tbody = document.getElementById('committeeTransactionBody'); if(tbody) tbody.innerHTML = appData.committeeTransactions.slice().reverse().map(t=>`<tr><td style="font-size:11px">${t.date}<\/td><td><span class="receipt-no">${t.receiptNo}<\/span><\/td><td class="${t.type==='deposit'?'text-success':'text-danger'}">${t.type==='deposit'?'जमा (+)':'निकासी (-)'}<\/td><td class="${t.type==='deposit'?'text-success':'text-danger'}">₹${t.amount}<\/td><td>${t.withPerson||'-'}<\/td><td>${t.note||'-'}<\/td><td>${canDelete()?`<button class="btn-sm btn-danger" onclick="deleteCommitteeTransaction(${t.id})">🗑️<\/button>`:''}<button class="btn-sm btn-info" onclick="editCommitteeTransaction(${t.id})">✏️<\/button><\/td><\/tr>`).join(''); saveToLocalStorage(); }
function openCommitteeTransactionModal(type, transactionId=null) { let t = transactionId ? appData.committeeTransactions.find(x=>x.id===transactionId) : null; let html = `<div class="modal"><div class="modal-content"><h3>${t ? 'लेनदेन संपादन' : (type==='deposit'?'💰 जमा':'💸 निकासी')}</h3><input type="number" id="transAmount" placeholder="राशि" value="${t ? t.amount : ''}" class="form-control"><input type="date" id="transDate" value="${t ? t.date : new Date().toISOString().slice(0,10)}" class="form-control"><input id="transWithPerson" placeholder="किसके साथ लेनदेन" value="${t ? t.withPerson||'' : ''}" class="form-control"><textarea id="transNote" placeholder="विवरण" class="form-control">${t ? t.note||'' : ''}</textarea><textarea id="transReason" placeholder="बदलाव का कारण *" class="form-control" ${t ? '' : 'style="display:none"'}></textarea><div class="flex-between"><button class="btn btn-primary" onclick="${t ? `updateCommitteeTransaction(${t.id})` : `saveCommitteeTransaction('${type}')`}">${t ? 'अपडेट करें' : 'सेव करें'}</button><button class="btn btn-secondary" onclick="closeModal()">रद्द</button></div></div></div>`; document.body.insertAdjacentHTML('beforeend', html); }
function saveCommitteeTransaction(type) { let amount = parseFloat(document.getElementById('transAmount').value); let date = document.getElementById('transDate').value; let withPerson = document.getElementById('transWithPerson').value; let note = document.getElementById('transNote').value; if(isNaN(amount) || amount<=0){ showToast("⚠️ सही राशि डालें", true); return; } let receiptNo = `समिति-${String(appData.nextTransactionReceiptCounter++).padStart(5,'0')}`; appData.committeeTransactions.push({ id: Date.now(), type: type, amount: amount, date: date, withPerson: withPerson, note: note, receiptNo: receiptNo, created_by: currentUser.name, created_at: new Date().toISOString(), editHistory: [] }); saveToLocalStorage(); closeModal(); showToast(`✅ लेनदेन सफल! रसीद: ${receiptNo}`); renderCommitteeTransactions(); addAuditLog(`COMMITTEE_TRANSACTION_${type.toUpperCase()}`, `₹${amount} - ${withPerson}`); refreshDashboardCharts(); }
function editCommitteeTransaction(id) { openCommitteeTransactionModal(null, id); }
function updateCommitteeTransaction(id) { let t = appData.committeeTransactions.find(x=>x.id===id); let reason = document.getElementById('transReason').value; if(!reason){ showToast("⚠️ कारण लिखें", true); return; } let oldData = { amount: t.amount, withPerson: t.withPerson, note: t.note }; t.amount = parseFloat(document.getElementById('transAmount').value); t.date = document.getElementById('transDate').value; t.withPerson = document.getElementById('transWithPerson').value; t.note = document.getElementById('transNote').value; let newData = { amount: t.amount, withPerson: t.withPerson, note: t.note }; addEditHistory(t, 'समिति लेनदेन', oldData, newData, reason); saveToLocalStorage(); closeModal(); showToast("✅ अपडेट"); renderCommitteeTransactions(); refreshDashboardCharts(); }
async function deleteCommitteeTransaction(id) { if(!verifySecretCode()) return; if(!await confirmDoubleDelete("लेनदेन")) return; appData.committeeTransactions = appData.committeeTransactions.filter(x=>x.id!==id); saveToLocalStorage(); renderCommitteeTransactions(); showToast("✅ हटा दिया"); refreshDashboardCharts(); }
function printCommitteeTransactions() { let rows = appData.committeeTransactions.map(t=>[t.date, t.receiptNo, t.type==='deposit'?'जमा':'निकासी', '₹'+t.amount, t.withPerson||'-', t.note||'-']); printGenericReport('समिति लेनदेन सूची', ['तिथि', 'रसीद नं.', 'प्रकार', 'राशि', 'किसके साथ', 'विवरण'], rows); }
function sendCommitteeTransactionsToPresident() { let totalDeposit = appData.committeeTransactions.filter(t=>t.type==='deposit').reduce((s,t)=>s+t.amount,0); let totalWithdraw = appData.committeeTransactions.filter(t=>t.type==='withdraw').reduce((s,t)=>s+t.amount,0); let balance = totalDeposit - totalWithdraw; let data = `💰 समिति निधि लेनदेन रिपोर्ट\n─────────────────\n📥 कुल जमा: ₹${totalDeposit}\n📤 कुल निकासी: ₹${totalWithdraw}\n⚖️ बैलेंस: ₹${balance}`; sendToPresident('समिति लेनदेन रिपोर्ट', data); }

function renderMediaManager() { let html = `<div class="card"><div class="card-title">📷 मीडिया मैनेजर (फोटो/वीडियो)<div><button class="print-btn" onclick="exportMediaHTML()"><i class="fas fa-download"></i> मीडिया डाउनलोड (HTML)</button></div></div><div class="media-upload-area" onclick="document.getElementById('mediaFileInput').click()"><i class="fas fa-cloud-upload-alt fa-2x"></i><p>क्लिक करें या फाइल ड्रॉप करें (फोटो/वीडियो)</p><input type="file" id="mediaFileInput" accept="image/*,video/*" style="display:none" multiple onchange="uploadMediaFiles(this.files)"></div><div id="mediaGalleryGrid" class="gallery-grid"></div>`; document.getElementById('contentArea').innerHTML = html; renderMediaGallery(); }
function uploadMediaFiles(files) { for(let file of files) { let reader = new FileReader(); reader.onload = function(e) { let mediaItem = { id: Date.now() + Math.random(), type: file.type.startsWith('image') ? 'image' : 'video', data: e.target.result, name: file.name, date: new Date().toISOString() }; appData.mediaFiles.push(mediaItem); saveToLocalStorage(); renderMediaGallery(); }; reader.readAsDataURL(file); } showToast(`📁 ${files.length} फाइल अपलोड हो रही है`); }
function renderMediaGallery() { let grid = document.getElementById('mediaGalleryGrid'); if(!grid) return; if(appData.mediaFiles.length === 0) { grid.innerHTML = '<p>कोई मीडिया फाइल नहीं</p>'; return; } grid.innerHTML = appData.mediaFiles.map(m => `<div class="gallery-item" onclick="viewMedia('${m.id}')">${m.type === 'image' ? `<img src="${m.data}">` : `<video src="${m.data}" style="width:100%;height:100%;object-fit:cover;"></video>`}<div class="name-tag">${m.name.substring(0,15)}<br><small>${new Date(m.date).toLocaleDateString()}</small></div><button class="remove-media" onclick="event.stopPropagation();deleteMedia('${m.id}')">✖</button></div>`).join(''); saveToLocalStorage(); }
function viewMedia(id) { let media = appData.mediaFiles.find(m => m.id == id); if(!media) return; let win = window.open('', '_blank'); win.document.write(`<!DOCTYPE html><html><head><title>${media.name}</title><style>body{margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#000;}img, video{max-width:100%;max-height:100vh;}</style></head><body>${media.type === 'image' ? `<img src="${media.data}">` : `<video controls autoplay src="${media.data}"></video>`}<div style="position:fixed;bottom:20px;left:0;right:0;text-align:center"><button onclick="window.print()" style="background:#FF9933;padding:10px 20px;border:none;border-radius:8px">🖨️ प्रिंट</button> <button onclick="window.close()">बंद</button></div></body></html>`); win.document.close(); }
function deleteMedia(id) { if(confirm("क्या आप यह मीडिया हटाना चाहते हैं?")) { appData.mediaFiles = appData.mediaFiles.filter(m => m.id != id); saveToLocalStorage(); renderMediaGallery(); showToast("✅ हटा दिया"); } }
function exportMediaHTML() { if(appData.mediaFiles.length === 0) { showToast("कोई मीडिया नहीं", true); return; } let html = `<html><head><title>मीडिया गैलरी</title><style>body{font-family:Arial;padding:20px}img,video{max-width:100%}</style></head><body><h1>मंदिर मीडिया गैलरी</h1>`; for(let m of appData.mediaFiles) { html += `<h3>${m.name}</h3>${m.type === 'image' ? `<img src="${m.data}" style="max-width:100%"><br>` : `<video controls src="${m.data}" style="max-width:100%"></video><br>`}`; } html += `</body></html>`; let blob = new Blob([html], {type: 'text/html'}); let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `mandir_media_${new Date().toISOString().slice(0,10)}.html`; a.click(); showToast("📥 मीडिया डाउनलोड शुरू"); }

// ==================== CLOUD BACKUP ====================
function cloudBackup() { let dataStr = JSON.stringify(appData); let blob = new Blob([dataStr], {type: 'application/json'}); let url = URL.createObjectURL(blob); let a = document.createElement('a'); a.href = url; a.download = `mandir_backup_${new Date().toISOString().slice(0,10)}.json`; a.click(); URL.revokeObjectURL(url); showToast("✅ बैकअप डाउनलोड हो गया"); addAuditLog("CLOUD_BACKUP", "बैकअप डाउनलोड किया"); }
function cloudRestore() { let input = document.createElement('input'); input.type = 'file'; input.accept = 'application/json'; input.onchange = e => { let file = e.target.files[0]; if(!file) return; let reader = new FileReader(); reader.onload = ev => { try { let restored = JSON.parse(ev.target.result); appData = { ...appData, ...restored }; saveToLocalStorage(); computeAllPending(); showToast("✅ रिस्टोर सफल! पेज रिफ्रेश हो रहा है"); setTimeout(() => location.reload(), 2000); } catch(err) { showToast("❌ गलत फाइल", true); } }; reader.readAsText(file); }; input.click(); }

// ==================== DASHBOARD ====================
function switchDashboardTab(tab) { currentDashboardTab = tab; renderDashboard(); }
function renderDashboard() { 
    computeAllPending(); 
    let activeMembers = appData.members.filter(m=>m.status==='active' && !m.hidden).length;
    let totalDonations = appData.donations.reduce((s,d)=>s+d.amount,0) + appData.otherDonations.reduce((s,od)=>s+od.amount,0);
    let totalPending = appData.members.filter(m=>!m.hidden).reduce((s,m)=>s+(m.pending||0),0);
    let totalCommitteePending = appData.committeeMembers.reduce((s,cm)=>s+cm.pending,0);
    let totalAdvance = appData.members.filter(m=>!m.hidden).reduce((s,m)=>s+(m.advanceBalance||0),0);
    let totalExpenses = appData.expenses.reduce((s,e)=>s+e.amount,0);
    let monthNow = new Date().getMonth(), yearNow = new Date().getFullYear();
    let currentMonthDonation = 0;
    for(let cm of appData.committeeMembers) {
        let isPaid = (cm.donations || []).some(d => d.year === yearNow && d.monthIndex === monthNow);
        if(isPaid) currentMonthDonation += cm.monthlyAmount;
    }

function filterBulkByPending(months) {
    window.currentBulkFilter = months;
    let allMembers = appData.members.filter(m => m.status === 'active' && m.mobile && !m.hidden);
    
    if(months > 0) {
        allMembers = allMembers.filter(m => {
            let approxMonths = Math.ceil(m.pending / m.monthlyAmount);
            return approxMonths >= months;
        });
    }
    
    window.bulkFilteredMembers = allMembers;
    
    let container = document.getElementById('bulkMembersList');
    if(container) {
        container.innerHTML = allMembers.map(m => `<div><input type="checkbox" class="bulk-member-cb" data-id="${m.id}" data-name="${m.name}" data-mobile="${m.mobile}" data-pending="${m.pending}"> ${m.name} (${m.mobile}) - <span class="badge-pending">₹${m.pending} बकाया</span></div>`).join('');
    }
    
    let countSpan = document.getElementById('bulkCount');
    if(countSpan) countSpan.innerText = allMembers.length;
}

    let searchName = document.getElementById('bulkSearchName')?.value.toLowerCase() || '';

function startBulkWithSelection() {
    if(!canSendBulk()){ showToast("⚠️ आप बल्क मैसेज नहीं भेज सकते",true); return; }
    if(bulkInterval) clearInterval(bulkInterval);
    let selected = Array.from(document.querySelectorAll('.bulk-member-cb:checked')).map(cb => {
        return appData.members.find(m => m.id == cb.dataset.id);
    }).filter(m => m && m.mobile);
    if(selected.length === 0){ showToast("⚠️ कम से कम एक सदस्य चुनें", true); return; }
    // Show links list instead of opening tabs
    let linksHtml = selected.map(m => {
        let details = getYearlyDetailsForMember(m, false);
        let msg = formatReminderMessage(m, m.pending, details, false);
        let memberPenalties = (appData.penalties||[]).filter(p => p.memberId === m.id && p.status === 'unpaid');
        let totalPenalty = memberPenalties.reduce((s,p)=>s+p.amount,0);
        if(totalPenalty > 0) msg += `\n\n⚖️ *जुर्माना बकाया: ₹${totalPenalty}*`;
        let waUrl = `https://wa.me/91${m.mobile}?text=${encodeURIComponent(msg)}`;
        return `<div style="margin:8px 0;padding:10px;background:#f0f9f0;border-radius:8px;border:1px solid #25D366;"><strong>${m.name}</strong> (₹${m.pending} बकाया)<br><a href="${waUrl}" target="_blank" style="color:#25D366;font-weight:bold;"><i class="fab fa-whatsapp"></i> WhatsApp खोलें →</a></div>`;
    }).join('');
    let modalHtml = `<div class="modal"><div class="modal-content" style="max-height:80vh;overflow-y:auto;"><h3>📱 बल्क WhatsApp लिंक (${selected.length} सदस्य)</h3><p style="color:#666;font-size:13px;margin-bottom:10px;">नीचे प्रत्येक सदस्य का WhatsApp लिंक है। एक-एक करके क्लिक करें:</p>${linksHtml}<div style="text-align:center;margin-top:15px;"><button class="btn btn-secondary" onclick="closeModal()">बंद करें</button></div></div></div>`;
    document.body.insertAdjacentHTML('beforeend', modalHtml);
    let msgDiv = document.getElementById('bulkProgress');
    if(msgDiv) msgDiv.innerHTML = `✅ ${selected.length} लिंक तैयार - नीचे मॉडल देखें`;
    addAuditLog("BULK_MSG", `${selected.length} सदस्यों के लिए बल्क लिंक बनाए`);
}

function sendNextBulkSelected() {
    if(bulkIndex >= bulkMembers.length) {
        clearInterval(bulkInterval);
        let msgDiv = document.getElementById('bulkProgress');
        if(msgDiv) msgDiv.innerHTML = `✅ सबको भेजा (${bulkMembers.length}/${bulkMembers.length})`;
        document.getElementById('stopBulkBtn').style.display = 'none';
        showToast("✅ सबको भेजा");
        return;
    }
    let m = bulkMembers[bulkIndex];
    let details = getYearlyDetailsForMember(m, false);
    let msg = formatReminderMessage(m, m.pending, details, false);
    window.open(`https://wa.me/91${m.mobile}?text=${encodeURIComponent(msg)}`, '_blank');
    bulkIndex++;
    let msgDiv = document.getElementById('bulkProgress');
    if(msgDiv) msgDiv.innerHTML = `📨 ${bulkIndex}/${bulkMembers.length} - ${m.name}`;
}

function stopBulk() {
    if(bulkInterval){
        clearInterval(bulkInterval);
        let msgDiv = document.getElementById('bulkProgress');
        if(msgDiv) msgDiv.innerHTML = `⏸️ रोका गया (${bulkIndex}/${bulkMembers.length})`;
        document.getElementById('stopBulkBtn').style.display = 'none';
        showToast("⏸️ रोका");
    }
}

    let filtered = window.pendingFilteredMembers.filter(m => m.pending >= searchAmount);
    renderPendingFilteredList(filtered);

    window.selectedPendingMembers = [];
}

function toggleSelectAllPending() {
    let selectAll = document.getElementById('selectAllPending');
    let checkboxes = document.querySelectorAll('.pending-checkbox');
    checkboxes.forEach(cb => cb.checked = selectAll.checked);
    updateSelectedPendingList();
}

function updateSelectedPendingList() {
    let checkboxes = document.querySelectorAll('.pending-checkbox:checked');
    window.selectedPendingMembers = Array.from(checkboxes).map(cb => ({
        id: parseInt(cb.dataset.id),
        name: cb.dataset.name,
        mobile: cb.dataset.mobile,
        pending: parseFloat(cb.dataset.pending)
    }));
}

function clearPendingSelection() {
    document.querySelectorAll('.pending-checkbox').forEach(cb => cb.checked = false);
    if(document.getElementById('selectAllPending')) {
        document.getElementById('selectAllPending').checked = false;
    }
    window.selectedPendingMembers = [];
    showToast("✅ सभी चयन हटा दिए");
}

function sendSelectedPendingReminder() {
    if(!window.selectedPendingMembers || window.selectedPendingMembers.length === 0) {
        showToast("⚠️ कम से कम एक सदस्य चुनें", true);
        return;
    }
    
    if(!confirm(`${window.selectedPendingMembers.length} सदस्यों को रिमाइंडर भेजें?`)) return;
    
    let index = 0;
    function sendNext() {
        if(index >= window.selectedPendingMembers.length) {
            showToast(`✅ ${window.selectedPendingMembers.length} सदस्यों को रिमाइंडर भेजा`);
            return;
        }
        let member = appData.members.find(m => m.id === window.selectedPendingMembers[index].id);
        if(member && member.mobile) {
            let details = getYearlyDetailsForMember(member, false);
            let msg = formatReminderMessage(member, member.pending, details, false);
            window.open(`https://wa.me/91${member.mobile}?text=${encodeURIComponent(msg)}`, '_blank');
        }
        index++;
        setTimeout(sendNext, 3000);
    }
    sendNext();
}

function sendBulkPendingReminder() {
    let checkboxes = document.querySelectorAll('.pending-checkbox');
    checkboxes.forEach(cb => cb.checked = true);
    updateSelectedPendingList();
    sendSelectedPendingReminder();
}

function printPendingListWithFilters() {
    let members = window.pendingFilteredMembers || [];
    let monthsText = window.currentPendingFilter === 0 ? 'सभी बकाया' : 
                     window.currentPendingFilter === 1 ? '1 महीना बकाया' :
                     window.currentPendingFilter === 3 ? '3 महीना बकाया' :
                     window.currentPendingFilter === 6 ? '6 महीना बकाया' : '1 साल बकाया';
    let rows = members.map((m,i) => [i+1, m.name, m.mobile||'-', m.village||'-', '₹'+m.monthlyAmount, '₹'+m.pending]);
    printGenericReport(`बकाया सदस्य सूची (${monthsText})`, ['क्र.', 'नाम', 'मोबाइल', 'गाँव', 'मासिक राशि', 'बकाया राशि'], rows);
}

function renderLedgerReport() { let html = `<div class="card"><div class="card-title">📒 लेजर रिपोर्ट<div><button class="print-btn" onclick="printLedgerReport()"><i class="fas fa-print"></i> प्रिंट</button><button class="whatsapp-president-btn" onclick="sendLedgerToPresident()"><i class="fab fa-whatsapp"></i> अध्यक्ष को भेजें</button></div></div><div class="year-selector"><select id="ledgerYear" onchange="updateLedger()">${(function(){let opts='';for(let y=2024;y<=new Date().getFullYear()+5;y++)opts+=`<option value="${y}">${y}</option>`;return opts;})()}</select></div><div id="ledgerTable"></div></div>`; document.getElementById('contentArea').innerHTML = html; updateLedger(); }
function updateLedger(){ let year = parseInt(document.getElementById('ledgerYear').value); let months = ['जनवरी','फरवरी','मार्च','अप्रैल','मई','जून','जुलाई','अगस्त','सितम्बर','अक्टूबर','नवम्बर','दिसम्बर']; let rows='', totalInc=0, totalExp=0; for(let i=0;i<12;i++){ let inc = appData.donations.filter(d=>new Date(d.date).getMonth()===i && new Date(d.date).getFullYear()===year).reduce((s,d)=>s+d.amount,0); let exp = appData.expenses.filter(e=>new Date(e.date).getMonth()===i && new Date(e.date).getFullYear()===year).reduce((s,e)=>s+e.amount,0); totalInc+=inc; totalExp+=exp; rows += `<tr><td style="color:#FF9933">${months[i]}<\/td><td class="text-success">₹${inc}<\/td><td class="text-danger">₹${exp}<\/td><td class="${inc-exp>=0?'text-success':'text-danger'}">₹${inc-exp}<\/td><\/tr>`; } document.getElementById('ledgerTable').innerHTML = `<table class="data-table"><thead><th>महीना</th><th>आय</th><th>व्यय</th><th>लाभ/हानि</th></thead><tbody>${rows}</tbody><tfoot><tr style="background:#f0f0f0"><th>कुल</th><th>₹${totalInc}</th><th>₹${totalExp}</th><th>₹${totalInc-totalExp}</th><\/tr><\/tfoot><\/table>`; saveToLocalStorage(); }
function printLedgerReport() { let year = document.getElementById('ledgerYear')?.value || new Date().getFullYear(); let months = ['जनवरी','फरवरी','मार्च','अप्रैल','मई','जून','जुलाई','अगस्त','सितम्बर','अक्टूबर','नवम्बर','दिसम्बर']; let rows = []; let totalInc = 0, totalExp = 0; for(let i=0;i<12;i++){ let inc = appData.donations.filter(d=>new Date(d.date).getMonth()===i && new Date(d.date).getFullYear()==year).reduce((s,d)=>s+d.amount,0); let exp = appData.expenses.filter(e=>new Date(e.date).getMonth()===i && new Date(e.date).getFullYear()==year).reduce((s,e)=>s+e.amount,0); totalInc += inc; totalExp += exp; rows.push([months[i], '₹'+inc, '₹'+exp, '₹'+(inc-exp)]); } rows.push(['कुल', '₹'+totalInc, '₹'+totalExp, '₹'+(totalInc-totalExp)]); printGenericReport(`लेजर रिपोर्ट ${year}`, ['महीना', 'आय', 'व्यय', 'लाभ/हानि'], rows); }
function sendLedgerToPresident() { let year = document.getElementById('ledgerYear')?.value || new Date().getFullYear(); let totalInc = appData.donations.filter(d=>new Date(d.date).getFullYear()==year).reduce((s,d)=>s+d.amount,0); let totalExp = appData.expenses.filter(e=>new Date(e.date).getFullYear()==year).reduce((s,e)=>s+e.amount,0); let data = `📒 लेजर रिपोर्ट ${year}\n─────────────────\n💰 कुल आय: ₹${totalInc}\n💸 कुल व्यय: ₹${totalExp}\n⚖️ शेष: ₹${totalInc-totalExp}`; sendToPresident(`लेजर रिपोर्ट ${year}`, data); }
function renderAuditReport(){ let logs = appData.auditLogs.slice(0,100).map(l=>`<div style="padding:8px;border-bottom:1px solid #eee;font-size:12px"><i class="fas fa-history"></i> ${new Date(l.timestamp).toLocaleString()} - ${l.user} (${l.role}) : ${l.action} - ${l.details}</div>`).join(''); document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">📋 ऑडिट लॉग<button class="print-btn" onclick="printAuditLog()"><i class="fas fa-print"></i> प्रिंट</button></div>${logs||'<p>कोई लॉग नहीं</p>'}</div>`; saveToLocalStorage(); }
function printAuditLog() { let rows = appData.auditLogs.slice(0,100).map(l=>[new Date(l.timestamp).toLocaleString(), l.user, l.role, l.action, l.details]); printGenericReport('ऑडिट लॉग', ['तिथि', 'यूजर', 'रोल', 'कार्य', 'विवरण'], rows); }
function renderTrendReport(){ let html=`<div class="card"><div class="card-title">📈 ट्रेंड रिपोर्ट<div><button class="print-btn" onclick="printTrendReport()"><i class="fas fa-print"></i> प्रिंट</button><button class="whatsapp-president-btn" onclick="sendTrendReportToPresident()"><i class="fab fa-whatsapp"></i> अध्यक्ष को भेजें</button></div></div><div class="year-selector"><select id="trendYear" onchange="loadTrend()">${(function(){let opts='';for(let y=2024;y<=new Date().getFullYear()+5;y++)opts+=`<option value="${y}">${y}</option>`;return opts;})()}</select></div><canvas id="trendCanvas"></canvas></div>`; document.getElementById('contentArea').innerHTML=html; loadTrend(); }
function loadTrend(){ let year=parseInt(document.getElementById('trendYear').value); let months=['जन','फर','मार्च','अप्रैल','मई','जून','जुलाई','अग','सित','अक्टू','नव','दिस']; let incData=months.map((_,i)=>appData.donations.filter(d=>new Date(d.date).getMonth()===i && new Date(d.date).getFullYear()===year).reduce((s,d)=>s+d.amount,0)); let expData=months.map((_,i)=>appData.expenses.filter(e=>new Date(e.date).getMonth()===i && new Date(e.date).getFullYear()===year).reduce((s,e)=>s+e.amount,0)); let ctx=document.getElementById('trendCanvas')?.getContext('2d'); if(ctx) { if(trendChart) trendChart.destroy(); trendChart = new Chart(ctx,{type:'line',data:{labels:months,datasets:[{label:'आय',data:incData,borderColor:'#28a745'},{label:'व्यय',data:expData,borderColor:'#dc3545'}]}}); } saveToLocalStorage(); }

function changeUpiWithAudit() {
    if(!canEditSettings()){ showToast("⚠️ आप UPI नहीं बदल सकते", true); return; }
    let newUpi = document.getElementById('newUpiId').value.trim();
    let reason = document.getElementById('upiChangeReason').value.trim();
    if(!newUpi){ showToast("⚠️ नया UPI दर्ज करें", true); return; }
    if(!reason){ showToast("⚠️ कारण लिखें", true); return; }
    let oldUpi = appData.settings.upiId;
    if(!appData.upiAuditLog) appData.upiAuditLog = [];
    appData.upiAuditLog.push({ oldUpi: oldUpi, newUpi: newUpi, reason: reason, changedBy: currentUser?.name||'Unknown', date: new Date().toISOString().slice(0,10) });
    appData.settings.upiId = newUpi;
    document.getElementById('setUpi').value = newUpi;
    saveToLocalStorage();
    addAuditLog("UPI_CHANGED", `UPI बदला: ${oldUpi} → ${newUpi}`);
    showToast("✅ UPI अपडेट (ऑडिट लॉग में दर्ज)");
    renderGeneralSettings();
}

function saveProfile() {
    if(!currentUser){ showToast("⚠️ कोई यूज़र लॉगिन नहीं", true); return; }
    let name = document.getElementById('profileName').value.trim();
    let newPwd = document.getElementById('profileNewPwd').value;
    let confirmPwd = document.getElementById('profileConfirmPwd').value;
    if(!name){ showToast("⚠️ नाम दर्ज करें", true); return; }
    if(newPwd && newPwd !== confirmPwd){ showToast("⚠️ पासवर्ड मेल नहीं खाते", true); return; }
    let user = appData.users.find(u => u.email === currentUser.email);
    if(user){ user.name = name; if(newPwd) user.password = newPwd; }
    currentUser.name = name;
    document.getElementById('userName').innerHTML = name;
    saveToLocalStorage();
    showToast("✅ प्रोफ़ाइल अपडेट");
    addAuditLog("PROFILE_UPDATE", `${name} ने प्रोफ़ाइल अपडेट की`);
}

    ${unpaid.length===0?'<p style="color:green">✅ कोई बकाया जुर्माना नहीं</p>':unpaid.map(p=>`<div class="member-card" style="border-left:4px solid #dc3545"><div><strong>${p.memberName}</strong><br>⚖️ ₹${p.amount} - ${p.reason}<br><small>📅 ${p.date} | #JUR-${String(p.id).slice(-5)}</small></div><div><button class="btn btn-success btn-sm" onclick="payPenalty(${p.id})">✅ चुकाया</button><button class="btn-sm btn-danger" onclick="deletePenalty(${p.id})">🗑️</button></div></div>`).join('')}
    <h4 style="color:#28a745;margin:15px 0 8px">✅ चुकाए गए जुर्माने</h4>
    ${paid.length===0?'<p style="color:gray">कोई नहीं</p>':paid.slice(0,20).map(p=>`<div class="member-card" style="border-left:4px solid #28a745;opacity:0.8"><div><strong>${p.memberName}</strong><br>⚖️ ₹${p.amount} - ${p.reason}<br><small>📅 ${p.date} → ✅ ${p.paidDate||''}</small></div></div>`).join('')}
    </div>`;
    document.getElementById('contentArea').innerHTML = html;
}
function openPenaltyModal(memberId) {
    if(!canAddPenalty()){ showToast("⚠️ आप जुर्माना नहीं जोड़ सकते",true); return; }
    let member = appData.members.find(x=>x.id===memberId);
    if(!member){ showToast("सदस्य नहीं मिला",true); return; }
    let existingPenalties = (appData.penalties||[]).filter(p=>p.memberId===memberId && p.status==='unpaid');
    let existingHtml = existingPenalties.length>0 ? `<div style="background:#fff3cd;border-radius:8px;padding:8px;margin-bottom:8px;"><strong>⚠️ मौजूदा बकाया जुर्माने:</strong><br>${existingPenalties.map(p=>`⚖️ ₹${p.amount} - ${p.reason}`).join('<br>')}</div>` : '';
    let html = `<div class="modal"><div class="modal-content"><h3>⚖️ जुर्माना जोड़ें - ${member.name}</h3>${existingHtml}<input id="penAmt" type="number" placeholder="जुर्माना राशि ₹ *" class="form-control"><textarea id="penReason" placeholder="कारण लिखें *" class="form-control" rows="3"></textarea><input type="date" id="penDate" value="${new Date().toISOString().slice(0,10)}" class="form-control"><div class="flex-between"><button class="btn btn-danger" onclick="processPenalty(${memberId})">⚖️ जुर्माना लगाएँ</button><button class="btn btn-secondary" onclick="closeModal()">रद्द</button></div></div></div>`;
    document.body.insertAdjacentHTML('beforeend', html);
}
function processPenalty(memberId) {
    let member = appData.members.find(x=>x.id===memberId);
    let amt = parseFloat(document.getElementById('penAmt').value);
    let reason = document.getElementById('penReason').value;
    let date = document.getElementById('penDate').value;
    if(!reason){ showToast("⚠️ कारण लिखें",true); return; }
    if(isNaN(amt)||amt<=0){ showToast("⚠️ सही राशि दर्ज करें",true); return; }
    if(!appData.penalties) appData.penalties=[];
    let pen = { id: Date.now(), memberId: memberId, memberName: member.name, amount: amt, reason: reason, date: date, status:'unpaid', createdBy: currentUser.name, createdAt: new Date().toISOString() };
    appData.penalties.push(pen);
    member.pending = (member.pending||0) + amt;
    saveToLocalStorage(); closeModal();
    showToast(`✅ ${member.name} को ₹${amt} जुर्माना लगाया`);
    addAuditLog("ADD_PENALTY", `${member.name} - ₹${amt} - ${reason}`);
    renderMemberList();
}
function payPenalty(penaltyId) {
    let pen = (appData.penalties||[]).find(p=>p.id===penaltyId);
    if(!pen){ showToast("जुर्माना नहीं मिला",true); return; }
    let member = appData.members.find(m=>m.id===pen.memberId);
    if(!confirm(`क्या ${pen.memberName} का ₹${pen.amount} जुर्माना (${pen.reason}) चुकाया गया?`)) return;
    pen.status = 'paid';
    pen.paidDate = new Date().toISOString().slice(0,10);
    pen.paidBy = currentUser.name;
    if(member) member.pending = Math.max(0, (member.pending||0) - pen.amount);
    saveToLocalStorage();
    showToast(`✅ जुर्माना चुकाया - ${pen.memberName} ₹${pen.amount}`);
    addAuditLog("PAY_PENALTY", `${pen.memberName} - ₹${pen.amount} चुकाया`);
    if(member) generateReceipt(member, null, pen.amount, 'कैश', "⚖️ जुर्माना चुकाया", false, pen.amount);
    renderPenaltyList();
}
async function deletePenalty(penaltyId) {
    if(!canAddPenalty()) return;
    let pen = (appData.penalties||[]).find(p=>p.id===penaltyId);
    if(!pen) return;
    if(!confirm(`⚠️ जुर्माना हटाएँ? ${pen.memberName} - ₹${pen.amount}`)) return;
    let member = appData.members.find(m=>m.id===pen.memberId);
    if(member && pen.status==='unpaid') member.pending = Math.max(0, (member.pending||0) - pen.amount);
    appData.penalties = appData.penalties.filter(p=>p.id!==penaltyId);
    saveToLocalStorage();
    showToast("✅ जुर्माना हटाया");
    addAuditLog("DELETE_PENALTY", `${pen.memberName} - ₹${pen.amount}`);
    renderPenaltyList();
}
function printPenalties() {
    let rows = (appData.penalties||[]).map(p=>[p.memberName, '₹'+p.amount, p.reason, p.date, p.status==='paid'?'✅ चुकाया':'⚠️ बकाया']);
    printGenericReport('जुर्माना सूची', ['सदस्य', 'राशि', 'कारण', 'तिथि', 'स्थिति'], rows);
}

// ==================== NAVIGATION ====================
function renderCurrentPage(){ if(!currentUser) return; 
    let pages={ home:{dashboard:renderDashboard, ledgerReport:renderLedgerReport, auditLog:renderAuditReport}, members:{memberList:renderMemberList, addMember:renderAddMember, memberHistory:renderMemberHistory, committees:renderCommittees, hiddenMembers:renderHiddenMembers, memberPhotoGallery:renderMemberPhotoGallery, penaltyList:renderPenaltyList}, finance:{donations:renderMemberList, expenses:renderExpenses, receiptsList:renderReceiptsList, advancePayment:renderAdvancePayment, profitLoss:renderProfitLoss, otherDonations:renderOtherDonations, ramcharitmanasReaders:renderRamcharitmanasReaders, pendingList:renderPendingListWithFilters}, temple:{events:renderEvents, ramcharitmanas:renderRamcharitmanas, construction:renderConstruction, gallery:renderGallery, socialLinks:renderSocialLinks, groups:renderGroups, meetings:renderMeetings, announcements:renderAnnouncements}, reports:{monthlyReport:renderMonthlyReport, yearlyReport:renderYearlyReport, pendingReport:renderPendingReport, auditReport:renderAuditReport, trendReport:renderTrendReport, expenseChart:renderExpenseChart}, settings:{generalSettings:renderGeneralSettings, userManagement:renderUserManagement, backup:renderBackup, digitalSignature:renderDigitalSignature, recycleBin:renderRecycleBin, mediaManager:renderMediaManager, amountHistory:renderAmountHistory}, transactions:{transactions:renderTransactionsMain}, committee:{committeeMembers:renderCommitteeMembers, committeeTransactions:renderCommitteeTransactions}, bulkWhatsapp:{bulkWhatsapp:renderBulkWhatsApp} }; 
    if(pages[currentMain] && pages[currentMain][currentSub]) pages[currentMain][currentSub](); else renderDashboard(); }
function switchMain(id){ pushToStack(currentMain,currentSub); currentMain=id; 
    if(id==='home') currentSub='dashboard'; else if(id==='members') currentSub='memberList'; else if(id==='finance') currentSub='donations'; else if(id==='temple') currentSub='events'; else if(id==='reports') currentSub='monthlyReport'; else if(id==='settings') currentSub='generalSettings'; else if(id==='transactions') currentSub='transactions'; else if(id==='committee') currentSub='committeeMembers'; else if(id==='bulkWhatsapp') currentSub='bulkWhatsapp';
    renderNavigation(); renderCurrentPage(); }
function switchSub(id){ pushToStack(currentMain,currentSub); currentSub=id; renderNavigation(); renderCurrentPage(); }
function renderNavigation(){ 
    let mainTabs=[{id:"home",label:"🏠 होम"},{id:"members",label:"👥 सदस्य"},{id:"finance",label:"💰 वित्त"},{id:"temple",label:"🛕 मंदिर"},{id:"reports",label:"📊 रिपोर्ट"},{id:"transactions",label:"💳 लेनदेन"},{id:"committee",label:"🏛️ समिति"},{id:"bulkWhatsapp",label:"📨 बल्क मैसेज"},{id:"settings",label:"⚙️ सेटिंग्स"}]; 
    document.getElementById('mainTabs').innerHTML=mainTabs.map(t=>`<button class="main-tab ${currentMain===t.id?'active':''}" data-tab="${t.id}" onclick="switchMain('${t.id}')">${t.label}</button>`).join(''); 
    let subMap={ home:["dashboard","ledgerReport","auditLog"], members:["memberList","addMember","memberHistory","committees","hiddenMembers","memberPhotoGallery","penaltyList"], finance:["donations","expenses","receiptsList","advancePayment","profitLoss","otherDonations","ramcharitmanasReaders","pendingList"], temple:["events","ramcharitmanas","construction","gallery","socialLinks","groups","meetings","announcements"], reports:["monthlyReport","yearlyReport","pendingReport","auditReport","trendReport","expenseChart"], settings:["generalSettings","userManagement","backup","digitalSignature","recycleBin","mediaManager","amountHistory"], transactions:["transactions"], committee:["committeeMembers","committeeTransactions"], bulkWhatsapp:["bulkWhatsapp"] }; 
    let subNames={ dashboard:"📊 डैश", ledgerReport:"📒 लेजर", auditLog:"📋 ऑडिट", memberList:"👥 सदस्य", addMember:"➕ जोड़ें", memberHistory:"📜 इतिहास", committees:"🏛️ समिति", hiddenMembers:"🙈 हाइड", memberPhotoGallery:"🖼️ फोटो", penaltyList:"⚖️ जुर्माना", donations:"💰 भुगतान", expenses:"💸 व्यय", receiptsList:"🧾 रसीदें", advancePayment:"⭐ एडवांस", profitLoss:"📊 लाभ/हानि", otherDonations:"💰 दान जमा", ramcharitmanasReaders:"📖 रामचरित पाठी", pendingList:"⚠️ बकाया लिस्ट", events:"🎪 आयोजन", ramcharitmanas:"📖 रामचरित", construction:"🏗️ निर्माण", gallery:"🖼️ गैलरी", socialLinks:"🔗 लिंक्स", groups:"👥 ग्रुप", meetings:"📅 बैठक", announcements:"📢 घोषणा", monthlyReport:"📅 मासिक", yearlyReport:"📆 वार्षिक", pendingReport:"⚠️ बकाया", trendReport:"📈 ट्रेंड", expenseChart:"🥧 खर्च", generalSettings:"⚙️ सेटिंग्स", userManagement:"👥 यूजर", backup:"📦 बैकअप", digitalSignature:"🖊️ सिग्नेचर", recycleBin:"🗑️ रीसायकल", mediaManager:"📷 मीडिया", amountHistory:"📜 राशि इतिहास", transactions:"💳 लेनदेन", committeeMembers:"👥 समिति सदस्य", committeeTransactions:"💰 समिति लेनदेन", bulkWhatsapp:"📨 बल्क मैसेज" }; 
    let subs=subMap[currentMain]||["dashboard"]; 
    document.getElementById('subTabs').innerHTML=subs.map(s=>`<button class="sub-tab ${currentSub===s?'active':''}" onclick="switchSub('${s}')">${subNames[s]||s}</button>`).join(''); }
function addLoginHistory(){ if(currentUser) appData.loginHistory.unshift({ user:currentUser.name, email:currentUser.email, role:currentUser.role, timestamp:new Date().toISOString() }); saveToLocalStorage(); }
// Default users - always available
const HARDCODED_USERS = [
    { id: 1, name: "सुपर एडमिन", email: "super@mandir.com", password: "super123", role: "super_admin" },
    { id: 2, name: "एडमिन", email: "admin@mandir.com", password: "admin123", role: "admin" },
    { id: 3, name: "ऑपरेटर", email: "operator@mandir.com", password: "oper123", role: "operator" },
    { id: 4, name: "व्यूअर", email: "viewer@mandir.com", password: "view123", role: "viewer" }
];
function doLogin(){
    let email = document.getElementById('loginEmail').value.trim();
    let pass = document.getElementById('loginPassword').value;
    if(!email||!pass){ document.getElementById('loginError').innerHTML="⚠️ ईमेल और पासवर्ड डालें!"; return; }
    let allUsers = (appData.users && appData.users.length > 0) ? appData.users : HARDCODED_USERS;
    let user = allUsers.find(u => u.email.trim() === email && u.password === pass);
    if(!user) user = HARDCODED_USERS.find(u => u.email.trim() === email && u.password === pass);
    if(user){
        currentUser = user;
        if(!appData.users) appData.users = [];
        if(!appData.users.find(u => u.email === user.email)) appData.users.push(user);
        resetLogoutTimer();
        afterLogin();
    } else {
        document.getElementById('loginError').innerHTML="❌ गलत ईमेल या पासवर्ड!";
    }
}
function afterLogin(){ document.getElementById('loginPage').style.display='none'; document.getElementById('appContainer').style.display='block'; document.getElementById('userName').innerHTML=currentUser.name; let roleText=currentUser.role==='super_admin'?'सुपर एडमिन':(currentUser.role==='admin'?'एडमिन':(currentUser.role==='operator'?'ऑपरेटर':'व्यूअर')); document.getElementById('userRoleBadge').innerHTML=roleText; document.getElementById('userRoleBadge').className=`role-${currentUser.role}`; computeAllPending(); addLoginHistory(); renderNavigation(); renderCurrentPage(); addAuditLog("लॉगिन","सफल"); showToast(`🙏 स्वागत है, ${currentUser.name} जी!`); checkOverdueMembers(); trackUserActivity(); checkAndAddNextMonthPending(); setInterval(checkAndAddNextMonthPending, 24*60*60*1000); }

// ==================== AUTO PENDING ====================
function checkAndAddNextMonthPending() {
    let today = new Date();
    let month = today.getMonth();
    let year = today.getFullYear();
    appData.members.forEach(m => {
        if(m.status !== 'active' || m.hidden || m.donationStatus === 'paused') return;
        let joinDate = new Date(m.joinDate);
        if(year < joinDate.getFullYear() || (year === joinDate.getFullYear() && month < joinDate.getMonth())) return;
        if(!isMonthPaid(m, year, month, false)) {
            computeAutoPendingForMember(m, false);
        }
    });
    saveToLocalStorage();
}

// ==================== ONLINE / OFFLINE INDICATOR ====================
window.addEventListener('online', () => {
    let el = document.getElementById('offlineStatus');
    if(el) el.style.display = 'none';
});
window.addEventListener('offline', () => {
    let el = document.getElementById('offlineStatus');
    if(el) { el.style.display = 'block'; el.style.cssText += ';display:block!important;'; }
});
function doLogout(){ if(bulkInterval) clearInterval(bulkInterval); if(logoutTimer) clearTimeout(logoutTimer); currentUser=null; document.getElementById('loginPage').style.display='flex'; document.getElementById('appContainer').style.display='none'; navigationStack=[]; showToast("🔓 लॉगआउट"); }
if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark');
document.getElementById('darkModeToggle')?.addEventListener('click', () => { document.body.classList.toggle('dark'); localStorage.setItem('darkMode', document.body.classList.contains('dark')); });
function shareApp(){ let msg=`🚩 ${appData.settings.committeeName}\nऐप लिंक: ${window.location.href}`; if(navigator.share) navigator.share({title:"मंदिर ऐप",text:msg}); else { navigator.clipboard.writeText(msg); showToast("📋 लिंक कॉपी"); } }
function toggleLanguage(){ let btn=document.querySelector('.lang-btn'); if(btn) btn.innerHTML=btn.innerHTML.includes('English')?'🇮🇳 हिंदी':'🇮🇳 English'; showToast("भाषा बदली"); }
// ✅ App start - Firebase async load then init
loadFromLocalStorage();
setInterval(() => { computeAllPending(); if(currentMain === 'home' && currentSub === 'dashboard') renderDashboard(); }, 3600000);
</script>
