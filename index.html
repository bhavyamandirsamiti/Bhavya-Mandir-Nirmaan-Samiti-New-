    (function createManifest() {
        const manifest = {
            name: "भव्य मन्दिर निर्माण समिति",
            short_name: "मन्दिर APP",
            start_url: ".",

                    sizes: "any",
                    type: "image/svg+xml",
                    purpose: "any maskable"
                }
            ]
        };
        const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(manifestBlob);
        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = manifestURL;
        document.head.appendChild(link);
    })();
    
    // Service Worker code
    (function registerServiceWorker() {
        const swCode = `self.addEventListener('install', event => {
            self.skipWaiting();
            event.waitUntil(
                caches.open('mandir-v1').then(cache => {
                    return cache.addAll([
                        '/',
                        '/index.html'
                    ]);
                })
            );
        });
        self.addEventListener('fetch', event => {
            event.respondWith(
                caches.match(event.request).then(response => {
                    return response || fetch(event.request);
                })
            );
        });`;
        const swBlob = new Blob([swCode], {type: 'application/javascript'});
        const swURL = URL.createObjectURL(swBlob);
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register(swURL).then(reg => {
                console.log('SW registered:', reg);
            }).catch(err => {
                console.log('SW registration failed:', err);
            });
        }
    })();

    function getAllMonthsFromJoinTillNow(joinDate) {
        const join = new Date(joinDate);
        const now = new Date();
        const monthsList = ['जनवरी', 'फरवरी', 'मार्च', 'अप्रैल', 'मई', 'जून', 'जुलाई', 'अगस्त', 'सितम्बर', 'अक्टूबर', 'नवम्बर', 'दिसम्बर'];
        let all = [];
        for(let y = join.getFullYear(); y <= now.getFullYear(); y++) {
            let sm = (y === join.getFullYear()) ? join.getMonth() : 0;
            let em = (y === now.getFullYear()) ? now.getMonth() : 11;
            for(let m = sm; m <= em; m++) { all.push({ year: y, month: monthsList[m], monthIndex: m }); }
        }
        return all;
    }
    function getMonthlyAmountForDate(member, date) {
        if(!member.monthlyAmountHistory || member.monthlyAmountHistory.length === 0) return member.monthlyAmount;
        let sorted = [...member.monthlyAmountHistory].sort((a,b) => new Date(a.effectiveDate) - new Date(b.effectiveDate));
        let effective = sorted[0].amount;
        for(let h of sorted) { if(new Date(h.effectiveDate) <= new Date(date)) effective = h.amount; }
        return effective;
    }
    function computeAdvanceAndPending() {
        for(let m of appData.members) {
            if(m.status !== 'active') continue;
            let monthlyDonations = appData.donations.filter(d => d.memberId === m.id && d.type === 'monthly');
            let advanceDonations = appData.donations.filter(d => d.memberId === m.id && d.type === 'advance');
            let totalAdvance = advanceDonations.reduce((sum, d) => sum + d.amount, 0);
            let allMonths = getAllMonthsFromJoinTillNow(m.joinDate);
            let expected = 0, paid = 0;
            for(let mon of allMonths) {
                let monthDate = new Date(mon.year, mon.monthIndex, 1);
                expected += getMonthlyAmountForDate(m, monthDate);
            }
            paid = monthlyDonations.reduce((s,d)=>s+d.amount,0);
            let pending = expected - paid;
            let advBal = totalAdvance;
            if(advBal > 0 && pending > 0) {
                if(advBal >= pending) { advBal -= pending; pending = 0; }
                else { pending -= advBal; advBal = 0; }
            }
            m.pending = pending > 0 ? pending : 0;
            m.advanceBalance = advBal > 0 ? advBal : 0;
        }
        saveToLocal();
    }

        let m = appData.members.find(x=>x.id===memberId);

    function submitEditRequest(memberId) {
        let m = appData.members.find(x=>x.id===memberId);
        let field = document.getElementById('editField').value;
        let newValue = document.getElementById('newValue').value;
        let reason = document.getElementById('requestReason').value;
        let oldValue = m[field];
        appData.pendingEdits.push({ id: Date.now(), memberId, memberName: m.name, field, oldValue, newValue, reason, requestedBy: currentUser.name, requestedAt: new Date().toISOString() });
        saveToLocal();
        closeModal();
        showToast("रिक्वेस्ट भेज दी गई");
        renderMemberList();
        addAuditLog("EDIT_REQUEST", `${currentUser.name} requested edit for ${m.name}`);
    }
    function approveEdit(id) {
        let req = appData.pendingEdits.find(r => r.id === id);
        let m = appData.members.find(x=>x.id === req.memberId);
        let oldData = { [req.field]: m[req.field] };
        m[req.field] = req.newValue;
        m.updated_by = currentUser.name;
        m.updated_at = new Date().toISOString();
        addEditHistory(m, 'MEMBER', oldData, { [req.field]: req.newValue }, req.reason);
        appData.pendingEdits = appData.pendingEdits.filter(r => r.id !== id);
        saveToLocal();
        renderMemberList();
        showToast("एडिट approved");
        addAuditLog("EDIT_APPROVED", `${currentUser.name} approved edit for ${m.name}`);
    }
    function rejectEdit(id) {
        appData.pendingEdits = appData.pendingEdits.filter(r => r.id !== id);
        saveToLocal();
        renderMemberList();
        showToast("रिक्वेस्ट reject");
    }

    function processAdvance(memberId) {
        let m = appData.members.find(x=>x.id===memberId);

    function getPendingMonthsForMember(memberId, selectedYear = null) {
        let m = appData.members.find(x=>x.id===memberId);
        if(!m) return [];
        const allMonths = getAllMonthsFromJoinTillNow(m.joinDate);
        const paidMonths = appData.donations.filter(d => d.memberId === m.id && d.type === 'monthly').map(d => ({ year: d.year, month: d.month }));
        let pending = [];
        for(let item of allMonths) {
            if(selectedYear && item.year !== selectedYear) continue;
            if(!paidMonths.some(p => p.year === item.year && p.month === item.month)) pending.push(item);
        }
        return pending;
    }
    
    function openPaymentModal(memberId) {
        let m = appData.members.find(x=>x.id===memberId);
        if(!m) return;
        
        let allMonths = getAllMonthsFromJoinTillNow(m.joinDate);
        let paidMonths = appData.donations.filter(d => d.memberId === m.id && d.type === 'monthly').map(d => ({ year: d.year, month: d.month }));
        let pendingMap = new Map();
        
        for(let item of allMonths) {
            if(!paidMonths.some(p => p.year === item.year && p.month === item.month)) {
                if(!pendingMap.has(item.year)) pendingMap.set(item.year, []);
                pendingMap.get(item.year).push({ month: item.month, monthIndex: item.monthIndex });
            }
        }
        
        let years = Array.from(pendingMap.keys()).sort((a,b)=>a-b);
        if(years.length === 0) { showToast("कोई बकाया नहीं है", true); return; }
        
        let currentYear = years[0];
        
        let html = `<div class="modal"><div class="modal-content" style="max-width: 450px;">
            <h3 style="color:var(--saffron); margin-bottom:15px;">💰 भुगतान - ${m.name}</h3>

            <div class="form-group" style="margin-top:15px;">

                <input type="number" id="payAmount" class="form-control" readonly style="background:#e9ecef;">
            </div>

                </select>

                <button class="btn btn-secondary" onclick="closeModal()">❌ रद्द</button>
            </div>
        </div></div>`;
        document.body.insertAdjacentHTML('beforeend', html);
        
        function renderMonthCheckboxes() {
            let year = parseInt(document.getElementById('paymentYearSelect').value);
            let pendingMonths = pendingMap.get(year) || [];
            let checkboxesHtml = '<div class="checklist"><div class="checklist-item"><input type="checkbox" id="selectAllMonths"> <strong>✅ सभी बकाया महीने चुनें (इस वर्ष)</strong></div>';
            for(let pm of pendingMonths) {
                checkboxesHtml += `<div class="checklist-item"><input type="checkbox" value="${pm.month}" class="month-cb"> <label>${pm.month}</label></div>`;
            }
            checkboxesHtml += '</div>';
            document.getElementById('paymentMonthsContainer').innerHTML = checkboxesHtml;
            
            let totalAmount = pendingMonths.length * m.monthlyAmount;
            document.getElementById('payAmount').value = totalAmount;
            
            let selectAllCb = document.getElementById('selectAllMonths');

    }
    function printPendingReportFn() {
        let rows = appData.members.filter(m=>m.pending>0 && m.status==='active').map(m=>`<tr><td style="color:var(--saffron);">${m.name}</td><td style="color:var(--danger);">₹${m.pending}</td></tr>`).join('');
        let printContent = `<html><head><title>बकाया रिपोर्ट</title><style>body{font-family:Arial;padding:20px} table{border-collapse:collapse;width:100%} th,td{border:1px solid #ddd;padding:8px} th{background:#FF9933;color:white}</style></head><body><h2>🚩 बकाया रिपोर्ट</h2><table><thead><tr><th>नाम</th><th>बकाया</th></tr></thead><tbody>${rows}</tbody></table><p>${new Date().toLocaleDateString()}</p><p>${appData.settings.president} (अध्यक्ष)</p></body></html>`;
        let win = window.open('', '_blank');
        win.document.write(printContent);
        win.document.close();
        win.print();
    }
    function renderAuditReport() {
        let logs = appData.auditLogs.slice(0,50).map(l=>`<tr><td style="color:var(--gray);">${l.timestamp.slice(0,10)}</td><td style="color:var(--saffron);">${l.user} (${l.role})</td><td style="color:var(--teal);">${l.action}</td><td style="color:var(--gray);">${l.details}</td></tr>`).join('');
        document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-title">📋 ऑडिट लॉग</div><table class="data-table"><thead><th>तिथि</th><th>उपयोगकर्ता</th><th>कार्य</th><th>विवरण</th></thead><tbody>${logs}</tbody></table></div>`;
    }

    function renderGeneralSettings() {
        let pendingRequestsHtml = '';
        if(currentUser.role === 'super_admin' && appData.pendingLogoRequests && appData.pendingLogoRequests.length > 0) {
            pendingRequestsHtml = `<div class="card"><div class="card-title">⏳ लोगो अनुमति रिक्वेस्ट</div>${appData.pendingLogoRequests.map(req => `<div class="member-card"><div><strong>${req.requestedBy}</strong><br>कारण: ${req.reason}<br><img src="${req.newLogo}" width="50" height="50" style="border-radius:50%;"></div><div><button class="btn-sm btn-success" onclick="approveLogoRequest(${req.id})">✅ Approve</button><button class="btn-sm btn-danger" onclick="rejectLogoRequest(${req.id})">❌ Reject</button></div></div>`).join('')}</div>`;
        }
        document.getElementById('contentArea').innerHTML = pendingRequestsHtml + `<div class="card"><div class="card-title">⚙️ सेटिंग्स</div><input id="setName" value="${appData.settings.committeeName}" class="form-control"><input id="setSub" value="${appData.settings.committeeSubtitle}" class="form-control mt-2"><input id="setUpi" value="${appData.settings.upiId}" class="form-control mt-2"><input id="president" value="${appData.settings.president}" class="form-control mt-2"><input id="presidentMobile" value="${appData.settings.presidentMobile}" class="form-control mt-2"><input id="secretary" value="${appData.settings.secretary}" class="form-control mt-2"><input type="file" id="logoUpload" accept="image/*" class="form-control mt-2">${currentUser.role === 'admin' ? '<input id="logoChangeReason" placeholder="लोगो बदलने का कारण" class="form-control mt-2">' : ''}<button class="btn btn-primary mt-3" onclick="saveGeneralSettings()">सेव करें</button></div>`;
        if(appData.settings.logo) document.querySelector('#contentArea .card').innerHTML += `<img src="${appData.settings.logo}" style="width:60px;height:60px;border-radius:50%;margin-top:10px;">`;
    }
    function saveGeneralSettings() {
        let logoFile = document.getElementById('logoUpload').files[0];
        let saveSettings = (logoUrl) => {
            appData.settings.committeeName = document.getElementById('setName').value;
            appData.settings.committeeSubtitle = document.getElementById('setSub').value;
            appData.settings.upiId = document.getElementById('setUpi').value;
            appData.settings.president = document.getElementById('president').value;
            appData.settings.presidentMobile = document.getElementById('presidentMobile').value;
            appData.settings.secretary = document.getElementById('secretary').value;
            if(logoUrl) {
                if(currentUser.role === 'super_admin') {
                    appData.settings.logo = logoUrl;
                    saveToLocal();
                    document.getElementById('committeeLogoImg').src = logoUrl;
                    showToast("लोगो बदला");
                    addAuditLog("LOGO_CHANGED", `by ${currentUser.name}`);
                } else if(currentUser.role === 'admin') {
                    let reason = document.getElementById('logoChangeReason')?.value || "लोगो बदलने की अनुमति";
                    if(!appData.pendingLogoRequests) appData.pendingLogoRequests = [];
                    appData.pendingLogoRequests.push({ id: Date.now(), requestedBy: currentUser.name, reason: reason, newLogo: logoUrl });
                    saveToLocal();
                    showToast("लोगो बदलने की रिक्वेस्ट भेजी");
                    addAuditLog("LOGO_CHANGE_REQUEST", `${currentUser.name} requested - Reason: ${reason}`);
                }
            } else {
                saveToLocal();
                showToast("सेटिंग्स सेव");
            }
            document.getElementById('headerTitle').innerHTML = appData.settings.committeeName;
            renderGeneralSettings();
        };
        if(logoFile) { let reader = new FileReader(); reader.onload = e => saveSettings(e.target.result); reader.readAsDataURL(logoFile); } else { saveSettings(null); }
    }
    function approveLogoRequest(id) {
        let req = appData.pendingLogoRequests.find(r => r.id === id);
        if(req) {
            appData.settings.logo = req.newLogo;
            appData.pendingLogoRequests = appData.pendingLogoRequests.filter(r => r.id !== id);
            saveToLocal();
            document.getElementById('committeeLogoImg').src = req.newLogo;
            showToast("लोगो बदलने की अनुमति दी");
            addAuditLog("LOGO_CHANGE_APPROVED", `by ${currentUser.name} for ${req.requestedBy}`);
            renderGeneralSettings();
        }
    }
    function rejectLogoRequest(id) {
        appData.pendingLogoRequests = appData.pendingLogoRequests.filter(r => r.id !== id);
        saveToLocal();
        showToast("लोगो बदलने की अनुमति अस्वीकृत");
        renderGeneralSettings();
    }

    function renderSocialSettings() {
        document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-title">🔗 सोशल सेटिंग्स</div><input id="fbLink" value="${appData.settings.facebookLink || ''}" placeholder="Facebook" class="form-control"><input id="instaLink" value="${appData.settings.instagramLink || ''}" placeholder="Instagram" class="form-control mt-2"><input id="youtubeLink" value="${appData.settings.youtubeLink || ''}" placeholder="YouTube" class="form-control mt-2"><button class="btn btn-primary mt-2" onclick="saveSocialSettings()">सेव करें</button></div>`;
    }
    function saveSocialSettings() {
        appData.settings.facebookLink = document.getElementById('fbLink').value;
        appData.settings.instagramLink = document.getElementById('instaLink').value;
        appData.settings.youtubeLink = document.getElementById('youtubeLink').value;
        saveToLocal();
        showToast("सेव");
        addAuditLog("SOCIAL_SETTINGS_CHANGED", "by "+currentUser.name);
    }
    function renderGoogleSheets() {
        document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-title">📊 Google Sheets</div><input id="sheetId" value="${appData.settings.googleSheetId || ''}" placeholder="Sheet ID" class="form-control"><button class="btn btn-primary mt-2" onclick="saveGoogleSheets()">सेव करें</button></div>`;
    }
    function saveGoogleSheets() {
        appData.settings.googleSheetId = document.getElementById('sheetId').value;
        saveToLocal();
        showToast("सेव");
    }
    function renderBackup() {
        document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-title">📦 बैकअप</div><button class="btn btn-success" onclick="backupNow()">💾 बैकअप डाउनलोड</button><button class="btn btn-info mt-2" onclick="restoreFromFile()">📂 रिस्टोर</button><button class="btn btn-info mt-2" onclick="backupToGoogleDrive()">☁️ Google Drive बैकअप</button></div>`;
    }
    function backupNow() {
        let a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(appData)]));
        a.download = `mandir_backup_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        showToast("बैकअप लिया गया");
        addAuditLog("BACKUP_DOWNLOAD", "manual backup");
    }
    function restoreFromFile() {
        let inp = document.createElement('input');
        inp.type = 'file';
        inp.accept = '.json';
        inp.onchange = e => {
            let file = e.target.files[0];
            if(file) {
                let reader = new FileReader();
                reader.onload = ev => {
                    try {
                        let restored = JSON.parse(ev.target.result);
                        appData = restored;
                        saveToLocal();
                        showToast("रिस्टोर सफल! पेज रिफ्रेश हो रहा है...");
                        setTimeout(() => location.reload(), 1500);
                    } catch(err) { showToast("गलत फ़ाइल फॉर्मेट", true); }
                };
                reader.readAsText(file);
            }
        };
        inp.click();
    }
    function renderUsers() {
        if(currentUser.role !== 'super_admin') { document.getElementById('contentArea').innerHTML = '<div class="card">❌ केवल सुपर एडमिन</div>'; return; }
        let userHtml = appData.users.map(u=>`<div class="member-card"><div>${u.name} (${u.role})<br><small>बनाया: ${u.created_by}</small></div><button class="btn-sm btn-danger" onclick="deleteUser(${u.id})">🗑️</button></div>`).join('');
        document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-title">👥 यूजर प्रबंधन</div>${userHtml}<button class="btn btn-primary mt-2" onclick="openAddUserModal()">+ नया यूजर</button></div>`;
    }
    function renderTheme() {
        document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-title">🎨 थीम</div><div style="display:flex; justify-content:center; gap:20px; padding:15px;"><div class="theme-icon" onclick="changeTheme('#FF9933')" style="color:#FF9933;"><i class="fas fa-palette fa-2x"></i><div>भगवा</div></div><div class="theme-icon" onclick="changeTheme('#28a745')" style="color:#28a745;"><i class="fas fa-palette fa-2x"></i><div>हरा</div></div><div class="theme-icon" onclick="changeTheme('#dc3545')" style="color:#dc3545;"><i class="fas fa-palette fa-2x"></i><div>लाल</div></div><div class="theme-icon" onclick="changeTheme('#007bff')" style="color:#007bff;"><i class="fas fa-palette fa-2x"></i><div>नीला</div></div></div><button class="btn btn-primary mt-2" onclick="document.body.classList.toggle('dark')">🌙 डार्क मोड टॉगल करें</button></div>`;
    }
    function changeTheme(color) { 
        document.documentElement.style.setProperty('--saffron', color); 
        document.documentElement.style.setProperty('--saffron-dark', color); 
        document.documentElement.style.setProperty('--gold', color); 
        showToast("थीम बदल दी गई"); 
        addAuditLog("THEME_CHANGED", color); 
    }

    function doLogin() {
        let email = document.getElementById('loginEmail').value;
        let password = document.getElementById('loginPassword').value;
        let user = appData.users.find(u => u.email === email && u.password === password);
        if(user) {
            currentUser = user;
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            document.getElementById('userName').innerHTML = user.name;
            let roleText = user.role === 'super_admin' ? 'सुपर एडमिन' : (user.role === 'admin' ? 'एडमिन' : (user.role === 'operator' ? 'ऑपरेटर' : 'व्यूअर'));
            document.getElementById('userRoleBadge').innerHTML = roleText;
            document.getElementById('userRoleBadge').className = `role-${user.role}`;
            if(appData.settings.logo) document.getElementById('committeeLogoImg').src = appData.settings.logo;
            computeAdvanceAndPending();
            renderNavigation();
            renderCurrentPage();
            addAuditLog("LOGIN", `User ${user.name} (${user.role}) logged in`);
            showToast(`स्वागत है, ${user.name} जी!`);
        } else {
            document.getElementById('loginError').innerHTML = "❌ गलत ईमेल या पासवर्ड!";
        }
    }
    function doLogout() {
        if(bulkInterval) clearInterval(bulkInterval);
        currentUser = null;
        document.getElementById('loginPage').style.display = 'flex';
        document.getElementById('appContainer').style.display = 'none';
        navigationStack = [];
        addAuditLog("LOGOUT", "User logged out");
        showToast("लॉगआउट हो गया");
    }

    document.getElementById('darkModeToggle')?.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        addAuditLog("DARK_MODE", document.body.classList.contains('dark') ? "enabled" : "disabled");
    });
    loadFromLocal();
</script>
</body>
</html>
