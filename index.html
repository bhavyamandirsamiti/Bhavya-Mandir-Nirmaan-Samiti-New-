    // ----------------------------- FIREBASE SAVE/LOAD ---------------------
    function saveSettings() { database.ref('settings').set(appData.settings); }
    function saveMembers() { let obj={}; appData.members.forEach(m=>obj[m.id]=m); database.ref('members').set(obj); }
    function saveDonations() { let obj={}; appData.donations.forEach(d=>obj[d.id]=d); database.ref('donations').set(obj); }

    function saveEvents() { let obj={}; appData.events.forEach(e=>obj[e.id]=e); database.ref('events').set(obj); }
    function saveRamcharit() { let obj={}; appData.ramcharitmanas.forEach(r=>obj[r.id]=r); database.ref('ramcharitmanas').set(obj); }
    function saveGallery() { let obj={}; appData.gallery.forEach((g,i)=>obj[i]=g); database.ref('gallery').set(obj); }
    function saveAudit() { let obj={}; appData.auditLogs.forEach((l,i)=>obj[i]=l); database.ref('auditLogs').set(obj); }
    function saveUsers() { let obj={}; appData.users.forEach(u=>obj[u.id]=u); database.ref('users').set(obj); }
    function saveCommittees() { let obj={}; appData.committees.forEach(c=>obj[c.id]=c); database.ref('committees').set(obj); }
    function savePendingEdits() { let obj={}; appData.pendingEdits.forEach(e=>obj[e.id]=e); database.ref('pendingEdits').set(obj); }
    function saveReceipts() { let obj={}; appData.receipts.forEach(r=>obj[r.id]=r); database.ref('receipts').set(obj); }
    function saveConstruction() { database.ref('construction').set(appData.construction); }
    function saveLogoRequests() { let obj={}; appData.pendingLogoRequests.forEach(r=>obj[r.id]=r); database.ref('pendingLogoRequests').set(obj); }
    function savePendingRequests() { let obj={}; appData.pendingRequests.forEach((r,i)=>obj[i]=r); database.ref('pendingRequests').set(obj); }
    function saveDataChangeRequests() { let obj={}; appData.dataChangeRequests.forEach((r,i)=>obj[i]=r); database.ref('dataChangeRequests').set(obj); }
    function saveLoginHistory() { let obj={}; appData.loginHistory.forEach((h,i)=>obj[i]=h); database.ref('loginHistory').set(obj); }
    function saveAll() { saveSettings(); saveMembers(); saveDonations(); saveExpenses(); saveEvents(); saveRamcharit(); saveGallery(); saveAudit(); saveUsers(); saveCommittees(); savePendingEdits(); saveReceipts(); saveConstruction(); saveLogoRequests(); savePendingRequests(); saveDataChangeRequests(); saveLoginHistory(); }

    function loadAll() {
        database.ref('settings').on('value',s=>{if(s.val()) appData.settings={...appData.settings,...s.val()}; pendingLoads--; checkLoaded();});
        database.ref('members').on('value',s=>{appData.members=s.val()?Object.values(s.val()):[]; pendingLoads--; checkLoaded();});
        database.ref('donations').on('value',s=>{appData.donations=s.val()?Object.values(s.val()):[]; pendingLoads--; checkLoaded();});
        database.ref('expenses').on('value',s=>{appData.expenses=s.val()?Object.values(s.val()):[]; pendingLoads--; checkLoaded();});
        database.ref('events').on('value',s=>{appData.events=s.val()?Object.values(s.val()):[]; pendingLoads--; checkLoaded();});
        database.ref('ramcharitmanas').on('value',s=>{appData.ramcharitmanas=s.val()?Object.values(s.val()):[]; pendingLoads--; checkLoaded();});
        database.ref('gallery').on('value',s=>{appData.gallery=s.val()?Object.values(s.val()):[]; pendingLoads--; checkLoaded();});
        database.ref('auditLogs').on('value',s=>{appData.auditLogs=s.val()?Object.values(s.val()):[]; pendingLoads--; checkLoaded();});
        database.ref('users').on('value',s=>{if(s.val()) appData.users=Object.values(s.val()); else ensureDefaultUsers(); pendingLoads--; checkLoaded();});
        database.ref('committees').on('value',s=>{appData.committees=s.val()?Object.values(s.val()):[]; pendingLoads--; checkLoaded();});
        database.ref('pendingEdits').on('value',s=>{appData.pendingEdits=s.val()?Object.values(s.val()):[]; pendingLoads--; checkLoaded();});
        database.ref('receipts').on('value',s=>{appData.receipts=s.val()?Object.values(s.val()):[]; pendingLoads--; checkLoaded();});
        database.ref('construction').on('value',s=>{if(s.val()) appData.construction=s.val(); pendingLoads--; checkLoaded();});
        database.ref('pendingLogoRequests').on('value',s=>{appData.pendingLogoRequests=s.val()?Object.values(s.val()):[]; pendingLoads--; checkLoaded();});
        database.ref('pendingRequests').on('value',s=>{appData.pendingRequests=s.val()?Object.values(s.val()):[]; updatePendingBadge(); pendingLoads--; checkLoaded();});
        database.ref('dataChangeRequests').on('value',s=>{appData.dataChangeRequests=s.val()?Object.values(s.val()):[]; updatePendingBadge(); pendingLoads--; checkLoaded();});
        database.ref('loginHistory').on('value',s=>{appData.loginHistory=s.val()?Object.values(s.val()):[]; pendingLoads--; checkLoaded();});
        database.ref('announcements').on('value',s=>{appData.announcements=s.val()?Object.values(s.val()):[]; pendingLoads--; checkLoaded();});
        database.ref('meetings').on('value',s=>{appData.meetings=s.val()?Object.values(s.val()):[]; pendingLoads--; checkLoaded();});
    }

        if(appData.users.length===0){
            appData.users=[
                {id:1,name:"सुपर एडमिन",email:"super@mandir.com",password:"super123",role:"super_admin"},
                {id:2,name:"एडमिन",email:"admin@mandir.com",password:"admin123",role:"admin"},
                {id:3,name:"ऑपरेटर",email:"operator@mandir.com",password:"oper123",role:"operator"},
                {id:4,name:"व्यूअर",email:"viewer@mandir.com",password:"view123",role:"viewer"}
            ];

        if(pendingLoads<=0 && !dataLoaded){

            if(currentUser){
                computeAdvanceAndPending();
                renderNavigation();
                renderCurrentPage();
                showToast("✅ डेटा लोड हो गया");
            } else {
                document.getElementById('contentArea').innerHTML='<div class="card">कृपया लॉगिन करें</div>';
            }

    function initSampleData(){
        if(appData.members.length===0){
            appData.members=[
                {id:1001,name:"रामप्रसाद गुप्ता",father:"श्रीकृष्ण",mobile:"9876543210",village:"गुलाबपुरा",monthlyAmount:200,monthlyAmountHistory:[{amount:200,effectiveDate:"2024-01-01"}],joinDate:"2024-01-01",status:"active",advanceBalance:0,pending:0,photo:""},
                {id:1002,name:"सीता देवी",father:"रामलाल",mobile:"9876543211",village:"मोहनगढ़",monthlyAmount:200,monthlyAmountHistory:[{amount:200,effectiveDate:"2024-01-15"}],joinDate:"2024-01-15",status:"active",advanceBalance:0,pending:0,photo:""}

    // ----------------------------- HELPERS ---------------------------------
    function getAllMonthsFromJoinTillNow(joinDate){ let join=new Date(joinDate), now=new Date(), months=['जनवरी','फरवरी','मार्च','अप्रैल','मई','जून','जुलाई','अगस्त','सितम्बर','अक्टूबर','नवम्बर','दिसम्बर'], all=[]; for(let y=join.getFullYear(); y<=now.getFullYear(); y++){ let sm=(y===join.getFullYear())?join.getMonth():0, em=(y===now.getFullYear())?now.getMonth():11; for(let m=sm; m<=em; m++) all.push({year:y, month:months[m], monthIndex:m}); } return all; }
    function getMonthlyAmountForDate(member,date){ if(!member.monthlyAmountHistory) return member.monthlyAmount; let sorted=[...member.monthlyAmountHistory].sort((a,b)=>new Date(a.effectiveDate)-new Date(b.effectiveDate)); let effective=sorted[0].amount; for(let h of sorted) if(new Date(h.effectiveDate)<=new Date(date)) effective=h.amount; return effective; }
    function computeAdvanceAndPending(){ for(let m of appData.members){ if(m.status!=='active') continue; let monthly=appData.donations.filter(d=>d.memberId===m.id && d.type==='monthly'); let advance=appData.donations.filter(d=>d.memberId===m.id && d.type==='advance'); let totalAdvance=advance.reduce((s,d)=>s+d.amount,0); let allMonths=getAllMonthsFromJoinTillNow(m.joinDate); let expected=0, paid=0; for(let mon of allMonths){ let date=new Date(mon.year, mon.monthIndex,1); expected+=getMonthlyAmountForDate(m,date); } paid=monthly.reduce((s,d)=>s+d.amount,0); let pending=expected-paid; let advBal=totalAdvance; if(advBal>0 && pending>0){ if(advBal>=pending){ advBal-=pending; pending=0; } else { pending-=advBal; advBal=0; } } m.pending=pending>0?pending:0; m.advanceBalance=advBal>0?advBal:0; } saveAll(); }
    function addAuditLog(action,details){ appData.auditLogs.unshift({action,details,user:currentUser?.name||"System",role:currentUser?.role||"System",timestamp:new Date().toISOString()}); if(appData.auditLogs.length>500) appData.auditLogs.pop(); saveAll(); }
    function showToast(msg,err=false){ let t=document.createElement('div'); t.className='toast'; t.innerText=msg; t.style.background=err?'#dc3545':'#28a745'; document.body.appendChild(t); setTimeout(()=>t.remove(),2500); }

    function pushToStack(main,sub){ navigationStack.push({main:currentMain,sub:currentSub}); let btn=document.getElementById('backBtn'); if(btn) btn.style.display='flex'; }
    function isValidMobile(m){ return /^[6-9]\d{9}$/.test(m); }
    function isDuplicateMobile(mob,excludeId){ return appData.members.some(m=>m.mobile===mob && m.id!==excludeId && m.status==='active'); }
    function getNextReceiptNo(){ return "REC"+Date.now().toString().slice(-8); }
    function getDynamicYears(s=2024){ let y=new Date().getFullYear(), arr=[]; for(let i=s;i<=y+10;i++) arr.push(i); return arr; }
    function getYearOptions(sel=null,s=2024){ let years=getDynamicYears(s); let cur=sel!==null?sel:new Date().getFullYear(); return years.map(y=>`<option value="${y}" ${y===cur?'selected':''}>${y}</option>`).join(''); }

    // ----------------------------- AUTHENTICATION -------------------------
    function doLogin(){
        let email=document.getElementById('loginEmail').value;
        let pwd=document.getElementById('loginPassword').value;
        auth.signInWithEmailAndPassword(email,pwd).then(cred=>{
            let role='viewer';
            if(email==='super@mandir.com') role='super_admin';
            else if(email==='admin@mandir.com') role='admin';
            else if(email==='operator@mandir.com') role='operator';
            currentUser={id:cred.user.uid, name:email.split('@')[0], email, role};
            afterLogin();
        }).catch(err=>{ document.getElementById('loginError').innerHTML="❌ "+err.message; });
    }
    function afterLogin(){
        document.getElementById('loginPage').style.display='none';
        document.getElementById('appContainer').style.display='block';
        document.getElementById('userName').innerHTML=currentUser.name;
        let roleText={super_admin:'सुपर एडमिन',admin:'एडमिन',operator:'ऑपरेटर',viewer:'व्यूअर'}[currentUser.role];
        document.getElementById('userRoleBadge').innerHTML=roleText;
        document.getElementById('userRoleBadge').className=`role-${currentUser.role}`;
        if(appData.settings.logo) document.getElementById('committeeLogoImg').src=appData.settings.logo;
        computeAdvanceAndPending();
        appData.loginHistory.unshift({user:currentUser.name,email:currentUser.email,role:currentUser.role,timestamp:new Date().toISOString(),device:navigator.userAgent.slice(0,100)});
        saveLoginHistory();
        renderNavigation();
        renderCurrentPage();
        addAuditLog("लॉगिन",`${currentUser.name} logged in`);
        showToast(`🙏 स्वागत है, ${currentUser.name} जी!`);
        updatePendingBadge();

        </div>

    function sendReminder(id){ let m=appData.members.find(x=>x.id===id); if(m){ let msg=`🚩 जय श्री राम\n${m.name} जी, बकाया: ₹${m.pending}\nUPI: ${appData.settings.upiId}`; window.open(`https://wa.me/91${m.mobile}?text=${encodeURIComponent(msg)}`,'_blank'); showToast(`📱 रिमाइंडर भेजा ${m.name} को`); addAuditLog("रिमाइंडर_भेजा",m.name); } }

    function backupToGoogleDrive(){ let data=JSON.stringify(appData); let blob=new Blob([data],{type:'application/json'}); let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`mandir_backup_${new Date().toISOString().slice(0,10)}.json`; a.click(); showToast("✅ बैकअप डाउनलोड"); }

    function renderMemberListFiltered(){
        let search=document.getElementById('searchAny')?.value.toLowerCase()||'';
        let filtered=appData.members.filter(m=> (m.name.toLowerCase().includes(search) || (m.mobile||'').includes(search) || (m.village||'').toLowerCase().includes(search)));

    function toggleMemberSelect(id){ let cb=document.querySelector(`.member-select[value="${id}"]`); if(cb && cb.checked){ if(!selectedMembers.includes(id)) selectedMembers.push(id); } else { selectedMembers=selectedMembers.filter(i=>i!==id); } let btn=document.getElementById('bulkDeleteBtn'); if(btn) btn.style.display=selectedMembers.length>0?'inline-block':'none'; }
    function bulkDeleteMembers(){ if(selectedMembers.length===0) return; if(confirm(`क्या आप ${selectedMembers.length} सदस्य हटाना चाहते हैं?`)){ appData.members=appData.members.filter(m=>!selectedMembers.includes(m.id)); saveAll(); showToast(`✅ ${selectedMembers.length} सदस्य हटा दिए`); selectedMembers=[]; renderMemberList(); addAuditLog("बल्क_हटाएं",`${selectedMembers.length} सदस्य`); } }
    function deleteMember(id){ if(confirm("हटाएं?")){ appData.members=appData.members.filter(m=>m.id!==id); saveAll(); renderMemberList(); showToast("✅ सदस्य हटा"); addAuditLog("DELETE_MEMBER",`ID ${id}`); } }
    function toggleMemberStatus(id){ let m=appData.members.find(x=>x.id===id); if(m){ m.status=m.status==='active'?'inactive':'active'; saveAll(); showToast(`${m.name} ${m.status==='active'?'सक्रिय':'निष्क्रिय'}`); renderMemberList(); } }
    function editMember(id){ let m=appData.members.find(x=>x.id===id); if(!m) return; let html=`<div class="modal"><div class="modal-content"><h3>✏️ ${m.name}</h3><input id="editName" value="${m.name}" class="form-control"><input id="editMobile" value="${m.mobile}" class="form-control"><input id="editVillage" value="${m.village}" class="form-control"><input id="editFather" value="${m.father||''}" placeholder="पिता" class="form-control"><input type="file" id="editPhoto" accept="image/*" class="form-control"><input id="editReason" placeholder="कारण" class="form-control"><button class="btn btn-primary" onclick="saveMemberEdit(${id})">सेव</button><button class="btn btn-secondary" onclick="closeModal()">रद्द</button></div></div>`; document.body.insertAdjacentHTML('beforeend',html); }
    function saveMemberEdit(id){ let m=appData.members.find(x=>x.id===id); let reason=document.getElementById('editReason')?.value||""; let oldData={name:m.name,mobile:m.mobile,village:m.village,father:m.father}; m.name=document.getElementById('editName').value; m.mobile=document.getElementById('editMobile').value; m.village=document.getElementById('editVillage').value; m.father=document.getElementById('editFather').value; if(m.mobile && !isValidMobile(m.mobile)){ showToast("गलत मोबाइल"); return; } if(isDuplicateMobile(m.mobile,id)){ showToast("मोबाइल पहले से रजिस्टर"); return; } let photoFile=document.getElementById('editPhoto').files[0]; let saveUpdate=(photoUrl)=>{ if(photoUrl) m.photo=photoUrl; m.updated_by=currentUser?.name; m.updated_at=new Date().toISOString(); addEditHistory(m,'सदस्य',oldData,{name:m.name,mobile:m.mobile,village:m.village,father:m.father},reason); saveAll(); closeModal(); showToast("✅ अपडेट"); renderMemberList(); }; if(photoFile){ let reader=new FileReader(); reader.onload=e=>saveUpdate(e.target.result); reader.readAsDataURL(photoFile); } else { saveUpdate(null); } }

    // PAYMENT MODAL
    function openPaymentModal(memberId){
        if(!canSendReceipt()){ showToast("⚠️ भुगतान नहीं जोड़ सकते",true); return; }
        let m=appData.members.find(x=>x.id===memberId);
        let allMonths=getAllMonthsFromJoinTillNow(m.joinDate);
        let paidMonths=appData.donations.filter(d=>d.memberId===m.id && d.type==='monthly').map(d=>({year:d.year,month:d.monthIndex}));
        let pendingMonths=allMonths.filter(mon=>!paidMonths.some(p=>p.year===mon.year && p.month===mon.monthIndex));
        if(pendingMonths.length===0){ showToast("✅ कोई बकाया नहीं"); return; }
        let years=[...new Set(pendingMonths.map(m=>m.year))].sort();
        let html=`<div class="modal"><div class="modal-content"><h3>💰 भुगतान - ${m.name}</h3><div class="year-selector"><label>📅 वर्ष:</label><select id="payYear">${years.map(y=>`<option value="${y}">${y}</option>`).join('')}</select></div><div id="payMonths" class="checklist"></div><input type="number" id="payAmount" placeholder="राशि" value="${m.monthlyAmount}" class="form-control"><select id="payMode" class="form-control"><option>कैश</option><option>UPI</option><option>बैंक ट्रांसफर</option></select><button class="btn btn-primary" onclick="processPayment(${memberId})">भुगतान करें</button><button class="btn btn-secondary" onclick="closeModal()">रद्द</button></div></div>`;
        document.body.insertAdjacentHTML('beforeend',html);
        function loadMonths(){ let year=parseInt(document.getElementById('payYear').value); let monthsForYear=pendingMonths.filter(m=>m.year===year); let container=document.getElementById('payMonths'); if(container) container.innerHTML=monthsForYear.map(mon=>`<div class="checklist-item"><input type="checkbox" value="${mon.monthIndex}" class="monthCb"> <label>${mon.month} ${mon.year}</label></div>`).join(''); }
        document.getElementById('payYear').addEventListener('change',loadMonths);
        loadMonths();
    }
    function processPayment(memberId){
        let m=appData.members.find(x=>x.id===memberId);
        let year=parseInt(document.getElementById('payYear').value);
        let selected=Array.from(document.querySelectorAll('.monthCb:checked')).map(cb=>parseInt(cb.value));
        if(selected.length===0){ showToast("⚠️ कोई महीना चुनें",true); return; }
        let amount=parseFloat(document.getElementById('payAmount').value)||m.monthlyAmount;
        let mode=document.getElementById('payMode').value;
        let monthNames=['जनवरी','फरवरी','मार्च','अप्रैल','मई','जून','जुलाई','अगस्त','सितम्बर','अक्टूबर','नवम्बर','दिसम्बर'];
        for(let month of selected){
            appData.donations.push({id:Date.now(),memberId:m.id,memberName:m.name,type:"monthly",month:monthNames[month],monthIndex:month,year:year,amount:amount,receiptNo:getNextReceiptNo(),date:new Date().toISOString().slice(0,10),mode:mode,created_by:currentUser.name});
        }
        computeAdvanceAndPending();
        saveAll();
        closeModal();
        renderMemberList();
        renderDashboard();
        showToast(`✅ ${selected.length} महीनों का भुगतान`);
        addAuditLog("PAYMENT",`${m.name} - ₹${amount*selected.length}`);
        generateReceipt(m,selected.map(mon=>({month:monthNames[mon],year,amount})),amount*selected.length,mode,"मासिक भुगतान");
    }
    function generateReceipt(member,paidMonthsList,totalAmount,mode,purpose){
        let logo=appData.settings.logo||"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23FF9933' width='100' height='100'/%3E%3Ctext x='50' y='70' font-size='60' text-anchor='middle' fill='white'%3E🛕%3C/text%3E%3C/svg%3E";
        let monthsHtml=paidMonthsList.map(p=>`<li>${p.month} ${p.year} - ₹${p.amount}</li>`).join('');
        let receiptNo=getNextReceiptNo();
        let upiUrl=`upi://pay?pa=${appData.settings.upiId}&pn=${encodeURIComponent(member.name)}&am=${member.pending||0}&cu=INR`;
        let win=window.open('','_blank');
        win.document.write(`<html><head><title>रसीद</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:Arial;padding:20px;background:#f0f0f0;}.receipt{max-width:700px;margin:auto;background:white;border:2px solid #FF9933;border-radius:15px;padding:20px;}.header{text-align:center;border-bottom:2px solid #FF9933;padding-bottom:15px;}.amount{color:#28a745;font-size:20px;font-weight:bold;}.signature{display:flex;justify-content:space-between;margin-top:30px;}</style></head><body><div class="receipt"><div class="header"><img src="${logo}" style="width:60px;height:60px;border-radius:50%;"><h2>${appData.settings.committeeName}</h2><p>${appData.settings.committeeSubtitle}</p><h3>दान रसीद</h3><strong>${receiptNo}</strong><p>${new Date().toLocaleDateString('hi-IN')}</p></div><p><strong>सदस्य:</strong> ${member.name}</p><p><strong>पिता:</strong> ${member.father||''}</p><p><strong>मोबाइल:</strong> ${member.mobile}</p><p><strong>गाँव:</strong> ${member.village}</p><div><strong>${purpose}:</strong><ul>${monthsHtml}</ul></div><p><strong>राशि:</strong> <span class="amount">₹${totalAmount}</span></p><p><strong>मोड:</strong> ${mode}</p><p><strong>शेष बकाया:</strong> ₹${member.pending}</p><p><strong>एडवांस शेष:</strong> ₹${member.advanceBalance}</p><div style="text-align:center;margin:15px 0;"><div id="qrCodeReceipt"></div><p>UPI QR स्कैन करें</p></div><div class="signature"><div>${appData.settings.presidentSignature?`<img src="${appData.settings.presidentSignature}" style="height:40px;">`:'.................'}<br>${appData.settings.president}<br>(अध्यक्ष)</div><div>${appData.settings.secretarySignature?`<img src="${appData.settings.secretarySignature}" style="height:40px;">`:'.................'}<br>${appData.settings.secretary}<br>(सचिव)</div></div><div class="footer"><p>🙏 जय श्री राम 🙏</p></div><div style="text-align:center;"><button onclick="window.print()" style="background:#FF9933;padding:8px 16px;border:none;border-radius:8px;">प्रिंट करें</button> <button onclick="window.close()">बंद करें</button></div></div><script>new QRCode(document.getElementById("qrCodeReceipt"),{text:"${upiUrl}",width:150,height:150});<\/script></body></html>`);
        win.document.close();
        let waMsg=`🚩 जय श्री राम 🚩\n✅ रसीद: ${receiptNo}\nराशि: ₹${totalAmount}\nशेष बकाया: ₹${member.pending}\nUPI: ${appData.settings.upiId}`;
        window.open(`https://wa.me/91${member.mobile}?text=${encodeURIComponent(waMsg)}`,'_blank');
        appData.receipts.unshift({id:Date.now(),receiptNo,memberName:member.name,amount:totalAmount,type:purpose==="⭐ एडवांस जमा"?'advance':'monthly',date:new Date().toISOString(),memberPhoto:member.photo,memberMobile:member.mobile});
        saveAll();
        addAuditLog("रसीद_जनरेट",receiptNo);
        showToast(`✅ रसीद ${receiptNo} सेव और भेजी गई`);
    }
    function openAdvanceModal(memberId){
        if(!canSendReceipt()){ showToast("⚠️ एडवांस नहीं जोड़ सकते",true); return; }
        let m=appData.members.find(x=>x.id===memberId);
        let html=`<div class="modal"><div class="modal-content"><h3>⭐ एडवांस जमा - ${m.name}</h3><input type="number" id="advAmount" placeholder="राशि" class="form-control"><select id="advMode" class="form-control"><option>कैश</option><option>UPI</option><option>बैंक ट्रांसफर</option></select><button class="btn btn-primary" onclick="processAdvance(${memberId})">जमा करें</button><button class="btn btn-secondary" onclick="closeModal()">रद्द</button></div></div>`;
        document.body.insertAdjacentHTML('beforeend',html);
    }
    function processAdvance(memberId){
        let m=appData.members.find(x=>x.id===memberId);
        let amount=parseFloat(document.getElementById('advAmount').value);
        let mode=document.getElementById('advMode').value;
        if(isNaN(amount)||amount<=0){ showToast("⚠️ सही राशि डालें",true); return; }
        appData.donations.push({id:Date.now(),memberId:m.id,memberName:m.name,type:"advance",amount:amount,receiptNo:"ADV"+Date.now(),date:new Date().toISOString().slice(0,10),mode:mode,created_by:currentUser.name});
        computeAdvanceAndPending();
        saveAll();
        closeModal();
        generateReceipt(m,null,amount,mode,"⭐ एडवांस जमा");
        showToast(`⭐ ₹${amount} एडवांस जमा`);
        addAuditLog("ADVANCE_PAYMENT",`${m.name} - ₹${amount}`);
        renderMemberList();
        renderDashboard();
    }

    // BULK IMPORT
    function renderBulkImport(){
        if(!canEdit()){ document.getElementById('contentArea').innerHTML='<div class="card">❌ अनुमति नहीं</div>'; return; }
        document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">📥 बल्क इम्पोर्ट (नाम,मोबाइल,राशि)</div><textarea id="bulkCsvData" rows="6" class="form-control" placeholder="नाम,मोबाइल,राशि&#10;राम शर्मा,9876543210,200&#10;सीता देवी,9876543211,200"></textarea><button class="btn btn-primary" onclick="previewBulkCsv()">प्रीव्यू</button><div id="bulkPreviewContainer" style="display:none;"></div><button id="saveBulkBtn" class="btn btn-success mt-2" style="display:none;" onclick="saveBulkCsv()">सेव करें</button></div>`;
    }
    let bulkTemp=[];
    function previewBulkCsv(){
        let data=document.getElementById('bulkCsvData').value;
        let lines=data.split('\n');
        bulkTemp=[];
        for(let line of lines){
            let parts=line.trim().split(',');
            if(parts.length>=1 && parts[0]){
                let name=parts[0].trim();
                let mobile=parts[1]?.trim()||'';
                let amount=parts[2]?parseFloat(parts[2].trim()):appData.settings.defaultMonthly;
                if(name && mobile && isValidMobile(mobile) && !isDuplicateMobile(mobile)){
                    bulkTemp.push({name,father:"",mobile,village:"",amount,joinDate:new Date().toISOString().slice(0,10),photo:""});
                }
            }
        }
        if(bulkTemp.length===0){ showToast("⚠️ कोई वैलिड डेटा नहीं",true); return; }
        let previewHtml=`<h4>${bulkTemp.length} सदस्य मिले:</h4>${bulkTemp.slice(0,20).map(m=>`<div>${m.name} - ${m.mobile} - ₹${m.amount}</div>`).join('')}`;
        document.getElementById('bulkPreviewContainer').innerHTML=previewHtml;
        document.getElementById('bulkPreviewContainer').style.display='block';
        document.getElementById('saveBulkBtn').style.display='inline-block';
    }
    function saveBulkCsv(){
        for(let m of bulkTemp){
            appData.members.push({id:Date.now()+Math.random(),name:m.name,father:m.father,mobile:m.mobile,village:m.village,monthlyAmount:m.amount,monthlyAmountHistory:[{amount:m.amount,effectiveDate:m.joinDate}],joinDate:m.joinDate,status:'active',photo:m.photo,advanceBalance:0,pending:0,created_by:currentUser.name,created_at:new Date().toISOString(),editHistory:[]});
        }
        computeAdvanceAndPending();
        saveAll();
        showToast(`${bulkTemp.length} सदस्य जुड़ गए`);
        document.getElementById('bulkPreviewContainer').style.display='none';
        document.getElementById('saveBulkBtn').style.display='none';
        document.getElementById('bulkCsvData').value='';
        switchSub('memberList');
    }

    function addCommittee(){ let year=prompt("वर्ष:"); if(year){ let members=[]; let addMore=true; while(addMore){ let post=prompt("पद (अध्यक्ष,सचिव,कोषाध्यक्ष)"); if(!post) break; let name=prompt(`${post} का नाम`); if(name) members.push({name,post}); addMore=confirm("और जोड़ें?"); } if(members.length===0){ let p=prompt("अध्यक्ष का नाम"); let s=prompt("सचिव का नाम"); if(p) members.push({name:p,post:"अध्यक्ष"}); if(s) members.push({name:s,post:"सचिव"}); } appData.committees.push({id:Date.now(),year:parseInt(year),members,created_by:currentUser.name,created_at:new Date().toISOString()}); saveAll(); renderCommittees(); showToast("✅ समिति जोड़ी"); } }

    function updateLedger(){ let year=parseInt(document.getElementById('ledgerYear').value); let months=['जन','फर','मार्च','अप्रैल','मई','जून','जुलाई','अग','सित','अक्टू','नव','दिस']; let totalIncome=0,totalExpense=0; let rows=''; for(let i=0;i<12;i++){ let inc=appData.donations.filter(d=>new Date(d.date).getMonth()===i && new Date(d.date).getFullYear()===year).reduce((s,d)=>s+d.amount,0); let exp=appData.expenses.filter(e=>new Date(e.date).getMonth()===i && new Date(e.date).getFullYear()===year).reduce((s,e)=>s+e.amount,0); totalIncome+=inc; totalExpense+=exp; rows+=`<tr><td>${months[i]}</td><td>₹${inc}</td><td>₹${exp}</td><td>₹${inc-exp}</td></tr>`; } document.getElementById('ledgerContent').innerHTML=`<div class="yearly-stats"><div class="yearly-stat-card"><h4>कुल आय</h4><p>₹${totalIncome}</p></div><div class="yearly-stat-card"><h4>कुल व्यय</h4><p>₹${totalExpense}</p></div><div class="yearly-stat-card"><h4>शेष</h4><p>₹${totalIncome-totalExpense}</p></div></div><table class="data-table"><thead><th>महीना</th><th>आय</th><th>व्यय</th><th>लाभ/हानि</th></thead><tbody>${rows}</tbody></table>`; }

    function renderTrendReport(){ let years=[...new Set([...appData.donations.map(d=>new Date(d.date).getFullYear()),new Date().getFullYear()])].sort(); let html=`<div class="card"><div class="card-title">📈 ट्रेंड रिपोर्ट</div><select id="trendYear">${years.map(y=>`<option value="${y}" ${y===years[years.length-1]?'selected':''}>${y}</option>`).join('')}</select><button class="btn btn-primary" onclick="updateTrendChart()">देखें</button><canvas id="trendChartCanvas" style="height:200px;"></canvas><div id="trendStats"></div></div>`; document.getElementById('contentArea').innerHTML=html; updateTrendChart(); }
    function updateTrendChart(){ let year=parseInt(document.getElementById('trendYear').value); let months=['जन','फर','मार्च','अप्रैल','मई','जून','जुलाई','अग','सित','अक्टू','नव','दिस']; let monthlyIncome=months.map((_,i)=>appData.donations.filter(d=>new Date(d.date).getMonth()===i && new Date(d.date).getFullYear()===year).reduce((s,d)=>s+d.amount,0)); let monthlyExpense=months.map((_,i)=>appData.expenses.filter(e=>new Date(e.date).getMonth()===i && new Date(e.date).getFullYear()===year).reduce((s,e)=>s+e.amount,0)); let ctx=document.getElementById('trendChartCanvas')?.getContext('2d'); if(ctx){ if(charts.trendChart) charts.trendChart.destroy(); charts.trendChart=new Chart(ctx,{type:'line',data:{labels:months,datasets:[{label:'आय',data:monthlyIncome,borderColor:'#28a745'},{label:'व्यय',data:monthlyExpense,borderColor:'#dc3545'}]}}); } let totalIncome=monthlyIncome.reduce((a,b)=>a+b,0); let totalExpense=monthlyExpense.reduce((a,b)=>a+b,0); document.getElementById('trendStats').innerHTML=`<div class="yearly-stats"><div class="yearly-stat-card"><h4>कुल आय</h4><p>₹${totalIncome}</p></div><div class="yearly-stat-card"><h4>कुल व्यय</h4><p>₹${totalExpense}</p></div><div class="yearly-stat-card"><h4>शेष</h4><p>₹${totalIncome-totalExpense}</p></div></div>`; }
    function renderProfitLoss(){ let years=[...new Set([...appData.donations.map(d=>new Date(d.date).getFullYear()),...appData.expenses.map(e=>new Date(e.date).getFullYear()),new Date().getFullYear()])].sort(); let rows=years.map(y=>{let inc=appData.donations.filter(d=>new Date(d.date).getFullYear()===y).reduce((s,d)=>s+d.amount,0); let exp=appData.expenses.filter(e=>new Date(e.date).getFullYear()===y).reduce((s,e)=>s+e.amount,0); return `<tr><td>${y}</td><td>₹${inc}</td><td>₹${exp}</td><td>₹${inc-exp}</td></tr>`;}).join(''); let totalInc=appData.donations.reduce((s,d)=>s+d.amount,0); let totalExp=appData.expenses.reduce((s,e)=>s+e.amount,0); document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">📊 लाभ/हानि रिपोर्ट</div><table class="data-table"><thead><th>वर्ष</th><th>आय</th><th>व्यय</th><th>लाभ/हानि</th></thead><tbody>${rows}</tbody><tfoot><tr><th>कुल</th><td>₹${totalInc}</td><td>₹${totalExp}</td><td>₹${totalInc-totalExp}</td></tr></tfoot></table></div>`; }
    function renderGeneralSettings(){ let pendingReqHtml=''; if(currentUser.role==='super_admin' && appData.pendingLogoRequests.length){ pendingReqHtml=`<div class="card"><div class="card-title">⏳ लोगो अनुमति रिक्वेस्ट</div>${appData.pendingLogoRequests.map(req=>`<div><strong>${req.requestedBy}</strong><br>कारण: ${req.reason}<br><img src="${req.newLogo}" width="40"><button class="btn-sm btn-success" onclick="approveLogoRequest(${req.id})">✅</button><button class="btn-sm btn-danger" onclick="rejectLogoRequest(${req.id})">❌</button></div>`).join('')}</div>`; } document.getElementById('contentArea').innerHTML=pendingReqHtml+`<div class="card"><div class="card-title">⚙️ सेटिंग्स</div><input id="setName" value="${appData.settings.committeeName}" class="form-control"><input id="setSub" value="${appData.settings.committeeSubtitle}" class="form-control"><input id="setUpi" value="${appData.settings.upiId}" class="form-control"><input id="president" value="${appData.settings.president}" class="form-control"><input id="presidentMobile" value="${appData.settings.presidentMobile}" class="form-control"><input id="secretary" value="${appData.settings.secretary}" class="form-control"><input type="file" id="logoUpload" accept="image/*" class="form-control">${currentUser.role==='admin'?'<input id="logoChangeReason" placeholder="लोगो बदलने का कारण" class="form-control">':''}<button class="btn btn-primary" onclick="saveGeneralSettings()">सेव करें</button></div>`; if(appData.settings.logo) document.querySelector('#contentArea .card').innerHTML+=`<img src="${appData.settings.logo}" style="width:50px;border-radius:50%;margin-top:10px;">`; }
    function saveGeneralSettings(){ let logoFile=document.getElementById('logoUpload').files[0]; let save=(logoUrl)=>{ appData.settings.committeeName=document.getElementById('setName').value; appData.settings.committeeSubtitle=document.getElementById('setSub').value; appData.settings.upiId=document.getElementById('setUpi').value; appData.settings.president=document.getElementById('president').value; appData.settings.presidentMobile=document.getElementById('presidentMobile').value; appData.settings.secretary=document.getElementById('secretary').value; if(logoUrl){ if(currentUser.role==='super_admin'){ appData.settings.logo=logoUrl; saveSettings(); document.getElementById('committeeLogoImg').src=logoUrl; showToast("✅ लोगो बदला"); addAuditLog("LOGO_CHANGED",currentUser.name); } else if(currentUser.role==='admin'){ let reason=document.getElementById('logoChangeReason')?.value||"लोगो बदलने की अनुमति"; appData.pendingLogoRequests.push({id:Date.now(),requestedBy:currentUser.name,reason,newLogo:logoUrl}); saveLogoRequests(); showToast("✅ रिक्वेस्ट भेजी"); } } else { saveSettings(); showToast("✅ सेटिंग्स सेव"); } document.getElementById('headerTitle').innerHTML=appData.settings.committeeName; renderGeneralSettings(); }; if(logoFile){ let reader=new FileReader(); reader.onload=e=>save(e.target.result); reader.readAsDataURL(logoFile); } else { save(null); } }
    function approveLogoRequest(id){ let req=appData.pendingLogoRequests.find(r=>r.id===id); if(req){ appData.settings.logo=req.newLogo; appData.pendingLogoRequests=appData.pendingLogoRequests.filter(r=>r.id!==id); saveSettings(); saveLogoRequests(); document.getElementById('committeeLogoImg').src=req.newLogo; showToast("✅ लोगो अनुमति दी"); renderGeneralSettings(); } }
    function rejectLogoRequest(id){ appData.pendingLogoRequests=appData.pendingLogoRequests.filter(r=>r.id!==id); saveLogoRequests(); showToast("❌ अस्वीकृत"); renderGeneralSettings(); }
    function renderSocialSettings(){ if(!canEdit()){ document.getElementById('contentArea').innerHTML='<div class="card">❌ अनुमति नहीं</div>'; return; } document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">🔗 सोशल सेटिंग्स</div><input id="fbLink" placeholder="फेसबुक" value="${appData.settings.facebookLink||''}" class="form-control"><input id="instaLink" placeholder="इंस्टाग्राम" value="${appData.settings.instagramLink||''}" class="form-control"><input id="youtubeLink" placeholder="यूट्यूब" value="${appData.settings.youtubeLink||''}" class="form-control"><button class="btn btn-primary" onclick="saveSocialSettings()">सेव</button></div>`; }
    function saveSocialSettings(){ appData.settings.facebookLink=document.getElementById('fbLink').value; appData.settings.instagramLink=document.getElementById('instaLink').value; appData.settings.youtubeLink=document.getElementById('youtubeLink').value; saveSettings(); showToast("✅ सेव"); addAuditLog("SOCIAL_SETTINGS_CHANGED",currentUser.name); }
    function renderGoogleSheets(){ document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">📊 Google Sheets</div><button class="btn btn-primary" onclick="exportToExcel()">एक्सेल डाउनलोड</button><p>एक्सेल फाइल को Google Sheets में इम्पोर्ट करें</p></div>`; }
    function renderBackup(){ document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">📦 बैकअप</div><button class="btn btn-success" onclick="exportToExcel()">एक्सेल बैकअप</button><button class="btn btn-info" onclick="backupToGoogleDrive()">JSON बैकअप</button><p>डेटा Firebase पर सुरक्षित है</p></div>`; }
    function renderUsers(){ if(!canEditUser()){ document.getElementById('contentArea').innerHTML='<div class="card">❌ केवल सुपर एडमिन</div>'; return; } let html=`<div class="card"><div class="card-title">👥 यूजर प्रबंधन</div>${appData.users.map(u=>`<div class="member-card"><div><strong>${u.name}</strong> (${u.role})<br>${u.email}</div><div><button class="btn-sm btn-info" onclick="openEditUserModal(${u.id})">✏️</button>${u.id!==currentUser.id?`<button class="btn-sm btn-danger" onclick="deleteUser(${u.id})">🗑️</button>`:''}</div></div>`).join('')}<button class="btn btn-primary" onclick="openAddUserModal()">+ नया यूजर</button></div>`; document.getElementById('contentArea').innerHTML=html; }
    function openAddUserModal(){ let html=`<div class="modal"><div class="modal-content"><h3>➕ नया यूजर</h3><input id="newUserName" placeholder="नाम" class="form-control"><input id="newUserEmail" placeholder="ईमेल" class="form-control"><input type="password" id="newUserPass" placeholder="पासवर्ड" class="form-control"><select id="newUserRole" class="form-control"><option value="admin">एडमिन</option><option value="operator">ऑपरेटर</option><option value="viewer">व्यूअर</option></select><button class="btn btn-primary" onclick="addNewUser()">बनाएं</button><button class="btn btn-secondary" onclick="closeModal()">रद्द</button></div></div>`; document.body.insertAdjacentHTML('beforeend',html); }
    function addNewUser(){ let user={id:Date.now(),name:document.getElementById('newUserName').value,email:document.getElementById('newUserEmail').value,password:document.getElementById('newUserPass').value,role:document.getElementById('newUserRole').value,created_by:currentUser.name,created_at:new Date().toISOString()}; appData.users.push(user); saveUsers(); closeModal(); showToast("✅ नया यूजर"); addAuditLog("ADD_USER",user.name); renderUsers(); }
    function openEditUserModal(userId){ let u=appData.users.find(u=>u.id===userId); if(!u) return; let html=`<div class="modal"><div class="modal-content"><h3>✏️ यूजर - ${u.name}</h3><input id="editName" value="${u.name}" class="form-control"><input id="editEmail" value="${u.email}" class="form-control"><input type="password" id="editUserPass" placeholder="नया पासवर्ड" class="form-control"><select id="editUserRole" class="form-control"><option ${u.role==='admin'?'selected':''}>एडमिन</option><option ${u.role==='operator'?'selected':''}>ऑपरेटर</option><option ${u.role==='viewer'?'selected':''}>व्यूअर</option></select><input id="editUserReason" placeholder="कारण" class="form-control"><button class="btn btn-primary" onclick="saveUserEdit(${userId})">सेव</button><button class="btn btn-secondary" onclick="closeModal()">रद्द</button></div></div>`; document.body.insertAdjacentHTML('beforeend',html); }
    function saveUserEdit(userId){ let u=appData.users.find(u=>u.id===userId); if(!u) return; let reason=document.getElementById('editUserReason')?.value||""; let old={name:u.name,email:u.email,password:u.password,role:u.role}; u.name=document.getElementById('editName').value; u.email=document.getElementById('editEmail').value; if(document.getElementById('editUserPass').value) u.password=document.getElementById('editUserPass').value; u.role=document.getElementById('editUserRole').value; u.updated_by=currentUser.name; u.updated_at=new Date().toISOString(); addEditHistory(u,'यूजर',old,{name:u.name,email:u.email,role:u.role},reason); saveUsers(); closeModal(); showToast("✅ यूजर अपडेट"); renderUsers(); addAuditLog("EDIT_USER",u.name); }
    function deleteUser(id){ if(confirm("हटाएं?")){ appData.users=appData.users.filter(u=>u.id!==id); saveUsers(); renderUsers(); showToast("✅ हटा दिया"); } }
    function renderTheme(){ document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">🎨 थीम</div><div><button class="btn" onclick="changeTheme('#FF9933')">भगवा</button><button class="btn" onclick="changeTheme('#28a745')">हरा</button><button class="btn" onclick="changeTheme('#dc3545')">लाल</button><button class="btn" onclick="changeTheme('#007bff')">नीला</button><button class="btn" onclick="document.body.classList.toggle('dark')">डार्क मोड</button></div></div>`; }
    function changeTheme(color){ document.documentElement.style.setProperty('--saffron',color); document.documentElement.style.setProperty('--saffron-dark',color); document.documentElement.style.setProperty('--gold',color); showToast("✅ थीम बदली"); }
    function renderDigitalSignature(){ if(!canEditUser()){ document.getElementById('contentArea').innerHTML='<div class="card">❌ केवल सुपर एडमिन</div>'; return; } let html=`<div class="card"><div class="card-title">🖊️ डिजिटल सिग्नेचर</div><div><h4>अध्यक्ष</h4>${appData.settings.presidentSignature?`<img src="${appData.settings.presidentSignature}" style="width:150px;">`:'<p>कोई नहीं</p>'}<input type="file" id="presidentSign" accept="image/*"><button class="btn btn-primary" onclick="uploadPresidentSign()">अपलोड</button></div><div><h4>सचिव</h4>${appData.settings.secretarySignature?`<img src="${appData.settings.secretarySignature}" style="width:150px;">`:'<p>कोई नहीं</p>'}<input type="file" id="secretarySign" accept="image/*"><button class="btn btn-primary" onclick="uploadSecretarySign()">अपलोड</button></div></div>`; document.getElementById('contentArea').innerHTML=html; }
    function uploadPresidentSign(){ let file=document.getElementById('presidentSign').files[0]; if(file){ let reader=new FileReader(); reader.onload=e=>{ appData.settings.presidentSignature=e.target.result; saveSettings(); showToast("✅ अध्यक्ष सिग्नेचर अपलोड"); renderDigitalSignature(); }; reader.readAsDataURL(file); } }
    function uploadSecretarySign(){ let file=document.getElementById('secretarySign').files[0]; if(file){ let reader=new FileReader(); reader.onload=e=>{ appData.settings.secretarySignature=e.target.result; saveSettings(); showToast("✅ सचिव सिग्नेचर अपलोड"); renderDigitalSignature(); }; reader.readAsDataURL(file); } }
    function renderAnnouncements(){ let html=`<div class="card"><div class="card-title">📢 घोषणा बोर्ड</div>${canEdit()?`<button class="btn btn-primary" onclick="addAnnouncement()">+ नई घोषणा</button>`:''}<div>${appData.announcements.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(a=>`<div><strong>${a.title}</strong><br><small>${new Date(a.date).toLocaleDateString()}</small><p>${a.content}</p>${canEdit()?`<button class="btn-sm btn-danger" onclick="deleteAnnouncement(${a.id})">🗑️</button>`:''}</div>`).join('')}</div></div>`; document.getElementById('contentArea').innerHTML=html; }
    function addAnnouncement(){ let title=prompt("शीर्षक"); if(!title) return; let content=prompt("विवरण"); if(!content) return; let pinned=confirm("पिन करें?"); appData.announcements.unshift({id:Date.now(),title,content,date:new Date().toISOString(),pinned,created_by:currentUser.name}); saveAll(); renderAnnouncements(); showToast("✅ घोषणा जोड़ी"); }
    function deleteAnnouncement(id){ if(confirm("हटाएं?")){ appData.announcements=appData.announcements.filter(a=>a.id!==id); saveAll(); renderAnnouncements(); showToast("✅ हटा दी"); } }
    function renderPendingRequests(){ let html=`<div class="card"><div class="card-title">⏳ लंबित रिक्वेस्ट (${appData.pendingRequests.length})</div>${appData.pendingRequests.map(r=>`<div><strong>${r.requestedBy}</strong> (${r.requestedByRole})<br>कार्य: ${r.action}<br>${new Date(r.createdAt).toLocaleString()}<button class="btn-sm btn-success" onclick="approveRequest(${r.id})">✅</button><button class="btn-sm btn-danger" onclick="rejectRequest(${r.id})">❌</button></div>`).join('')}</div><div class="card"><div class="card-title">📝 डाटा शिकायत (${appData.dataChangeRequests.length})</div>${appData.dataChangeRequests.map(r=>`<div><strong>${r.requestedBy}</strong><br>${r.comment||r.details}<button class="btn-sm btn-success" onclick="approveDataRequest(${r.id})">✅</button><button class="btn-sm btn-danger" onclick="rejectDataRequest(${r.id})">❌</button></div>`).join('')}</div>`; document.getElementById('contentArea').innerHTML=html; }
    function approveRequest(id){ let req=appData.pendingRequests.find(r=>r.id===id); if(req){ appData.pendingRequests=appData.pendingRequests.filter(r=>r.id!==id); savePendingRequests(); updatePendingBadge(); showToast("✅ स्वीकृत"); addAuditLog("REQUEST_APPROVED",`${req.requestedBy} की ${req.action}`); renderCurrentPage(); } }
    function rejectRequest(id){ appData.pendingRequests=appData.pendingRequests.filter(r=>r.id!==id); savePendingRequests(); updatePendingBadge(); showToast("❌ अस्वीकृत"); renderCurrentPage(); }
    function approveDataRequest(id){ appData.dataChangeRequests=appData.dataChangeRequests.filter(r=>r.id!==id); saveDataChangeRequests(); updatePendingBadge(); showToast("✅ शिकायत स्वीकार"); renderCurrentPage(); }
    function rejectDataRequest(id){ appData.dataChangeRequests=appData.dataChangeRequests.filter(r=>r.id!==id); saveDataChangeRequests(); updatePendingBadge(); showToast("❌ अस्वीकृत"); renderCurrentPage(); }
    function renderProfile(){ document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">👤 मेरी प्रोफाइल</div><p>नाम: ${currentUser.name}</p><p>ईमेल: ${currentUser.email}</p><p>रोल: ${currentUser.role}</p>${canEdit()?`<button class="btn btn-primary" onclick="changePassword()">पासवर्ड बदलें</button>`:''}</div>`; }
    function changePassword(){ let np=prompt("नया पासवर्ड"); if(np){ let idx=appData.users.findIndex(u=>u.id===currentUser.id); if(idx!==-1) appData.users[idx].password=np; saveUsers(); showToast("✅ पासवर्ड बदला"); addAuditLog("पासवर्ड_बदला",currentUser.name); } }
    function renderTopDonors(){ let donorMap=new Map(); appData.donations.forEach(d=>{if(d.memberName) donorMap.set(d.memberName,(donorMap.get(d.memberName)||0)+d.amount);}); let sorted=Array.from(donorMap.entries()).sort((a,b)=>b[1]-a[1]); let html=`<div class="card"><div class="card-title">🏆 टॉप दानदाता</div><table class="data-table"><thead><th>#</th><th>नाम</th><th>कुल दान (₹)</th></thead><tbody>${sorted.map(([n,a],i)=>`<tr><td>${i+1}</td><td>${n}</td><td>₹${a}</td></tr>`).join('')}</tbody></table></div>`; document.getElementById('contentArea').innerHTML=html; }
    function renderLoginHistory(){ let html=`<div class="card"><div class="card-title">📱 लॉगिन हिस्ट्री</div><table class="data-table"><thead><th>तिथि/समय</th><th>उपयोगकर्ता</th><th>रोल</th><th>डिवाइस</th></thead><tbody>${appData.loginHistory.slice(0,50).map(h=>`<tr><td>${new Date(h.timestamp).toLocaleString()}</td><td>${h.user}</td><td>${h.role}</td><td>${h.device||'-'}</td></tr>`).join('')}</tbody></table></div>`; document.getElementById('contentArea').innerHTML=html; }
    function renderUserManagement(){ renderUsers(); }
    function renderPaymentPage(){ renderDonations(); }

    // Bulk WhatsApp
    function startBulkMessage(){ if(!canSendBulkMessage()){ showToast("अनुमति नहीं"); return; } bulkMembers=appData.members.filter(m=>m.status==='active'&&m.mobile); if(bulkMembers.length===0){ showToast("कोई सदस्य नहीं"); return; } bulkIndex=0; sendNextBulk(); bulkInterval=setInterval(sendNextBulk,20000); showToast(`📨 बल्क शुरू... ${bulkMembers.length} सदस्य`); }
    function sendNextBulk(){ if(bulkIndex>=bulkMembers.length){ clearInterval(bulkInterval); bulkInterval=null; showToast("✅ सभी को भेज दिया"); addAuditLog("बल्क_मैसेज","समाप्त"); return; } let m=bulkMembers[bulkIndex]; let msg=generateDetailedReminderMessage(m); window.open(`https://wa.me/91${m.mobile}?text=${encodeURIComponent(msg)}`,'_blank'); showToast(`📤 ${bulkIndex+1}/${bulkMembers.length}: ${m.name}`); bulkIndex++; }
    function stopBulkMessage(){ if(bulkInterval){ clearInterval(bulkInterval); bulkInterval=null; showToast("⏹️ रोक दिया"); } }
    function generateDetailedReminderMessage(m){ let allMonths=getAllMonthsFromJoinTillNow(m.joinDate); let status=''; let totalPaid=0; for(let item of allMonths){ let isPaid=appData.donations.some(d=>d.memberId===m.id && d.month===item.month && d.year===item.year && d.type==='monthly'); if(isPaid){ status+=`✅ ${item.month} ${item.year}: ₹${getMonthlyAmountForDate(m,new Date(item.year,item.monthIndex,1))}\n`; totalPaid+=getMonthlyAmountForDate(m,new Date(item.year,item.monthIndex,1)); } else { status+=`⭕ ${item.month} ${item.year}: ₹${getMonthlyAmountForDate(m,new Date(item.year,item.monthIndex,1))} (देय)\n`; } } return `🚩 जय श्री राम\n${m.name} जी,\nबकाया: ₹${m.pending}\n${status}UPI: ${appData.settings.upiId}\nधन्यवाद`; }

    // ----------------------------- STARTUP ---------------------------------
    document.getElementById('darkModeToggle')?.addEventListener('click',()=>document.body.classList.toggle('dark'));
    loadAll();
    initSampleData();
    ensureDefaultUsers();
    // Add a back button listener (if needed)
    let backBtn = document.createElement('div'); backBtn.id='backBtn'; backBtn.style.display='none'; backBtn.className='back-btn'; backBtn.innerHTML='<i class="fas fa-arrow-left"></i>'; backBtn.onclick=goBack; document.querySelector('.header .user-info')?.prepend(backBtn);
</script>
