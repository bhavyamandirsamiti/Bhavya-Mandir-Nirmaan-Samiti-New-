        .edit-history-item { font-size: 11px; padding: 5px; border-bottom: 1px solid #eee; }
    </style>
</head>

<script>
// ==================== COMPLETE APP - ALL FEATURES INCLUDED ====================
let appData = {
    settings: { committeeName: "🚩 भव्य मन्दिर निर्माण समिति 🚩", committeeSubtitle: "गुलाबपुरा (मोहनगढ़)", upiId: "asryadavtkg@ybl", defaultMonthly: 200, president: "राजेंद्र यादव जी", secretary: "अरविंद सिंह यादव", logo: "", presidentMobile: "9754452583", presidentSignature: "", secretarySignature: "", whatsappGroupLink: "", telegramGroupLink: "", facebookLink: "", instagramLink: "", announcementChannel: "" },
    members: [], donations: [], expenses: [], events: [], ramcharitmanas: [], gallery: [], auditLogs: [], users: [], committees: [], pendingEdits: [], receipts: [], construction: { percentage: 35, photos: [], expenses: [] }, pendingRequests: [], dataChangeRequests: [], loginHistory: [], announcements: [], meetings: [], notifications: []
};
let currentUser = null, currentMain = "home", currentSub = "dashboard", navigationStack = [], charts = {};
let dataLoaded = false;
let bulkInterval = null, bulkIndex = 0, bulkMembers = [];
let nextReceiptCounter = 1;
let selectedMembersForDelete = [];

function saveToLocalStorage() { localStorage.setItem('mandirAppDataComplete', JSON.stringify(appData)); }
function loadFromLocalStorage() {
    let saved = localStorage.getItem('mandirAppDataComplete');
    if(saved) {
        let parsed = JSON.parse(saved);
        appData = { ...appData, ...parsed };
        if(!appData.members) appData.members = [];
        if(!appData.donations) appData.donations = [];
        if(!appData.expenses) appData.expenses = [];
        if(!appData.events) appData.events = [];
        if(!appData.ramcharitmanas) appData.ramcharitmanas = [];
        if(!appData.gallery) appData.gallery = [];
        if(!appData.auditLogs) appData.auditLogs = [];
        if(!appData.users) appData.users = [];
        if(!appData.committees) appData.committees = [];
        if(!appData.pendingEdits) appData.pendingEdits = [];
        if(!appData.receipts) appData.receipts = [];
        if(!appData.construction) appData.construction = { percentage: 35, photos: [], expenses: [] };
        if(!appData.pendingRequests) appData.pendingRequests = [];
        if(!appData.dataChangeRequests) appData.dataChangeRequests = [];
        if(!appData.loginHistory) appData.loginHistory = [];
        if(!appData.announcements) appData.announcements = [];
        if(!appData.meetings) appData.meetings = [];
        if(!appData.notifications) appData.notifications = [];
        if(!appData.settings.announcementChannel) appData.settings.announcementChannel = "";
    }
    ensureDefaultUsers();
    if(appData.members.length === 0) initSampleData();
    dataLoaded = true;
    if(currentUser) { computeAdvanceAndPending(); renderNavigation(); renderCurrentPage(); showToast("✅ डेटा लोड हो गया"); checkBirthdaysAndAnniversaries(); }
}

function ensureDefaultUsers() {
    if(appData.users.length === 0) {
        appData.users = [
            { id: 1, name: "सुपर एडमिन", email: "super@mandir.com", password: "super123", role: "super_admin" },
            { id: 2, name: "एडमिन", email: "admin@mandir.com", password: "admin123", role: "admin" },
            { id: 3, name: "ऑपरेटर", email: "operator@mandir.com", password: "oper123", role: "operator" },
            { id: 4, name: "व्यूअर", email: "viewer@mandir.com", password: "view123", role: "viewer" }
        ];
        saveToLocalStorage();
    }
}

const membersList = [
    "श्री अर्जुन यादव जी,8435970852,500,2024-01-15,1980-01-15", "श्री अंशुल रतनाकर जी,7999077371,400,2024-02-10,1985-02-10", "श्री मुलायम सिंह यादव जी,9617572553,300,2024-03-05,1975-03-05",
    "श्री आशीष (गोलू) यादव जी,7067046127,100,2024-01-20,1990-01-20", "श्री रवि शंकर यादव जी,7828820092,250,2024-02-15,1988-02-15",
    "श्री विजय कुमार साहू जी,9340383510,250,2024-03-12,1985-03-12", "श्री रंजीत जोशी महाराज जी,9238618239,251,2024-01-08,1978-01-08"
];

function initSampleData() {
    if(appData.members.length === 0) {
        for(let i=0; i<membersList.length; i++) {
            let parts = membersList[i].split(',');
            let joinDate = parts[3] || "2025-01-01";
            let birthDate = parts[4] || "1980-01-01";
            appData.members.push({ id: 10000 + i, name: parts[0], father: "श्री रामलाल जी", mobile: parts[1], village: "गुलाबपुरा", monthlyAmount: parseInt(parts[2]), monthlyAmountHistory: [{ amount: parseInt(parts[2]), effectiveDate: joinDate }], joinDate: joinDate, birthDate: birthDate, status: "active", hidden: false, photo: "", advanceBalance: 0, pending: 0, editHistory: [] });
        }
        appData.expenses = [{ id: 1, category: "निर्माण", amount: 5000, note: "सीमेंट खरीद", date: "2024-01-05" }, { id: 2, category: "भोजन", amount: 2000, note: "प्रसाद", date: "2024-01-10" }, { id: 3, category: "बिजली", amount: 1500, note: "बिल", date: "2024-01-15" }];

function getAllMonthsFromJoinTillNow(joinDate) {
    const join = new Date(joinDate);
    const now = new Date();
    const monthsList = ['जनवरी', 'फरवरी', 'मार्च', 'अप्रैल', 'मई', 'जून', 'जुलाई', 'अगस्त', 'सितम्बर', 'अक्टूबर', 'नवम्बर', 'दिसम्बर'];
    let all = [];
    for(let y = join.getFullYear(); y <= now.getFullYear(); y++) {
        let sm = (y === join.getFullYear()) ? join.getMonth() : 0;
        let em = (y === now.getFullYear()) ? now.getMonth() : 11;
        for(let m = sm; m <= em; m++) all.push({ year: y, month: monthsList[m], monthIndex: m });
    }
    return all;
}

function getMonthlyAmountForDate(member, date) {
    if(!member.monthlyAmountHistory || member.monthlyAmountHistory.length === 0) return member.monthlyAmount;
    let sorted = [...member.monthlyAmountHistory].sort((a,b) => new Date(a.effectiveDate) - new Date(b.effectiveDate));
    let effective = sorted[0].amount;
    for(let h of sorted) if(new Date(h.effectiveDate) <= new Date(date)) effective = h.amount;
    return effective;
}

function computeAdvanceAndPending() {
    for(let m of appData.members) {
        if(m.status !== 'active') continue;
        let monthlyDonations = appData.donations.filter(d => d.memberId === m.id && d.type === 'monthly');
        let advanceDonations = appData.donations.filter(d => d.memberId === m.id && d.type === 'advance');
        let totalAdvance = advanceDonations.reduce((sum, d) => sum + d.amount, 0);
        let allMonths = getAllMonthsFromJoinTillNow(m.joinDate);
        let expected = 0, paid = 0;
        for(let mon of allMonths) {
            let monthDate = new Date(mon.year, mon.monthIndex, 1);
            expected += getMonthlyAmountForDate(m, monthDate);
        }
        paid = monthlyDonations.reduce((s,d)=>s+d.amount,0);
        let pending = expected - paid;
        let advBal = totalAdvance;
        if(advBal > 0 && pending > 0) {
            if(advBal >= pending) { advBal -= pending; pending = 0; }
            else { pending -= advBal; advBal = 0; }
        }
        m.pending = pending > 0 ? pending : 0;
        m.advanceBalance = advBal > 0 ? advBal : 0;
    }
    saveToLocalStorage();
}

function getMemberTotalDonation(memberId) {
    return appData.donations.filter(d => d.memberId === memberId && (d.type === 'monthly' || d.type === 'advance')).reduce((s,d)=>s+d.amount,0);

function renderBirthdayReminder() {

}
function toggleMemberSelection(id, isChecked) {
    if(isChecked) { if(!selectedMembersForDelete.includes(id)) selectedMembersForDelete.push(id); }
    else { selectedMembersForDelete = selectedMembersForDelete.filter(i => i !== id); }
    updateBulkDeleteBar();
    let selectAll = document.getElementById('selectAllCheckbox');
    if(selectAll) selectAll.checked = selectedMembersForDelete.length === currentFilteredMembers.length && currentFilteredMembers.length > 0;
}
function toggleSelectAll() {
    let selectAll = document.getElementById('selectAllCheckbox');
    if(selectAll.checked) {
        selectedMembersForDelete = currentFilteredMembers.map(m => m.id);
        document.querySelectorAll('.member-checkbox').forEach(cb => cb.checked = true);
    } else {
        selectedMembersForDelete = [];
        document.querySelectorAll('.member-checkbox').forEach(cb => cb.checked = false);
    }
    updateBulkDeleteBar();
}
function selectAllVisibleMembers() {
    selectedMembersForDelete = currentFilteredMembers.map(m => m.id);
    document.querySelectorAll('.member-checkbox').forEach(cb => cb.checked = true);
    let selectAll = document.getElementById('selectAllCheckbox');
    if(selectAll) selectAll.checked = true;
    updateBulkDeleteBar();
}
function clearMemberSelection() {
    selectedMembersForDelete = [];
    document.querySelectorAll('.member-checkbox').forEach(cb => cb.checked = false);
    let selectAll = document.getElementById('selectAllCheckbox');
    if(selectAll) selectAll.checked = false;
    updateBulkDeleteBar();
}
function updateBulkDeleteBar() {
    let bar = document.getElementById('bulkDeleteBar');
    let countSpan = document.getElementById('selectedCount');
    if(bar && countSpan) {
        if(selectedMembersForDelete.length > 0) {
            bar.style.display = 'flex';
            countSpan.innerText = selectedMembersForDelete.length;
        } else {
            bar.style.display = 'none';
        }
    }
}
async function confirmBulkDelete() {
    if(selectedMembersForDelete.length === 0) return;
    if(!await confirmDoubleAction(`${selectedMembersForDelete.length} सदस्य हटाना`)) return;
    if(confirm(`क्या आप ${selectedMembersForDelete.length} सदस्यों को हटाना चाहते हैं?`)) {
        appData.members = appData.members.filter(m => !selectedMembersForDelete.includes(m.id));
        saveToLocalStorage();
        showToast(`✅ ${selectedMembersForDelete.length} सदस्य हटा दिए गए`);
        selectedMembersForDelete = [];
        applyFilters();
        addAuditLog("BULK_DELETE", `${selectedMembersForDelete.length} सदस्य हटाए गए`);
    }
}

function toggleMemberVisibility(id) { let m = appData.members.find(x=>x.id===id); if(m) { m.hidden = !m.hidden; saveToLocalStorage(); renderMemberList(); showToast(`${m.name} ${m.hidden ? 'हाइड' : 'अनहाइड'}`); addAuditLog("TOGGLE_VISIBILITY", `${m.name} -> ${m.hidden ? 'hidden' : 'visible'}`); } }
function toggleMemberStatus(id) { let m = appData.members.find(x=>x.id===id); if(m) { m.status = m.status === 'active' ? 'inactive' : 'active'; saveToLocalStorage(); renderMemberList(); showToast(`${m.name} ${m.status === 'active' ? 'सक्रिय' : 'निष्क्रिय'}`); addAuditLog("TOGGLE_STATUS", `${m.name} -> ${m.status}`); } }

function saveMemberEdit(id) {
    let m = appData.members.find(x=>x.id===id);
    if(!m) return;
    let reason = document.getElementById('editReason')?.value || "कोई कारण नहीं";
    let oldData = { name: m.name, mobile: m.mobile, village: m.village, father: m.father, monthlyAmount: m.monthlyAmount, birthDate: m.birthDate };
    m.name = document.getElementById('editName').value;
    m.mobile = document.getElementById('editMobile').value;
    m.village = document.getElementById('editVillage').value;
    m.father = document.getElementById('editFather').value;
    m.birthDate = document.getElementById('editBirth').value;
    let newAmount = parseFloat(document.getElementById('editAmount').value);
    if(newAmount !== m.monthlyAmount && !isNaN(newAmount) && newAmount > 0) {
        if(!m.monthlyAmountHistory) m.monthlyAmountHistory = [];
        m.monthlyAmountHistory.push({ amount: newAmount, effectiveDate: new Date().toISOString().slice(0,10), changedBy: currentUser.name, reason: reason });
        m.monthlyAmount = newAmount;
    }
    m.joinDate = document.getElementById('editJoin').value;
    let photoFile = document.getElementById('editPhoto').files[0];
    let saveMember = (photoUrl) => {
        if(photoUrl) m.photo = photoUrl;
        let newData = { name: m.name, mobile: m.mobile, village: m.village, father: m.father, monthlyAmount: m.monthlyAmount, birthDate: m.birthDate };
        addEditHistory(m, 'सदस्य', oldData, newData, reason);
        computeAdvanceAndPending();
        saveToLocalStorage();
        closeModal();
        showToast('✅ सदस्य अपडेट');
        renderMemberList();
    };
    if(photoFile) { let reader = new FileReader(); reader.onload = (e) => saveMember(e.target.result); reader.readAsDataURL(photoFile); } else { saveMember(null); }
}

function processAdvance(memberId) {
    let m = appData.members.find(x=>x.id===memberId);

    if(isNaN(amount) || amount <= 0) { showToast("⚠️ सही राशि", true); return; }
    let receiptNo = `एडवांस-${Date.now().toString().slice(-8)}`;
    appData.donations.push({ id: Date.now(), memberId: m.id, memberName: m.name, type: "advance", amount: amount, receiptNo: receiptNo, date: new Date().toISOString().slice(0,10), mode: mode });

    saveToLocalStorage();
    closeModal();
    showToast(`⭐ ₹${amount} एडवांस जमा`);

function openMultiYearPaymentModal(memberId) {
    let m = appData.members.find(x => x.id === memberId);
    if(!m) return;
    let allMonths = getAllMonthsFromJoinTillNow(m.joinDate);
    let paidMonths = appData.donations.filter(d => d.memberId === m.id && d.type === 'monthly').map(d => ({ year: d.year, month: d.monthIndex }));
    let pendingMonths = allMonths.filter(mon => !paidMonths.some(p => p.year === mon.year && p.month === mon.monthIndex));
    if(pendingMonths.length === 0) { showToast("✅ कोई बकाया नहीं", true); return; }
    let groupedByYear = {};
    pendingMonths.forEach(mon => { if(!groupedByYear[mon.year]) groupedByYear[mon.year] = []; groupedByYear[mon.year].push(mon); });
    let years = Object.keys(groupedByYear).sort();
    let html = `<div class="modal"><div class="modal-content"><h3 style="color:var(--saffron);">💰 मल्टी-ईयर भुगतान - ${m.name}</h3><div><button class="select-all-btn" onclick="selectAllYears()">✅ सभी चुनें</button><button class="select-all-btn" onclick="deselectAll()">❌ सभी हटाएँ</button></div><div id="multiYearMonthsContainer" class="checklist"></div><div class="flex-between"><input type="number" id="paymentAmountMulti" value="${m.monthlyAmount}" style="width:120px;" class="form-control"><select id="paymentModeMulti" style="width:120px;" class="form-control"><option>कैश</option><option>UPI</option></select><span id="selectedTotalAmount">₹0</span></div><button class="btn btn-primary" onclick="processPayment(${memberId})">✅ भुगतान करें</button><button class="btn btn-secondary" onclick="closeModal()">रद्द</button></div></div>`;
    document.body.insertAdjacentHTML('beforeend', html);
    function renderYears() {
        let container = document.getElementById('multiYearMonthsContainer');
        if(!container) return;
        let html2 = '';
        for(let y of years) {
            html2 += `<div class="year-group"><div class="year-header" onclick="toggleYear('${y}')"><div><input type="checkbox" class="year-cb" data-year="${y}" onchange="selectYearMonths('${y}', this.checked)"> <strong>📅 ${y}</strong> (${groupedByYear[y].length} महीने)</div><i class="fas fa-chevron-down"></i></div><div class="year-months" id="yearMonths_${y}">${groupedByYear[y].map(mon => `<div class="month-item"><input type="checkbox" value="${mon.year}_${mon.monthIndex}" class="month-cb" data-year="${mon.year}" onchange="updateTotalAmount()"> <label>${mon.month} - ₹${getMonthlyAmountForDate(m, new Date(mon.year, mon.monthIndex, 1))}</label></div>`).join('')}</div></div>`;
        }
        container.innerHTML = html2;
        updateTotalAmount();
    }
    renderYears();
    window.selectAllYears = function() { document.querySelectorAll('.month-cb').forEach(cb => cb.checked = true); document.querySelectorAll('.year-cb').forEach(cb => cb.checked = true); updateTotalAmount(); };
    window.deselectAll = function() { document.querySelectorAll('.month-cb').forEach(cb => cb.checked = false); document.querySelectorAll('.year-cb').forEach(cb => cb.checked = false); updateTotalAmount(); };
    window.toggleYear = function(year) { let div = document.getElementById(`yearMonths_${year}`); if(div) div.style.display = div.style.display === 'none' ? 'block' : 'none'; };
    window.selectYearMonths = function(year, checked) { document.querySelectorAll(`.month-cb[data-year="${year}"]`).forEach(cb => cb.checked = checked); updateTotalAmount(); };
    window.updateTotalAmount = function() { let amount = parseFloat(document.getElementById('paymentAmountMulti').value) || m.monthlyAmount; let count = document.querySelectorAll('.month-cb:checked').length; document.getElementById('selectedTotalAmount').innerHTML = `₹${count * amount}`; };
    document.getElementById('paymentAmountMulti').addEventListener('input', updateTotalAmount);
}
function processPayment(memberId) {
    let m = appData.members.find(x => x.id === memberId);
    let selected = Array.from(document.querySelectorAll('.month-cb:checked')).map(cb => { let [year, month] = cb.value.split('_'); return { year: parseInt(year), monthIndex: parseInt(month) }; });
    if(selected.length === 0) { showToast("⚠️ महीना चुनें", true); return; }
    let amount = parseFloat(document.getElementById('paymentAmountMulti').value);
    let mode = document.getElementById('paymentModeMulti').value;
    let monthNames = ['जनवरी','फरवरी','मार्च','अप्रैल','मई','जून','जुलाई','अगस्त','सितम्बर','अक्टूबर','नवम्बर','दिसम्बर'];
    let total = 0;
    let receiptNo = getNextReceiptNo();
    for(let s of selected) {
        let amt = getMonthlyAmountForDate(m, new Date(s.year, s.monthIndex, 1));
        total += amt;
        appData.donations.push({ id: Date.now(), memberId: m.id, memberName: m.name, type: "monthly", month: monthNames[s.monthIndex], monthIndex: s.monthIndex, year: s.year, amount: amt, receiptNo: receiptNo, date: new Date().toISOString().slice(0,10), mode: mode });
    }
    appData.receipts.unshift({ id: Date.now(), receiptNo: receiptNo, memberName: m.name, amount: total, date: new Date().toISOString() });
    computeAdvanceAndPending();
    saveToLocalStorage();
    closeModal();
    showToast(`✅ ₹${total} का भुगतान हो गया`);
    renderMemberList();
    renderDashboard();
    addAuditLog("PAYMENT", `${m.name} - ₹${total}`);
}
function getNextReceiptNo() { return `आरईसी-${String(nextReceiptCounter++).padStart(5,'0')}`; }

function sendReminder(id) {
    let m = appData.members.find(x=>x.id===id);
    if(m && m.mobile) {
        let allMonths = getAllMonthsFromJoinTillNow(m.joinDate);
        let msg = `🚩 *जय श्री राम* 🚩\n\nप्रिय *${m.name} जी*,\n\nआपका मासिक विवरण:\n\n`;
        for(let item of allMonths) {
            let isPaid = appData.donations.some(d => d.memberId === m.id && d.month === item.month && d.year === item.year);
            let amt = getMonthlyAmountForDate(m, new Date(item.year, item.monthIndex, 1));
            if(isPaid) msg += `✅ ${item.month} ${item.year}: ₹${amt} (जमा)\n`;
            else msg += `⭕ ${item.month} ${item.year}: ₹${amt} (देय)\n`;
        }
        msg += `\n⚠️ शेष बकाया: ₹${m.pending}\n💸 UPI: ${appData.settings.upiId}`;
        window.open(`https://wa.me/91${m.mobile}?text=${encodeURIComponent(msg)}`, '_blank');
        showToast(`📱 रिमाइंडर भेजा`);
    }
}

function importBulk() {
    let lines = document.getElementById('bulkData').value.split('\n');
    let count = 0;
    for(let line of lines) {
        line = line.trim();
        if(!line) continue;
        let parts = line.split(',');
        let name = parts[0]?.trim() || "नाम नहीं";
        let mobile = parts[1]?.trim() || "";
        let amount = parts[2] ? parseFloat(parts[2].trim()) : appData.settings.defaultMonthly;
        let joinDate = parts[3]?.trim() || new Date().toISOString().slice(0,10);
        let birthDate = parts[4]?.trim() || "";
        if(name) {
            appData.members.push({ id: Date.now() + count, name: name, father: "", mobile: mobile, village: "", monthlyAmount: amount, monthlyAmountHistory: [{ amount: amount, effectiveDate: joinDate }], joinDate: joinDate, birthDate: birthDate, status: 'active', hidden: false, photo: "", advanceBalance: 0, pending: 0, editHistory: [] });
            count++;
        }
    }
    computeAdvanceAndPending();
    saveToLocalStorage();
    showToast(`✅ ${count} सदस्य जुड़ गए`);
    switchSub('memberList');
    addAuditLog("BULK_IMPORT", `${count} सदस्य जोड़े गए`);
}

function startBulkMessage() { if(bulkInterval) clearInterval(bulkInterval); bulkMembers = appData.members.filter(m => m.status === 'active' && m.mobile && !m.hidden); if(bulkMembers.length === 0) { showToast("⚠️ कोई सदस्य नहीं", true); return; } bulkIndex = 0; document.getElementById('bulkProgress').innerHTML = `📨 प्रगति: 0/${bulkMembers.length}`; sendNextBulk(); bulkInterval = setInterval(() => sendNextBulk(), 20000); }
function sendNextBulk() { if(bulkIndex >= bulkMembers.length) { clearInterval(bulkInterval); document.getElementById('bulkProgress').innerHTML = `✅ सभी ${bulkMembers.length} सदस्यों को मैसेज भेजा गया`; showToast("✅ सबको भेजा"); return; } let m = bulkMembers[bulkIndex]; let allMonths = getAllMonthsFromJoinTillNow(m.joinDate); let msg = `🚩 *जय श्री राम* 🚩\n\nप्रिय *${m.name} जी*,\n\nआपका विवरण:\n\n`; for(let item of allMonths) { let isPaid = appData.donations.some(d => d.memberId === m.id && d.month === item.month && d.year === item.year); let amt = getMonthlyAmountForDate(m, new Date(item.year, item.monthIndex, 1)); if(isPaid) msg += `✅ ${item.month} ${item.year}: ₹${amt} (जमा)\n`; else msg += `⭕ ${item.month} ${item.year}: ₹${amt} (देय)\n`; } msg += `\n⚠️ शेष: ₹${m.pending}\n💸 UPI: ${appData.settings.upiId}`; window.open(`https://wa.me/91${m.mobile}?text=${encodeURIComponent(msg)}`, '_blank'); bulkIndex++; document.getElementById('bulkProgress').innerHTML = `📨 प्रगति: ${bulkIndex}/${bulkMembers.length} - ${m.name}`; }
function stopBulkMessage() { if(bulkInterval) { clearInterval(bulkInterval); document.getElementById('bulkProgress').innerHTML = `⏹️ रोका गया`; showToast("⏹️ रोका"); } }

function renderMonthlyReport() { let y = new Date().getFullYear(), m = new Date().getMonth(); let inc = appData.donations.filter(d=>new Date(d.date).getFullYear()===y && new Date(d.date).getMonth()===m).reduce((s,d)=>s+d.amount,0); let exp = appData.expenses.filter(e=>new Date(e.date).getFullYear()===y && new Date(e.date).getMonth()===m).reduce((s,e)=>s+e.amount,0); let months = ['जनवरी','फरवरी','मार्च','अप्रैल','मई','जून','जुलाई','अगस्त','सितम्बर','अक्टूबर','नवम्बर','दिसम्बर']; document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-title">📅 मासिक रिपोर्ट - ${months[m]} ${y}</div><div class="stats-grid"><div class="stat-card"><div class="stat-value">₹${inc}</div><div class="stat-label">आय</div></div><div class="stat-card"><div class="stat-value">₹${exp}</div><div class="stat-label">व्यय</div></div><div class="stat-card"><div class="stat-value">₹${inc-exp}</div><div class="stat-label">शेष</div></div></div></div>`; }

function renderPendingReport() { let pending = appData.members.filter(m => !m.hidden && m.pending > 0); let total = pending.reduce((s,m)=>s+m.pending,0); document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-title">⚠️ बकाया रिपोर्ट</div><div class="stats-grid"><div class="stat-card"><div class="stat-value">${pending.length}</div><div class="stat-label">बकाया सदस्य</div></div><div class="stat-card"><div class="stat-value">₹${total}</div><div class="stat-label">कुल बकाया</div></div></div><div class="table-wrapper"><table class="data-table"><thead><th>नाम</th><th>बकाया</th></thead><tbody>${pending.map(m => `</td><td class="${getNameColorClass(m)}">${m.name}${m.photo ? `<br><img src="${m.photo}" style="width:25px;height:25px;border-radius:50%;">` : ''}${m.monthlyAmountHistory && m.monthlyAmountHistory.length > 1 ? `<div class="amount-history">राशि बदली: ${m.monthlyAmountHistory[m.monthlyAmountHistory.length-1].effectiveDate}</div>` : ''}</td><td class="badge-pending">₹${m.pending}</td></tr>`).join('')}</tbody>}</div><button class="btn btn-success mt-2" onclick="sharePendingReport()"><i class="fab fa-whatsapp"></i> भेजें</button></div>`; }

function renderTrendReport() { let m = ['जन','फर','मार्च','अप्रैल','मई','जून','जुलाई','अग','सित','अक्टू','नव','दिस']; let y = new Date().getFullYear(); let data = m.map((_,i) => appData.donations.filter(d=>new Date(d.date).getMonth()===i && new Date(d.date).getFullYear()===y).reduce((s,d)=>s+d.amount,0)); document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-title">📈 ट्रेंड रिपोर्ट ${y}</div><canvas id="trendChart"></canvas></div>`; if(charts.trend) charts.trend.destroy(); charts.trend = new Chart(document.getElementById('trendChart'), { type:'line', data:{ labels:m, datasets:[{ label:'आय', data:data, borderColor:'#28a745', fill:false }] } }); }

function renderUserManagement() { renderUsers(); }
function renderTopDonors() { let donorMap = new Map(); appData.donations.forEach(d => { if(d.memberName) donorMap.set(d.memberName, (donorMap.get(d.memberName) || 0) + d.amount); }); let top = Array.from(donorMap.entries()).sort((a,b)=>b[1]-a[1]).slice(0,10); document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-title">🏆 टॉप दानदाता</div>${top.map(([n,a],i)=>`<div>${i+1}. ${n} - ₹${a}</div>`).join('')}</div>`; }
function renderLoginHistory() { document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-title">📱 लॉगिन हिस्ट्री</div><div class="table-wrapper"><table class="data-table"><thead><th>तिथि</th><th>उपयोगकर्ता</th><th>रोल</th></thead><tbody>${appData.loginHistory.slice(0,50).map(h => `<tr><td style="font-size:11px;">${new Date(h.timestamp).toLocaleString()}</td><td class="name-pending">${h.user}</td><td class="badge-advance">${h.role}</td></tr>`).join('')}</tbody>}</div></div>`; }
function renderAnnouncements() { let html = `<div class="card"><div class="card-title">📢 घोषणाएँ</div>${canEdit() ? `<button class="btn btn-primary" onclick="addAnnouncement()">+ नई घोषणा</button>` : ''}<div>${appData.announcements.map(a => `<div class="request-card"><div><strong>${a.title}</strong><br><small>${new Date(a.date).toLocaleDateString()}</small><p>${a.content}</p></div>${canEdit() ? `<div><button class="btn-sm btn-danger" onclick="deleteAnnouncement(${a.id})">🗑️</button></div>` : ''}</div>`).join('')}</div></div>`; document.getElementById('contentArea').innerHTML = html; }
function addAnnouncement() { let t = prompt("शीर्षक:"); if(!t) return; let c = prompt("विवरण:"); appData.announcements.unshift({ id: Date.now(), title: t, content: c, date: new Date().toISOString(), pinned: false }); saveToLocalStorage(); renderAnnouncements(); showToast("✅ घोषणा जुड़ी"); addAuditLog("ADD_ANNOUNCEMENT", t); }
function deleteAnnouncement(id) { if(confirm("हटाएं?")) { appData.announcements = appData.announcements.filter(a => a.id !== id); saveToLocalStorage(); renderAnnouncements(); showToast("✅ हटा"); } }

function exportToExcel() { const wsData = [['नाम', 'मोबाइल', 'गाँव', 'पिता', 'मासिक', 'बकाया', 'एडवांस', 'कुल दान', 'ज्वाइन डेट', 'जन्म तिथि', 'स्थिति']]; appData.members.forEach(m => { wsData.push([m.name, m.mobile, m.village, m.father, m.monthlyAmount, m.pending, m.advanceBalance, getMemberTotalDonation(m.id), m.joinDate, m.birthDate || '', m.status]); }); const ws = XLSX.utils.aoa_to_sheet(wsData); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'सदस्य'); XLSX.writeFile(wb, `mandir_members_${new Date().toISOString().slice(0,10)}.xlsx`); showToast("📊 एक्सेल डाउनलोड"); }
function shareApp() { let msg = `🚩 भव्य मन्दिर निर्माण समिति\nऐप लिंक: ${window.location.href}\nसुपर एडमिन: super@mandir.com / super123`; if(navigator.share) navigator.share({ title: "मन्दिर ऐप", text: msg }); else { navigator.clipboard.writeText(msg); showToast("📋 लिंक कॉपी"); } }
function startVoiceSearch() { if (!('webkitSpeechRecognition' in window)) { showToast("🔊 वॉयस सर्च सपोर्ट नहीं", true); return; } const recognition = new webkitSpeechRecognition(); recognition.lang = 'hi-IN'; recognition.start(); recognition.onresult = (e) => { const text = e.results[0][0].transcript; showToast("🔊 खोज: " + text); if(currentSub === 'memberList') { let searchBox = document.getElementById('searchName'); if(searchBox) searchBox.value = text; applyFilters(); } else { switchSub('memberList'); setTimeout(() => { let searchBox = document.getElementById('searchName'); if(searchBox) searchBox.value = text; applyFilters(); }, 500); } }; recognition.onerror = () => showToast("🔊 बोलें नहीं सुनाई दिया", true); }
function installApp() { if(deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; } }
let deferredPrompt; window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; document.getElementById('installAppBtn').style.display = 'inline-flex'; });

};
function getText(key) { return currentLanguage === 'hi' ? (translations.hi[key] || key) : (translations.en[key] || key); }
function toggleLanguage() { currentLanguage = currentLanguage === 'hi' ? 'en' : 'hi'; document.getElementById('langBtn').innerHTML = currentLanguage === 'hi' ? "🇮🇳 English" : "🇮🇳 हिंदी"; renderNavigation(); renderCurrentPage(); }

function renderCurrentPage() {
    if(!dataLoaded && !currentUser) return;
    const pages = {
        home: { dashboard: renderDashboard, profile: renderProfile, userManagement: renderUserManagement, topDonors: renderTopDonors, loginHistory: renderLoginHistory, announcements: renderAnnouncements, birthdayReminder: renderBirthdayReminder },
        members: { memberList: renderMemberList, hiddenMembers: renderHiddenMembers, addMember: renderAddMember, bulkImport: renderBulkImport, committees: renderCommittees, changeAmount: renderChangeAmount, memberHistory: renderMemberHistory, updateMissingFields: renderUpdateMissingFields, memberPhotoGallery: renderMemberPhotoGallery, memberQRCode: renderMemberQRCode },
        finance: { donations: renderDonations, pending: renderPending, advancePayment: renderAdvancePayment, receipts: renderReceipts, receiptsList: renderReceiptsList, expenses: renderExpenses, ledger: renderLedger, expenseCategoryChart: renderExpenseCategoryChart, profitLoss: renderProfitLoss },
        temple: { ramcharitmanas: renderRamcharitmanas, events: renderEvents, construction: renderConstruction, gallery: renderGallery, meetings: renderMeetings, socialLinks: renderSocialLinks, groups: renderGroups, channel: renderChannel },
        reports: { monthlyReport: renderMonthlyReport, yearlyReport: renderYearlyReport, pendingReport: renderPendingReport, auditReport: renderAuditReport, trendReport: renderTrendReport, pdfReport: renderPdfReport },
        settings: { generalSettings: renderGeneralSettings, socialSettings: renderSocialSettings, googleSheets: renderGoogleSheets, backup: renderBackup, restoreBackup: renderRestoreBackup, users: renderUsers, theme: renderTheme, digitalSignature: renderDigitalSignature }
    };
    if(pages[currentMain] && pages[currentMain][currentSub]) pages[currentMain][currentSub]();
    else renderDashboard();
}
