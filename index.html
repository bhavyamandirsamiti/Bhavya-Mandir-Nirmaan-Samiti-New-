    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `self.addEventListener('install', event => { self.skipWaiting(); event.waitUntil(caches.open('mandir-v1').then(cache => cache.addAll(['/'])); }); self.addEventListener('fetch', event => { event.respondWith(caches.match(event.request).then(response => response || fetch(event.request))); });`;
                const swBlob = new Blob([swCode], {type: 'application/javascript'});
                const swURL = URL.createObjectURL(swBlob);
                navigator.serviceWorker.register(swURL).then(reg => console.log('SW registered')).catch(err => console.log('SW failed:', err));
            });
        }
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; const btn = document.getElementById('installAppBtn'); if(btn) btn.style.display = 'inline-flex'; });
        function installApp() { if(deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(() => { deferredPrompt = null; const btn = document.getElementById('installAppBtn'); if(btn) btn.style.display = 'none'; }); } }
        function refreshPage() { window.location.reload(); }
        const GOOGLE_DRIVE_FOLDER_ID = "1ekyVapMl-0Aq-QFVAL1ej5cjmzQmOQ0x";
        function backupToGoogleDrive() { let data = JSON.stringify(appData); let blob = new Blob([data], {type:'application/json'}); let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `mandir_backup_${new Date().toISOString().slice(0,10)}.json`; a.click(); URL.revokeObjectURL(a.href); showToast("बैकअप डाउनलोड हुआ"); window.open(`https://drive.google.com/drive/folders/${GOOGLE_DRIVE_FOLDER_ID}`, '_blank'); }
        let nextReceiptCounter = 1;
        function getNextReceiptNo() { return `REC-${String(nextReceiptCounter++).padStart(5,'0')}`; }
        function getDynamicYears(startYear = 2024) {
            let currentYear = new Date().getFullYear();
            let years = [];
            for(let y = startYear; y <= currentYear + 10; y++) years.push(y);
            return years;
        }
        function getYearOptions(selectedYear = null, startYear = 2024) {
            let years = getDynamicYears(startYear);
            let currentYear = new Date().getFullYear();
            let selYear = selectedYear !== null ? selectedYear : currentYear;
            return years.map(y => `<option value="${y}" ${y === selYear ? 'selected' : ''}>${y}</option>`).join('');
        }
        
        // PDF Export Function
        async function exportToPDF(type) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            let content = '';
            if (type === 'members') {
                content = '🚩 सदस्य सूची\n\n';
                appData.members.forEach((m, i) => { content += `${i+1}. ${m.name} - ${m.mobile || ''} - ${m.village || ''} - बकाया: ₹${m.pending||0}\n`; });
            } else if (type === 'ledger') {
                content = '📒 लेजर रिपोर्ट\n\n';
                const totalIncome = appData.donations.reduce((s,d)=>s+d.amount,0);
                const totalExpense = appData.expenses.reduce((s,e)=>s+e.amount,0);
                content += `कुल आय: ₹${totalIncome}\nकुल व्यय: ₹${totalExpense}\nशेष: ₹${totalIncome - totalExpense}`;
            } else if (type === 'pending') {
                content = '⚠️ बकाया रिपोर्ट\n\n';
                appData.members.filter(m=>m.pending>0).forEach((m, i) => { content += `${i+1}. ${m.name} - बकाया: ₹${m.pending}\n`; });
            }
            doc.text(content, 10, 10);
            doc.save(`${type}_report_${new Date().toISOString().slice(0,10)}.pdf`);
            showToast("PDF डाउनलोड हुआ");
        }
        
        // Excel Export Function
        function exportToExcel() {
            const wsData = [['नाम', 'मोबाइल', 'गाँव', 'पिता', 'मासिक राशि', 'बकाया', 'एडवांस', 'ज्वाइन डेट']];
            appData.members.forEach(m => { wsData.push([m.name, m.mobile || '', m.village || '', m.father || '', m.monthlyAmount, m.pending || 0, m.advanceBalance || 0, m.joinDate]); });
            const ws = XLSX.utils.aoa_to_sheet(wsData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Members');
            XLSX.writeFile(wb, `mandir_members_${new Date().toISOString().slice(0,10)}.xlsx`);
            showToast("Excel डाउनलोड हुआ");
        }
        
        // Mobile Validation Functions
        function isValidMobile(mobile) { return /^[6-9]\d{9}$/.test(mobile); }
        function isDuplicateMobile(mobile, excludeId = null) { return appData.members.some(m => m.mobile === mobile && m.id !== excludeId); }
    </script>

    function getAllMonthsFromJoinTillNow(joinDate) { const join = new Date(joinDate); const now = new Date(); const monthsList = ['जनवरी', 'फरवरी', 'मार्च', 'अप्रैल', 'मई', 'जून', 'जुलाई', 'अगस्त', 'सितम्बर', 'अक्टूबर', 'नवम्बर', 'दिसम्बर']; let all = []; for(let y = join.getFullYear(); y <= now.getFullYear(); y++) { let sm = (y === join.getFullYear()) ? join.getMonth() : 0; let em = (y === now.getFullYear()) ? now.getMonth() : 11; for(let m = sm; m <= em; m++) { all.push({ year: y, month: monthsList[m], monthIndex: m }); } } return all; }
    function getMonthlyAmountForDate(member, date) { if(!member.monthlyAmountHistory || member.monthlyAmountHistory.length === 0) return member.monthlyAmount; let sorted = [...member.monthlyAmountHistory].sort((a,b) => new Date(a.effectiveDate) - new Date(b.effectiveDate)); let effective = sorted[0].amount; for(let h of sorted) { if(new Date(h.effectiveDate) <= new Date(date)) effective = h.amount; } return effective; }
    function computeAdvanceAndPending() { for(let m of appData.members) { if(m.status !== 'active') continue; let monthlyDonations = appData.donations.filter(d => d.memberId === m.id && d.type === 'monthly'); let advanceDonations = appData.donations.filter(d => d.memberId === m.id && d.type === 'advance'); let totalAdvance = advanceDonations.reduce((sum, d) => sum + d.amount, 0); let allMonths = getAllMonthsFromJoinTillNow(m.joinDate); let expected = 0, paid = 0; for(let mon of allMonths) { let monthDate = new Date(mon.year, mon.monthIndex, 1); expected += getMonthlyAmountForDate(m, monthDate); } paid = monthlyDonations.reduce((s,d)=>s+d.amount,0); let pending = expected - paid; let advBal = totalAdvance; if(advBal > 0 && pending > 0) { if(advBal >= pending) { advBal -= pending; pending = 0; } else { pending -= advBal; advBal = 0; } } m.pending = pending > 0 ? pending : 0; m.advanceBalance = advBal > 0 ? advBal : 0; } saveToLocal(); }

ss="signature"><div>......................<br>${appData.settings.president}<br>(अध्यक्ष)</div><div>......................<br>${appData.settings.secretary}<br>(सचिव)</div></div><div class="footer"><p>🙏 जय श्री राम 🙏</p><p>राशि जमा करते रहें, मंदिर निर्माण में सहयोग करते रहें। धन्यवाद।</p></div><div style="text-align:center;margin-top:15px;"><button onclick="window.print()" style="background:#FF9933;padding:8px 16px;border:none;border-radius:8px;">🖨️ प्रिंट करें</button> <button onclick="window.close()" style="background:#6c757d;padding:8px 16px;border:none;border-radius:8px;">बंद करें</button></div></div></body></html>`);

    function advanceFilter() {
        let name = (document.getElementById('searchName')?.value || '').toLowerCase();
        let village = (document.getElementById('searchVillage')?.value || '').toLowerCase();
        let mobile = (document.getElementById('searchMobile')?.value || '');
        let range = document.getElementById('searchPendingRange')?.value || '';
        let filtered = appData.members.filter(m => {
            if(name && !m.name.toLowerCase().includes(name)) return false;
            if(village && !(m.village || '').toLowerCase().includes(village)) return false;
            if(mobile && !(m.mobile || '').includes(mobile)) return false;
            if(range) {
                if(range === '0' && m.pending > 0) return false;
                if(range === '1-500' && (m.pending < 1 || m.pending > 500)) return false;
                if(range === '501-1000' && (m.pending < 501 || m.pending > 1000)) return false;
                if(range === '1001' && m.pending < 1001) return false;
            }
            return true;
        });
        document.getElementById('memberListContainer').innerHTML = filtered.map(m => `<div class="member-card"><div><strong>${m.name}</strong><br>${m.village} | बकाया: ₹${m.pending||0}</div><div><button class="btn-sm btn-success" onclick="openDonationForMember(${m.id})">💰</button>${canSendReminder() ? `<button class="btn-sm btn-warning" onclick="sendReminder(${m.id})">📱</button>` : ''}</div></div>`).join('');
    }

    function addNewMember() { 
        let mobile = document.getElementById('memMobile').value;
        if(!isValidMobile(mobile)) { showToast("❌ सही 10 डिजिट मोबाइल नंबर डालें", true); return; }
        if(isDuplicateMobile(mobile)) { showToast("❌ यह मोबाइल नंबर पहले से रजिस्टर है", true); return; }
        let newId = Date.now(); 
        let photoFile = document.getElementById('memPhoto').files[0]; 
        let saveMember = (photoUrl) => { 
            let member = { id: newId, name: document.getElementById('memName').value, father: document.getElementById('memFather').value, mobile: mobile, village: document.getElementById('memVillage').value, monthlyAmount: parseFloat(document.getElementById('memAmount').value), monthlyAmountHistory: [{ amount: parseFloat(document.getElementById('memAmount').value), effectiveDate: document.getElementById('memJoin').value }], joinDate: document.getElementById('memJoin').value, status: 'active', photo: photoUrl, advanceBalance: 0, pending: 0, created_by: currentUser.name, created_at: new Date().toISOString(), editHistory: [] }; 
            appData.members.push(member); 
            computeAdvanceAndPending(); 
            saveToLocal(); 
            addAuditLog("ADD_MEMBER", member.name); 
            showToast("सदस्य जुड़ गया"); 
            switchSub('memberList'); 
        }; 
        if(photoFile) { let reader = new FileReader(); reader.onload = (e) => saveMember(e.target.result); reader.readAsDataURL(photoFile); } else { saveMember(""); } 
    }

    function renderLedger() {
        let currentYear = new Date().getFullYear();
        let years = getDynamicYears(2024);
        let months = ['जनवरी', 'फरवरी', 'मार्च', 'अप्रैल', 'मई', 'जून', 'जुलाई', 'अगस्त', 'सितम्बर', 'अक्टूबर', 'नवम्बर', 'दिसम्बर'];
        let yearOptions = years.map(y => `<option value="${y}" ${y === currentYear ? 'selected' : ''}>${y}</option>`).join('');
        let html = `<div class="card"><div class="card-title">📒 लेजर (वर्षवार)</div><div class="flex-between"><label>📅 वर्ष: </label><select id="ledgerYearSelect" class="form-control" style="width:auto;">${yearOptions}</select><button class="btn-sm btn-primary" onclick="renderLedger()">देखें</button></div><div id="ledgerContent"></div><div class="mt-2"><button class="btn btn-success" onclick="shareLedger()"><i class="fab fa-whatsapp"></i> भेजें</button><button class="btn btn-info" onclick="printLedger()"><i class="fas fa-print"></i> प्रिंट</button><button class="btn btn-primary" onclick="exportToExcel()"><i class="fas fa-file-excel"></i> Excel</button><button class="btn btn-danger" onclick="exportToPDF('ledger')"><i class="fas fa-file-pdf"></i> PDF</button></div></div>`;
        document.getElementById('contentArea').innerHTML = html;
        function updateLedgerContent() {
            let year = parseInt(document.getElementById('ledgerYearSelect').value);
            let monthlyRows = '';
            let totalIncome = 0;
            let totalExpense = 0;
            for(let i = 0; i < 12; i++) {
                let income = appData.donations.filter(d => { let dDate = new Date(d.date); return dDate.getMonth() === i && dDate.getFullYear() === year; }).reduce((s, d) => s + d.amount, 0);
                let expense = appData.expenses.filter(e => { let eDate = new Date(e.date); return eDate.getMonth() === i && eDate.getFullYear() === year; }).reduce((s, e) => s + e.amount, 0);
                totalIncome += income;
                totalExpense += expense;

    function renderPendingReport() { computeAdvanceAndPending(); let pendingMembers = appData.members.filter(m => m.pending > 0 && m.status === 'active'); let rows = pendingMembers.map(m => `<tr><td style="color:var(--saffron);">${m.name}</td><td style="color:var(--danger);">₹${m.pending.toFixed(2)}</td></tr>`).join(''); let totalPending = pendingMembers.reduce((s, m) => s + m.pending, 0); let html = `<div class="card"><div class="card-title">⚠️ बकाया रिपोर्ट</div><div style="overflow-x:auto;"><table class="data-table"><thead><th>नाम</th><th>बकाया (₹)</th></thead><tbody>${rows || '<tr><td colspan="2">कोई बकाया सदस्य नहीं</td></tr>'}</tbody><tfoot><tr style="background:#f0f0f0;"><th>कुल बकाया</th><td style="color:var(--danger);">₹${totalPending.toFixed(2)}</td></tr></tfoot></table></div><div class="mt-2"><button class="btn btn-success" onclick="sharePendingReport()"><i class="fab fa-whatsapp"></i> भेजें</button><button class="btn btn-info" onclick="printPendingReportFn()"><i class="fas fa-print"></i> प्रिंट</button><button class="btn btn-primary" onclick="exportToExcel()"><i class="fas fa-file-excel"></i> Excel</button><button class="btn btn-danger" onclick="exportToPDF('pending')"><i class="fas fa-file-pdf"></i> PDF</button></div></div>`; document.getElementById('contentArea').innerHTML = html; }
    function sharePendingReport() { let msg = `🚩 *${appData.settings.committeeName}* 🚩\n\n⚠️ *बकाया रिपोर्ट:*\n\n`; let total = 0; appData.members.filter(m => m.pending > 0 && m.status === 'active').forEach(m => { msg += `▫️ ${m.name}: ₹${m.pending.toFixed(2)}\n`; total += m.pending; }); msg += `\n💰 *कुल बकाया:* ₹${total.toFixed(2)}\n📅 ${new Date().toLocaleDateString()}\n👤 ${appData.settings.president} (अध्यक्ष)`; window.open(`https://wa.me/91${appData.settings.presidentMobile}?text=${encodeURIComponent(msg)}`, '_blank'); }
    function printPendingReportFn() { let rows = appData.members.filter(m => m.pending > 0 && m.status === 'active').map(m => `<tr><td style="color:var(--saffron);">${m.name}</td><td style="color:var(--danger);">₹${m.pending.toFixed(2)}</td></tr>`).join(''); let totalPending = appData.members.filter(m => m.pending > 0 && m.status === 'active').reduce((s, m) => s + m.pending, 0); let win = window.open('', '_blank'); win.document.write(`<html><head><title>बकाया रिपोर्ट</title><style>body{font-family:Arial;padding:20px} table{border-collapse:collapse;width:100%} th,td{border:1px solid #ddd;padding:8px} th{background:#FF9933;color:white}</style></head><body><h2>🚩 बकाया रिपोर्ट</h2>表格<th>नाम</th><th>बकाया</th>${rows}<tfoot><tr style="background:#f0f0f0;"><th>कुल बकाया</th><td style="color:var(--danger);">₹${totalPending.toFixed(2)}</td></tr></tfoot></table><p>${new Date().toLocaleDateString()}</p><p>${appData.settings.president} (अध्यक्ष)</p></body></html>`); win.document.close(); win.print(); }
    function renderAuditReport() { let logs = appData.auditLogs.slice(0, 100).map(l => `<td><td style="color:var(--gray);">${new Date(l.timestamp).toLocaleDateString()} ${new Date(l.timestamp).toLocaleTimeString()}</td><td style="color:var(--saffron);">${l.user} (${l.role})</td><td style="color:var(--teal);">${l.action}</td><td style="color:var(--gray);">${l.details}</td></tr>`).join(''); let html = `<div class="card"><div class="card-title">📋 ऑडिट लॉग</div><div style="overflow-x:auto;"><table class="data-table"><thead><th>तिथि/समय</th><th>उपयोगकर्ता</th><th>कार्य</th><th>विवरण</th></thead><tbody>${logs || '<tr><td colspan="4">कोई लॉग नहीं</td></tr>'}</tbody></table></div></div>`; document.getElementById('contentArea').innerHTML = html; }
    function renderGeneralSettings() { let pendingRequestsHtml = ''; if(currentUser.role === 'super_admin' && appData.pendingLogoRequests && appData.pendingLogoRequests.length > 0) { pendingRequestsHtml = `<div class="card"><div class="card-title">⏳ लोगो अनुमति रिक्वेस्ट</div>${appData.pendingLogoRequests.map(req => `<div class="member-card"><div><strong>${req.requestedBy}</strong><br>कारण: ${req.reason}<br><img src="${req.newLogo}" width="40" height="40" style="border-radius:50%;"></div><div><button class="btn-sm btn-success" onclick="approveLogoRequest(${req.id})">✅</button><button class="btn-sm btn-danger" onclick="rejectLogoRequest(${req.id})">❌</button></div></div>`).join('')}</div>`; } document.getElementById('contentArea').innerHTML = pendingRequestsHtml + `<div class="card"><div class="card-title">⚙️ सेटिंग्स</div><input id="setName" value="${appData.settings.committeeName}" class="form-control"><input id="setSub" value="${appData.settings.committeeSubtitle}" class="form-control"><input id="setUpi" value="${appData.settings.upiId}" class="form-control"><input id="president" value="${appData.settings.president}" class="form-control"><input id="presidentMobile" value="${appData.settings.presidentMobile}" class="form-control"><input id="secretary" value="${appData.settings.secretary}" class="form-control"><input type="file" id="logoUpload" accept="image/*" class="form-control">${currentUser.role === 'admin' ? '<input id="logoChangeReason" placeholder="लोगो बदलने का कारण" class="form-control">' : ''}<button class="btn btn-primary" onclick="saveGeneralSettings()">सेव करें</button></div>`; if(appData.settings.logo) document.querySelector('#contentArea .card').innerHTML += `<img src="${appData.settings.logo}" style="width:50px;height:50px;border-radius:50%;margin-top:10px;">`; }
    function saveGeneralSettings() { let logoFile = document.getElementById('logoUpload').files[0]; let saveSettings = (logoUrl) => { appData.settings.committeeName = document.getElementById('setName').value; appData.settings.committeeSubtitle = document.getElementById('setSub').value; appData.settings.upiId = document.getElementById('setUpi').value; appData.settings.president = document.getElementById('president').value; appData.settings.presidentMobile = document.getElementById('presidentMobile').value; appData.settings.secretary = document.getElementById('secretary').value; if(logoUrl) { if(currentUser.role === 'super_admin') { appData.settings.logo = logoUrl; saveToLocal(); document.getElementById('committeeLogoImg').src = logoUrl; showToast("लोगो बदला"); addAuditLog("LOGO_CHANGED", `by ${currentUser.name}`); } else if(currentUser.role === 'admin') { let reason = document.getElementById('logoChangeReason')?.value || "लोगो बदलने की अनुमति"; if(!appData.pendingLogoRequests) appData.pendingLogoRequests = []; appData.pendingLogoRequests.push({ id: Date.now(), requestedBy: currentUser.name, reason: reason, newLogo: logoUrl }); saveToLocal(); showToast("लोगो बदलने की रिक्वेस्ट भेजी"); addAuditLog("LOGO_CHANGE_REQUEST", `${currentUser.name} requested - Reason: ${reason}`); } } else { saveToLocal(); showToast("सेटिंग्स सेव"); } document.getElementById('headerTitle').innerHTML = appData.settings.committeeName; renderGeneralSettings(); }; if(logoFile) { let reader = new FileReader(); reader.onload = e => saveSettings(e.target.result); reader.readAsDataURL(logoFile); } else { saveSettings(null); } }
    function approveLogoRequest(id) { let req = appData.pendingLogoRequests.find(r => r.id === id); if(req) { appData.settings.logo = req.newLogo; appData.pendingLogoRequests = appData.pendingLogoRequests.filter(r => r.id !== id); saveToLocal(); document.getElementById('committeeLogoImg').src = req.newLogo; showToast("लोगो बदलने की अनुमति दी"); addAuditLog("LOGO_CHANGE_APPROVED", `by ${currentUser.name} for ${req.requestedBy}`); renderGeneralSettings(); } }
    function rejectLogoRequest(id) { appData.pendingLogoRequests = appData.pendingLogoRequests.filter(r => r.id !== id); saveToLocal(); showToast("लोगो बदलने की अनुमति अस्वीकृत"); renderGeneralSettings(); }
    function renderSocialSettings() { if(!canEdit()) { document.getElementById('contentArea').innerHTML = '<div class="card">❌ आप सोशल सेटिंग्स नहीं बदल सकते</div>'; return; } document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-title">🔗 सोशल सेटिंग्स</div><input id="fbLink" value="${appData.settings.facebookLink || ''}" placeholder="Facebook" class="form-control"><input id="instaLink" value="${appData.settings.instagramLink || ''}" placeholder="Instagram" class="form-control"><input id="youtubeLink" value="${appData.settings.youtubeLink || ''}" placeholder="YouTube" class="form-control"><button class="btn btn-primary" onclick="saveSocialSettings()">सेव करें</button></div>`; }
    function saveSocialSettings() { appData.settings.facebookLink = document.getElementById('fbLink').value; appData.settings.instagramLink = document.getElementById('instaLink').value; appData.settings.youtubeLink = document.getElementById('youtubeLink').value; saveToLocal(); showToast("सेव"); addAuditLog("SOCIAL_SETTINGS_CHANGED", "by "+currentUser.name); }
    function renderGoogleSheets() { if(!canEdit()) { document.getElementById('contentArea').innerHTML = '<div class="card">❌ आप Google Sheets सेटिंग्स नहीं बदल सकते</div>'; return; } document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-title">📊 Google Sheets</div><input id="sheetId" value="${appData.settings.googleSheetId || ''}" placeholder="Sheet ID" class="form-control"><button class="btn btn-primary" onclick="saveGoogleSheets()">सेव करें</button></div>`; }
    function saveGoogleSheets() { appData.settings.googleSheetId = document.getElementById('sheetId').value; saveToLocal(); showToast("सेव"); }
    function renderBackup() { document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-title">📦 बैकअप</div><button class="btn btn-success" onclick="backupNow()">💾 बैकअप</button><button class="btn btn-info" onclick="restoreFromFile()">📂 रिस्टोर</button><button class="btn btn-info" onclick="backupToGoogleDrive()">☁️ Google Drive</button><button class="btn btn-primary" onclick="exportToExcel()"><i class="fas fa-file-excel"></i> Excel बैकअप</button></div>`; }
    function backupNow() { let a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(appData)])); a.download = `mandir_backup_${new Date().toISOString().slice(0,10)}.json`; a.click(); showToast("बैकअप लिया"); addAuditLog("BACKUP_DOWNLOAD", "manual backup"); }
    function restoreFromFile() { let inp = document.createElement('input'); inp.type='file'; inp.onchange=e=>{ let file=e.target.files[0]; let reader=new FileReader(); reader.onload=ev=>{ try{ let restored=JSON.parse(ev.target.result); appData=restored; saveToLocal(); showToast("रिस्टोर सफल!"); setTimeout(()=>location.reload(),1500); }catch(err){ showToast("गलत फ़ाइल",true); } }; reader.readAsText(file); }; inp.click(); }
    function renderUsers() { if(!canEditUser()) { document.getElementById('contentArea').innerHTML = '<div class="card">❌ केवल सुपर एडमिन</div>'; return; } let userHtml = appData.users.map(u=>`<div class="member-card"><div>${u.name} (${u.role})<br><span style="font-size:10px;">बनाया: ${u.created_by}</span></div><button class="btn-sm btn-danger" onclick="deleteUser(${u.id})">🗑️</button></div>`).join(''); document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-title">👥 यूजर प्रबंधन</div>${userHtml}<button class="btn btn-primary" onclick="openAddUserModal()">+ नया यूजर</button></div>`; }
    function renderTheme() { document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-title">🎨 थीम</div><div style="display:flex; justify-content:center; gap:15px; padding:10px;"><div class="theme-icon" onclick="changeTheme('#FF9933')" style="color:#FF9933;"><i class="fas fa-palette fa-2x"></i><div>भगवा</div></div><div class="theme-icon" onclick="changeTheme('#28a745')" style="color:#28a745;"><i class="fas fa-palette fa-2x"></i><div>हरा</div></div><div class="theme-icon" onclick="changeTheme('#dc3545')" style="color:#dc3545;"><i class="fas fa-palette fa-2x"></i><div>लाल</div></div><div class="theme-icon" onclick="changeTheme('#007bff')" style="color:#007bff;"><i class="fas fa-palette fa-2x"></i><div>नीला</div></div></div><button class="btn btn-primary" onclick="document.body.classList.toggle('dark')">🌙 डार्क मोड</button></div>`; }
    function changeTheme(color) { document.documentElement.style.setProperty('--saffron', color); document.documentElement.style.setProperty('--saffron-dark', color); document.documentElement.style.setProperty('--gold', color); showToast("थीम बदली"); addAuditLog("THEME_CHANGED", color); }
    function doLogin() { let email = document.getElementById('loginEmail').value; let password = document.getElementById('loginPassword').value; let user = appData.users.find(u => u.email === email && u.password === password); if(user) { currentUser = user; document.getElementById('loginPage').style.display = 'none'; document.getElementById('appContainer').style.display = 'block'; document.getElementById('userName').innerHTML = user.name; let roleText = user.role === 'super_admin' ? 'सुपर एडमिन' : (user.role === 'admin' ? 'एडमिन' : (user.role === 'operator' ? 'ऑपरेटर' : 'व्यूअर')); document.getElementById('userRoleBadge').innerHTML = roleText; document.getElementById('userRoleBadge').className = `role-${user.role}`; if(appData.settings.logo) document.getElementById('committeeLogoImg').src = appData.settings.logo; computeAdvanceAndPending(); renderNavigation(); renderCurrentPage(); addAuditLog("LOGIN", `User ${user.name} (${user.role}) logged in`); showToast(`स्वागत है, ${user.name} जी!`); } else { document.getElementById('loginError').innerHTML = "❌ गलत ईमेल या पासवर्ड!"; } }
    function doLogout() { if(bulkInterval) clearInterval(bulkInterval); currentUser = null; document.getElementById('loginPage').style.display = 'flex'; document.getElementById('appContainer').style.display = 'none'; navigationStack = []; addAuditLog("LOGOUT", "User logged out"); showToast("लॉगआउट हो गया"); }
    
    // MAIN RENDER CURRENT PAGE FUNCTION - FIXED!
    function renderCurrentPage() { 
        if(!dataLoaded && currentUser) return;
        if(currentMain === 'home') { 
            if(currentSub === 'dashboard') renderDashboard(); 
            else if(currentSub === 'profile') renderProfile(); 
            else if(currentSub === 'userManagement') renderUserManagement(); 
        } else if(currentMain === 'members') { 
            if(currentSub === 'memberList') renderMemberList(); 
            else if(currentSub === 'addMember') renderAddMember(); 
            else if(currentSub === 'bulkImport') renderBulkImport(); 
            else if(currentSub === 'updateMissingFields') renderUpdateMissingFields(); 
            else if(currentSub === 'memberHistory') renderMemberHistory(); 
            else if(currentSub === 'committees') renderCommittees(); 
            else if(currentSub === 'changeAmount') renderChangeAmount(); 
        } else if(currentMain === 'finance') { 
            if(currentSub === 'donations') renderDonations(); 
            else if(currentSub === 'pending') renderPendingList(); 
            else if(currentSub === 'receipts') renderReceipts(); 
            else if(currentSub === 'receiptsList') renderReceiptsList(); 
            else if(currentSub === 'generalDonations') renderGeneralDonations(); 
            else if(currentSub === 'advancePayment') renderAdvancePayment(); 
            else if(currentSub === 'expenses') renderExpenses(); 
            else if(currentSub === 'ledger') renderLedger(); 
        } else if(currentMain === 'temple') { 
            if(currentSub === 'ramcharitmanas') renderRamcharitmanas(); 
            else if(currentSub === 'events') renderEvents(); 
            else if(currentSub === 'construction') renderConstruction(); 
            else if(currentSub === 'gallery') renderGallery(); 
            else if(currentSub === 'socialLinks') renderSocialLinks(); 
            else if(currentSub === 'groups') renderGroups(); 
            else if(currentSub === 'channel') renderChannel(); 
        } else if(currentMain === 'reports') { 
            if(currentSub === 'monthlyReport') renderMonthlyReport(); 
            else if(currentSub === 'yearlyReport') renderYearlyReport(); 
            else if(currentSub === 'pendingReport') renderPendingReport(); 
            else if(currentSub === 'auditReport') renderAuditReport(); 
        } else if(currentMain === 'settings') { 
            if(currentSub === 'generalSettings') renderGeneralSettings(); 
            else if(currentSub === 'socialSettings') renderSocialSettings(); 
            else if(currentSub === 'googleSheets') renderGoogleSheets(); 
            else if(currentSub === 'backup') renderBackup(); 
            else if(currentSub === 'users') renderUsers(); 
            else if(currentSub === 'theme') renderTheme(); 
        } 
    }
    
    document.getElementById('darkModeToggle')?.addEventListener('click', () => { document.body.classList.toggle('dark'); addAuditLog("DARK_MODE", document.body.classList.contains('dark') ? "enabled" : "disabled"); });
    
    // Initial load
    loadAllDataFromFirebase();
    initSampleData();
    ensureDefaultUsers();
</script>
