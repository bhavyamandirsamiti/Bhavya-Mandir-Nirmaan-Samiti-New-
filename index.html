    <script>
    // ============================================================
    // SAFE SCRIPT LOADER - CDN fail होने पर app crash नहीं होगा
    // ============================================================
    window._libsReady = { chartjs: false, xlsx: false, qrcode: false };

    function safeLoadScript(src, key, fallbackSrc, onLoad) {
        var s = document.createElement('script');
        s.src = src;
        s.onload = function() {
            window._libsReady[key] = true;
            if(onLoad) onLoad();
        };
        s.onerror = function() {
            if(fallbackSrc) {
                // Try fallback CDN
                var s2 = document.createElement('script');
                s2.src = fallbackSrc;
                s2.onload = function() { window._libsReady[key] = true; if(onLoad) onLoad(); };
                s2.onerror = function() { window._libsReady[key] = false; if(onLoad) onLoad(); };
                document.head.appendChild(s2);
            } else {
                window._libsReady[key] = false;
                if(onLoad) onLoad();
            }
        };
        document.head.appendChild(s);
    }

    safeLoadScript(
        'https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js',
        'chartjs',
        'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js'
    );
    safeLoadScript(
        'https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js',
        'xlsx',
        'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js'
    );
    safeLoadScript(

        'qrcode',
        'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js'
    );
    </script>

        ]
    };
    const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
    const manifestURL = URL.createObjectURL(manifestBlob);
    const link = document.createElement('link');
    link.rel = 'manifest';
    link.href = manifestURL;
    document.head.appendChild(link);
})();

});

window.installApp = function() {

            document.getElementById('installAppBtn').style.display = 'none';

let logoutTimer;
function resetLogoutTimer() {
    if(logoutTimer) clearTimeout(logoutTimer);

            doLogout();
        }
    }, 30 * 60 * 1000);
}
function trackUserActivity() {
    resetLogoutTimer();
}
['click', 'mousemove', 'keypress', 'scroll', 'touchstart'].forEach(event => {

});

// ==================== REAL QR CODE GENERATOR ====================
function generateSimpleQR(elementId, text) {
    let container = document.getElementById(elementId);
    if(!container) return;
    container.innerHTML = '';
    if(typeof QRCode !== 'undefined') {
        new QRCode(container, { text: text, width: 200, height: 200, colorDark: "#000000", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.M });
    } else {
        let upiText = text.split('pa=')[1]?.split('&')[0] || "UPI";
        container.innerHTML = `<div style="padding:10px;border:2px solid #FF9933;border-radius:8px;text-align:center;"><p style="font-size:12px;color:#666;">UPI: ${upiText}</p><a href="${text}" target="_blank" style="color:#25D366;text-decoration:none;">📱 क्लिक करें UPI ऐप खोलें</a></div>`;
    }
}

function isValidMobile(mobile) {
    if(!mobile) return false;
    let cleaned = String(mobile).replace(/\D/g, '');
    return /^[6-9]\d{9}$/.test(cleaned);
}

// ==================== IMAGE COMPRESSION (15KB-20KB Auto Compress) ====================
function compressImage(file, maxSizeKB, callback) {
    let reader = new FileReader();
    reader.onload = function(e) {
        let img = new Image();
        img.onload = function() {
            let canvas = document.createElement('canvas');
            let MAX_DIM = 600;
            let w = img.width, h = img.height;
            if(w > MAX_DIM || h > MAX_DIM) {
                if(w > h) { h = Math.round(h * MAX_DIM / w); w = MAX_DIM; }
                else { w = Math.round(w * MAX_DIM / h); h = MAX_DIM; }
            }
            canvas.width = w; canvas.height = h;
            let ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            let quality = 0.7;
            let dataUrl = canvas.toDataURL('image/jpeg', quality);
            // Target: 15KB-20KB (20KB = ~27000 chars in base64)
            let targetMax = 20 * 1024 * 1.37; // ~27KB chars
            let targetMin = 15 * 1024 * 1.37; // ~20KB chars
            // Reduce until under 20KB
            while(dataUrl.length > targetMax && quality > 0.1) {
                quality -= 0.05;
                dataUrl = canvas.toDataURL('image/jpeg', quality);
            }
            // If still above maxSizeKB (custom limit), keep reducing
            while(dataUrl.length > maxSizeKB * 1024 * 1.37 && quality > 0.05) {
                quality -= 0.05;
                dataUrl = canvas.toDataURL('image/jpeg', quality);
            }
            callback(dataUrl);
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

// Tier 1: IndexedDB  → बड़ी files (videos, images >50KB, member photos)

const IDB_NAME    = 'mandirMediaDB';
const IDB_VERSION = 1;
const IDB_STORE   = 'mediaFiles';
let   idb         = null; // IndexedDB connection

// --- Open IndexedDB ---
function openIndexedDB(cb) {
    if(idb) { cb(idb); return; }
    try {
        let req = indexedDB.open(IDB_NAME, IDB_VERSION);
        req.onupgradeneeded = function(e) {
            let db = e.target.result;
            if(!db.objectStoreNames.contains(IDB_STORE)) {
                let store = db.createObjectStore(IDB_STORE, { keyPath: 'id' });
                store.createIndex('type', 'type', { unique: false });
                store.createIndex('date', 'date', { unique: false });
            }
        };
        req.onsuccess = function(e) {
            idb = e.target.result;
            console.log('✅ IndexedDB ready');
            cb(idb);
        };
        req.onerror = function(e) {
            console.warn('IndexedDB open error:', e.target.error);
            cb(null);
        };
    } catch(e) { console.warn('IndexedDB not supported:', e); cb(null); }
}

// --- Save to IndexedDB ---
function idbSave(item, cb) {
    openIndexedDB(function(db) {
        if(!db) { if(cb) cb(false); return; }
        try {
            let tx = db.transaction(IDB_STORE, 'readwrite');
            let store = tx.objectStore(IDB_STORE);
            let req = store.put(item);
            req.onsuccess = function() { if(cb) cb(true); };
            req.onerror   = function() { if(cb) cb(false); };
        } catch(e) { if(cb) cb(false); }
    });
}

// --- Get from IndexedDB ---
function idbGet(id, cb) {
    openIndexedDB(function(db) {
        if(!db) { cb(null); return; }
        try {
            let tx = db.transaction(IDB_STORE, 'readonly');
            let req = tx.objectStore(IDB_STORE).get(id);
            req.onsuccess = function() { cb(req.result || null); };
            req.onerror   = function() { cb(null); };
        } catch(e) { cb(null); }
    });
}

// --- Get ALL from IndexedDB ---
function idbGetAll(cb) {
    openIndexedDB(function(db) {
        if(!db) { cb([]); return; }
        try {
            let tx = db.transaction(IDB_STORE, 'readonly');
            let req = tx.objectStore(IDB_STORE).getAll();
            req.onsuccess = function() { cb(req.result || []); };
            req.onerror   = function() { cb([]); };
        } catch(e) { cb([]); }
    });
}

// --- Delete from IndexedDB ---
function idbDelete(id, cb) {
    openIndexedDB(function(db) {
        if(!db) { if(cb) cb(false); return; }
        try {
            let tx = db.transaction(IDB_STORE, 'readwrite');
            let req = tx.objectStore(IDB_STORE).delete(id);
            req.onsuccess = function() { if(cb) cb(true); };
            req.onerror   = function() { if(cb) cb(false); };
        } catch(e) { if(cb) cb(false); }
    });
}

// --- Get IndexedDB size (approx) ---
function idbGetSize(cb) {
    idbGetAll(function(items) {
        let totalBytes = items.reduce(function(sum, item) {
            return sum + (item.data ? item.data.length * 0.75 : 0) +
                         (item.name ? item.name.length : 0) + 100;
        }, 0);
        cb(items.length, (totalBytes / (1024 * 1024)).toFixed(2));
    });
}

// --- Smart 3-tier save for media ---
// Images <50KB → LocalStorage (in appData) + Firebase
// Images ≥50KB → IndexedDB only (thumbnail in appData)
// Videos       → IndexedDB only (no Firebase)
function saveMediaSmart(file, onProgress, onDone) {
    let isImage = file.type.startsWith('image/');
    let isVideo = file.type.startsWith('video/');

    let mediaItem = {
        id: Date.now() + '_' + Math.random().toString(36).substr(2,6),
        name: file.name,
        type: isImage ? 'image' : 'video',
        mimeType: file.type,
        size: file.size,
        date: new Date().toISOString(),
        storage: 'indexeddb', // always default to idb
        data: null,
        thumbnail: null
    };

    if(onProgress) onProgress(10, 'फाइल पढ़ी जा रही है...');

    if(isVideo) {
        // Videos → always IndexedDB
        let reader = new FileReader();
        reader.onload = function(e) {
            mediaItem.data = e.target.result;
            mediaItem.storage = 'indexeddb';
            if(onProgress) onProgress(60, 'IndexedDB में सेव हो रहा है...');
            idbSave(mediaItem, function(ok) {
                if(ok) {
                    // Store only metadata (no data) in appData
                    let meta = Object.assign({}, mediaItem);
                    meta.data = null; // don't store binary in appData
                    appData.mediaFiles.push(meta);
                    saveToLocalStorage();
                    if(onProgress) onProgress(100, '✅ Video IndexedDB में सेव हुआ!');
                    if(onDone) onDone(mediaItem, true);
                } else {
                    if(onProgress) onProgress(100, '⚠️ IndexedDB error');
                    if(onDone) onDone(null, false);
                }
            });
        };
        reader.readAsDataURL(file);

    } else if(isImage) {
        // Images → compress first, then decide tier
        compressImage(file, 200, function(dataUrl) {
            let sizeKB = (dataUrl.length * 0.75) / 1024;
            if(onProgress) onProgress(40, `Compressed: ${sizeKB.toFixed(0)}KB`);

            mediaItem.data = dataUrl;

            if(sizeKB < 50) {
                // Small image → LocalStorage + Firebase
                mediaItem.storage = 'localstorage';
                appData.mediaFiles.push(mediaItem);
                saveToLocalStorage(); // includes Firebase sync
                if(onProgress) onProgress(100, `✅ Image LocalStorage+Firebase में (${sizeKB.toFixed(0)}KB)`);
                if(onDone) onDone(mediaItem, true);
            } else {
                // Large image → IndexedDB + thumbnail in appData
                mediaItem.storage = 'indexeddb';
                // Generate tiny thumbnail for grid preview
                _makeThumbnail(dataUrl, 120, function(thumb) {
                    mediaItem.thumbnail = thumb;
                    if(onProgress) onProgress(70, 'IndexedDB में सेव हो रहा है...');
                    idbSave(mediaItem, function(ok) {
                        // Store meta+thumbnail in appData (no full data)
                        let meta = Object.assign({}, mediaItem);
                        meta.data = null;
                        appData.mediaFiles.push(meta);
                        saveToLocalStorage();
                        if(onProgress) onProgress(100, `✅ Image IndexedDB में (${sizeKB.toFixed(0)}KB)`);
                        if(onDone) onDone(mediaItem, ok);
                    });
                });
            }
        });
    }
}

// Generate thumbnail from dataUrl
function _makeThumbnail(dataUrl, size, cb) {
    try {
        let img = new Image();
        img.onload = function() {
            let canvas = document.createElement('canvas');
            canvas.width = size; canvas.height = size;
            let ctx = canvas.getContext('2d');
            let s = Math.min(img.width, img.height);
            let ox = (img.width - s) / 2, oy = (img.height - s) / 2;
            ctx.drawImage(img, ox, oy, s, s, 0, 0, size, size);
            cb(canvas.toDataURL('image/jpeg', 0.6));
        };
        img.onerror = function() { cb(dataUrl); };
        img.src = dataUrl;
    } catch(e) { cb(dataUrl); }
}

// Load media for display (from correct tier)
function loadMediaForDisplay(meta, cb) {
    if(meta.storage === 'indexeddb') {
        idbGet(meta.id, function(item) {
            if(item && item.data) { cb(item.data); }
            else if(meta.thumbnail) { cb(meta.thumbnail); }
            else { cb(null); }
        });
    } else {
        // localstorage: data already in meta
        cb(meta.data || null);
    }
}

function initApprovalRequests() {
    if(!appData.approvalRequests) appData.approvalRequests = [];
}

function submitApprovalRequest(requestData, targetRole) {
    initApprovalRequests();
    let req = {
        id: Date.now(),
        requestedBy: currentUser.name,
        requestedByEmail: currentUser.email,
        requestedByRole: currentUser.role,
        targetRole: targetRole, // 'super_admin' or 'admin'
        type: requestData.type,
        itemId: requestData.itemId,
        itemType: requestData.itemType,
        currentData: requestData.currentData,
        newData: requestData.newData,
        reason: requestData.reason,
        timestamp: new Date().toISOString(),
        status: 'pending',
        resolvedBy: null,
        resolvedAt: null,
        rejectReason: ''
    };
    appData.approvalRequests.push(req);
    saveToLocalStorage();
    addAuditLog('APPROVAL_REQUEST_SUBMITTED', `${req.type} - ${req.reason}`);
    showToast('✅ Edit Request भेजा गया! ' + (targetRole === 'super_admin' ? 'Super Admin' : 'Admin') + ' की approval का इंतजार करें।');
    return req;
}

function getPendingApprovalRequests() {
    initApprovalRequests();
    if(isSuperAdmin()) return appData.approvalRequests.filter(r => r.status === 'pending');
    if(isAdmin()) return appData.approvalRequests.filter(r => r.status === 'pending' && r.targetRole === 'admin');
    return [];
}

function approveRequest(reqId) {
    initApprovalRequests();
    let req = appData.approvalRequests.find(r => r.id === reqId);
    if(!req) { showToast('❌ Request नहीं मिला', true); return; }
    if(req.targetRole === 'super_admin' && !isSuperAdmin()) { showToast('❌ सिर्फ Super Admin approve कर सकते हैं', true); return; }
    if(req.targetRole === 'admin' && !isAdmin() && !isSuperAdmin()) { showToast('❌ Admin या Super Admin ही approve कर सकते हैं', true); return; }
    
    req.status = 'approved';
    req.resolvedBy = currentUser.name;
    req.resolvedAt = new Date().toISOString();
    
    // Apply the change
    applyApprovedChange(req);
    saveToLocalStorage();
    addAuditLog('APPROVAL_REQUEST_APPROVED', `${req.type} by ${req.requestedBy} - approved by ${currentUser.name}`);
    showToast('✅ Request Approve हो गया और बदलाव लागू हो गया!');
    renderApprovalRequests();
}

function rejectApprovalRequest(reqId) {
    initApprovalRequests();
    let req = appData.approvalRequests.find(r => r.id === reqId);
    if(!req) return;
    let reason = prompt('Reject करने का कारण लिखें:');
    if(!reason) { showToast('⚠️ कारण जरूरी है', true); return; }
    req.status = 'rejected';
    req.resolvedBy = currentUser.name;
    req.resolvedAt = new Date().toISOString();
    req.rejectReason = reason;
    saveToLocalStorage();
    addAuditLog('APPROVAL_REQUEST_REJECTED', `${req.type} by ${req.requestedBy} - rejected: ${reason}`);
    showToast('❌ Request Reject कर दी गई');
    renderApprovalRequests();
}

function applyApprovedChange(req) {
    try {
        let newData = typeof req.newData === 'string' ? JSON.parse(req.newData) : req.newData;
        if(req.itemType === 'donation') {
            let d = appData.donations.find(x => x.id == req.itemId);
            if(d) { Object.assign(d, newData); addEditHistory(d, 'दान (Approved)', JSON.parse(req.currentData||'{}'), newData, req.reason); }
        } else if(req.itemType === 'otherDonation') {
            let od = appData.otherDonations.find(x => x.id == req.itemId);
            if(od) { Object.assign(od, newData); addEditHistory(od, 'दान (Approved)', JSON.parse(req.currentData||'{}'), newData, req.reason); }
        } else if(req.itemType === 'member') {
            let m = appData.members.find(x => x.id == req.itemId);
            if(m) { Object.assign(m, newData); addEditHistory(m, 'सदस्य (Approved)', JSON.parse(req.currentData||'{}'), newData, req.reason); computeAllPending(); }
        } else if(req.itemType === 'receipt_delete') {
            appData.receipts = appData.receipts.filter(r => r.id != req.itemId);
        }
    } catch(e) { console.error('applyApprovedChange error:', e); }
}

// ==================== EFFECTIVE DATE CALCULATION ====================
function getAmountForMonth(member, year, month) {
    if(!member.monthlyAmountHistory || member.monthlyAmountHistory.length === 0) {
        return member.monthlyAmount;
    }
    let currentDate = new Date(year, month, 1);
    let sortedHistory = [...member.monthlyAmountHistory].sort((a,b) => new Date(a.effectiveDate) - new Date(b.effectiveDate));
    let applicableAmount = sortedHistory[0].amount;
    for(let i = sortedHistory.length - 1; i >= 0; i--) {
        let effectiveDate = new Date(sortedHistory[i].effectiveDate);
        if(currentDate >= effectiveDate) {
            applicableAmount = sortedHistory[i].amount;
            break;
        }
    }
    return applicableAmount;
}

// ==================== DONATION PAUSE/RESUME FUNCTIONS ====================
function isMonthInPausedPeriod(member, year, month) {
    if(!member.donationPauseHistory || member.donationPauseHistory.length === 0) return false;
    let date = new Date(year, month, 1);
    for(let period of member.donationPauseHistory) {
        let pauseStart = new Date(period.pausedFrom);
        if(period.resumedFrom) { let resumeDate = new Date(period.resumedFrom); if(date >= pauseStart && date < resumeDate) return true; }
        else { if(date >= pauseStart) return true; }
    }
    return false;
}

// ==================== YOY GROWTH ====================
function calculateYoYGrowth() {
    let thisYear = new Date().getFullYear();
    let thisMonth = new Date().getMonth();
    let thisYearCollection = appData.donations.filter(d => new Date(d.date).getFullYear() === thisYear && new Date(d.date).getMonth() === thisMonth).reduce((s,d) => s+d.amount, 0);
    let lastYearCollection = appData.donations.filter(d => new Date(d.date).getFullYear() === thisYear-1 && new Date(d.date).getMonth() === thisMonth).reduce((s,d) => s+d.amount, 0);
    let growth = lastYearCollection ? ((thisYearCollection - lastYearCollection) / lastYearCollection * 100).toFixed(1) : 0;
    let icon = growth >= 0 ? '📈' : '📉';
    let color = growth >= 0 ? '#28a745' : '#dc3545';
    return { growth, icon, color, thisYearCollection, lastYearCollection };
}

// ==================== ✅ FIXED v2: CENTRALIZED LEDGER PENDING CALCULATION ====================
function isMonthPaid(member, year, monthIndex, isCommittee = false) {
    if(isCommittee) {
        return (member.donations || []).some(d => d.year === year && d.monthIndex === monthIndex);
    } else {
        return appData.donations.some(d => 
            d.memberId === member.id && 
            d.type === 'monthly' && 
            d.year === year && 
            d.monthIndex === monthIndex
        );
    }
}

function computeAutoPendingForMember(member, isCommittee = false) {
    let current = getCurrentYearMonth();
    let joinDate = new Date(member.joinDate);
    let startYear = joinDate.getFullYear();
    let startMonth = joinDate.getMonth();
    
    // Step 1: Calculate total due for unpaid, non-paused months only
    let totalDue = 0;
    for(let y = startYear; y <= current.year; y++) {
        let sm = (y === startYear) ? startMonth : 0;
        let em = (y === current.year) ? current.month : 11;
        for(let m = sm; m <= em; m++) {
            if(isMonthInPausedPeriod(member, y, m)) continue;
            if(!isMonthPaid(member, y, m, isCommittee)) {
                totalDue += getAmountForMonth(member, y, m);
            }
        }
    }
    
    // Step 2: Get advance balance
    let totalAdvance = isCommittee 
        ? (member.advanceDonations || []).reduce((s,d) => s + d.amount, 0) 
        : appData.donations.filter(d => d.memberId === member.id && d.type === 'advance').reduce((s,d) => s + d.amount, 0);
    
    // Step 3: Apply advance to reduce pending
    let pending = Math.max(0, totalDue - totalAdvance);
    let advanceBalance = Math.max(0, totalAdvance - totalDue);
    
    member.pending = pending;
    member.advanceBalance = advanceBalance;
    return { pending: member.pending, advanceBalance: member.advanceBalance };
}

function computeAllPending() {
    for(let m of appData.members) if(m.status === 'active' && !m.hidden) computeAutoPendingForMember(m, false);
    for(let cm of appData.committeeMembers) if(cm.status === 'active') computeAutoPendingForMember(cm, true);
    saveToLocalStorage();
}

function _getLocalStorageSizeKB() {
    try {
        var data = localStorage.getItem(STORAGE_KEY) || '';
        return (new Blob([data]).size / 1024).toFixed(1);
    } catch(e) { return '?'; }
}

    var panel = document.getElementById('storagePanelContainer');
    if(panel) {
        var lsSize = _getLocalStorageSizeKB();

    idbGetSize(function(count, mb) {
        var el = document.getElementById('idbDashInfo');
        if(el) el.innerHTML = count + ' files / ' + mb + ' MB';

function formatReminderMessage(member, pendingAmount, yearWiseDetails, isCommittee = false) {
    let msg = `🚩 *जय श्री राम* 🚩\n\nआदरणीय *${member.name} जी*,\nभव्य मंदिर निर्माण समिति आपके निरंतर सहयोग हेतु हृदय से आभारी है। *आप पर और आपके परिवार पर हनुमान जी की कृपा और आशीर्वाद हमेशा बना रहे।* \n\nआपका मासिक विवरण इस प्रकार है:\n\n`;
    for(let item of yearWiseDetails) { 
        let status = item.isPaid ? "✅" : (item.isPaused ? "⏸️ बंद" : "⭕"); 
        msg += `🗓️ ${item.monthName} ${item.year}: ${status} ₹${item.amount} (${item.isPaid ? "जमा" : (item.isPaused ? "दान बंद" : "देय है")})\n`; 
    }
    let totalReceived = yearWiseDetails.filter(i => i.isPaid).reduce((s,i) => s + i.amount, 0);
    msg += `--------------------------------\n💰 *कुल प्राप्त सहयोग (कुल): ₹${totalReceived}*\n⚠️ *कुल शेष बकाया: ₹${pendingAmount}*\n💸 *UPI ID: ${appData.settings.upiId}*\n--------------------------------\n🙏 *करबद्ध निवेदन:* धर्म की इस पावन ज्योति को प्रज्वलित रखने हेतु अपनी शेष राशि *₹${pendingAmount}* जमा कर समिति को अनुग्रहित करें।\n\nभवदीय,\n${appData.settings.president} (अध्यक्ष)\n${appData.settings.secretary} (सचिव)`;
    return msg;
}

function getYearlyDetailsForMember(member, isCommittee = false) {
    let current = getCurrentYearMonth();
    let joinDate = new Date(member.joinDate);
    let months = ['जनवरी','फरवरी','मार्च','अप्रैल','मई','जून','जुलाई','अगस्त','सितम्बर','अक्टूबर','नवम्बर','दिसम्बर'];
    let details = [];
    for(let y = joinDate.getFullYear(); y <= current.year; y++) {
        for(let m = 0; m <= 11; m++) {
            let date = new Date(y, m, 1);
            if(date < new Date(joinDate.getFullYear(), joinDate.getMonth(), 1)) continue;
            if(y === current.year && m > current.month) continue;
            let monthlyAmountForThisMonth = getAmountForMonth(member, y, m);
            let isPaused = isMonthInPausedPeriod(member, y, m);
            let isPaid = isPaused ? false : isMonthPaid(member, y, m, isCommittee);
            details.push({ monthName: months[m], year: y, amount: monthlyAmountForThisMonth, isPaid: isPaid, isPaused: isPaused });
        }
    }
    return details;
}

function sendReminderMsg(id, isCommittee = false) {
    let member = isCommittee ? appData.committeeMembers.find(x=>x.id===id) : appData.members.find(x=>x.id===id);
    if(!member || !member.mobile) { showToast("मोबाइल नंबर नहीं है", true); return; }
    let details = getYearlyDetailsForMember(member, isCommittee);
    let msg = formatReminderMessage(member, member.pending, details, isCommittee);
    // Add penalty info
    let memberPenalties = (appData.penalties||[]).filter(p => p.memberId === member.id && p.status === 'unpaid');
    let totalPenalty = memberPenalties.reduce((s,p)=>s+p.amount,0);
    if(totalPenalty > 0) {
        msg += `\n\n⚖️ *जुर्माना बकाया: ₹${totalPenalty}*\nकारण: ${memberPenalties.map(p=>p.reason).join(', ')}`;
    }
    // Add UPI QR link
    let upiUrl = `upi://pay?pa=${appData.settings.upiId}&pn=${encodeURIComponent(member.name)}&am=${(member.pending||0)+totalPenalty}&cu=INR`;
    msg += `\n\n💸 *UPI ID: ${appData.settings.upiId}*\n📱 <क्लिक करें UPI ऐप खोलें: ${upiUrl}>`;
    window.open(`https://wa.me/91${member.mobile}?text=${encodeURIComponent(msg)}`, '_blank');
    showToast(`📱 रिमाइंडर भेजा`);
    addAuditLog("REMINDER_SENT", `${member.name} को रिमाइंडर`);
}

let _filterDebounceTimer = null;
function debounceFilterMembers() {
    if(_filterDebounceTimer) clearTimeout(_filterDebounceTimer);
    _filterDebounceTimer = setTimeout(() => filterMembers(), 500);
}

function toggleDropdown(event, id) {
    event.stopPropagation();
    document.querySelectorAll('.action-dropdown-content').forEach(drop => {
        if(drop.id !== `dropdown-${id}`) drop.classList.remove('show-dropdown');
    });
    let dropdown = document.getElementById(`dropdown-${id}`);
    dropdown.classList.toggle('show-dropdown');
    setTimeout(() => {
        document.addEventListener('click', function closeDropdown(e) {
            if(!dropdown.contains(e.target) && !e.target.closest('.action-dropdown-btn')) {
                dropdown.classList.remove('show-dropdown');
                document.removeEventListener('click', closeDropdown);
            }
        });
    }, 100);
}

async function confirmBulkDelete() { if(selectedMembersForDelete.length === 0) return; if(!await twoUserDeleteConfirm(`${selectedMembersForDelete.length} सदस्य हटाना`)) return; let deleted = appData.members.filter(m => selectedMembersForDelete.includes(m.id)); let delCount = deleted.length; for(let m of deleted) { appData.deletedMembers.push({ ...m, deletedAt: new Date().toISOString(), deletedBy: currentUser.name }); } appData.members = appData.members.filter(m => !selectedMembersForDelete.includes(m.id)); saveToLocalStorage(); showToast(`✅ ${delCount} सदस्य हटाए`); selectedMembersForDelete = []; filterMembers(); addAuditLog("BULK_DELETE", `${delCount} सदस्य हटाए`); refreshDashboardCharts(); }

// ==================== TWO-USER DELETE CONFIRMATION ====================
function twoUserDeleteConfirm(action) {
    return new Promise(resolve => {
        let html = `<div class="modal"><div class="modal-content"><h3 style="color:#dc3545">🔐 डिलीट कन्फर्मेशन: ${action}</h3>
        <p style="color:#666;margin-bottom:15px;">इस क्रिया को पूर्ण करने के लिए <strong>दो अधिकृत यूज़र</strong> को अनुमोदन देना होगा।</p>
        <div style="background:#fff3cd;padding:12px;border-radius:8px;margin-bottom:15px;">
        <p><strong>पहली पुष्टि (आप):</strong></p>
        <input type="password" id="twoDelPwd1" placeholder="आपका पासवर्ड" class="form-control">
        </div>
        <div style="background:#f8d7da;padding:12px;border-radius:8px;margin-bottom:15px;">
        <p><strong>दूसरी पुष्टि (दूसरा अधिकृत यूज़र):</strong></p>
        <select id="twoDelUser2" class="form-control">
        <option value="">-- दूसरा यूज़र चुनें --</option>
        ${appData.users.filter(u => u.email !== currentUser?.email && (u.role === 'super_admin' || u.role === 'admin')).map(u => `<option value="${u.email}">${u.name} (${u.role})</option>`).join('')}
        </select>
        <input type="password" id="twoDelPwd2" placeholder="दूसरे यूज़र का पासवर्ड" class="form-control" style="margin-top:8px;">
        </div>
        <p style="font-size:12px;color:#888;">🔒 यह कार्यवाही ऑडिट लॉग में दर्ज होगी</p>
        <div class="flex-between" style="margin-top:15px;">
        <button class="btn btn-danger" onclick="window._twoDelResolve(true)">✅ दोनों पुष्टि करें</button>
        <button class="btn btn-secondary" onclick="window._twoDelResolve(false)">❌ रद्द</button>
        </div></div></div>`;
        document.body.insertAdjacentHTML('beforeend', html);
        window._twoDelResolve = (confirmed) => {
            if(confirmed) {
                let pwd1 = document.getElementById('twoDelPwd1')?.value;
                let user2Email = document.getElementById('twoDelUser2')?.value;
                let pwd2 = document.getElementById('twoDelPwd2')?.value;
                let user1Valid = appData.users.find(u => u.email === currentUser?.email && u.password === pwd1);
                let user2 = appData.users.find(u => u.email === user2Email && u.password === pwd2);
                closeModal();
                if(!user1Valid){ showToast("⚠️ पहला पासवर्ड गलत", true); resolve(false); return; }
                if(!user2){ showToast("⚠️ दूसरा पासवर्ड गलत या यूज़र नहीं मिला", true); resolve(false); return; }
                addAuditLog("TWO_USER_DELETE", `${action} - अनुमोदन: ${currentUser.name} + ${user2.name}`);
                resolve(true);
            } else { closeModal(); resolve(false); }
        };
    });
}

function saveMemberEdit(id) { 
    let m = appData.members.find(x=>x.id===id); 
    let reason = document.getElementById('editReason').value; 
    if(!reason){ showToast("⚠️ कारण लिखें", true); return; }
    let newMobile = document.getElementById('editMobile').value;
    if(newMobile && !isValidMobile(newMobile)){ showToast("⚠️ मोबाइल नंबर 10 अंकों का होना चाहिए (6-9 से शुरू)", true); return; }
    let oldData = { name: m.name, mobile: m.mobile, village: m.village, father: m.father, monthlyAmount: m.monthlyAmount, joinDate: m.joinDate, photo: m.photo }; 
    m.name = document.getElementById('editName').value; 
    m.mobile = document.getElementById('editMobile').value; 
    m.village = document.getElementById('editVillage').value; 
    m.father = document.getElementById('editFather').value; 
    let newJoinDate = document.getElementById('editJoinDate').value; 
    if(newJoinDate) m.joinDate = newJoinDate; 
    let newAmt = parseFloat(document.getElementById('editAmount').value); 
    let effDate = document.getElementById('editEffDate').value; 
    if(!isNaN(newAmt) && newAmt>0 && newAmt !== m.monthlyAmount){ 
        if(!m.monthlyAmountHistory) m.monthlyAmountHistory = []; 
        m.monthlyAmountHistory.push({ amount: newAmt, effectiveDate: effDate, changedBy: currentUser.name, reason: reason, changedAt: new Date().toISOString() }); 
        m.monthlyAmountHistory.sort((a,b) => new Date(a.effectiveDate) - new Date(b.effectiveDate));
        m.monthlyAmount = newAmt; 
        addAuditLog("AMOUNT_CHANGED", `${m.name}: ₹${newAmt} from ${effDate} - ${reason}`);
    } 
    let photoFile = document.getElementById('editPhoto').files[0]; 
    let saveUpdate = (photoUrl) => { 
        if(photoUrl) m.photo = photoUrl; 
        let newData = { name: m.name, mobile: m.mobile, village: m.village, father: m.father, monthlyAmount: m.monthlyAmount, joinDate: m.joinDate, photo: m.photo }; 
        addEditHistory(m, 'सदस्य', oldData, newData, reason); 
        computeAllPending(); 
        saveToLocalStorage(); 
        closeModal(); 
        showToast("✅ सदस्य अपडेट हो गया"); 
        renderMemberList(); 
        refreshDashboardCharts(); 
    }; 
    if(photoFile) { let r = new FileReader(); r.onload = e => saveUpdate(e.target.result); r.readAsDataURL(photoFile); } 
    else { saveUpdate(null); } 
}

// ==================== PAYMENT MODAL (ONLY UNPAID MONTHS) ====================
function openPaymentModal(memberId, isCommittee) { 
    if(!canAddDonation()){ showToast("⚠️ आप भुगतान नहीं जोड़ सकते",true); return; } 
    let member = isCommittee ? appData.committeeMembers.find(x=>x.id===memberId) : appData.members.find(x=>x.id===memberId); 
    if(!member) return; 
    let current = getCurrentYearMonth();
    let joinDate = new Date(member.joinDate);
    let pendingMonths = [];
    for(let y = joinDate.getFullYear(); y <= current.year; y++) {
        let sm = (y === joinDate.getFullYear()) ? joinDate.getMonth() : 0;
        let em = (y === current.year) ? current.month : 11;
        for(let mo = sm; mo <= em; mo++) {
            let isPaused = isMonthInPausedPeriod(member, y, mo);
            if(isPaused) continue;
            // ✅ Use centralized isMonthPaid
            if(!isMonthPaid(member, y, mo, isCommittee)) {
                let monthlyAmountForThisMonth = getAmountForMonth(member, y, mo);
                pendingMonths.push({ year: y, monthIndex: mo, monthName: ['जनवरी','फरवरी','मार्च','अप्रैल','मई','जून','जुलाई','अगस्त','सितम्बर','अक्टूबर','नवम्बर','दिसम्बर'][mo], amount: monthlyAmountForThisMonth });
            }
        }
    }
    if(pendingMonths.length===0){ showToast("✅ कोई बकाया नहीं"); return; }
    let html = `<div class="modal"><div class="modal-content" style="max-width:700px"><h3>💰 भुगतान - ${member.name}</h3><div class="balance-card" style="margin-bottom:15px;padding:10px;background:#e8f5e9;border-radius:12px"><strong>⭐ एडवांस शेष:</strong> ₹${member.advanceBalance}<br><small>पहले एडवांस उपयोग होगा, फिर नया भुगतान</small></div><button class="select-all-btn" onclick="toggleSelectAllMonths()">✅ सभी चुनें / हटाएं</button><div id="multiYearChecklist" class="checklist"></div><div class="flex-between"><select id="payMode" class="form-control" style="width:120px"><option>कैश</option><option>UPI</option></select></div><div id="totalAmountDisplay" class="total-display"></div><div class="flex-between"><button class="btn btn-primary" onclick="processPayment(${memberId}, ${isCommittee})">✅ भुगतान करें</button><button class="btn btn-secondary" onclick="closeModal()">रद्द</button></div></div></div>`; 
    document.body.insertAdjacentHTML('beforeend', html); 
    let container = document.getElementById('multiYearChecklist'); 
    let groups = {};
    for(let mon of pendingMonths) { if(!groups[mon.year]) groups[mon.year] = []; groups[mon.year].push(mon); }
    let years = Object.keys(groups).sort();
    let html2 = '';
    for(let y of years) {
        html2 += `<div class="year-group"><div class="year-header" onclick="toggleYear('${y}')"><div><input type="checkbox" class="yearCheckbox" data-year="${y}" onchange="selectYear('${y}', this.checked)"> <strong>📅 ${y}</strong> (${groups[y].length} महीने)</div><i class="fas fa-chevron-down"></i></div><div class="year-months" id="yearMonths_${y}" style="display:block;">`;
        for(let mon of groups[y]) { 
            let amountChanged = getAmountForMonth(member, mon.year, mon.monthIndex) !== member.monthlyAmount;
            html2 += `<div class="month-item"><input type="checkbox" class="monthCb" data-year="${mon.year}" data-month="${mon.monthIndex}" data-name="${mon.monthName}" data-amount="${mon.amount}"> <label>${mon.monthName} ${mon.year} - ₹${mon.amount}${amountChanged ? ' <span class="amount-history-badge">(बदली हुई राशि)</span>' : ''}</label></div>`; 
        }
        html2 += `</div></div>`;
    }
    container.innerHTML = html2;
    document.querySelectorAll('.monthCb').forEach(cb => cb.addEventListener('change', updateTotal));
    document.querySelectorAll('.yearCheckbox').forEach(cb => cb.addEventListener('change', function(e) { let year = this.dataset.year; document.querySelectorAll(`.monthCb[data-year="${year}"]`).forEach(c => c.checked = this.checked); updateTotal(); }));
    updateTotal();
    window.toggleYear = function(year) { let div = document.getElementById(`yearMonths_${year}`); if(div) div.style.display = div.style.display === 'none' ? 'block' : 'none'; };
    window.selectYear = function(year, checked) { document.querySelectorAll(`.monthCb[data-year="${year}"]`).forEach(cb => cb.checked = checked); updateTotal(); };
    window.toggleSelectAllMonths = function() { let allCb = document.querySelectorAll('.monthCb'); let anyChecked = Array.from(allCb).some(cb => cb.checked); allCb.forEach(cb => cb.checked = !anyChecked); updateTotal(); };
    function updateTotal() { let total = 0; document.querySelectorAll('.monthCb:checked').forEach(cb => { total += parseFloat(cb.dataset.amount); }); document.getElementById('totalAmountDisplay').innerHTML = `💰 कुल राशि: ₹${total}`; }
}

function processPayment(id, isCommittee) { 
    let member = isCommittee ? appData.committeeMembers.find(x=>x.id===id) : appData.members.find(x=>x.id===id); 
    let selected = Array.from(document.querySelectorAll('.monthCb:checked')).map(cb=>({ 
        year: parseInt(cb.dataset.year), 
        monthIndex: parseInt(cb.dataset.month),  // ✅ FIX: was cb.dataset.monthIndex, correct is data-month
        monthName: cb.dataset.name, 
        amount: parseFloat(cb.dataset.amount) 
    })); 
    if(selected.length===0){ showToast("⚠️ महीना चुनें", true); return; } 
    let mode = document.getElementById('payMode').value; 
    let remainingAdvance = member.advanceBalance; 
    let totalNewPayment = 0; 
    let paidList = []; 
    for(let s of selected) { 
        if(remainingAdvance > 0) { 
            if(remainingAdvance >= s.amount) { 
                remainingAdvance -= s.amount; 
                paidList.push({ month: s.monthName, year: s.year, amount: s.amount, paidFrom: "advance" }); 
            } else { 
                let fromNew = s.amount - remainingAdvance; 
                remainingAdvance = 0; 
                totalNewPayment += fromNew; 
                if(isCommittee) { 
                    if(!member.donations) member.donations = []; 
                    member.donations.push({ id: Date.now(), year: s.year, monthIndex: s.monthIndex, month: s.monthName, amount: fromNew, date: new Date().toISOString().slice(0,10), mode: mode }); 
                } else { 
                    appData.donations.push({ id: Date.now(), memberId: member.id, memberName: member.name, type: "monthly", month: s.monthName, monthIndex: s.monthIndex, year: s.year, amount: fromNew, date: new Date().toISOString().slice(0,10), mode: mode }); 
                } 
                paidList.push({ month: s.monthName, year: s.year, amount: s.amount, fromNew: fromNew }); 
            } 
        } else { 
            totalNewPayment += s.amount; 
            if(isCommittee) { 
                if(!member.donations) member.donations = []; 
                member.donations.push({ id: Date.now(), year: s.year, monthIndex: s.monthIndex, month: s.monthName, amount: s.amount, date: new Date().toISOString().slice(0,10), mode: mode }); 
            } else { 
                appData.donations.push({ id: Date.now(), memberId: member.id, memberName: member.name, type: "monthly", month: s.monthName, monthIndex: s.monthIndex, year: s.year, amount: s.amount, date: new Date().toISOString().slice(0,10), mode: mode }); 
            } 
            paidList.push({ month: s.monthName, year: s.year, amount: s.amount }); 
        } 
    } 
    if(remainingAdvance !== member.advanceBalance) { 
        if(isCommittee) { 
            let advanceDonations = member.advanceDonations || []; 
            let usedAdvance = member.advanceBalance - remainingAdvance; 
            let toReduce = usedAdvance; 
            for(let adv of advanceDonations) { 
                if(toReduce <= 0) break; 
                if(adv.amount <= toReduce) { toReduce -= adv.amount; adv.amount = 0; } 
                else { adv.amount -= toReduce; toReduce = 0; } 
            } 
            member.advanceDonations = advanceDonations.filter(adv => adv.amount > 0); 
        } else { 
            let advanceDonations = appData.donations.filter(d => d.memberId === member.id && d.type === 'advance').sort((a,b)=>new Date(a.date)-new Date(b.date)); 
            let usedAdvance = member.advanceBalance - remainingAdvance; 
            let toReduce = usedAdvance; 
            for(let adv of advanceDonations) { 
                if(toReduce <= 0) break; 
                if(adv.amount <= toReduce) { toReduce -= adv.amount; adv.amount = 0; } 
                else { adv.amount -= toReduce; toReduce = 0; } 
            } 
            appData.donations = appData.donations.filter(d => !(d.type==='advance' && d.amount===0)); 
        } 
    } 
    computeAllPending(); 
    saveToLocalStorage(); 
    closeModal(); 
    if(totalNewPayment > 0) generateReceipt(member, paidList.filter(p=>p.fromNew !== undefined || !p.paidFrom), totalNewPayment, mode, "मासिक भुगतान", isCommittee); 
    else showToast(`✅ सभी चयनित महीने एडवांस से कवर हो गए!`); 
    if(isCommittee) renderCommitteeMembers(); 
    else renderMemberList(); 
    refreshDashboardCharts(); 
}

function processAdvance(id, isCommittee) { let member = isCommittee ? appData.committeeMembers.find(x=>x.id===id) : appData.members.find(x=>x.id===id); let amt = parseFloat(document.getElementById('advAmt').value); let mode = document.getElementById('advMode').value; let reason = document.getElementById('advReason')?.value || "एडवांस जमा"; if(isNaN(amt) || amt<=0){ showToast("⚠️ सही राशि", true); return; } if(isCommittee) { if(!member.advanceDonations) member.advanceDonations = []; member.advanceDonations.push({ id: Date.now(), amount: amt, date: new Date().toISOString().slice(0,10), mode: mode, reason: reason }); } else { appData.donations.push({ id: Date.now(), memberId: member.id, memberName: member.name, type: "advance", amount: amt, date: new Date().toISOString().slice(0,10), mode: mode, reason: reason }); } computeAllPending(); saveToLocalStorage(); closeModal(); generateReceipt(member, null, amt, mode, "⭐ एडवांस जमा", isCommittee); if(isCommittee) renderCommitteeMembers(); else renderMemberList(); refreshDashboardCharts(); }

// ==================== RECEIPT FUNCTIONS ====================
function generateReceipt(member, paidList, total, mode, purpose, isCommittee = false, penaltyPaid = 0) { let receiptNo = `आरआईएस-${String(appData.nextReceiptCounter++).padStart(5,'0')}`; let logo = appData.settings.logo || "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23FF9933' width='100' height='100'/%3E%3Ctext x='50' y='70' font-size='60' text-anchor='middle' fill='white'%3E🚩%3C/text%3E%3C/svg%3E"; let memberPhotoHtml = member.photo ? `<img src="${member.photo}" style="width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid #FF9933;" />` : ''; let monthsHtml = paidList && paidList.length>0 ? paidList.map(p=>`<li>${p.month} ${p.year} - ₹${p.amount}</li>`).join('') : '<li>⭐ एडवांस जमा</li>'; let penaltyHtml = penaltyPaid > 0 ? `<p><strong>⚖️ जुर्माना जमा:</strong> <span style="color:#dc3545;font-weight:bold">₹${penaltyPaid}</span></p>` : ''; let upiUrl = `upi://pay?pa=${appData.settings.upiId}&pn=${encodeURIComponent(member.name)}&am=${member.pending||0}&cu=INR`; let win = window.open('', '_blank'); win.document.write(`<!DOCTYPE html><html><head><title>रसीद ${receiptNo}</title><script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"><\/script><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',Arial;padding:20px;background:#f0f0f0}.receipt{max-width:750px;margin:auto;background:white;border:2px solid #FF9933;border-radius:15px;padding:25px}.header{text-align:center;border-bottom:2px solid #FF9933;padding-bottom:15px;margin-bottom:15px;display:flex;align-items:center;justify-content:center;gap:15px;flex-wrap:wrap}.logo-img{width:60px;height:60px;border-radius:50%}.amount{color:#28a745;font-size:22px;font-weight:bold}.signature{margin-top:25px;display:flex;justify-content:space-between;border-top:1px dashed #ddd;padding-top:15px}.footer{text-align:center;margin-top:20px;font-size:12px;color:#666}@media print{body{padding:0;background:white}.receipt{border:none;padding:0}button{display:none}}</style></head><body><div class="receipt"><div class="header"><img src="${logo}" class="logo-img">${memberPhotoHtml}<div><h2>${appData.settings.committeeName}</h2><p>${appData.settings.committeeSubtitle}</p><h3>दान रसीद</h3><strong>${receiptNo}</strong><p>${new Date().toLocaleDateString('hi-IN')}</p></div></div><table class="details-table"><tr><td style="width:40%"><strong>सदस्य नाम:</strong><\/td><td>${member.name}<\/td><\/tr><tr><td style="width:40%"><strong>पिता/पद:</strong><\/td><td>${member.father || member.post || ''}<\/td><\/tr><tr><td style="width:40%"><strong>मोबाइल:</strong><\/td><td>${member.mobile}<\/td><\/tr><\/table><div><strong>${purpose}:</strong><ul>${monthsHtml}</ul></div><p><strong>राशि:</strong> <span class="amount">₹${total}</span></p><p><strong>मोड:</strong> ${mode}</p>${penaltyHtml}<p><strong>शेष बकाया:</strong> ₹${member.pending}</p><p><strong>एडवांस शेष:</strong> ₹${member.advanceBalance}</p><p><strong>UPI ID:</strong> ${appData.settings.upiId}</p><div id="qrDiv" style="text-align:center;margin:15px 0;"></div><div class="signature"><div>......................<br>${appData.settings.president}<br>(अध्यक्ष)</div><div>......................<br>${appData.settings.secretary}<br>(सचिव)</div></div><div class="footer"><p>🙏 जय श्री राम 🙏</p></div><div style="text-align:center;margin-top:20px"><button onclick="window.print();setTimeout(()=>window.close(),500);" style="background:#FF9933;padding:10px 20px;border:none;border-radius:8px">🖨️ प्रिंट करें</button> <button onclick="window.close()">बंद</button></div></div><scr"+"ipt>setTimeout(() => { if(typeof QRCode !== 'undefined') new QRCode(document.getElementById("qrDiv"),{text:"${upiUrl}",width:160,height:160}); else document.getElementById("qrDiv").innerHTML = '<a href="${upiUrl}" target="_blank" style="color:#25D366">📱 क्लिक करें UPI ऐप खोलें</a>'; }, 200);<\/script></body></html>`); win.document.close(); let waMsg = `🚩 *जय श्री राम* 🚩\n\n✅ *रसीद:* ${receiptNo}\n👤 *सदस्य:* ${member.name}\n💰 *राशि:* ₹${total}\n⚠️ *शेष बकाया:* ₹${member.pending}\n⭐ *एडवांस शेष:* ₹${member.advanceBalance}\n💸 *UPI ID:* ${appData.settings.upiId}\n\n🙏 धन्यवाद - ${appData.settings.committeeName}`; if(member.mobile) window.open(`https://wa.me/91${member.mobile}?text=${encodeURIComponent(waMsg)}`, '_blank'); appData.receipts.unshift({ id: Date.now(), receiptNo, memberName: member.name, amount: total, date: new Date().toISOString(), memberId: member.id, isCommittee: isCommittee }); saveToLocalStorage(); showToast(`✅ रसीद ${receiptNo} जनरेट`); if(currentSub === 'receiptsList') renderReceiptsList(); refreshDashboardCharts(); addAuditLog("RECEIPT_GENERATED", `${member.name} - ₹${total} - ${receiptNo}`); }
function viewReceipt(receipt) { let member = receipt.isCommittee ? appData.committeeMembers.find(m => m.id === receipt.memberId) : appData.members.find(m => m.id === receipt.memberId); if(!member) { showToast("सदस्य नहीं मिला", true); return; } let logo = appData.settings.logo || "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23FF9933' width='100' height='100'/%3E%3Ctext x='50' y='70' font-size='60' text-anchor='middle' fill='white'%3E🚩%3C/text%3E%3C/svg%3E"; let upiUrl = `upi://pay?pa=${appData.settings.upiId}&pn=${encodeURIComponent(member.name)}&cu=INR`; let win = window.open('', '_blank'); win.document.write(`<!DOCTYPE html><html><head><title>रसीद ${receipt.receiptNo}</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',Arial;padding:20px;background:#f0f0f0}.receipt{max-width:750px;margin:auto;background:white;border:2px solid #FF9933;border-radius:15px;padding:25px}.header{text-align:center;border-bottom:2px solid #FF9933;padding-bottom:15px;margin-bottom:15px}.logo-img{width:60px;border-radius:50%}.amount{color:#28a745;font-size:22px;font-weight:bold}.signature{margin-top:25px;display:flex;justify-content:space-between;border-top:1px dashed #ddd;padding-top:15px}.footer{text-align:center;margin-top:20px;font-size:12px;color:#666}@media print{body{padding:0;background:white}.receipt{border:none;padding:0}button{display:none}}</style></head><body><div class="receipt"><div class="header"><img src="${logo}" class="logo-img"><h2>${appData.settings.committeeName}</h2><h3>दान रसीद</h3><strong>${receipt.receiptNo}</strong><p>${new Date(receipt.date).toLocaleDateString('hi-IN')}</p></div><p><strong>सदस्य:</strong> ${member.name}</p><p><strong>राशि:</strong> <span class="amount">₹${receipt.amount}</span></p><p><strong>UPI ID:</strong> ${appData.settings.upiId}</p><div id="qrDiv" style="text-align:center;margin:15px 0;"></div><div class="signature"><div>......................<br>${appData.settings.president}<br>(अध्यक्ष)</div><div>......................<br>${appData.settings.secretary}<br>(सचिव)</div></div><div class="footer"><p>🙏 जय श्री राम 🙏</p></div><div style="text-align:center;margin-top:20px"><button onclick="window.print()" style="background:#FF9933;padding:10px 20px;border:none;border-radius:8px">🖨️ प्रिंट</button> <button onclick="window.close()">बंद</button></div></div><scr"+"ipt>setTimeout(() => { if(typeof QRCode !== 'undefined') new QRCode(document.getElementById("qrDiv"),{text:"${upiUrl}",width:160,height:160}); else document.getElementById("qrDiv").innerHTML = '<a href="${upiUrl}" target="_blank">📱 क्लिक करें UPI ऐप खोलें</a>'; }, 100);<\/script></body></html>`); win.document.close(); }
function renderReceiptsList() { let search = document.getElementById('recSearch')?.value?.toLowerCase()||''; let recs = appData.receipts.filter(r=> !search || r.memberName.toLowerCase().includes(search) || r.receiptNo.toLowerCase().includes(search)); let rec = recs.slice(0,100); let searchBar = `<div style="margin-bottom:10px;"><input id="recSearch" placeholder="🔍 सदस्य नाम या रसीद नं. खोजें..." class="form-control" oninput="renderReceiptsList()" style="max-width:300px;" value="${search}"></div>`; let html = `<div class="card"><div class="card-title">🧾 सभी रसीदें (क्लिक करें देखने के लिए)<button class="print-btn" onclick="printReceiptsList()"><i class="fas fa-print"></i> प्रिंट</button></div>${searchBar}${rec.map(r=>`<div class="member-card"><div><span class="receipt-no" onclick="viewReceiptById('${r.receiptNo}')">${r.receiptNo}</span> - ${r.memberName} - ₹${r.amount}<br><small>${new Date(r.date).toLocaleDateString()}</small></div><div><button class="whatsapp-president-btn" onclick="sendReceiptOnWhatsApp('${r.receiptNo}', '${r.memberName}', ${r.amount})"><i class="fab fa-whatsapp"></i> भेजें</button></div></div>`).join('')}${rec.length===0?'<p>कोई रसीद नहीं</p>':''}</div>`; document.getElementById('contentArea').innerHTML = html; saveToLocalStorage(); }
function viewReceiptById(receiptNo) { let receipt = appData.receipts.find(r => r.receiptNo === receiptNo); if(receipt) viewReceipt(receipt); }
function sendReceiptOnWhatsApp(receiptNo, name, amount) { let msg = `🚩 *जय श्री राम* 🚩\n\n✅ *रसीद:* ${receiptNo}\n👤 *सदस्य:* ${name}\n💰 *राशि:* ₹${amount}\n💸 *UPI ID:* ${appData.settings.upiId}\n\n🙏 धन्यवाद - ${appData.settings.committeeName}`; window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank'); }
function printReceiptsList() { let rows = appData.receipts.slice(0,100).map(r=>[r.receiptNo, r.memberName, '₹'+r.amount, new Date(r.date).toLocaleDateString()]); printGenericReport('रसीद सूची', ['रसीद नं.', 'सदस्य नाम', 'राशि', 'तिथि'], rows); }

function filterCommitteeList() { let search = document.getElementById('searchCommittee')?.value.toLowerCase()||''; let filtered = appData.committeeMembers.filter(cm=>search?cm.name.toLowerCase().includes(search):true); let tbody = document.getElementById('committeeTableBody'); if(tbody) tbody.innerHTML = filtered.map((cm,idx)=>`<tr><td style="color:#FF9933">${idx+1}<\/td><td><strong>${cm.name}<\/strong><\/td><td><span class="badge-active">${cm.post}<\/span><\/td><td>${cm.mobile}<\/td><td>₹${cm.monthlyAmount}<\/td><td class="badge-pending">₹${cm.pending}<\/td><td class="badge-advance">₹${cm.advanceBalance}<\/td><td class="action-col"><div class="action-dropdown"><button class="action-dropdown-btn" onclick="toggleDropdown(event, ${cm.id})">⚙️ क्लिक <i class="fas fa-chevron-down"></i></button><div id="dropdown-${cm.id}" class="action-dropdown-content"><button onclick="openPaymentModal(${cm.id}, true)">💰 भुगतान</button><button onclick="openAdvanceModal(${cm.id}, true)">⭐ एडवांस</button><button onclick="editCommitteeMember(${cm.id})">✏️ एडिट</button><button onclick="sendReminderMsg(${cm.id}, true)">📱 रिमाइंडर</button><button onclick="openCustomReminderModal(${cm.id}, true)">✏️📱 कस्टम</button><button onclick="showPaymentQR(${cm.id}, true)"><i class="fas fa-qrcode"></i> QR</button>${canEditMember() && cm.donationStatus !== 'paused' ? `<button onclick="pauseDonation(${cm.id}, true)">⏸️ दान बंद</button>` : ''}${canEditMember() && cm.donationStatus === 'paused' ? `<button onclick="resumeDonation(${cm.id}, true)">▶️ दान चालू</button>` : ''}${canEditMember() && cm.donationPauseHistory && cm.donationPauseHistory.length > 0 ? `<button onclick="viewPauseHistory(${cm.id}, true)">📋 बंद/चालू इतिहास</button>` : ''}</div></div><\/td><\/tr>`).join(''); saveToLocalStorage(); }

function printCommitteeMembers() { let rows = appData.committeeMembers.map((cm,i)=>[i+1, cm.name, cm.post, cm.mobile, '₹'+cm.monthlyAmount, '₹'+cm.pending, '₹'+cm.advanceBalance, cm.donationStatus === 'paused' ? 'दान बंद' : 'सक्रिय']); printGenericReport('समिति सदस्य सूची', ['क्र.', 'नाम', 'पद', 'मोबाइल', 'मासिक', 'बकाया', 'एडवांस', 'स्थिति'], rows); }

// ==================== AMOUNT HISTORY TAB ====================
function renderAmountHistory() {
    let allHistory = [];
    
    appData.members.forEach(m => {
        if(m.monthlyAmountHistory && m.monthlyAmountHistory.length > 0) {
            allHistory.push({ type: 'सदस्य', name: m.name, id: m.id, history: m.monthlyAmountHistory });
        }
    });
    
    appData.committeeMembers.forEach(cm => {
        if(cm.monthlyAmountHistory && cm.monthlyAmountHistory.length > 0) {
            allHistory.push({ type: 'समिति सदस्य', name: `${cm.name} (${cm.post})`, id: cm.id, history: cm.monthlyAmountHistory });
        }
    });
    
    let html = `<div class="card"><div class="card-title">📜 राशि परिवर्तन इतिहास (Effective Date के साथ)</div>`;
    
    allHistory.forEach(item => {
        html += `<div class="member-card" style="margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
            <strong>${item.type}: ${item.name}</strong>
            <div class="amount-history-list" style="max-height: 200px; overflow-y: auto; margin-top: 8px;">`;
        
        item.history.forEach((h,idx) => {
            html += `<div class="edit-history-item">📅 <strong>${h.effectiveDate}</strong> से: ₹${h.amount} (${h.changedBy || 'सिस्टम'})<br>📝 कारण: ${h.reason || '-'}<button class="delete-history-btn" onclick="deleteAmountHistoryItem('${item.id}', '${item.type}', ${idx})">🗑️ हटाएँ</button></div>`;
        });
        
        html += `</div></div>`;
    });
    
    html += `</div>`;
    document.getElementById('contentArea').innerHTML = html;
    saveToLocalStorage();
}

function deleteAmountHistoryItem(itemId, type, historyIndex) {
    if(!verifySecretCode()) return;
    
    let item = null;
    if(type === 'सदस्य') item = appData.members.find(m => m.id == itemId);
    else if(type === 'समिति सदस्य') item = appData.committeeMembers.find(m => m.id == itemId);
    
    if(item && item.monthlyAmountHistory && item.monthlyAmountHistory[historyIndex]) {
        item.monthlyAmountHistory.splice(historyIndex, 1);
        if(item.monthlyAmountHistory.length > 0) {
            item.monthlyAmount = item.monthlyAmountHistory[item.monthlyAmountHistory.length-1].amount;
        }
        saveToLocalStorage();
        showToast("✅ राशि इतिहास हटा दिया गया");
        renderAmountHistory();
        if(currentSub === 'memberList') renderMemberList();
        else if(currentSub === 'committeeMembers') renderCommitteeMembers();
    }
}

function isWithin24Hours(dateStr) {
    if(!dateStr) return false;
    let d = new Date(dateStr);
    return (Date.now() - d.getTime()) < 24 * 60 * 60 * 1000;
}

function _updateMediaStorageBar() {

let _mediaFilter = 'all';
function filterMedia(type) { _mediaFilter = type; renderMediaGallery(type); }
function uploadMediaFiles(files) {
    let fileArr = Array.from(files);
    let idx = 0;
    function processNext() {
        if(idx >= fileArr.length) { showToast('✅ ' + fileArr.length + ' file(s) अपलोड हुईं'); document.getElementById('mediaUploadProgress').style.display = 'none'; renderMediaGallery(_mediaFilter); _updateMediaStorageBar(); _refreshStoragePanel(); return; }
        let file = fileArr[idx++];
        document.getElementById('mediaUploadProgress').style.display = 'block';
        saveMediaSmart(file, function(pct, msg) { document.getElementById('mediaProgressBar').style.width = pct + '%'; document.getElementById('mediaProgressText').innerHTML = '[' + idx + '/' + fileArr.length + '] ' + file.name + ': ' + msg; }, function(item, ok) { if(!ok) showToast('⚠️ ' + file.name + ' सेव नहीं हुआ', true); processNext(); });
    }
    processNext();
}
function renderMediaGallery(filter) {
    filter = filter || _mediaFilter || 'all';
    let grid = document.getElementById('mediaGalleryGrid');
    if(!grid) return;
    let items = appData.mediaFiles.filter(function(m) {
        if(filter === 'all') return true;
        if(filter === 'image') return m.type === 'image';
        if(filter === 'video') return m.type === 'video';
        if(filter === 'indexeddb') return m.storage === 'indexeddb';
        if(filter === 'localstorage') return m.storage === 'localstorage' || !m.storage;
        return true;
    });
    if(items.length === 0) { grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#aaa;">कोई मीडिया नहीं</div>'; return; }
    grid.innerHTML = items.map(function(m) {
        let preview = m.thumbnail || m.data || '';
        let storageIcon = m.storage === 'indexeddb' ? '🗄️' : '💾';
        let sizeStr = m.size ? (m.size > 1048576 ? (m.size/1048576).toFixed(1)+'MB' : (m.size/1024).toFixed(0)+'KB') : '';
        return '<div class="gallery-item" id="gitem_' + m.id + '" onclick="viewMedia(\'' + m.id + '\')">' +
            (m.type === 'image' ? (preview ? '<img src="' + preview + '" loading="lazy" style="width:100%;height:100%;object-fit:cover;">' : '<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:32px;">🖼️</div>') : '<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;background:#1a1a2e;"><span style="font-size:36px;">🎥</span><span style="font-size:10px;color:#aaa;margin-top:4px;">' + sizeStr + '</span></div>') +
            '<div style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.6);color:white;font-size:9px;padding:3px 5px;">' + storageIcon + ' ' + (m.name ? m.name.substring(0,14) : '') + '<span style="float:right;color:#aaa;">' + sizeStr + '</span></div>' +
            '<button onclick="event.stopPropagation();deleteMedia(\'' + m.id + '\')" style="position:absolute;top:4px;right:4px;background:rgba(220,53,69,0.85);border:none;border-radius:50%;width:22px;height:22px;color:white;cursor:pointer;font-size:12px;line-height:22px;text-align:center;">✖</button>' +
            '</div>';
    }).join('');
    items.forEach(function(m) {
        if(m.storage === 'indexeddb' && m.type === 'image' && !m.thumbnail) {
            idbGet(m.id, function(item) {
                if(!item) return;
                let el = document.getElementById('gitem_' + m.id);
                if(el && item.data) { let img = el.querySelector('img'); if(!img) { let div = el.querySelector('div'); if(div) div.innerHTML = '<img src="' + item.data + '" style="width:100%;height:100%;object-fit:cover;">'; } }
            });
        }
    });
}

        allItems.forEach(function(m) { html += '<div class="item">' + (m.type==='image'?'<img src="'+(m.data||m.thumbnail||'')+'">':'<video controls src="'+(m.data||'')+'"></video>') + '<div class="caption">'+(m.name||'')+'</div></div>'; });
        html += '</div></body></html>';
        let blob = new Blob([html], {type:'text/html'}); let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'mandir_media_' + new Date().toISOString().slice(0,10) + '.html'; a.click(); showToast('📥 Export complete!');
    }
    if(pending.length === 0) { buildAndDownload(); return; }
    pending.forEach(function(meta) { idbGet(meta.id, function(item) { allItems.push(Object.assign({}, meta, {data: item?item.data:(meta.thumbnail||'')})); done++; if(done === pending.length) buildAndDownload(); }); });
}

function filterBulkByPending(months) {
    window.currentBulkFilter = months;
    let allMembers = appData.members.filter(m => m.status === 'active' && m.mobile && !m.hidden);
    
    if(months > 0) {
        allMembers = allMembers.filter(m => {
            let approxMonths = Math.ceil(m.pending / m.monthlyAmount);
            return approxMonths >= months;
        });
    }
    
    window.bulkFilteredMembers = allMembers;
    
    let container = document.getElementById('bulkMembersList');
    if(container) {
        container.innerHTML = allMembers.map(m => `<div><input type="checkbox" class="bulk-member-cb" data-id="${m.id}" data-name="${m.name}" data-mobile="${m.mobile}" data-pending="${m.pending}"> ${m.name} (${m.mobile}) - <span class="badge-pending">₹${m.pending} बकाया</span></div>`).join('');
    }
    
    let countSpan = document.getElementById('bulkCount');
    if(countSpan) countSpan.innerText = allMembers.length;
}

function filterBulkByName() {
    let searchName = document.getElementById('bulkSearchName')?.value.toLowerCase() || '';
    let filtered = window.bulkFilteredMembers.filter(m => m.name.toLowerCase().includes(searchName));
    
    let container = document.getElementById('bulkMembersList');
    if(container) {
        container.innerHTML = filtered.map(m => `<div><input type="checkbox" class="bulk-member-cb" data-id="${m.id}" data-name="${m.name}" data-mobile="${m.mobile}" data-pending="${m.pending}"> ${m.name} (${m.mobile}) - <span class="badge-pending">₹${m.pending} बकाया</span></div>`).join('');
    }
}

        return appData.members.find(m => m.id == cb.dataset.id);
    }).filter(m => m && m.mobile);
    if(selected.length === 0){ showToast("⚠️ कम से कम एक सदस्य चुनें", true); return; }
    // Show links list instead of opening tabs

        let details = getYearlyDetailsForMember(m, false);
        let msg = formatReminderMessage(m, m.pending, details, false);
        let memberPenalties = (appData.penalties||[]).filter(p => p.memberId === m.id && p.status === 'unpaid');

    }).join('');
    let modalHtml = `<div class="modal"><div class="modal-content" style="max-height:80vh;overflow-y:auto;"><h3>📱 बल्क WhatsApp लिंक (${selected.length} सदस्य)</h3><p style="color:#666;font-size:13px;margin-bottom:10px;">नीचे प्रत्येक सदस्य का WhatsApp लिंक है। एक-एक करके क्लिक करें:</p>${linksHtml}<div style="text-align:center;margin-top:15px;"><button class="btn btn-secondary" onclick="closeModal()">बंद करें</button></div></div></div>`;

        if(msgDiv) msgDiv.innerHTML = `✅ सबको भेजा (${bulkMembers.length}/${bulkMembers.length})`;
        document.getElementById('stopBulkBtn').style.display = 'none';
        showToast("✅ सबको भेजा");
        return;
    }
    let m = bulkMembers[bulkIndex];
    let details = getYearlyDetailsForMember(m, false);
    let msg = formatReminderMessage(m, m.pending, details, false);
    window.open(`https://wa.me/91${m.mobile}?text=${encodeURIComponent(msg)}`, '_blank');
    bulkIndex++;
    let msgDiv = document.getElementById('bulkProgress');
    if(msgDiv) msgDiv.innerHTML = `📨 ${bulkIndex}/${bulkMembers.length} - ${m.name}`;
}

function stopBulk() {
    if(bulkInterval){
        clearInterval(bulkInterval);
        let msgDiv = document.getElementById('bulkProgress');
        if(msgDiv) msgDiv.innerHTML = `⏸️ रोका गया (${bulkIndex}/${bulkMembers.length})`;
        document.getElementById('stopBulkBtn').style.display = 'none';
        showToast("⏸️ रोका");
    }
}

function filterPendingByMonths(months) {
    window.currentPendingFilter = months;
    let allPending = appData.members.filter(m => !m.hidden && m.pending > 0);
    
    if(months > 0) {
        allPending = allPending.filter(m => {
            let approxMonths = Math.ceil(m.pending / m.monthlyAmount);
            return approxMonths >= months;
        });
    }
    
    window.pendingFilteredMembers = allPending;
    renderPendingFilteredList();
}

function filterPendingByName() {
    let searchName = document.getElementById('pendingSearchName')?.value.toLowerCase() || '';
    if(!searchName) {
        renderPendingFilteredList();
        return;
    }
    let filtered = window.pendingFilteredMembers.filter(m => m.name.toLowerCase().includes(searchName));
    renderPendingFilteredList(filtered);
}

function filterPendingByAmount() {
    let searchAmount = parseFloat(document.getElementById('pendingSearchAmount')?.value) || 0;
    if(searchAmount <= 0) {
        renderPendingFilteredList();
        return;
    }
    let filtered = window.pendingFilteredMembers.filter(m => m.pending >= searchAmount);
    renderPendingFilteredList(filtered);
}

function renderPendingFilteredList(membersList = null) {
    let members = membersList || window.pendingFilteredMembers;
    let monthsText = window.currentPendingFilter === 0 ? 'सभी बकाया' : 
                     window.currentPendingFilter === 1 ? '1 महीना बकाया' :

                     window.currentPendingFilter === 6 ? '6 महीना बकाया' : '1 साल बकाया';
    
    let totalPending = members.reduce((s,m) => s + m.pending, 0);
    
    let html = `<div class="stats-grid">
        <div class="stat-card"><div class="stat-value">${members.length}</div><div class="stat-label">बकाया सदस्य (${monthsText})</div></div>

        <table class="data-table">

            <td>${idx+1}</td>
            <td><strong>${m.name}</strong>${m.photo?`<img src="${m.photo}" class="member-photo" style="width:20px;height:20px;margin-left:5px">`:''}<br><span style="font-size:10px;color:gray;">${m.father||''}<\/span></td>
            <td>${m.mobile || '-'}</td>
            <td>${m.village || '-'}</td>
            <td>₹${m.monthlyAmount}</td>
            <td class="badge-pending">₹${m.pending}</td>
            <td>~ ${approxMonths} महीने</td>
            <td class="action-buttons">
                <button class="btn-sm btn-warning" onclick="sendReminderMsg(${m.id}, false)" title="रिमाइंडर">📱</button>
                <button class="qr-button" onclick="showPaymentQR(${m.id}, false)" title="QR से भुगतान"><i class="fas fa-qrcode"></i> QR</button>
              ‰
         </tr>`;
    });
    
    html += `</tbody> </table></div>
    <div class="flex-between" style="margin-top: 15px;">
        <button class="btn btn-success" onclick="sendSelectedPendingReminder()"><i class="fab fa-whatsapp"></i> चयनित को रिमाइंडर भेजें</button>
        <button class="btn btn-secondary" onclick="clearPendingSelection()">साफ़ करें</button>
    </div>`;
    
    document.getElementById('pendingMembersList').innerHTML = html;
    window.selectedPendingMembers = [];
}

function toggleSelectAllPending() {
    let selectAll = document.getElementById('selectAllPending');
    let checkboxes = document.querySelectorAll('.pending-checkbox');
    checkboxes.forEach(cb => cb.checked = selectAll.checked);
    updateSelectedPendingList();
}

function updateSelectedPendingList() {
    let checkboxes = document.querySelectorAll('.pending-checkbox:checked');
    window.selectedPendingMembers = Array.from(checkboxes).map(cb => ({
        id: parseInt(cb.dataset.id),
        name: cb.dataset.name,
        mobile: cb.dataset.mobile,
        pending: parseFloat(cb.dataset.pending)
    }));
}

function clearPendingSelection() {
    document.querySelectorAll('.pending-checkbox').forEach(cb => cb.checked = false);
    if(document.getElementById('selectAllPending')) {
        document.getElementById('selectAllPending').checked = false;
    }
    window.selectedPendingMembers = [];
    showToast("✅ सभी चयन हटा दिए");
}

function sendSelectedPendingReminder() {
    if(!window.selectedPendingMembers || window.selectedPendingMembers.length === 0) {
        showToast("⚠️ कम से कम एक सदस्य चुनें", true);
        return;
    }
    
    if(!confirm(`${window.selectedPendingMembers.length} सदस्यों को रिमाइंडर भेजें?`)) return;
    
    let index = 0;
    function sendNext() {
        if(index >= window.selectedPendingMembers.length) {
            showToast(`✅ ${window.selectedPendingMembers.length} सदस्यों को रिमाइंडर भेजा`);
            return;
        }
        let member = appData.members.find(m => m.id === window.selectedPendingMembers[index].id);
        if(member && member.mobile) {
            let details = getYearlyDetailsForMember(member, false);
            let msg = formatReminderMessage(member, member.pending, details, false);
            window.open(`https://wa.me/91${member.mobile}?text=${encodeURIComponent(msg)}`, '_blank');
        }
        index++;
        setTimeout(sendNext, 3000);
    }
    sendNext();
}

function sendBulkPendingReminder() {
    let checkboxes = document.querySelectorAll('.pending-checkbox');
    checkboxes.forEach(cb => cb.checked = true);
    updateSelectedPendingList();
    sendSelectedPendingReminder();
}

}

function processNewMemberPhoto(file) {

    let reader = new FileReader();
    reader.onload = e => {
        let preview = document.getElementById('newMemberPhotoPreview');
        if(preview) preview.innerHTML = `<img src="${e.target.result}" style="width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid #FF9933">`;
    };
    reader.readAsDataURL(file);
    compressImage(file, 200, function(dataUrl) {
        window._newMemberPhoto = dataUrl;
        let preview = document.getElementById('newMemberPhotoPreview');
        if(preview) preview.innerHTML = `<img src="${dataUrl}" style="width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid #FF9933"> <span style="font-size:11px;color:#28a745">✅ Compressed</span>`;

function editExpenseItem(id) { let e = appData.expenses.find(x=>x.id===id); let historyHtml = renderEditHistory(e, 'व्यय'); let html = `<div class="modal"><div class="modal-content"><h3>✏️ व्यय संपादन</h3><input id="editExpCat" value="${e.category}" class="form-control"><input id="editExpAmt" type="number" value="${e.amount}" class="form-control"><input id="editExpNote" value="${e.note||''}" class="form-control"><input type="date" id="editExpDate" value="${e.date}" class="form-control"><textarea id="editExpReason" placeholder="बदलाव का कारण *" class="form-control" required></textarea><div class="flex-between"><button class="btn btn-primary" onclick="updateExpenseItem(${id})">अपडेट करें</button><button class="btn btn-secondary" onclick="closeModal()">रद्द</button></div>${historyHtml}</div></div>`; document.body.insertAdjacentHTML('beforeend', html); }
function updateExpenseItem(id) { let e = appData.expenses.find(x=>x.id===id); let reason = document.getElementById('editExpReason').value; if(!reason){ showToast("⚠️ कारण लिखें", true); return; } let oldData = { category: e.category, amount: e.amount, note: e.note, date: e.date }; e.category = document.getElementById('editExpCat').value; e.amount = parseFloat(document.getElementById('editExpAmt').value); e.note = document.getElementById('editExpNote').value; e.date = document.getElementById('editExpDate').value; let newData = { category: e.category, amount: e.amount, note: e.note, date: e.date }; addEditHistory(e, 'व्यय', oldData, newData, reason); saveToLocalStorage(); closeModal(); showToast("✅ अपडेट"); renderExpenseList(); refreshDashboardCharts(); }
async function deleteExpenseItem(id){ if(!verifySecretCode()) return; if(!await confirmDoubleDelete("व्यय")) return; let e = appData.expenses.find(x=>x.id===id); if(e){ appData.deletedExpenses.push({ ...e, deletedAt: new Date().toISOString(), deletedBy: currentUser.name }); appData.expenses = appData.expenses.filter(x=>x.id!==id); saveToLocalStorage(); renderExpenseList(); showToast("✅ व्यय हटा"); addAuditLog("DELETE_EXPENSE", e.category); refreshDashboardCharts(); } }

function sendExpensesToPresident() { let total = appData.expenses.reduce((s,e)=>s+e.amount,0); let recent = appData.expenses.slice(-10).map(e=>`${e.date}: ${e.category} - ₹${e.amount}`).join('\n'); let data = `💸 व्यय रिपोर्ट\n─────────────────\n💰 कुल व्यय: ₹${total}\n\n📋 हाल के व्यय:\n${recent}`; sendToPresident('व्यय रिपोर्ट', data); }

function renderProfitLoss(){ let years=getDataYears(); let rows=years.map(y=>{let inc=appData.donations.filter(d=>new Date(d.date).getFullYear()===y).reduce((s,d)=>s+d.amount,0) + appData.otherDonations.filter(d=>new Date(d.date).getFullYear()===y).reduce((s,d)=>s+d.amount,0); let exp=appData.expenses.filter(e=>new Date(e.date).getFullYear()===y).reduce((s,e)=>s+e.amount,0); return `<tr><td style="color:#FF9933">${y}<\/td><td class="text-success">₹${inc}<\/td><td class="text-danger">₹${exp}<\/td><td class="${inc-exp>=0?'text-success':'text-danger'}">₹${inc-exp}<\/td><\/tr>`; }).join(''); document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">📊 लाभ/हानि रिपोर्ट<div><button class="print-btn" onclick="printProfitLoss()"><i class="fas fa-print"></i> प्रिंट</button><button class="whatsapp-president-btn" onclick="sendProfitLossToPresident()"><i class="fab fa-whatsapp"></i> अध्यक्ष को भेजें</button></div></div><table class="data-table"><thead><th>वर्ष</th><th>आय</th><th>व्यय</th><th>लाभ/हानि</th></thead><tbody>${rows}</tbody><\/table><\/div>`; saveToLocalStorage(); }
function printProfitLoss() { let years=getDataYears(); let rows = years.map(y=>{ let inc=appData.donations.filter(d=>new Date(d.date).getFullYear()===y).reduce((s,d)=>s+d.amount,0) + appData.otherDonations.filter(d=>new Date(d.date).getFullYear()===y).reduce((s,d)=>s+d.amount,0); let exp=appData.expenses.filter(e=>new Date(e.date).getFullYear()===y).reduce((s,e)=>s+e.amount,0); return [y.toString(), '₹'+inc, '₹'+exp, '₹'+(inc-exp)]; }); printGenericReport('लाभ/हानि रिपोर्ट', ['वर्ष', 'आय', 'व्यय', 'लाभ/हानि'], rows); }
function sendProfitLossToPresident() { let totalInc = appData.donations.reduce((s,d)=>s+d.amount,0) + appData.otherDonations.reduce((s,od)=>s+od.amount,0); let totalExp = appData.expenses.reduce((s,e)=>s+e.amount,0); let data = `📊 लाभ/हानि रिपोर्ट\n─────────────────\n💰 कुल आय: ₹${totalInc}\n💸 कुल व्यय: ₹${totalExp}\n⚖️ शुद्ध लाभ/हानि: ₹${totalInc-totalExp}`; sendToPresident('लाभ/हानि रिपोर्ट', data); }
