function renderAnnouncementsList(){ let search = document.getElementById('annSearch')?.value?.toLowerCase()||''; let anns = appData.announcements.filter(a=> !search || a.title.toLowerCase().includes(search) || (a.content||'').toLowerCase().includes(search)); let searchBar = document.getElementById('annSearch') ? '' : `<div style="margin-bottom:10px;"><input id="annSearch" placeholder="🔍 घोषणा खोजें..." class="form-control" oninput="renderAnnouncementsList()" style="max-width:300px;"></div>`; document.getElementById('announcementsList').innerHTML = searchBar + anns.map(a=>`<div class="member-card"><div><strong>${a.title}</strong><br><small>${new Date(a.date).toLocaleDateString()}</small><p>${a.content}</p></div><div>${canDelete()?`<button class="btn-sm btn-danger" onclick="deleteAnnouncementItem(${a.id})">🗑️</button>`:''}<button class="btn-sm btn-info" onclick="editAnnouncementItem(${a.id})">✏️</button></div></div>`).join(''); saveToLocalStorage(); }
function addAnnouncement(){ if(!canEdit()) return; let t=prompt("शीर्षक"), c=prompt("विवरण"); if(t){ appData.announcements.unshift({id:Date.now(), title:t, content:c, date:new Date().toISOString(), editHistory:[]}); saveToLocalStorage(); renderAnnouncementsList(); showToast("✅ घोषणा जुड़ी"); } }
function editAnnouncementItem(id) { let a = appData.announcements.find(x=>x.id===id); let historyHtml = renderEditHistory(a, 'घोषणा'); let html = `<div class="modal"><div class="modal-content"><h3>✏️ घोषणा संपादन</h3><input id="editAnnTitle" value="${a.title}" class="form-control"><textarea id="editAnnContent" class="form-control">${a.content||''}</textarea><textarea id="editAnnReason" placeholder="बदलाव का कारण *" class="form-control" required></textarea><div class="flex-between"><button class="btn btn-primary" onclick="updateAnnouncementItem(${id})">अपडेट करें</button><button class="btn btn-secondary" onclick="closeModal()">रद्द</button></div>${historyHtml}</div></div>`; document.body.insertAdjacentHTML('beforeend', html); }
function updateAnnouncementItem(id) { let a = appData.announcements.find(x=>x.id===id); let reason = document.getElementById('editAnnReason').value; if(!reason){ showToast("⚠️ कारण लिखें", true); return; } let oldData = { title: a.title, content: a.content }; a.title = document.getElementById('editAnnTitle').value; a.content = document.getElementById('editAnnContent').value; let newData = { title: a.title, content: a.content }; addEditHistory(a, 'घोषणा', oldData, newData, reason); saveToLocalStorage(); closeModal(); showToast("✅ अपडेट"); renderAnnouncementsList(); }
async function deleteAnnouncementItem(id){ if(!verifySecretCode()) return; if(!await confirmDoubleDelete("घोषणा")) return; let a = appData.announcements.find(x=>x.id===id); if(a){ appData.deletedAnnouncements.push({ ...a, deletedAt: new Date().toISOString(), deletedBy: currentUser.name }); appData.announcements = appData.announcements.filter(x=>x.id!==id); saveToLocalStorage(); renderAnnouncementsList(); showToast("✅ घोषणा हटा"); addAuditLog("DELETE_ANNOUNCEMENT", a.title); } }
function printAnnouncements() { let rows = appData.announcements.map(a=>[a.title, a.content, new Date(a.date).toLocaleDateString()]); printGenericReport('घोषणा सूची', ['शीर्षक', 'विवरण', 'तिथि'], rows); }
function renderLedgerReport() { let html = `<div class="card"><div class="card-title">📒 लेजर रिपोर्ट<div><button class="print-btn" onclick="printLedgerReport()"><i class="fas fa-print"></i> प्रिंट</button><button class="whatsapp-president-btn" onclick="sendLedgerToPresident()"><i class="fab fa-whatsapp"></i> अध्यक्ष को भेजें</button></div></div><div class="year-selector"><select id="ledgerYear" onchange="updateLedger()">${(function(){let opts='';for(let y=2024;y<=new Date().getFullYear()+5;y++)opts+=`<option value="${y}">${y}</option>`;return opts;})()}</select></div><div id="ledgerTable"></div></div>`; document.getElementById('contentArea').innerHTML = html; updateLedger(); }
function updateLedger(){ let year = parseInt(document.getElementById('ledgerYear').value); let months = ['जनवरी','फरवरी','मार्च','अप्रैल','मई','जून','जुलाई','अगस्त','सितम्बर','अक्टूबर','नवम्बर','दिसम्बर']; let rows='', totalInc=0, totalExp=0; for(let i=0;i<12;i++){ let inc = appData.donations.filter(d=>new Date(d.date).getMonth()===i && new Date(d.date).getFullYear()===year).reduce((s,d)=>s+d.amount,0); let exp = appData.expenses.filter(e=>new Date(e.date).getMonth()===i && new Date(e.date).getFullYear()===year).reduce((s,e)=>s+e.amount,0); totalInc+=inc; totalExp+=exp; rows += `<tr><td style="color:#FF9933">${months[i]}<\/td><td class="text-success">₹${inc}<\/td><td class="text-danger">₹${exp}<\/td><td class="${inc-exp>=0?'text-success':'text-danger'}">₹${inc-exp}<\/td><\/tr>`; } document.getElementById('ledgerTable').innerHTML = `<table class="data-table"><thead><th>महीना</th><th>आय</th><th>व्यय</th><th>लाभ/हानि</th></thead><tbody>${rows}</tbody><tfoot><tr style="background:#f0f0f0"><th>कुल</th><th>₹${totalInc}</th><th>₹${totalExp}</th><th>₹${totalInc-totalExp}</th><\/tr><\/tfoot><\/table>`; saveToLocalStorage(); }
function printLedgerReport() { let year = document.getElementById('ledgerYear')?.value || new Date().getFullYear(); let months = ['जनवरी','फरवरी','मार्च','अप्रैल','मई','जून','जुलाई','अगस्त','सितम्बर','अक्टूबर','नवम्बर','दिसम्बर']; let rows = []; let totalInc = 0, totalExp = 0; for(let i=0;i<12;i++){ let inc = appData.donations.filter(d=>new Date(d.date).getMonth()===i && new Date(d.date).getFullYear()==year).reduce((s,d)=>s+d.amount,0); let exp = appData.expenses.filter(e=>new Date(e.date).getMonth()===i && new Date(e.date).getFullYear()==year).reduce((s,e)=>s+e.amount,0); totalInc += inc; totalExp += exp; rows.push([months[i], '₹'+inc, '₹'+exp, '₹'+(inc-exp)]); } rows.push(['कुल', '₹'+totalInc, '₹'+totalExp, '₹'+(totalInc-totalExp)]); printGenericReport(`लेजर रिपोर्ट ${year}`, ['महीना', 'आय', 'व्यय', 'लाभ/हानि'], rows); }
function sendLedgerToPresident() { let year = document.getElementById('ledgerYear')?.value || new Date().getFullYear(); let totalInc = appData.donations.filter(d=>new Date(d.date).getFullYear()==year).reduce((s,d)=>s+d.amount,0); let totalExp = appData.expenses.filter(e=>new Date(e.date).getFullYear()==year).reduce((s,e)=>s+e.amount,0); let data = `📒 लेजर रिपोर्ट ${year}\n─────────────────\n💰 कुल आय: ₹${totalInc}\n💸 कुल व्यय: ₹${totalExp}\n⚖️ शेष: ₹${totalInc-totalExp}`; sendToPresident(`लेजर रिपोर्ट ${year}`, data); }
function renderAuditReport(){ let logs = appData.auditLogs.slice(0,100).map(l=>`<div style="padding:8px;border-bottom:1px solid #eee;font-size:12px"><i class="fas fa-history"></i> ${new Date(l.timestamp).toLocaleString()} - ${l.user} (${l.role}) : ${l.action} - ${l.details}</div>`).join(''); document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">📋 ऑडिट लॉग<button class="print-btn" onclick="printAuditLog()"><i class="fas fa-print"></i> प्रिंट</button></div>${logs||'<p>कोई लॉग नहीं</p>'}</div>`; saveToLocalStorage(); }
function printAuditLog() { let rows = appData.auditLogs.slice(0,100).map(l=>[new Date(l.timestamp).toLocaleString(), l.user, l.role, l.action, l.details]); printGenericReport('ऑडिट लॉग', ['तिथि', 'यूजर', 'रोल', 'कार्य', 'विवरण'], rows); }
function renderTrendReport(){ let html=`<div class="card"><div class="card-title">📈 ट्रेंड रिपोर्ट<div><button class="print-btn" onclick="printTrendReport()"><i class="fas fa-print"></i> प्रिंट</button><button class="whatsapp-president-btn" onclick="sendTrendReportToPresident()"><i class="fab fa-whatsapp"></i> अध्यक्ष को भेजें</button></div></div><div class="year-selector"><select id="trendYear" onchange="loadTrend()">${(function(){let opts='';for(let y=2024;y<=new Date().getFullYear()+5;y++)opts+=`<option value="${y}">${y}</option>`;return opts;})()}</select></div><canvas id="trendCanvas"></canvas></div>`; document.getElementById('contentArea').innerHTML=html; loadTrend(); }

function printTrendReport() { let year = document.getElementById('trendYear')?.value || new Date().getFullYear(); let months = ['जन','फर','मार्च','अप्रैल','मई','जून','जुलाई','अग','सित','अक्टू','नव','दिस']; let rows = []; for(let i=0;i<12;i++){ let inc = appData.donations.filter(d=>new Date(d.date).getMonth()===i && new Date(d.date).getFullYear()==year).reduce((s,d)=>s+d.amount,0); let exp = appData.expenses.filter(e=>new Date(e.date).getMonth()===i && new Date(e.date).getFullYear()==year).reduce((s,e)=>s+e.amount,0); rows.push([months[i], '₹'+inc, '₹'+exp, '₹'+(inc-exp)]); } printGenericReport(`ट्रेंड रिपोर्ट ${year}`, ['महीना', 'आय', 'व्यय', 'लाभ/हानि'], rows); }

function renderExpenseChart(){ let cat={}; appData.expenses.forEach(e=>{cat[e.category]=(cat[e.category]||0)+e.amount;}); let labels=Object.keys(cat), data=Object.values(cat); let total=data.reduce((a,b)=>a+b,0); let html=`<div class="card"><div class="card-title">🥧 व्यय श्रेणी विश्लेषण<div><button class="print-btn" onclick="printExpenseChart()"><i class="fas fa-print"></i> प्रिंट</button><button class="whatsapp-president-btn" onclick="sendExpenseChartToPresident()"><i class="fab fa-whatsapp"></i> अध्यक्ष को भेजें</button></div></div><canvas id="pieCanvas"></canvas><table class="data-table mt-2"><thead><th>श्रेणी</th><th>राशि</th><th>%</th></thead><tbody>${labels.map((l,i)=>`<tr><td class="name-active">${l}<\/td><td class="text-danger">₹${data[i]}<\/td><td>${((data[i]/total)*100).toFixed(1)}%<\/td><\/tr>`).join('')}</tbody><\/table><\/div>`; document.getElementById('contentArea').innerHTML=html; let ctx=document.getElementById('pieCanvas')?.getContext('2d'); if(ctx) { if(pieChart) pieChart.destroy(); pieChart = new Chart(ctx,{type:'pie',data:{labels:labels,datasets:[{data:data,backgroundColor:['#FF9933','#28a745','#dc3545','#17a2b8','#6f42c1']}]}}); } saveToLocalStorage(); }

function changeUpiWithAudit() {
    if(!canEditSettings()){ showToast("⚠️ आप UPI नहीं बदल सकते", true); return; }
    let newUpi = document.getElementById('newUpiId').value.trim();
    let reason = document.getElementById('upiChangeReason').value.trim();
    if(!newUpi){ showToast("⚠️ नया UPI दर्ज करें", true); return; }
    if(!reason){ showToast("⚠️ कारण लिखें", true); return; }
    let oldUpi = appData.settings.upiId;
    if(!appData.upiAuditLog) appData.upiAuditLog = [];
    appData.upiAuditLog.push({ oldUpi: oldUpi, newUpi: newUpi, reason: reason, changedBy: currentUser?.name||'Unknown', date: new Date().toISOString().slice(0,10) });
    appData.settings.upiId = newUpi;
    document.getElementById('setUpi').value = newUpi;
    saveToLocalStorage();
    addAuditLog("UPI_CHANGED", `UPI बदला: ${oldUpi} → ${newUpi}`);
    showToast("✅ UPI अपडेट (ऑडिट लॉग में दर्ज)");
    renderGeneralSettings();
}

function saveProfile() {
    if(!currentUser){ showToast("⚠️ कोई यूज़र लॉगिन नहीं", true); return; }
    let name = document.getElementById('profileName').value.trim();
    let newPwd = document.getElementById('profileNewPwd').value;
    let confirmPwd = document.getElementById('profileConfirmPwd').value;
    if(!name){ showToast("⚠️ नाम दर्ज करें", true); return; }
    if(newPwd && newPwd !== confirmPwd){ showToast("⚠️ पासवर्ड मेल नहीं खाते", true); return; }
    let user = appData.users.find(u => u.email === currentUser.email);
    if(user){ user.name = name; if(newPwd) user.password = newPwd; }
    currentUser.name = name;
    document.getElementById('userName').innerHTML = name;
    saveToLocalStorage();
    showToast("✅ प्रोफ़ाइल अपडेट");
    addAuditLog("PROFILE_UPDATE", `${name} ने प्रोफ़ाइल अपडेट की`);
}
function saveSettings(){ appData.settings.committeeName=document.getElementById('setName').value; appData.settings.upiId=document.getElementById('setUpi').value; appData.settings.president=document.getElementById('setPresident').value; appData.settings.secretary=document.getElementById('setSec').value; appData.settings.presidentMobile=document.getElementById('setMobile').value; let logoFile = document.getElementById('logoUpload').files[0]; let pf=document.getElementById('presSigFile').files[0]; let sf=document.getElementById('secSigFile').files[0]; let save=()=>{ saveToLocalStorage(); document.getElementById('headerTitle').innerHTML=appData.settings.committeeName; if(appData.settings.logo) document.getElementById('committeeLogoImg').src=appData.settings.logo; showToast("✅ सेव"); renderGeneralSettings(); }; if(logoFile){ let r=new FileReader(); r.onload=e=>{ appData.settings.logo=e.target.result; save(); }; r.readAsDataURL(logoFile); } else if(pf){ let r=new FileReader(); r.onload=e=>{ appData.settings.presidentSignature=e.target.result; if(sf){ let r2=new FileReader(); r2.onload=e2=>{ appData.settings.secretarySignature=e2.target.result; save(); }; r2.readAsDataURL(sf); }else save(); }; r.readAsDataURL(pf); } else if(sf){ let r=new FileReader(); r.onload=e=>{ appData.settings.secretarySignature=e.target.result; save(); }; r.readAsDataURL(sf); } else save(); }
function exportExcel(){ let ws=[['नाम','पिता नाम','मोबाइल','गाँव','मासिक','बकाया','एडवांस','ज्वाइन डेट','दान स्थिति']]; appData.members.forEach(m=>ws.push([m.name,m.father||'',m.mobile,m.village||'',m.monthlyAmount,m.pending||0,m.advanceBalance||0,m.joinDate,m.donationStatus === 'paused' ? 'बंद' : 'सक्रिय'])); let wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(ws),'सदस्य'); XLSX.writeFile(wb,`mandir_${new Date().toISOString().slice(0,10)}.xlsx`); showToast("📊 एक्सेल"); }
function backupJSON(){ let a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify(appData)],{type:'application/json'})); a.download='mandir_backup.json'; a.click(); showToast("बैकअप"); }
function exportEverything() { let fullData = { exportDate: new Date().toISOString(), version: "1.0", members: appData.members, donations: appData.donations, expenses: appData.expenses, committeeMembers: appData.committeeMembers, settings: appData.settings, receipts: appData.receipts, transactions: appData.transactions }; let jsonStr = JSON.stringify(fullData, null, 2); let blob = new Blob([jsonStr], {type: 'application/json'}); let a = document.createElement('a'); let url = URL.createObjectURL(blob); a.href = url; a.download = `mandir_full_backup_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`; a.click(); URL.revokeObjectURL(url); showToast("✅ पूरा बैकअप डाउनलोड हो गया"); addAuditLog("FULL_BACKUP", "सभी डेटा का बैकअप लिया"); }

function restoreDeletedMember(id) { let idx = appData.deletedMembers.findIndex(m=>m.id===id); if(idx!==-1) { let restored = appData.deletedMembers[idx]; let newId = Date.now(); restored.id = newId; delete restored.deletedAt; delete restored.deletedBy; appData.members.push(restored); appData.deletedMembers.splice(idx,1); saveToLocalStorage(); showToast("✅ सदस्य पुनर्स्थापित"); renderRecycleBin(); renderMemberList(); refreshDashboardCharts(); addAuditLog("RESTORE_MEMBER", restored.name); } }

// ==================== PENALTY / जुर्माना SYSTEM ====================
function renderPenaltyList() {
    if(!canAddPenalty()) { document.getElementById('contentArea').innerHTML='<div class="card">❌ केवल एडमिन/सुपर एडमिन</div>'; return; }
    let search = document.getElementById('penSearch')?.value?.toLowerCase()||'';
    let penalties = (appData.penalties||[]).filter(p=> !search || p.memberName.toLowerCase().includes(search) || p.reason.toLowerCase().includes(search));
    let unpaid = penalties.filter(p=>p.status==='unpaid');
    let paid = penalties.filter(p=>p.status==='paid');
    let totalUnpaid = unpaid.reduce((s,p)=>s+p.amount,0);
    let html = `<div class="card"><div class="card-title">⚖️ जुर्माना प्रबंधन<div><button class="print-btn" onclick="printPenalties()"><i class="fas fa-print"></i> प्रिंट</button></div></div>
    <div class="stats-grid"><div class="stat-card"><div class="stat-value">${unpaid.length}</div><div>बकाया जुर्माने</div></div><div class="stat-card"><div class="stat-value" style="color:#dc3545">₹${totalUnpaid}</div><div>कुल बकाया</div></div><div class="stat-card"><div class="stat-value" style="color:#28a745">${paid.length}</div><div>चुकाए जुर्माने</div></div></div>
    <div style="margin-bottom:10px;"><input id="penSearch" placeholder="🔍 सदस्य या कारण खोजें..." class="form-control" oninput="renderPenaltyList()" style="max-width:300px;" value="${search}"></div>
    <h4 style="color:#dc3545;margin:10px 0">⚠️ बकाया जुर्माने</h4>
    ${unpaid.length===0?'<p style="color:green">✅ कोई बकाया जुर्माना नहीं</p>':unpaid.map(p=>`<div class="member-card" style="border-left:4px solid #dc3545"><div><strong>${p.memberName}</strong><br>⚖️ ₹${p.amount} - ${p.reason}<br><small>📅 ${p.date} | #JUR-${String(p.id).slice(-5)}</small></div><div><button class="btn btn-success btn-sm" onclick="payPenalty(${p.id})">✅ चुकाया</button><button class="btn-sm btn-danger" onclick="deletePenalty(${p.id})">🗑️</button></div></div>`).join('')}
    <h4 style="color:#28a745;margin:15px 0 8px">✅ चुकाए गए जुर्माने</h4>
    ${paid.length===0?'<p style="color:gray">कोई नहीं</p>':paid.slice(0,20).map(p=>`<div class="member-card" style="border-left:4px solid #28a745;opacity:0.8"><div><strong>${p.memberName}</strong><br>⚖️ ₹${p.amount} - ${p.reason}<br><small>📅 ${p.date} → ✅ ${p.paidDate||''}</small></div></div>`).join('')}
    </div>`;
    document.getElementById('contentArea').innerHTML = html;
}
function openPenaltyModal(memberId) {
    if(!canAddPenalty()){ showToast("⚠️ आप जुर्माना नहीं जोड़ सकते",true); return; }
    let member = appData.members.find(x=>x.id===memberId);
    if(!member){ showToast("सदस्य नहीं मिला",true); return; }
    let existingPenalties = (appData.penalties||[]).filter(p=>p.memberId===memberId && p.status==='unpaid');
    let existingHtml = existingPenalties.length>0 ? `<div style="background:#fff3cd;border-radius:8px;padding:8px;margin-bottom:8px;"><strong>⚠️ मौजूदा बकाया जुर्माने:</strong><br>${existingPenalties.map(p=>`⚖️ ₹${p.amount} - ${p.reason}`).join('<br>')}</div>` : '';
    let html = `<div class="modal"><div class="modal-content"><h3>⚖️ जुर्माना जोड़ें - ${member.name}</h3>${existingHtml}<input id="penAmt" type="number" placeholder="जुर्माना राशि ₹ *" class="form-control"><textarea id="penReason" placeholder="कारण लिखें *" class="form-control" rows="3"></textarea><input type="date" id="penDate" value="${new Date().toISOString().slice(0,10)}" class="form-control"><div class="flex-between"><button class="btn btn-danger" onclick="processPenalty(${memberId})">⚖️ जुर्माना लगाएँ</button><button class="btn btn-secondary" onclick="closeModal()">रद्द</button></div></div></div>`;
    document.body.insertAdjacentHTML('beforeend', html);
}
function processPenalty(memberId) {
    let member = appData.members.find(x=>x.id===memberId);
    let amt = parseFloat(document.getElementById('penAmt').value);
    let reason = document.getElementById('penReason').value;
    let date = document.getElementById('penDate').value;
    if(!reason){ showToast("⚠️ कारण लिखें",true); return; }
    if(isNaN(amt)||amt<=0){ showToast("⚠️ सही राशि दर्ज करें",true); return; }
    if(!appData.penalties) appData.penalties=[];
    let pen = { id: Date.now(), memberId: memberId, memberName: member.name, amount: amt, reason: reason, date: date, status:'unpaid', createdBy: currentUser.name, createdAt: new Date().toISOString() };
    appData.penalties.push(pen);
    member.pending = (member.pending||0) + amt;
    saveToLocalStorage(); closeModal();
    showToast(`✅ ${member.name} को ₹${amt} जुर्माना लगाया`);
    addAuditLog("ADD_PENALTY", `${member.name} - ₹${amt} - ${reason}`);
    renderMemberList();
}
function payPenalty(penaltyId) {
    let pen = (appData.penalties||[]).find(p=>p.id===penaltyId);
    if(!pen){ showToast("जुर्माना नहीं मिला",true); return; }
    let member = appData.members.find(m=>m.id===pen.memberId);
    if(!confirm(`क्या ${pen.memberName} का ₹${pen.amount} जुर्माना (${pen.reason}) चुकाया गया?`)) return;
    pen.status = 'paid';
    pen.paidDate = new Date().toISOString().slice(0,10);
    pen.paidBy = currentUser.name;
    if(member) member.pending = Math.max(0, (member.pending||0) - pen.amount);
    saveToLocalStorage();
    showToast(`✅ जुर्माना चुकाया - ${pen.memberName} ₹${pen.amount}`);
    addAuditLog("PAY_PENALTY", `${pen.memberName} - ₹${pen.amount} चुकाया`);
    if(member) generateReceipt(member, null, pen.amount, 'कैश', "⚖️ जुर्माना चुकाया", false, pen.amount);
    renderPenaltyList();
}
async function deletePenalty(penaltyId) {
    if(!canAddPenalty()) return;
    let pen = (appData.penalties||[]).find(p=>p.id===penaltyId);
    if(!pen) return;
    if(!confirm(`⚠️ जुर्माना हटाएँ? ${pen.memberName} - ₹${pen.amount}`)) return;
    let member = appData.members.find(m=>m.id===pen.memberId);
    if(member && pen.status==='unpaid') member.pending = Math.max(0, (member.pending||0) - pen.amount);
    appData.penalties = appData.penalties.filter(p=>p.id!==penaltyId);
    saveToLocalStorage();
    showToast("✅ जुर्माना हटाया");
    addAuditLog("DELETE_PENALTY", `${pen.memberName} - ₹${pen.amount}`);
    renderPenaltyList();
}
function printPenalties() {
    let rows = (appData.penalties||[]).map(p=>[p.memberName, '₹'+p.amount, p.reason, p.date, p.status==='paid'?'✅ चुकाया':'⚠️ बकाया']);
    printGenericReport('जुर्माना सूची', ['सदस्य', 'राशि', 'कारण', 'तिथि', 'स्थिति'], rows);
}

function switchMain(id){ pushToStack(currentMain,currentSub); currentMain=id; 
    if(id==='home') currentSub='dashboard'; else if(id==='members') currentSub='memberList'; else if(id==='finance') currentSub='donations'; else if(id==='temple') currentSub='events'; else if(id==='reports') currentSub='monthlyReport'; else if(id==='settings') currentSub='generalSettings'; else if(id==='transactions') currentSub='transactions'; else if(id==='committee') currentSub='committeeMembers'; else if(id==='bulkWhatsapp') currentSub='bulkWhatsapp'; else if(id==='chat') currentSub='groupChat'; else if(id==='requestsTab') currentSub='requestsMain';

function doLogin(){
    let email = document.getElementById('loginEmail').value.trim();
    let pass = document.getElementById('loginPassword').value;
    if(!email||!pass){ document.getElementById('loginError').innerHTML="⚠️ ईमेल और पासवर्ड डालें!"; return; }
    let allUsers = (appData.users && appData.users.length > 0) ? appData.users : HARDCODED_USERS;
    let user = allUsers.find(u => u.email.trim() === email && u.password === pass);
    if(!user) user = HARDCODED_USERS.find(u => u.email.trim() === email && u.password === pass);
    if(user){
        currentUser = user;
        if(!appData.users) appData.users = [];
        if(!appData.users.find(u => u.email === user.email)) appData.users.push(user);
        resetLogoutTimer();
        afterLogin();
    } else {
        document.getElementById('loginError').innerHTML="❌ गलत ईमेल या पासवर्ड!";
    }
}

// ==================== AUTO PENDING ====================
function checkAndAddNextMonthPending() {
    let today = new Date();
    let month = today.getMonth();
    let year = today.getFullYear();
    appData.members.forEach(m => {
        if(m.status !== 'active' || m.hidden || m.donationStatus === 'paused') return;
        let joinDate = new Date(m.joinDate);
        if(year < joinDate.getFullYear() || (year === joinDate.getFullYear() && month < joinDate.getMonth())) return;
        if(!isMonthPaid(m, year, month, false)) {
            computeAutoPendingForMember(m, false);
        }
    });
    saveToLocalStorage();
}

function getChatUnreadCount() {
    if(!currentUser) return 0;
    let lastRead = parseInt(localStorage.getItem('chatLastRead_'+currentUser.email)||'0');
    return (appData.chatMessages||[]).filter(m=>m.senderId!==currentUser.email && new Date(m.timestamp).getTime()>lastRead).length;
}
function getPendingRequestsCount() {
    return (appData.requests||[]).filter(r=>r.status==='pending').length;
}

function sendGroupMessage() {
    let input = document.getElementById('chatMsgInput');
    if(!input) return;
    let content = input.value.trim();
    if(!content) return;
    let msg = { id: Date.now(), senderId: currentUser.email, senderName: currentUser.name, senderRole: currentUser.role, content: content, type: 'text', timestamp: new Date().toISOString() };
    if(!appData.chatMessages) appData.chatMessages = [];
    appData.chatMessages.push(msg);
    saveToLocalStorage();
    input.value = '';
    renderGroupChat();
    addAuditLog("CHAT_MESSAGE", `${currentUser.name}: ${content.substring(0,50)}`);
}

function sendChatFile(inputEl) {
    let file = inputEl.files[0];
    if(!file) return;
    let isImage = file.type.startsWith('image/');
    let reader = new FileReader();
    reader.onload = function(e) {
        let msg = { id: Date.now(), senderId: currentUser.email, senderName: currentUser.name, senderRole: currentUser.role, content: e.target.result, type: isImage?'image':'file', fileName: file.name, timestamp: new Date().toISOString() };
        if(!appData.chatMessages) appData.chatMessages = [];
        appData.chatMessages.push(msg);
        saveToLocalStorage();
        renderGroupChat();
        showToast(`✅ ${file.name} शेयर किया`);
    };
    reader.readAsDataURL(file);
}

let typingTimeout = null;
function broadcastTyping() {
    localStorage.setItem('chatTyping', JSON.stringify({user: currentUser?.name, time: Date.now()}));
    if(typingTimeout) clearTimeout(typingTimeout);
    typingTimeout = setTimeout(()=>localStorage.removeItem('chatTyping'), 2500);
}
function startTypingListener() {
    let tid = setInterval(()=>{
        if(currentMain!=='chat') { clearInterval(tid); return; }
        let el = document.getElementById('typingIndicator');
        if(!el) { clearInterval(tid); return; }
        try {
            let t = JSON.parse(localStorage.getItem('chatTyping')||'null');
            if(t && t.user !== currentUser?.name && Date.now()-t.time < 2500) el.innerHTML = `✏️ ${t.user} टाइप कर रहे हैं...`;
            else el.innerHTML = '';
        } catch(e) { el.innerHTML = ''; }
    }, 1000);
}

function openPrivateChat(email, name) {
    window.privateChatWith = email;
    window.privateChatWithName = name;
    let key = [currentUser.email, email].sort().join('||');
    if(!appData.privateChats) appData.privateChats = {};
    let chat = appData.privateChats[key] || [];
    // Mark as read
    chat.forEach(m=>{ if(m.senderId===email) m.read=true; });
    appData.privateChats[key] = chat;
    saveToLocalStorage();
    let panel = document.getElementById('privateChatPanel');
    if(!panel) return;
    panel.innerHTML = `<div class="card-title" style="font-size:14px">💬 ${name} के साथ चैट</div>
        <div id="privateMsgBox" style="height:320px;overflow-y:auto;padding:10px;background:#f5f5f5;border-radius:12px;margin-bottom:10px;display:flex;flex-direction:column;gap:6px">
            ${chat.length===0?'<div style="text-align:center;color:#aaa;margin-top:100px">कोई संदेश नहीं</div>':''}
            ${chat.map(m=>{
                let isMe = m.senderId===currentUser.email;
                return `<div style="display:flex;flex-direction:column;align-items:${isMe?'flex-end':'flex-start'}">
                    <div style="max-width:80%;background:${isMe?'linear-gradient(135deg,#FF9933,#e68200)':'white'};color:${isMe?'white':'#333'};padding:8px 12px;border-radius:${isMe?'16px 16px 4px 16px':'16px 16px 16px 4px'};box-shadow:0 2px 5px rgba(0,0,0,0.1);font-size:14px">${m.content}</div>
                    <span style="font-size:10px;color:#aaa;margin-top:2px">${new Date(m.timestamp).toLocaleTimeString('hi-IN',{hour:'2-digit',minute:'2-digit'})}</span>
                </div>`;
            }).join('')}
        </div>
        <div style="display:flex;gap:8px">
            <input type="text" id="privateMsgInput" placeholder="संदेश..." class="form-control" style="flex:1;border-radius:50px" onkeypress="if(event.key==='Enter')sendPrivateMessage('${email}','${name}')">
            <button class="btn btn-primary" onclick="sendPrivateMessage('${email}','${name}')" style="border-radius:50%">➤</button>
        </div>`;
    let box = document.getElementById('privateMsgBox');
    if(box) box.scrollTop = box.scrollHeight;
}

function sendPrivateMessage(email, name) {
    let input = document.getElementById('privateMsgInput');
    if(!input) return;
    let content = input.value.trim();
    if(!content) return;
    let key = [currentUser.email, email].sort().join('||');
    if(!appData.privateChats) appData.privateChats = {};
    if(!appData.privateChats[key]) appData.privateChats[key] = [];
    appData.privateChats[key].push({ id: Date.now(), senderId: currentUser.email, senderName: currentUser.name, content: content, timestamp: new Date().toISOString(), read: false });
    saveToLocalStorage();
    input.value = '';
    openPrivateChat(email, name);
}

function previewCSVImport(inputEl) {
    let file = inputEl.files[0]; if(!file) return;
    let reader = new FileReader();
    reader.onload = function(e) {
        let text = e.target.result;
        let lines = text.split('\n').filter(l=>l.trim());
        if(lines.length < 2) { showToast("⚠️ CSV में कम से कम 2 rows होनी चाहिए", true); return; }
        // Parse header
        let headers = lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase());
        let rows = lines.slice(1).map(line=>{
            let cols = line.match(/(".*?"|[^,]+|(?<=,)(?=,)|^(?=,)|(?<=,)$)/g) || [];
            return cols.map(c=>c.replace(/^"|"$/g,'').trim());
        });
        let previewArea = document.getElementById('csvPreviewArea');
        if(!previewArea) return;
        previewArea.innerHTML = `<div class="card" style="margin-top:0">
            <div class="card-title">👁️ CSV Preview (${rows.length} rows)</div>
            <p style="font-size:13px;color:#666;margin-bottom:10px">Headers मिले: <strong>${headers.join(', ')}</strong></p>
            <p style="font-size:12px;background:#fff3e0;padding:10px;border-radius:8px;margin-bottom:12px">
                ⚠️ CSV में नाम, मोबाइल, और मासिक राशि columns होने चाहिए।<br>
                Column नाम: <strong>naam/name/नाम</strong>, <strong>mobile/मोबाइल</strong>, <strong>amount/राशि/monthlyamount</strong>
            </p>
            <div class="table-wrapper" style="max-height:250px;overflow-y:auto">
                <table class="data-table">
                    <thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
                    <tbody>${rows.slice(0,10).map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody>
                </table>
            </div>
            ${rows.length>10?`<p style="font-size:12px;color:#888">...और ${rows.length-10} rows</p>`:''}
            <div style="margin-top:15px;display:flex;gap:10px;flex-wrap:wrap">
                <button class="btn btn-success" onclick="confirmCSVImport()">✅ Import करें (${rows.length} सदस्य)</button>
                <button class="btn btn-secondary" onclick="document.getElementById('csvPreviewArea').innerHTML=''">❌ रद्द</button>
            </div>
        </div>`;
        window._csvImportData = { headers, rows };
    };
    reader.readAsText(file, 'UTF-8');
}

function confirmCSVImport() {
    if(!window._csvImportData) return;
    let { headers, rows } = window._csvImportData;
    let nameIdx = headers.findIndex(h=>['naam','name','नाम','सदस्य नाम','सदस्यनाम'].includes(h));
    let mobileIdx = headers.findIndex(h=>['mobile','मोबाइल','phone','mob'].includes(h));
    let amountIdx = headers.findIndex(h=>['amount','राशि','monthlyamount','मासिकराशि','मासिक राशि'].includes(h));
    let villageIdx = headers.findIndex(h=>['village','गाँव','gram','gaon'].includes(h));
    let fatherIdx = headers.findIndex(h=>['father','पिता'].includes(h));
    
    if(nameIdx === -1) { showToast("⚠️ 'naam' या 'name' column नहीं मिला", true); return; }
    if(!confirm(`${rows.length} सदस्य import करें? Duplicate मोबाइल skip होंगे।`)) return;
    
    let added = 0, skipped = 0;
    rows.forEach(row=>{
        let name = row[nameIdx]?.trim();
        if(!name) { skipped++; return; }
        let mobile = mobileIdx>=0 ? row[mobileIdx]?.trim() : '';
        if(mobile && appData.members.find(m=>m.mobile===mobile)) { skipped++; return; }
        let amount = amountIdx>=0 ? parseFloat(row[amountIdx]) : 100;
        if(isNaN(amount)||amount<=0) amount = 100;
        let village = villageIdx>=0 ? row[villageIdx]?.trim() : '';
        let father = fatherIdx>=0 ? row[fatherIdx]?.trim() : '';
        let joinDate = new Date().toISOString().slice(0,10);
        appData.members.push({ id: Date.now()+added, name, mobile, village, father, monthlyAmount: amount, monthlyAmountHistory:[{amount,effectiveDate:joinDate}], joinDate, status:'active', hidden:false, photo:'', advanceBalance:0, pending:0, editHistory:[], donationStatus:'active', donationPauseHistory:[] });
        added++;
    });
    computeAllPending();
    saveToLocalStorage();
    showToast(`✅ ${added} सदस्य import, ${skipped} skip`);
    addAuditLog("CSV_IMPORT", `${added} सदस्य import`);
    document.getElementById('csvPreviewArea').innerHTML = `<div class="card"><p style="color:#28a745;font-size:16px;text-align:center">✅ Import सफल! ${added} सदस्य जोड़े गए, ${skipped} skip किए।</p></div>`;
    window._csvImportData = null;
}

function restoreFromJSON(inputEl) {
    let file = inputEl.files[0]; if(!file) return;
    if(!confirm("⚠️ JSON Restore करने से मौजूदा सारा डेटा बदल जाएगा। क्या आप निश्चित हैं?")) { inputEl.value=''; return; }
    let reader = new FileReader();
    reader.onload = function(e) {
        try {
            let parsed = JSON.parse(e.target.result);
            if(!parsed.members || !parsed.settings) { showToast("⚠️ Invalid JSON - members या settings नहीं मिला", true); return; }
            appData = { ...appData, ...parsed };
            if(!appData.chatMessages) appData.chatMessages = [];
            if(!appData.privateChats) appData.privateChats = {};
            if(!appData.requests) appData.requests = [];
            if(!appData.googleSheetsSettings) appData.googleSheetsSettings = {};
            if(!appData.notifications) appData.notifications = [];
            saveToLocalStorage();
            computeAllPending();
            showToast("✅ JSON Restore सफल!");
            addAuditLog("JSON_RESTORE", `${file.name} से restore`);
            renderCurrentPage();
        } catch(err) {
            showToast("❌ JSON parse error: " + err.message, true);
        }
    };
    reader.readAsText(file);
}

let notifPanelOpen = false;
let notifSoundEnabled = true;
let notifAudioCtx = null;

function getNotifSoundEnabled() {
    let v = localStorage.getItem('notifSoundEnabled');
    return v === null ? true : v === 'true';
}
function setNotifSoundEnabled(val) {
    notifSoundEnabled = val;
    localStorage.setItem('notifSoundEnabled', val);
}

function playNotifSound() {
    if(!getNotifSoundEnabled()) return;
    try {
        if(!notifAudioCtx) notifAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let osc = notifAudioCtx.createOscillator();
        let gain = notifAudioCtx.createGain();
        osc.connect(gain); gain.connect(notifAudioCtx.destination);
        osc.type = 'sine'; osc.frequency.setValueAtTime(880, notifAudioCtx.currentTime);
        gain.gain.setValueAtTime(0.3, notifAudioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, notifAudioCtx.currentTime + 0.5);
        osc.start(notifAudioCtx.currentTime);
        osc.stop(notifAudioCtx.currentTime + 0.5);
    } catch(e) { /* ignore if audio ctx fails */ }
}

function requestPushNotificationPermission() {
    if('Notification' in window && Notification.permission === 'default') {

            Notification.requestPermission().then(perm => {
                if(perm === 'granted') showToast("🔔 Push Notification की अनुमति मिली!");
            });

    }
}

function sendPushNotification(title, body) {
    if('Notification' in window && Notification.permission === 'granted') {
        new Notification(title, { body: body, icon: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23FF9933' width='100' height='100'/%3E%3Ctext x='50' y='70' font-size='60' text-anchor='middle' fill='white'%3E🚩%3C/text%3E%3C/svg%3E" });
    }
}

function addAppNotification(title, message, type = 'info') {
    if(!appData.notifications) appData.notifications = [];
    let notif = { id: Date.now(), title, message, type, timestamp: new Date().toISOString(), read: false };
    appData.notifications.unshift(notif);
    if(appData.notifications.length > 100) appData.notifications = appData.notifications.slice(0, 100);
    saveToLocalStorage();
    updateNotifBadge();

}

function renderNotifPanel() {
    let old = document.getElementById('notifPanel');
    if(old) old.remove();
    let notifs = (appData.notifications||[]).slice(0, 50);
    let soundEnabled = getNotifSoundEnabled();
    let html = `<div id="notifPanel" class="notif-panel">

                <button class="notif-close-btn" onclick="toggleNotifPanel()">✕</button>
            </div>
        </div>
        <div class="notif-list" id="notifListContainer">

            <div class="notif-item ${n.read?'read':'unread'}" onclick="markNotifRead(${n.id})">

                    <div class="notif-text"><strong>${n.title}</strong><br>${n.message}</div>

            <button class="notif-action-btn notif-mark-all" onclick="markAllNotifsRead()">✅ सभी पढ़ा</button>

        </div>
    </div>`;

function getNotifIcon(type) {
    const icons = { login:'🔐', donation:'💰', expense:'💸', member:'👤', penalty:'⚖️', reminder:'📱', info:'ℹ️', warning:'⚠️', success:'✅' };
    return icons[type] || '🔔';
}

function timeAgo(timestamp) {
    let diff = (Date.now() - new Date(timestamp)) / 1000;
    if(diff < 60) return 'अभी';
    if(diff < 3600) return `${Math.floor(diff/60)} मिनट पहले`;
    if(diff < 86400) return `${Math.floor(diff/3600)} घंटे पहले`;
    return `${Math.floor(diff/86400)} दिन पहले`;
}

function markNotifRead(id) {

function getDateRangeHtml(type = 'donation') {
    let today = new Date().toISOString().slice(0,10);
    let weekAgo = new Date(Date.now() - 7*86400000).toISOString().slice(0,10);
    let monthStart = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().slice(0,10);

    let extraFilter = '';
    if(type === 'expense') {
        let categories = [...new Set((appData.expenses||[]).map(e=>e.category).filter(Boolean))];
        extraFilter = `<select id="drCategoryFilter" class="form-control" style="max-width:150px;border-radius:30px;padding:6px 12px;font-size:12px;" onchange="applyDateRangeFilter('${type}')">
            <option value="">🗂️ सभी श्रेणियाँ</option>
            ${categories.map(c=>`<option value="${c}">${c}</option>`).join('')}
        </select>`;
    } else if(type === 'penalty') {
        extraFilter = `<select id="drStatusFilter" class="form-control" style="max-width:130px;border-radius:30px;padding:6px 12px;font-size:12px;" onchange="applyDateRangeFilter('${type}')">
            <option value="">📋 सभी स्थिति</option>
            <option value="unpaid">⭕ बकाया</option>
            <option value="paid">✅ भुगतान हुआ</option>
        </select>`;
    } else {
        extraFilter = `<input type="text" id="drMemberSearch" placeholder="🔍 सदस्य नाम" class="form-control" style="max-width:150px;border-radius:30px;padding:6px 12px;font-size:12px;" oninput="applyDateRangeFilter('${type}')">`;
    }

    return `<div class="date-range-bar" id="dateRangeBar">
        <label style="font-size:12px;font-weight:600;color:#FF9933">📅 तिथि:</label>
        <input type="date" id="drFrom" value="${monthStart}" onchange="applyDateRangeFilter('${type}')">
        <span style="font-size:12px;color:#888">से</span>
        <input type="date" id="drTo" value="${today}" onchange="applyDateRangeFilter('${type}')">
        ${extraFilter}
        <button class="date-range-btn" onclick="setDateRangeShortcut('today','${type}')">आज</button>
        <button class="date-range-btn" onclick="setDateRangeShortcut('week','${type}')">इस हफ्ते</button>
        <button class="date-range-btn" onclick="setDateRangeShortcut('month','${type}')">इस महीने</button>
        <button class="date-range-btn secondary" onclick="setDateRangeShortcut('clear','${type}')">साफ़</button>
        <div class="date-range-total" id="drTotal">कुल: ₹0</div>
    </div>`;
}

function setDateRangeShortcut(shortcut, type) {
    let today = new Date().toISOString().slice(0,10);
    let from = document.getElementById('drFrom');
    let to = document.getElementById('drTo');
    if(!from || !to) return;
    if(shortcut === 'today') { from.value = today; to.value = today; }
    else if(shortcut === 'week') { from.value = new Date(Date.now()-7*86400000).toISOString().slice(0,10); to.value = today; }
    else if(shortcut === 'month') { from.value = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().slice(0,10); to.value = today; }
    else if(shortcut === 'clear') { from.value = '2024-01-01'; to.value = today; }
    applyDateRangeFilter(type);
}

function filterByDateRange(items, from, to, dateField = 'date') {
    return items.filter(item => {
        let d = item[dateField]?.slice(0,10);
        return d && d >= from && d <= to;
    });
}

function applyDateRangeFilter(type) {
    let from = document.getElementById('drFrom')?.value || '2024-01-01';
    let to = document.getElementById('drTo')?.value || new Date().toISOString().slice(0,10);

    if(type === 'donation') {
        let memberSearch = document.getElementById('drMemberSearch')?.value?.toLowerCase() || '';
        let filtered = filterByDateRange(appData.donations||[], from, to);
        if(memberSearch) filtered = filtered.filter(d => (d.memberName||'').toLowerCase().includes(memberSearch));
        let total = filtered.reduce((s,d)=>s+d.amount,0);
        let totalEl = document.getElementById('drTotal');
        if(totalEl) totalEl.innerHTML = `कुल: ₹${total.toLocaleString()} (${filtered.length})`;
        let tbody = document.getElementById('drDonationBody');
        if(tbody) tbody.innerHTML = filtered.slice().reverse().map((d,i)=>`<tr>
            <td>${i+1}</td>
            <td>${d.date}</td>
            <td><strong>${d.memberName||'-'}</strong></td>
            <td class="text-success">₹${d.amount}</td>
            <td>${d.type==='monthly'?'मासिक':'एडवांस'}</td>
            <td>${d.mode||'-'}</td>
        </tr>`).join('');

    } else if(type === 'expense') {
        let catFilter = document.getElementById('drCategoryFilter')?.value || '';
        let filtered = filterByDateRange(appData.expenses||[], from, to);
        if(catFilter) filtered = filtered.filter(e => e.category === catFilter);
        let total = filtered.reduce((s,e)=>s+e.amount,0);
        let totalEl = document.getElementById('drTotal');
        if(totalEl) totalEl.innerHTML = `कुल: ₹${total.toLocaleString()} (${filtered.length})`;
        let tbody = document.getElementById('drExpenseBody');
        if(tbody) tbody.innerHTML = filtered.slice().reverse().map((e,i)=>`<tr>
            <td>${i+1}</td>
            <td>${e.date}</td>
            <td><strong>${e.category}</strong></td>
            <td class="text-danger">₹${e.amount}</td>
            <td>${e.note||'-'}</td>
        </tr>`).join('');

    } else if(type === 'penalty') {
        let statusFilter = document.getElementById('drStatusFilter')?.value || '';
        let filtered = filterByDateRange(appData.penalties||[], from, to, 'date');
        if(statusFilter) filtered = filtered.filter(p => p.status === statusFilter);
        let total = filtered.reduce((s,p)=>s+p.amount,0);
        let totalEl = document.getElementById('drTotal');
        if(totalEl) totalEl.innerHTML = `कुल: ₹${total.toLocaleString()} (${filtered.length})`;
        let tbody = document.getElementById('drPenaltyBody');
        if(tbody) tbody.innerHTML = filtered.slice().reverse().map((p,i)=>`<tr>
            <td>${i+1}</td>
            <td>${p.date}</td>
            <td><strong>${p.memberName||'-'}</strong></td>
            <td class="text-danger">₹${p.amount}</td>
            <td>${p.reason||'-'}</td>
            <td><span class="${p.status==='paid'?'badge-active':'badge-pending'}">${p.status==='paid'?'✅ भुगतान':'⭕ बकाया'}</span></td>
        </tr>`).join('');
    }
}

async function sendTelegramMessage(text) {
    let s = appData.telegramSettings;
    if(!s || !s.enabled || !s.botToken || !s.chatId) return false;
    try {
        let url = `https://api.telegram.org/bot${s.botToken}/sendMessage`;
        let res = await fetch(url, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ chat_id: s.chatId, text: text, parse_mode: 'HTML' }) });
        let data = await res.json();
        return data.ok;
    } catch(e) { return false; }
}

async function testTelegramConnection() {
    let token = document.getElementById('tgBotToken')?.value?.trim();
    let chatId = document.getElementById('tgChatId')?.value?.trim();
    if(!token || !chatId) { showToast("⚠️ Bot Token और Chat ID भरें", true); return; }
    let btn = document.getElementById('tgTestBtn');
    if(btn) { btn.innerHTML = '⏳ भेज रहे हैं...'; btn.disabled = true; }
    try {
        let url = `https://api.telegram.org/bot${token}/sendMessage`;
        let res = await fetch(url, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ chat_id: chatId, text: `🚩 <b>${appData.settings.committeeName}</b>\n\n✅ Telegram Bot कनेक्ट हो गया!\n🤖 Test Message सफल\n📅 ${new Date().toLocaleString('hi-IN')}`, parse_mode: 'HTML' }) });
        let data = await res.json();
        if(data.ok) { showToast("✅ Telegram Test Message भेजा गया!"); }
        else { showToast("❌ Telegram Error: " + (data.description||'Unknown'), true); }
    } catch(e) { showToast("❌ Network Error: " + e.message, true); }
    if(btn) { btn.innerHTML = '<i class="fab fa-telegram"></i> Test Connection'; btn.disabled = false; }
}

// ==================== ✅ FEATURE 16: OFFLINE QUEUE + AUTO SYNC ====================

const OFFLINE_QUEUE_KEY = 'mandirOfflineQueue_v1';
const MAX_QUEUE_SIZE = 10;

function getOfflineQueue() {
    try { return JSON.parse(localStorage.getItem(OFFLINE_QUEUE_KEY) || '[]'); }
    catch(e) { return []; }
}

function saveOfflineQueue(queue) {
    localStorage.setItem(OFFLINE_QUEUE_KEY, JSON.stringify(queue));
    updateOfflineQueueBadge();
}

function addToOfflineQueue(type, data, description) {
    let queue = getOfflineQueue();
    if(queue.length >= MAX_QUEUE_SIZE) {
        showToast(`⚠️ Offline Queue भरी है (max ${MAX_QUEUE_SIZE})`, true);
        return false;
    }
    queue.push({ id: Date.now(), type, data, description: description || type, timestamp: new Date().toISOString(), synced: false });
    saveOfflineQueue(queue);
    showToast(`📁 Offline Queue में जोड़ा (${queue.length}/${MAX_QUEUE_SIZE})`);
    return true;
}

async function flushOfflineQueue() {
    let queue = getOfflineQueue();
    if(queue.length === 0) { showToast("✅ Offline Queue खाली है"); return; }
    if(!navigator.onLine) { showToast("⚠️ अभी भी Offline हैं", true); return; }
    let flushed = 0;
    let failed = 0;
    for(let item of queue) {
        try {
            // Apply the queued changes to appData
            if(item.type === 'DONATION' && item.data) {
                if(!appData.donations.find(d => d.id === item.data.id)) {
                    appData.donations.push(item.data);
                    flushed++;
                }
            } else if(item.type === 'MEMBER' && item.data) {
                if(!appData.members.find(m => m.id === item.data.id)) {
                    appData.members.push(item.data);
                    flushed++;
                }
            } else if(item.type === 'EXPENSE' && item.data) {
                if(!appData.expenses.find(e => e.id === item.data.id)) {
                    appData.expenses.push(item.data);
                    flushed++;
                }
            } else {
                flushed++;
            }
        } catch(e) { failed++; }
    }
    saveOfflineQueue([]);
    computeAllPending();
    saveToLocalStorage();
    showToast(`✅ Queue Flush: ${flushed} सफल${failed>0?`, ${failed} असफल`:''}`);
    updateOfflineQueueBadge();
    addAuditLog("QUEUE_FLUSH", `${flushed} items synced`);
    renderCurrentPage();
}

function updateOfflineQueueBadge() {
    let queue = getOfflineQueue();
    let badge = document.getElementById('offlineQueueBadge');
    if(badge) {
        if(queue.length > 0) { badge.className = 'offline-queue-badge visible'; badge.innerText = queue.length; }
        else { badge.className = 'offline-queue-badge'; }
    }
    // Update any queue status bar
    let bar = document.getElementById('queueStatusBar');
    if(bar) {
        if(queue.length > 0) { bar.className = 'queue-status-bar visible'; bar.innerHTML = `📁 <strong>${queue.length} Pending</strong> items offline queue में | <button class="queue-flush-btn" onclick="flushOfflineQueue()">🔄 Sync Now</button>`; }
        else { bar.className = 'queue-status-bar'; }
    }
}

function showOfflineQueuePanel() {
    let queue = getOfflineQueue();
    let html = `<div class="modal"><div class="modal-content">
        <h3>📁 Offline Queue (${queue.length}/${MAX_QUEUE_SIZE})</h3>
        ${!navigator.onLine ? '<div style="background:#fff3cd;padding:10px;border-radius:10px;margin-bottom:10px;font-size:13px">📡 आप अभी Offline हैं</div>' : '<div style="background:#e8f5e9;padding:10px;border-radius:10px;margin-bottom:10px;font-size:13px">🌐 Online हैं - Sync कर सकते हैं</div>'}
        ${queue.length === 0 ? '<p style="text-align:center;color:#888;padding:20px">✅ Queue खाली है</p>' : queue.map(item=>`
            <div class="queue-item">

            <button class="btn btn-secondary" onclick="closeModal()">बंद</button>
        </div>
    </div></div>`;
    document.body.insertAdjacentHTML('beforeend', html);

                <option value="">👤 सभी यूजर</option>
                ${users.map(u => `<option value="${u}">${u}</option>`).join('')}
            </select>
            <input type="text" id="actActionFilter" placeholder="🔍 Action खोजें" class="form-control" style="width:160px" oninput="filterActivityLog()">
            <input type="date" id="actDateFrom" class="form-control" style="width:145px" onchange="filterActivityLog()">

        </div>
        <div id="activityLogList"></div>
    </div>`;

function filterActivityLog() {
    let userF = document.getElementById('actUserFilter')?.value?.toLowerCase() || '';
    let actionF = document.getElementById('actActionFilter')?.value?.toLowerCase() || '';
    let dateFrom = document.getElementById('actDateFrom')?.value || '';
    let dateTo = document.getElementById('actDateTo')?.value || '';
    let logs = appData.auditLogs || [];
    let filtered = logs.filter(l => {
        if(userF && !(l.user||'').toLowerCase().includes(userF)) return false;
        if(actionF && !(l.action||'').toLowerCase().includes(actionF) && !(l.details||'').toLowerCase().includes(actionF)) return false;
        let logDate = l.timestamp ? l.timestamp.slice(0,10) : '';
        if(dateFrom && logDate < dateFrom) return false;
        if(dateTo && logDate > dateTo) return false;
        return true;
    }).slice(0,200);
    let container = document.getElementById('activityLogList');
    if(!container) return;
    if(filtered.length === 0) { container.innerHTML = '<p style="text-align:center;color:#aaa;padding:20px">कोई लॉग नहीं मिला</p>'; return; }

// ==================== FEATURE 15: TARGET ALERT ====================
function checkTargetAlerts() {
    let monthlyTarget = appData.settings.monthlyTarget || 50000;
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();
    let monthKey = `${currentYear}-${currentMonth}`;
    let dismissed80 = localStorage.getItem(`targetAlert80_${monthKey}`);
    let dismissed100 = localStorage.getItem(`targetAlert100_${monthKey}`);
    let monthlyCollection = appData.donations
        .filter(d => new Date(d.date).getMonth() === currentMonth && new Date(d.date).getFullYear() === currentYear)
        .reduce((s,d) => s+d.amount, 0);
    let percentage = (monthlyCollection / monthlyTarget) * 100;
    // Remove existing alerts first
    let existing = document.getElementById('targetAlertBanner');
    if(existing) existing.remove();
    if(percentage >= 100 && !dismissed100) {
        showTargetAlertBanner(100, monthlyCollection, monthlyTarget, monthKey);
    } else if(percentage >= 80 && percentage < 100 && !dismissed80) {
        showTargetAlertBanner(80, monthlyCollection, monthlyTarget, monthKey);
    }
}

function showTargetAlertBanner(level, collected, target, monthKey) {
    let months = ['जनवरी','फरवरी','मार्च','अप्रैल','मई','जून','जुलाई','अगस्त','सितम्बर','अक्टूबर','नवम्बर','दिसम्बर'];
    let monthName = months[new Date().getMonth()];
    let percentage = Math.round((collected/target)*100);
    let isComplete = level === 100;
    let bgColor = isComplete ? 'linear-gradient(135deg,#28a745,#1e7e34)' : 'linear-gradient(135deg,#FF9933,#e68200)';
    let icon = isComplete ? '🎉' : '🎯';
    let msg = isComplete 
        ? `बधाई! ${monthName} का 100% टारगेट पूरा हुआ!` 
        : `${monthName} का 80% टारगेट पूरा! ₹${collected.toLocaleString()} / ₹${target.toLocaleString()}`;
    let banner = document.createElement('div');
    banner.id = 'targetAlertBanner';
    banner.style.cssText = `position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:9999;background:${bgColor};color:white;padding:12px 20px;border-radius:50px;box-shadow:0 8px 25px rgba(0,0,0,0.25);display:flex;align-items:center;gap:12px;max-width:90vw;animation:fadeInUp 0.4s ease`;
    banner.innerHTML = `<span style="font-size:22px">${icon}</span><div style="flex:1"><strong>${percentage}% टारगेट</strong><br><small>${msg}</small></div><button onclick="dismissTargetAlert(${level},'${monthKey}')" style="background:rgba(255,255,255,0.3);border:none;border-radius:50%;width:26px;height:26px;cursor:pointer;color:white;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0">✕</button>`;
    document.body.appendChild(banner);
    setTimeout(() => { if(banner.parentNode) banner.style.opacity='0.95'; }, 100);
}

function dismissTargetAlert(level, monthKey) {
    localStorage.setItem(`targetAlert${level}_${monthKey}`, '1');
    let banner = document.getElementById('targetAlertBanner');
    if(banner) banner.remove();
    showToast(`✅ Alert इस महीने के लिए बंद किया`);
}

function filterReceiptsAdvanced() {
    let search = (document.getElementById('recSearch')?.value || '').toLowerCase();
    let dateFrom = document.getElementById('recDateFrom')?.value || '';
    let dateTo = document.getElementById('recDateTo')?.value || '';
    let recs = appData.receipts || [];
    let filtered = recs.filter(r => {
        if(search && !(r.memberName||'').toLowerCase().includes(search) && !(r.receiptNo||'').toLowerCase().includes(search)) return false;
        let rDate = r.date ? r.date.slice(0,10) : '';
        if(dateFrom && rDate < dateFrom) return false;
        if(dateTo && rDate > dateTo) return false;
        return true;
    }).slice().reverse().slice(0,150);
    let countEl = document.getElementById('recFilteredCount');
    if(countEl) countEl.textContent = `कुल: ${filtered.length}`;
    let container = document.getElementById('receiptListContainer');
    if(!container) return;
    if(filtered.length === 0) { container.innerHTML = '<p style="text-align:center;color:#aaa;padding:20px">कोई रसीद नहीं मिली</p>'; return; }
    container.innerHTML = filtered.map(r => `<div class="member-card">
        <div>
            <span class="receipt-no" onclick="viewReceiptById('${r.receiptNo}')">${r.receiptNo}</span>
            <strong> ${r.memberName}</strong> — <span class="text-success">₹${r.amount}</span><br>
            <small style="color:#888">📅 ${new Date(r.date).toLocaleDateString('hi-IN')} · ${r.mode||''}</small>
        </div>
        <div>
            <button class="whatsapp-president-btn" onclick="sendReceiptOnWhatsApp('${r.receiptNo}','${r.memberName}',${r.amount})"><i class="fab fa-whatsapp"></i></button>
        </div>
    </div>`).join('');
    window._filteredReceipts = filtered;
    saveToLocalStorage();
}

// ==================== FEATURE 22: CHART INTERACTIVITY ====================
function enhanceChartInteractivity(chart, data, labels) {
    if(!chart || !chart.canvas) return;
    chart.canvas.onclick = function(evt) {
        let points = chart.getElementsAtEventForMode(evt, 'nearest', { intersect: true }, false);
        if(points && points.length > 0) {
            let idx = points[0].index;
            let dsIdx = points[0].datasetIndex;
            let val = data[idx] !== undefined ? data[idx] : (chart.data.datasets[dsIdx]?.data[idx]);
            let label = labels[idx] || chart.data.labels[idx] || '';
            let total = (data.length ? data : chart.data.datasets[dsIdx]?.data || []).reduce((a,b) => a+(+b||0), 0);
            let pct = total > 0 ? ((+val/total)*100).toFixed(1) : '0.0';
            showToast(`📊 ${label}: ₹${(+val||0).toLocaleString('hi-IN')} (${pct}%)`);
        }
    };
    // Custom tooltip showing ₹ and percentage
    if(chart.options && chart.options.plugins) {
        chart.options.plugins.tooltip = chart.options.plugins.tooltip || {};
        chart.options.plugins.tooltip.callbacks = chart.options.plugins.tooltip.callbacks || {};
        chart.options.plugins.tooltip.callbacks.label = function(context) {
            let val = context.parsed.y !== undefined ? context.parsed.y : context.parsed;
            let ds = context.dataset.data || [];
            let total = ds.reduce((a,b) => a+(+b||0), 0);
            let pct = total > 0 ? ((+val/total)*100).toFixed(1) : '0.0';
            return ` ₹${(+val||0).toLocaleString('hi-IN')} (${pct}%)`;
        };
        chart.update('none');
    }
    // Legend click: hide/show dataset
    if(chart.options && chart.options.plugins && chart.options.plugins.legend) {
        chart.options.plugins.legend.onClick = function(e, legendItem, legend) {
            let idx = legendItem.datasetIndex !== undefined ? legendItem.datasetIndex : legendItem.index;
            let meta = chart.getDatasetMeta(idx);
            meta.hidden = !meta.hidden;
            chart.update();
            showToast(meta.hidden ? `📊 "${legendItem.text}" छुपाया` : `📊 "${legendItem.text}" दिखाया`);
        };
        chart.update('none');
    }
}

// ==================== FEATURE 23: AUTO REFRESH EVERY 5 MINUTES ====================
let _autoRefreshInterval = null;
let _lastAutoRefreshData = null;

function startAutoRefresh() {
    if(_autoRefreshInterval) clearInterval(_autoRefreshInterval);
    _autoRefreshInterval = setInterval(() => {
        if(!currentUser) return;
        try {
            // Compare current localStorage data with what we last saw
            let stored = localStorage.getItem(STORAGE_KEY);
            if(stored && stored !== _lastAutoRefreshData) {
                _lastAutoRefreshData = stored;
                let parsed = JSON.parse(stored);
                // Only update if data has actually changed meaningfully
                let newMemberCount = (parsed.members||[]).length;
                let oldMemberCount = appData.members.length;
                let newDonCount = (parsed.donations||[]).length;
                let oldDonCount = appData.donations.length;
                if(newMemberCount !== oldMemberCount || newDonCount !== oldDonCount) {
                    // Reload data from localStorage (simulates remote sync)
                    if(typeof loadFromLocalStorage === 'function') loadFromLocalStorage();
                    showToast("🔄 नया data आया");
                    if(typeof renderCurrentPage === 'function') renderCurrentPage();
                }
            } else if(!_lastAutoRefreshData) {
                _lastAutoRefreshData = stored;
            }
        } catch(e) {}
    }, 5 * 60 * 1000); // Every 5 minutes
}

// ==================== FEATURE 24: DRAG & DROP PHOTO UPLOAD ====================
function renderDragDropPhotoUpload(memberId, containerId) {
    let container = document.getElementById(containerId);
    if(!container) return;
    let member = appData.members.find(m => m.id == memberId);
    let currentPhoto = member ? member.photo : '';
    container.innerHTML = `
        <div class="dragdrop-upload-area" id="ddArea_${memberId}" 
             ondragover="handleDragOver(event,'${memberId}')" 
             ondragleave="handleDragLeave(event,'${memberId}')" 
             ondrop="handleDrop(event,'${memberId}')"
             onclick="document.getElementById('ddFileInput_${memberId}').click()">
            <div class="upload-icon">📸</div>
            <div class="upload-label">फोटो खींचें या क्लिक करें</div>
            <div class="upload-hint">JPG, PNG — अधिकतम 2MB</div>
            <input type="file" id="ddFileInput_${memberId}" accept="image/*" style="display:none" 
                   onchange="handleDDFileSelect(event,'${memberId}')">
        </div>
        ${currentPhoto ? `<img src="${currentPhoto}" class="dragdrop-preview" id="ddPreview_${memberId}">` : `<div id="ddPreview_${memberId}"></div>`}
    `;
}

function handleDragOver(evt, memberId) {
    evt.preventDefault();
    let area = document.getElementById('ddArea_' + memberId);
    if(area) area.classList.add('dragover');
}

function handleDragLeave(evt, memberId) {
    let area = document.getElementById('ddArea_' + memberId);
    if(area) area.classList.remove('dragover');
}

function handleDrop(evt, memberId) {
    evt.preventDefault();
    let area = document.getElementById('ddArea_' + memberId);
    if(area) area.classList.remove('dragover');
    let files = evt.dataTransfer.files;
    if(files && files.length > 0) processDDFile(files[0], memberId);
}

function handleDDFileSelect(evt, memberId) {
    let file = evt.target.files[0];
    if(file) processDDFile(file, memberId);
}

function processDDFile(file, memberId) {
    if(!file.type.startsWith('image/')) { showToast("❌ केवल Image files allowed", true); return; }
    // Show preview immediately
    let reader = new FileReader();
    reader.onload = function(e) {
        let previewEl = document.getElementById('ddPreview_' + memberId);
        if(previewEl) {
            previewEl.outerHTML = `<img src="${e.target.result}" class="dragdrop-preview" id="ddPreview_${memberId}">`;
        }
    };
    reader.readAsDataURL(file);
    // Compress & save
    compressImage(file, 150, function(dataUrl) {
        let member = appData.members.find(m => m.id == memberId);
        if(member) {
            member.photo = dataUrl;
            saveToLocalStorage();
            showToast("✅ फोटो सेव हुई!");
            // Update preview with compressed version
            setTimeout(() => {
                let previewEl = document.getElementById('ddPreview_' + memberId);
                if(previewEl) previewEl.src = dataUrl;
            }, 100);
        }
    });
}

let _sessionTimer = null;
let _sessionWarnTimer = null;
const SESSION_TIMEOUT_MS = 30 * 60 * 1000;  // 30 minutes
const SESSION_WARN_BEFORE_MS = 1 * 60 * 1000; // warn 1 min before

function resetSession() {
    if(_sessionTimer) clearTimeout(_sessionTimer);
    if(_sessionWarnTimer) clearTimeout(_sessionWarnTimer);
    let warnEl = document.getElementById('sessionWarningModal');
    if(warnEl) warnEl.remove();
    if(!currentUser) return;
    // Warn at 29 minutes
    _sessionWarnTimer = setTimeout(() => {
        showSessionWarning();
    }, SESSION_TIMEOUT_MS - SESSION_WARN_BEFORE_MS);
    // Logout at 30 minutes
    _sessionTimer = setTimeout(() => {
        let warnEl = document.getElementById('sessionWarningModal');
        if(warnEl) warnEl.remove();
        if(currentUser) {
            showToast("⏰ सत्र समाप्त – स्वतः लॉगआउट", true);
            if(typeof doLogout === 'function') doLogout();

// ==================== FEATURE 28: AUTO BACKUP (EVERY 24 HOURS) ====================
const MAX_BACKUPS = 5;
const BACKUP_INTERVAL_MS = 24 * 60 * 60 * 1000; // 24 hours
const BACKUP_KEY = 'mandirAutoBackupHistory';

function doAutoBackup(silent) {
    try {
        let data = JSON.stringify(appData);
        let sizeKB = Math.round(data.length / 1024);
        let backupEntry = {
            id: 'bk_' + Date.now(),
            timestamp: new Date().toISOString(),
            sizeKB: sizeKB,
            memberCount: appData.members.length,
            donationCount: appData.donations.length,
            data: data
        };
        // Load backup history
        let historyStr = localStorage.getItem(BACKUP_KEY);
        let history = [];
        try { history = historyStr ? JSON.parse(historyStr) : []; } catch(e) { history = []; }
        // Add new backup at start
        history.unshift(backupEntry);
        // Keep only last 5 (data saved separately to save memory – store without data field in history list)
        let historyMeta = history.slice(0, MAX_BACKUPS).map(b => ({ id: b.id, timestamp: b.timestamp, sizeKB: b.sizeKB, memberCount: b.memberCount, donationCount: b.donationCount }));
        localStorage.setItem(BACKUP_KEY, JSON.stringify(historyMeta));
        // Save actual data in separate key (last 5)
        history.slice(0, MAX_BACKUPS).forEach(b => {
            localStorage.setItem('mandirBackup_' + b.id, b.data);
        });
        // Clean up old backups beyond 5
        if(history.length > MAX_BACKUPS) {
            history.slice(MAX_BACKUPS).forEach(b => {
                localStorage.removeItem('mandirBackup_' + b.id);
            });
        }
        // Store backup timestamp
        localStorage.setItem('mandirLastBackupTime', Date.now().toString());
        if(!silent) showToast(`💾 Auto Backup हुआ — ${sizeKB} KB`);
        // Update appData.backupHistory for display
        if(!appData.backupHistory) appData.backupHistory = [];
        appData.backupHistory = historyMeta.slice(0, MAX_BACKUPS);
    } catch(e) {
        if(!silent) showToast("❌ Backup failed: " + e.message, true);
    }
}

function restoreBackup(backupId) {
    if(!confirm("⚠️ क्या आप इस backup से data restore करना चाहते हैं? मौजूदा data replace हो जाएगा।")) return;
    try {
        let dataStr = localStorage.getItem('mandirBackup_' + backupId);
        if(!dataStr) { showToast("❌ Backup data नहीं मिला", true); return; }
        let parsed = JSON.parse(dataStr);
        // Copy safe fields
        let safeFields = ['members','donations','expenses','events','receipts','committees','committeeTransactions','transactions','otherDonations','announcements','meetings','settings'];
        safeFields.forEach(f => { if(parsed[f]) appData[f] = parsed[f]; });
        saveToLocalStorage();
        renderCurrentPage();
        showToast("✅ Backup restore हुआ!");
    } catch(e) {
        showToast("❌ Restore failed: " + e.message, true);
    }
}

function renderBackupManager() {
    let historyStr = localStorage.getItem(BACKUP_KEY);
    let history = [];
    try { history = historyStr ? JSON.parse(historyStr) : []; } catch(e) {}
    let lastBackupTime = localStorage.getItem('mandirLastBackupTime');
    let lastBackupStr = lastBackupTime ? new Date(parseInt(lastBackupTime)).toLocaleString('hi-IN') : 'कभी नहीं';
    let html = `<div class="card">
        <div class="card-title">💾 Auto Backup Manager
            <button class="btn btn-success btn-sm" onclick="doAutoBackup(false)">💾 अभी Backup लो</button>
        </div>
        <div style="background:#e8f5e9;border-radius:12px;padding:14px;margin-bottom:16px;font-size:13px">
            <div>⏰ <strong>अगला Auto Backup:</strong> हर 24 घंटे में स्वतः</div>

    if(!appData.backupHistory) appData.backupHistory = [];

// ==================== FIX: TARGET ALERT (80% and 100%) ====================
let _targetAlertShown = {};
function checkTargetAlerts() {
    let monthlyTarget = appData.settings.monthlyTarget || 50000;
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();
    let monthlyCollection = appData.donations.filter(d => new Date(d.date).getMonth() === currentMonth && new Date(d.date).getFullYear() === currentYear).reduce((s,d) => s+d.amount, 0);
    let pct = (monthlyCollection / monthlyTarget) * 100;
    let monthKey = `${currentYear}_${currentMonth}`;
    
    if(pct >= 100 && !_targetAlertShown[monthKey+'_100']) {
        _targetAlertShown[monthKey+'_100'] = true;
        showTargetAlert(`🎉 लक्ष्य 100% पूरा! ₹${monthlyCollection.toLocaleString()} / ₹${monthlyTarget.toLocaleString()}`, '#28a745');
    } else if(pct >= 80 && !_targetAlertShown[monthKey+'_80']) {
        _targetAlertShown[monthKey+'_80'] = true;
        showTargetAlert(`🎯 लक्ष्य 80% पूरा! ₹${monthlyCollection.toLocaleString()} / ₹${monthlyTarget.toLocaleString()} — केवल ₹${(monthlyTarget-monthlyCollection).toLocaleString()} बाकी`, '#FF9933');
    }
}

function showTargetAlert(msg, color) {
    let existing = document.getElementById('targetAlertBanner');
    if(existing) existing.remove();
    let div = document.createElement('div');
    div.id = 'targetAlertBanner';
    div.style.cssText = `position:fixed;top:70px;left:50%;transform:translateX(-50%);background:${color};color:white;padding:12px 20px;border-radius:30px;z-index:9999;font-weight:700;font-size:14px;box-shadow:0 4px 15px rgba(0,0,0,0.2);display:flex;gap:12px;align-items:center;max-width:90vw;text-align:center;animation:fadeInUp 0.3s`;
    div.innerHTML = `${msg} <button onclick="this.parentElement.remove()" style="background:rgba(255,255,255,0.3);border:none;border-radius:20px;padding:4px 10px;color:white;cursor:pointer;font-size:12px">✕ बंद</button>`;

}

const _origPreviewCSVImport = window.previewCSVImport;
window.previewCSVImport = function(input) {
    let file = input.files[0];
    if(!file) return;
    let reader = new FileReader();
    reader.onload = function(e) {
        let lines = e.target.result.split('\n').filter(l => l.trim());
        let headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
        let previewRows = lines.slice(1, 6).map(line => line.split(',').map(v => v.trim().replace(/^"|"$/g,'')));
        let html = `<div class="modal"><div class="modal-content" style="max-width:650px">
            <h3>📥 CSV Preview (पहले 5 पंक्तियाँ)</h3>
            <div style="overflow-x:auto;margin-bottom:15px">
                <table class="data-table">
                    <thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
                    <tbody>${previewRows.map(row=>`<tr>${row.map(v=>`<td>${v}</td>`).join('')}</tr>`).join('')}</tbody>
                </table>
            </div>
            <div style="background:#e8f5e9;border-radius:12px;padding:12px;margin-bottom:12px;font-size:13px">
                ✅ कुल पंक्तियाँ: <strong>${lines.length-1}</strong> | पहले 5 preview में दिख रहे हैं
            </div>
            <p style="font-size:12px;color:#888">आवश्यक columns: name, mobile, village, father, monthlyAmount, joinDate</p>
            <div class="flex-between">
                <button class="btn btn-primary" onclick="executeCSVImport(${JSON.stringify(e.target.result).replace(/</g,'&lt;')})">✅ Import करें (${lines.length-1} सदस्य)</button>
                <button class="btn btn-secondary" onclick="closeModal()">रद्द</button>
            </div>
        </div></div>`;
        document.body.insertAdjacentHTML('beforeend', html);
    };
    reader.readAsText(file);
};

window.executeCSVImport = function(csvText) {
    let lines = csvText.split('\n').filter(l => l.trim());
    let headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/^"|"$/g,''));
    let added = 0;
    lines.slice(1).forEach(line => {
        let vals = line.split(',').map(v => v.trim().replace(/^"|"$/g,''));
        let obj = {};
        headers.forEach((h,i) => { obj[h] = vals[i] || ''; });
        if(obj.name) {
            let amt = parseFloat(obj.monthlyamount || obj.monthly_amount || obj['मासिक राशि'] || '200') || 200;
            let jd = obj.joindate || obj.join_date || obj['ज्वाइन तिथि'] || new Date().toISOString().slice(0,10);
            appData.members.push({ id: Date.now() + added, name: obj.name, father: obj.father||obj['पिता']||'', mobile: obj.mobile||obj['मोबाइल']||'', village: obj.village||obj['गाँव']||'', monthlyAmount: amt, joinDate: jd, birthDate: obj.birthdate||'', status:'active', hidden:false, photo:'', advanceBalance:0, pending:0, editHistory:[], donationStatus:'active', donationPauseHistory:[], monthlyAmountHistory:[{amount:amt,effectiveDate:jd}] });
            added++;
        }
    });
    computeAllPending();
    saveToLocalStorage();
    closeModal();
    showToast(`✅ ${added} सदस्य import हुए`);
    addAuditLog("CSV_IMPORT", `${added} सदस्य import`);
    renderMemberList();
};

(function patchChatSystem() {

                    let typingDiv = document.createElement('div');
                    typingDiv.id = 'typingIndicator';
                    typingDiv.style.cssText = 'font-size:11px;color:#aaa;padding:4px 8px;display:none';
                    typingDiv.innerHTML = '<i>typing...</i>';
                    chatInput.parentNode.insertBefore(typingDiv, chatInput);
                    chatInput.addEventListener('input', () => {
                        typingDiv.style.display = 'block';
                        clearTimeout(window._typingTimer);
                        window._typingTimer = setTimeout(() => { typingDiv.style.display = 'none'; }, 1500);
                    });
                }
            }, 300);
        };
    }

    // Count unread messages and show badge
    function updatePrivateChatBadges() {
        if(!currentUser || !appData.privateChats) return;
        let totalUnread = 0;
        Object.keys(appData.privateChats).forEach(key => {
            if(key.includes(currentUser.email)) {
                let unread = appData.privateChats[key].filter(m => m.senderId !== currentUser.email && !m.read).length;
                totalUnread += unread;
            }
        });
        let badge = document.getElementById('privateChatBadge');
        if(!badge) {
            badge = document.createElement('span');
            badge.id = 'privateChatBadge';
            badge.style.cssText = 'background:#dc3545;color:white;border-radius:50%;padding:2px 6px;font-size:10px;font-weight:bold;margin-left:4px;display:none';
            let privateBtn = document.querySelector('[onclick*="privateChat"]');
            if(privateBtn) privateBtn.appendChild(badge);
        }
        if(badge) {
            badge.textContent = totalUnread;
            badge.style.display = totalUnread > 0 ? 'inline' : 'none';
        }
    }
    setInterval(updatePrivateChatBadges, 3000);
})();

const _origFilterReceiptsAdvanced_v11 = window.filterReceiptsAdvanced;
window.filterReceiptsAdvanced = function() {
    let search = (document.getElementById('recSearch')?.value || '').toLowerCase();
    let dateFrom = document.getElementById('recDateFrom')?.value || '';
    let dateTo = document.getElementById('recDateTo')?.value || '';
    let recs = appData.receipts || [];
    let filtered = recs.filter(r => {
        if(search && !(r.memberName||'').toLowerCase().includes(search) && !(r.receiptNo||'').toLowerCase().includes(search)) return false;
        let rDate = r.date ? r.date.slice(0,10) : '';
        if(dateFrom && rDate < dateFrom) return false;
        if(dateTo && rDate > dateTo) return false;
        return true;
    }).slice().reverse().slice(0,150);
    let countEl = document.getElementById('recFilteredCount');
    if(countEl) countEl.textContent = `कुल: ${filtered.length}`;
    let container = document.getElementById('receiptListContainer');
    if(!container) return;
    if(filtered.length === 0) { container.innerHTML = '<p style="text-align:center;color:#aaa;padding:20px">कोई रसीद नहीं मिली</p>'; return; }
    container.innerHTML = filtered.map(r => `<div class="member-card">
        <div>
            <span class="receipt-no" onclick="viewReceiptById('${r.receiptNo}')">${r.receiptNo}</span>

            ${canDeleteReceipt() ? (isSuperAdmin() ? 
                `<button class="btn-sm btn-danger" onclick="deleteReceiptDirect(${r.id})" title="Delete">🗑️ Delete</button>` :
                `<button class="btn-sm btn-warning" onclick="requestReceiptDelete(${r.id},'${r.receiptNo}')" title="Delete Request">🗑️ Delete Request</button>`
            ) : ''}
        </div>
    </div>`).join('');
    window._filteredReceipts = filtered;
    saveToLocalStorage();
};

function deleteReceiptDirect(receiptId) {
    if(!isSuperAdmin()) { showToast('❌ सिर्फ Super Admin Direct Delete कर सकते हैं', true); return; }
    let reason = prompt('🗑️ Receipt Delete करने का कारण लिखें (अनिवार्य):');
    if(!reason) { showToast('⚠️ कारण जरूरी है', true); return; }
    if(!confirm('क्या आप वाकई यह रसीद हटाना चाहते हैं?')) return;
    let rec = appData.receipts.find(r => r.id === receiptId);
    if(!rec) { showToast('❌ रसीद नहीं मिली', true); return; }
    appData.receipts = appData.receipts.filter(r => r.id !== receiptId);
    saveToLocalStorage();
    addAuditLog('RECEIPT_DELETED', `${rec.receiptNo} - ${rec.memberName} - ₹${rec.amount} | कारण: ${reason}`);
    showToast(`✅ रसीद ${rec.receiptNo} हटाई गई`);
    if(typeof filterReceiptsAdvanced === 'function') filterReceiptsAdvanced();
}

function requestReceiptDelete(receiptId, receiptNo) {
    if(!isAdmin()) { showToast('❌ सिर्फ Admin Delete Request कर सकते हैं', true); return; }
    let reason = prompt(`🗑️ रसीद ${receiptNo} Delete के लिए कारण लिखें (Super Admin approval चाहिए):`);
    if(!reason) { showToast('⚠️ कारण जरूरी है', true); return; }
    let rec = appData.receipts.find(r => r.id === receiptId);
    submitApprovalRequest({
        type: 'RECEIPT_DELETE',
        itemId: receiptId,
        itemType: 'receipt_delete',
        currentData: JSON.stringify(rec||{}),
        newData: JSON.stringify({deleted:true}),
        reason: reason
    }, 'super_admin');
}
