// App Theme Load on startup
let savedThemeMain = localStorage.getItem('mandirThemeMain');
let savedThemeDark = localStorage.getItem('mandirThemeDark');
if(savedThemeMain && savedThemeDark) {
document.documentElement.style.setProperty('--saffron', savedThemeMain);

if(metaTag) metaTag.setAttribute("content", savedThemeMain);
}
</script>

function openIndexedDB() { return new Promise((resolve, reject) => { if (db && db.name === DB_NAME) { resolve(db); return; } const req = indexedDB.open(DB_NAME, DB_VERSION); req.onerror = () => reject(req.error); req.onsuccess = () => { db = req.result; resolve(db); }; req.onupgradeneeded = (e) => { const d = e.target.result; STORES.forEach(s => { if (!d.objectStoreNames.contains(s)) d.createObjectStore(s, { keyPath: 'id' }); }); }; }); }
async function saveToIndexedDB(store, id, data) { try { const d = await openIndexedDB(); const tx = d.transaction(store, 'readwrite'); tx.objectStore(store).put({ id: id, data: data, updatedAt: new Date().toISOString() }); return true; } catch(e) { return false; } }
async function getFromIndexedDB(store, id) { try { const d = await openIndexedDB(); const tx = d.transaction(store, 'readonly'); const req = tx.objectStore(store).get(id); return new Promise((res) => { req.onsuccess = () => res(req.result ? req.result.data : null); req.onerror = () => res(null); }); } catch(e) { return null; } }
async function deleteFromIndexedDB(store, id) { try { const d = await openIndexedDB(); const tx = d.transaction(store, 'readwrite'); tx.objectStore(store).delete(id); return true; } catch(e) { return false; } }

function getAllMonths(joinDate) { let join = new Date(joinDate); let now = new Date(); let months = []; let currentYear = now.getFullYear(); let currentMonth = now.getMonth(); for(let y=join.getFullYear(); y<=currentYear; y++) { let sm = (y===join.getFullYear()) ? join.getMonth() : 0; let em = (y===currentYear) ? currentMonth : 11; for(let m=sm; m<=em; m++) { months.push({ year: y, monthIndex: m, monthName: ['जनवरी','फरवरी','मार्च','अप्रैल','मई','जून','जुलाई','अगस्त','सितम्बर','अक्टूबर','नवम्बर','दिसम्बर'][m] }); } } return months; }
function getYearOptions() { let currentYear = new Date().getFullYear(); let opts = ''; for (let y = 2024; y <= currentYear; y++) { opts += `<option value="${y}">${y}</option>`; } return opts; }
function getDataYears() { let currentYear = new Date().getFullYear(); let years = []; for (let y = 2024; y <= currentYear; y++) { years.push(y); } return years; }

function getAmountAtDate(item, date) {
if(!item.amountHistory || item.amountHistory.length===0) return item.monthlyAmount || 0;
let sorted = [...item.amountHistory].sort((a,b)=>new Date(a.effectiveDate)-new Date(b.effectiveDate));
let effective = sorted[0].amount;
for(let h of sorted) if(new Date(h.effectiveDate) <= new Date(date)) effective = h.amount;
return effective;
}

function computeAdvanceAndPendingForItem(item, typePrefix) {
if(item.status !== 'active') { item.pending = 0; return; }
let advType = typePrefix === 'monthly' ? 'advance' : typePrefix + '_advance';
let monthlyDonations = appData.donations.filter(d=>d.memberId===item.id && (d.type===typePrefix || d.type==='member_monthly'));
let advanceDonations = appData.donations.filter(d=>d.memberId===item.id && d.type===advType);
let totalAdvance = advanceDonations.reduce((s,d)=>s+d.amount,0);
let allMonths = getAllMonths(item.joinDate || "2024-01-01");
let expected=0; for(let mon of allMonths) expected += getAmountAtDate(item, new Date(mon.year, mon.monthIndex, 1));
let paid = monthlyDonations.reduce((s,d)=>s+d.amount,0);
let pending = expected - paid; let advBal = totalAdvance;
if(advBal>0 && pending>0) { if(advBal>=pending) { advBal-=pending; pending=0; } else { pending-=advBal; advBal=0; } }
item.pending = pending>0 ? pending : 0; item.advanceBalance = advBal>0 ? advBal : 0;
}

function computeAllAdvanceAndPending() {
for(let m of appData.members) computeAdvanceAndPendingForItem(m, 'monthly');
for(let o of appData.officers) computeAdvanceAndPendingForItem(o, 'officer_monthly');
saveToLocalStorage();
}
function computeAdvanceAndPending() { computeAllAdvanceAndPending(); }

function sendReminderMsg(id, type='member') {
let m; let donationType = 'monthly';
if(type === 'member') { m = appData.members.find(x=>x.id===id); }
else if(type === 'officer') { m = appData.officers.find(x=>x.id===id); donationType = 'officer_monthly'; }
if(!m || !m.mobile) return;
let allMonths = getAllMonths(m.joinDate || "2024-01-01");
let msg = `🚩 *जय श्री राम* 🚩\n\nप्रिय ${m.name} जी,\n\nविवरण:\n`;
for(let item of allMonths) {
let isPaid = appData.donations.some(d=>d.memberId===m.id && d.year===item.year && d.month===item.monthName && (d.type===donationType || d.type==='member_monthly'));
let amt = getAmountAtDate(m, new Date(item.year, item.monthIndex, 1));
msg += isPaid ? `✅ ${item.monthName} ${item.year}: ₹${amt} (जमा)\n` : `⭕ ${item.monthName} ${item.year}: ₹${amt} (देय)\n`;
}
msg += `\n⚠️ *कुल बकाया:* ₹${m.pending}\n💸 UPI ID: ${appData.settings.upiId}\n📱 *भुगतान:* UPI ऐप खोलें\n🙏 धन्यवाद - ${appData.settings.committeeName}`;
window.open(`https://wa.me/91${m.mobile}?text=${encodeURIComponent(msg)}`, '_blank'); showToast(`📱 रिमाइंडर भेजा`);
}

function openPaymentModal(memberId) {
if(!canAddDonation()){ showToast("⚠️ आप भुगतान नहीं जोड़ सकते",true); return; }
let m = appData.members.find(x=>x.id===memberId); if(!m) return;
let allMonths = getAllMonths(m.joinDate);
let paid = appData.donations.filter(d=>d.memberId===m.id && (d.type==='monthly' || d.type==='member_monthly')).map(d=>`${d.year}_${d.monthIndex}`);
let pending = allMonths.filter(mon=>!paid.includes(`${mon.year}_${mon.monthIndex}`));
if(pending.length===0){ showToast("✅ कोई बकाया नहीं"); return; }
let groups = {}; pending.forEach(mon=>{ if(!groups[mon.year]) groups[mon.year]=[]; groups[mon.year].push(mon); });
let years = Object.keys(groups).sort();
let html = `<div class="modal"><div class="modal-content"><h3>💰 भुगतान - ${m.name}</h3><div class="balance-card"><strong>⭐ एडवांस शेष:</strong> ₹${m.advanceBalance}</div><div id="multiYearChecklist" class="checklist"></div><div class="flex-between"><select id="payMode" class="form-control" style="width:120px"><option>कैश</option><option>UPI</option></select></div><div id="totalAmountDisplay" class="total-display"></div><div class="flex-between"><button class="btn btn-primary" onclick="processMultiYearPayment(${memberId})">✅ भुगतान करें</button><button class="btn btn-secondary" onclick="closeModal()">रद्द</button></div></div></div>`;
document.body.insertAdjacentHTML('beforeend', html);
let html2 = '';
for(let y of years) {
html2 += `<div class="year-group"><div class="year-header" onclick="toggleYear('${y}')"><div><input type="checkbox" class="yearCheckbox" data-year="${y}" onchange="selectYear('${y}', this.checked)"> <strong>📅 ${y}</strong> (${groups[y].length} महीने)</div></div><div class="year-months" id="yearMonths_${y}" style="display:block;">`;
for(let mon of groups[y]) { let amt = getAmountAtDate(m, new Date(mon.year, mon.monthIndex, 1)); html2 += `<div class="month-item"><input type="checkbox" class="monthCb" data-year="${mon.year}" data-month="${mon.monthIndex}" data-name="${mon.monthName}" data-amount="${amt}"> <label>${mon.monthName} - ₹${amt}</label></div>`; }

}
document.getElementById('multiYearChecklist').innerHTML = html2;
document.querySelectorAll('.monthCb').forEach(cb => cb.addEventListener('change', updateTotal));
document.querySelectorAll('.yearCheckbox').forEach(cb => cb.addEventListener('change', function(e) { let year = this.dataset.year; document.querySelectorAll(`.monthCb[data-year="${year}"]`).forEach(c => c.checked = this.checked); updateTotal(); }));
function updateTotal() { let total = 0; document.querySelectorAll('.monthCb:checked').forEach(cb => { total += parseFloat(cb.dataset.amount); }); document.getElementById('totalAmountDisplay').innerHTML = `💰 कुल राशि: ₹${total}`; }

}
function processMultiYearPayment(id) {
let m = appData.members.find(x=>x.id===id);
let selected = Array.from(document.querySelectorAll('.monthCb:checked')).map(cb=>({ year: parseInt(cb.dataset.year), monthIndex: parseInt(cb.dataset.monthIndex), monthName: cb.dataset.name, amount: parseFloat(cb.dataset.amount) }));
if(selected.length===0){ showToast("⚠️ महीना चुनें", true); return; }
let mode = document.getElementById('payMode').value; let remainingAdvance = m.advanceBalance; let totalNewPayment = 0; let paidList = [];
for(let s of selected) {
if(remainingAdvance > 0) {
if(remainingAdvance >= s.amount) { remainingAdvance -= s.amount; paidList.push({ month: s.monthName, year: s.year, amount: s.amount, paidFrom: "advance" }); }
else { let fromNew = s.amount - remainingAdvance; remainingAdvance = 0; totalNewPayment += fromNew; appData.donations.push({ id: Date.now(), memberId: m.id, memberName: m.name, type: "monthly", month: s.monthName, monthIndex: s.monthIndex, year: s.year, amount: fromNew, date: new Date().toISOString().slice(0,10), mode: mode }); paidList.push({ month: s.monthName, year: s.year, amount: s.amount, fromNew: fromNew }); }
} else { totalNewPayment += s.amount; appData.donations.push({ id: Date.now(), memberId: m.id, memberName: m.name, type: "monthly", month: s.monthName, monthIndex: s.monthIndex, year: s.year, amount: s.amount, date: new Date().toISOString().slice(0,10), mode: mode }); paidList.push({ month: s.monthName, year: s.year, amount: s.amount }); }
}
if(remainingAdvance !== m.advanceBalance) {
let advs = appData.donations.filter(d=>d.memberId===m.id && d.type==='advance').sort((a,b)=>new Date(a.date)-new Date(b.date));
let toReduce = m.advanceBalance - remainingAdvance;
for(let adv of advs) { if(toReduce <= 0) break; if(adv.amount <= toReduce) { toReduce -= adv.amount; adv.amount = 0; } else { adv.amount -= toReduce; toReduce = 0; } }
appData.donations = appData.donations.filter(d => !(d.type==='advance' && d.amount===0));
}
computeAllAdvanceAndPending(); saveToLocalStorage(); closeModal(); renderCurrentPage(); refreshDashboardCharts();
if(totalNewPayment > 0) generateReceipt(m, paidList.filter(p=>p.fromNew !== undefined || !p.paidFrom), totalNewPayment, mode, "मासिक भुगतान");
else showToast(`✅ सभी एडवांस से कवर हो गए!`);
}

<div class="mt-2"><h3>🎨 ऐप थीम चुनें</h3><div style="display:flex;gap:10px;margin-top:10px;"><div class="theme-color-box" style="background:#FF9933;" onclick="setAppTheme('#FF9933','#e68200')" title="नारंगी"></div><div class="theme-color-box" style="background:#e74c3c;" onclick="setAppTheme('#e74c3c','#c0392b')" title="लाल"></div><div class="theme-color-box" style="background:#27ae60;" onclick="setAppTheme('#27ae60','#2ecc71')" title="हरा"></div><div class="theme-color-box" style="background:#2980b9;" onclick="setAppTheme('#2980b9','#3498db')" title="नीला"></div><div class="theme-color-box" style="background:#f39c12;" onclick="setAppTheme('#f39c12','#e67e22')" title="पीला"></div><div class="theme-color-box" style="background:#8e44ad;" onclick="setAppTheme('#8e44ad','#9b59b6')" title="बैंगनी"></div></div></div></div>`;

}
function setAppTheme(main, dark) {
document.documentElement.style.setProperty('--saffron', main);
document.documentElement.style.setProperty('--saffron-dark', dark);
let metaTheme = document.querySelector('meta[name="theme-color"]');
if(metaTheme) metaTheme.setAttribute("content", main);
localStorage.setItem('mandirThemeMain', main);
localStorage.setItem('mandirThemeDark', dark);
showToast("🎨 थीम बदल गई!");
}

// Committee Management

function editOfficer(id) {
let o = appData.officers.find(x=>x.id===id);
let html = `<div class="modal"><div class="modal-content"><h3>✏️ पदाधिकारी संपादन</h3><input id="editOfficerName" value="${o.name}" class="form-control"><input id="editOfficerPost" value="${o.post||''}" class="form-control"><input id="editOfficerMobile" value="${o.mobile||''}" class="form-control"><input id="editOfficerAmount" type="number" value="${o.monthlyAmount}" class="form-control"><label>नई राशि प्रभावी तिथि:</label><input type="date" id="editOfficerEffDate" value="${new Date().toISOString().slice(0,10)}" class="form-control"><div class="flex-between"><button class="btn btn-primary" onclick="updateOfficer(${id})">अपडेट करें</button><button class="btn btn-secondary" onclick="closeModal()">रद्द</button></div></div></div>`;
document.body.insertAdjacentHTML('beforeend', html);
}
function updateOfficer(id) {
let o = appData.officers.find(x=>x.id===id);
o.name = document.getElementById('editOfficerName').value; o.post = document.getElementById('editOfficerPost').value; o.mobile = document.getElementById('editOfficerMobile').value;
let newAmt = parseFloat(document.getElementById('editOfficerAmount').value); let effDate = document.getElementById('editOfficerEffDate').value;
if(!isNaN(newAmt) && newAmt>0 && newAmt !== o.monthlyAmount){ if(!o.amountHistory) o.amountHistory = []; o.amountHistory.push({ amount: newAmt, effectiveDate: effDate }); o.monthlyAmount = newAmt; }
computeAllAdvanceAndPending(); saveToLocalStorage(); closeModal(); renderCommittees(); showToast("✅ पदाधिकारी अपडेट");
}

function renderOfficerTransactions() {
let officerOptions = appData.officers.map(o=>`<option value="${o.id}">${o.name} (${o.post})</option>`).join('');
let html = `<div class="card"><div class="card-title">🔄 पदाधिकारियों के बीच लेनदेन</div><div class="flex-between"><div><label>करने वाला (From):</label><select id="officerFrom" class="form-control">${officerOptions}</select></div><div><label>पाने वाला (To):</label><select id="officerTo" class="form-control">${officerOptions}</select></div><input type="number" id="officerAmount" placeholder="राशि" class="form-control" style="width:150px"><textarea id="officerNote" placeholder="विवरण" class="form-control" style="width:200px"></textarea><button class="btn btn-primary" onclick="processOfficerTransfer()">हस्तांतरण करें</button></div><div class="mt-2"><h3>हस्तांतरण इतिहास</h3><div class="table-wrapper"><table class="data-table"><thead><tr><th>तिथि</th><th>कर्ता</th><th>पाने वाला</th><th>राशि</th><th>विवरण</th></tr></thead><tbody>${(appData.officerTransfers||[]).slice().reverse().map(t=>`<tr><td>${t.date}</td><td>${t.fromName}</td><td>${t.toName}</td><td class="fine-amount">₹${t.amount}</td><td>${t.note||'-'}</td></tr>`).join('')}</tbody></table></div></div></div>`;
document.getElementById('contentArea').innerHTML = html;
}
function processOfficerTransfer() {
let fromId = parseInt(document.getElementById('officerFrom').value); let toId = parseInt(document.getElementById('officerTo').value); let amount = parseFloat(document.getElementById('officerAmount').value); let note = document.getElementById('officerNote').value;
if(fromId === toId || isNaN(amount) || amount<=0) return;
let fromOfficer = appData.officers.find(o=>o.id===fromId); let toOfficer = appData.officers.find(o=>o.id===toId);
let transferRecord = { id: Date.now(), amount: amount, date: new Date().toISOString().slice(0,10), note: note, fromId: fromId, toId: toId, fromName: fromOfficer.name, toName: toOfficer.name };
if(!appData.officerTransfers) appData.officerTransfers = []; appData.officerTransfers.unshift(transferRecord);
saveToLocalStorage(); showToast(`✅ हस्तांतरण सफल`); renderOfficerTransactions();
}

function renderTransactionsMain() {
if(!canManageTransactions()){ document.getElementById('contentArea').innerHTML='<div class="card">❌ आप लेनदेन नहीं देख सकते</div>'; return; }
let totalDeposit = appData.transactions.filter(t=>t.type==='deposit' && !t.deleted).reduce((s,t)=>s+t.amount,0);
let totalWithdraw = appData.transactions.filter(t=>t.type==='withdraw' && !t.deleted).reduce((s,t)=>s+t.amount,0);
let balance = totalDeposit - totalWithdraw;
let html = `<div class="card"><div class="card-title">💰 लेनदेन प्रबंधन</div><div class="balance-card"><h3>चालू बैलेंस</h3><p style="font-size:32px; font-weight:bold; color:var(--saffron)">₹${balance}</p><p>कुल जमा: ₹${totalDeposit} | कुल निकासी: ₹${totalWithdraw}</p></div><div class="flex-between"><button class="btn btn-success" onclick="openTransactionModal('deposit')"><i class="fas fa-plus-circle"></i> जमा (+)</button><button class="btn btn-danger" onclick="openTransactionModal('withdraw')"><i class="fas fa-minus-circle"></i> निकासी (-)</button><button class="btn btn-info" onclick="renderOfficerTransactions()"><i class="fas fa-exchange-alt"></i> पदाधिकारी हस्तांतरण</button></div><div class="table-wrapper"><table class="data-table"><thead><tr><th>तिथि</th><th>प्रकार</th><th>विवरण</th><th>राशि (₹)</th></tr></thead><tbody id="transactionListBody"></tbody></table></div></div>`;
document.getElementById('contentArea').innerHTML = html;
renderTransactionsList();
}
function renderTransactionsList() {
let tbody = document.getElementById('transactionListBody'); if(!tbody) return;
tbody.innerHTML = appData.transactions.filter(t=>!t.deleted).slice().reverse().map(t=>`<tr><td>${t.date}</td><td class="${t.type==='deposit'?'text-success':'text-danger'}">${t.type==='deposit'?'जमा (+)':'निकासी (-)'}</td><td>${t.note||'-'}</td><td class="${t.type==='deposit'?'text-success':'text-danger'}">₹${t.amount}</td></tr>`).join('');
}
function openTransactionModal(type) {
let html = `<div class="modal"><div class="modal-content"><h3>${type==='deposit'?'💰 जमा':'💸 निकासी'}</h3><input type="number" id="transAmount" placeholder="राशि" class="form-control"><input type="date" id="transDate" value="${new Date().toISOString().slice(0,10)}" class="form-control"><textarea id="transNote" placeholder="विवरण" class="form-control"></textarea><div class="flex-between"><button class="btn btn-primary" onclick="saveTransaction('${type}')">सेव करें</button><button class="btn btn-secondary" onclick="closeModal()">रद्द</button></div></div></div>`;
document.body.insertAdjacentHTML('beforeend', html);
}
function saveTransaction(type) {
let amount = parseFloat(document.getElementById('transAmount').value);
if(isNaN(amount) || amount<=0) return;
let transaction = { id: Date.now(), type: type, amount: amount, date: document.getElementById('transDate').value, note: document.getElementById('transNote').value, deleted: false };
appData.transactions.push(transaction); saveToLocalStorage(); closeModal(); showToast(`✅ लेनदेन सफल`); renderTransactionsMain();
}
function editTransaction(id) {
let t = appData.transactions.find(x=>x.id===id);
let html = `<div class="modal"><div class="modal-content"><h3>✏️ संपादन</h3><input type="number" id="editTransAmount" value="${t.amount}" class="form-control"><input type="date" id="editTransDate" value="${t.date}" class="form-control"><textarea id="editTransNote" class="form-control">${t.note||''}</textarea><textarea id="editTransReason" placeholder="कारण *" class="form-control" required></textarea><div class="flex-between"><button class="btn btn-primary" onclick="updateTransaction(${id})">अपडेट करें</button><button class="btn btn-secondary" onclick="closeModal()">रद्द</button></div></div></div>`;
document.body.insertAdjacentHTML('beforeend', html);
}
function updateTransaction(id) {
let t = appData.transactions.find(x=>x.id===id); let reason = document.getElementById('editTransReason').value; if(!reason) return;
t.amount = parseFloat(document.getElementById('editTransAmount').value); t.date = document.getElementById('editTransDate').value; t.note = document.getElementById('editTransNote').value;
saveToLocalStorage(); closeModal(); showToast("✅ अपडेट"); renderTransactionsMain();
}
async function deleteTransaction(id) {
if(!await confirmDoubleDelete("लेनदेन")) return;
let idx = appData.transactions.findIndex(t=>t.id===id);
if(idx!==-1) {
let deleted = { ...appData.transactions[idx], deletedAt: new Date().toISOString(), deletedBy: currentUser.name };
appData.deletedTransactions.push(deleted); appData.transactions[idx].deleted = true;
saveToLocalStorage(); renderTransactionsMain(); showToast("✅ लेनदेन हटा");
}
}

// Reports
function renderReportsMain() {
let html = `<div class="card"><div class="card-title">📊 रिपोर्ट्स</div><div class="stats-grid"><div class="stat-card" onclick="renderYearlyReport()"><div class="stat-value">📆</div><div class="stat-label">वार्षिक रिपोर्ट</div></div><div class="stat-card" onclick="renderMonthlyReport()"><div class="stat-value">📅</div><div class="stat-label">मासिक रिपोर्ट</div></div><div class="stat-card" onclick="renderLedgerReport()"><div class="stat-value">📒</div><div class="stat-label">लेजर</div></div><div class="stat-card" onclick="renderPendingReport()"><div class="stat-value">⚠️</div><div class="stat-label">बकाया रिपोर्ट</div></div><div class="stat-card" onclick="renderTrendReport()"><div class="stat-value">📈</div><div class="stat-label">ट्रेंड रिपोर्ट</div></div><div class="stat-card" onclick="renderExpenseChart()"><div class="stat-value">🥧</div><div class="stat-label">व्यय विश्लेषण</div></div></div></div>`;
document.getElementById('contentArea').innerHTML = html;
}
function renderYearlyReport() { let years = getDataYears(); let currentYear = new Date().getFullYear(); let html = `<div class="card"><div class="card-title">📆 वार्षिक रिपोर्ट</div><div class="year-selector"><select id="yearlyYear" onchange="updateYearlyReport()">${years.map(y=>`<option value="${y}" ${y===currentYear?'selected':''}>${y}</option>`).join('')}</select></div><div id="yearlyReportData"></div><canvas id="yearlyChartCanvas" style="height:200px; margin-top:15px;"></canvas></div>`; document.getElementById('contentArea').innerHTML = html; updateYearlyReport(); }
function updateYearlyReport() {
let year = parseInt(document.getElementById('yearlyYear').value);
let income = appData.donations.filter(d=>new Date(d.date).getFullYear()===year).reduce((s,d)=>s+d.amount,0);
let expense = appData.expenses.filter(e=>new Date(e.date).getFullYear()===year).reduce((s,e)=>s+e.amount,0);
document.getElementById('yearlyReportData').innerHTML = `<div class="stats-grid"><div class="stat-card"><div class="stat-value text-success">₹${income}</div><div>आय</div></div><div class="stat-card"><div class="stat-value text-danger">₹${expense}</div><div>व्यय</div></div><div class="stat-card"><div class="stat-value text-primary">₹${income-expense}</div><div>लाभ/हानि</div></div></div>`;
let months = ['जन','फर','मार्च','अप्रैल','मई','जून','जुलाई','अग','सित','अक्टू','नव','दिस'];
let monthlyIncome = months.map((_,i)=>appData.donations.filter(d=>new Date(d.date).getMonth()===i && new Date(d.date).getFullYear()===year).reduce((s,d)=>s+d.amount,0));
let monthlyExpense = months.map((_,i)=>appData.expenses.filter(e=>new Date(e.date).getMonth()===i && new Date(e.date).getFullYear()===year).reduce((s,e)=>s+e.amount,0));
let ctx = document.getElementById('yearlyChartCanvas')?.getContext('2d');
if(ctx) { if(yearlyChart) yearlyChart.destroy(); yearlyChart = new Chart(ctx, { type:'bar', data:{ labels:months, datasets:[{ label:'आय', data:monthlyIncome, backgroundColor:'#28a745' },{ label:'व्यय', data:monthlyExpense, backgroundColor:'#dc3545' }] } }); }
}
function renderMonthlyReport() { let years = getDataYears(); let months = ['जनवरी','फरवरी','मार्च','अप्रैल','मई','जून','जुलाई','अगस्त','सितम्बर','अक्टूबर','नवम्बर','दिसम्बर']; let currentYear = new Date().getFullYear(), currentMonth = new Date().getMonth(); let html = `<div class="card"><div class="card-title">📅 मासिक रिपोर्ट</div><div class="flex-between"><div class="year-selector"><select id="monthlyYear" onchange="updateMonthlyReport()">${years.map(y=>`<option value="${y}" ${y===currentYear?'selected':''}>${y}</option>`).join('')}</select></div><div class="month-selector"><select id="monthlyMonth" onchange="updateMonthlyReport()">${months.map((m,i)=>`<option value="${i}" ${i===currentMonth?'selected':''}>${m}</option>`).join('')}</select></div></div><div id="monthlyReportData"></div></div>`; document.getElementById('contentArea').innerHTML = html; updateMonthlyReport(); }
function updateMonthlyReport() {
let year = parseInt(document.getElementById('monthlyYear').value); let month = parseInt(document.getElementById('monthlyMonth').value);
let income = appData.donations.filter(d=>new Date(d.date).getFullYear()===year && new Date(d.date).getMonth()===month).reduce((s,d)=>s+d.amount,0);
let expense = appData.expenses.filter(e=>new Date(e.date).getFullYear()===year && new Date(e.date).getMonth()===month).reduce((s,e)=>s+e.amount,0);
document.getElementById('monthlyReportData').innerHTML = `<div class="stats-grid"><div class="stat-card"><div class="stat-value text-success">₹${income}</div><div>आय</div></div><div class="stat-card"><div class="stat-value text-danger">₹${expense}</div><div>व्यय</div></div><div class="stat-card"><div class="stat-value text-primary">₹${income-expense}</div><div>शेष</div></div></div>`;
}
function renderLedgerReport() { let html = `<div class="card"><div class="card-title">📒 लेजर रिपोर्ट</div><div class="year-selector"><select id="ledgerYear" onchange="updateLedger()">${getYearOptions()}</select></div><div id="ledgerTable"></div></div>`; document.getElementById('contentArea').innerHTML = html; updateLedger(); }
function updateLedger(){
let year = parseInt(document.getElementById('ledgerYear').value);
let months = ['जनवरी','फरवरी','मार्च','अप्रैल','मई','जून','जुलाई','अगस्त','सितम्बर','अक्टूबर','नवम्बर','दिसम्बर'];
let rows='', totalInc=0, totalExp=0;
for(let i=0;i<12;i++){
let inc = appData.donations.filter(d=>new Date(d.date).getMonth()===i && new Date(d.date).getFullYear()===year).reduce((s,d)=>s+d.amount,0);
let exp = appData.expenses.filter(e=>new Date(e.date).getMonth()===i && new Date(e.date).getFullYear()===year).reduce((s,e)=>s+e.amount,0);
totalInc+=inc; totalExp+=exp;
rows += `<tr><td>${months[i]}</td><td class="text-success">₹${inc}</td><td class="text-danger">₹${exp}</td><td class="${inc-exp>=0?'text-success':'text-danger'}">₹${inc-exp}</td></tr>`;
}
document.getElementById('ledgerTable').innerHTML = `<table class="data-table"><thead><tr><th>महीना</th><th>आय</th><th>व्यय</th><th>लाभ/हानि</th></tr></thead><tbody>${rows}</tbody><tfoot><tr style="background:#f0f0f0"><th>कुल</th><th>₹${totalInc}</th><th>₹${totalExp}</th><th>₹${totalInc-totalExp}</th></tr></tfoot></table>`;
}
function renderPendingReport(){
let pending = appData.members.filter(m=>!m.hidden && m.pending>0);
let total = pending.reduce((s,m)=>s+m.pending,0);
document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">⚠️ बकाया रिपोर्ट</div><div class="stats-grid"><div class="stat-card"><div class="stat-value">${pending.length}</div><div>बकाया सदस्य</div></div><div class="stat-card"><div class="stat-value text-danger">₹${total}</div><div>कुल बकाया</div></div></div><div class="table-wrapper"><table class="data-table"><thead><tr><th>नाम</th><th>मोबाइल</th><th>बकाया</th><th>कार्य</th></tr></thead><tbody>${pending.map(m=>`<tr><td class="name-pending">${m.name}</td><td>${m.mobile||'-'}</td><td class="badge-pending">₹${m.pending}</td><td><button class="btn-sm btn-warning" onclick="sendReminderMsg(${m.id}, 'member')">📱</button><button class="btn-sm btn-secondary" onclick="showPaymentQR(${m.id})">QR</button></td></tr>`).join('')}</tbody></table></div></div>`;
}
function renderTrendReport(){ let html=`<div class="card"><div class="card-title">📈 ट्रेंड रिपोर्ट</div><div class="year-selector"><select id="trendYear" onchange="loadTrend()">${getYearOptions()}</select></div><canvas id="trendCanvas"></canvas></div>`; document.getElementById('contentArea').innerHTML=html; loadTrend(); }
function loadTrend(){
let year=parseInt(document.getElementById('trendYear').value);
let months=['जन','फर','मार्च','अप्रैल','मई','जून','जुलाई','अग','सित','अक्टू','नव','दिस'];
let incData=months.map((_,i)=>appData.donations.filter(d=>new Date(d.date).getMonth()===i && new Date(d.date).getFullYear()===year).reduce((s,d)=>s+d.amount,0));
let expData=months.map((_,i)=>appData.expenses.filter(e=>new Date(e.date).getMonth()===i && new Date(e.date).getFullYear()===year).reduce((s,e)=>s+e.amount,0));
let ctx=document.getElementById('trendCanvas')?.getContext('2d');
if(ctx) { if(trendChart) trendChart.destroy(); trendChart = new Chart(ctx,{type:'line',data:{labels:months,datasets:[{label:'आय',data:incData,borderColor:'#28a745'},{label:'व्यय',data:expData,borderColor:'#dc3545'}]}}); }
}
function renderExpenseChart(){
let cat={}; appData.expenses.filter(e => !e.deleted).forEach(e=>{cat[e.category]=(cat[e.category]||0)+e.amount;});
let labels=Object.keys(cat), data=Object.values(cat); let total=data.reduce((a,b)=>a+b,0);
let html=`<div class="card"><div class="card-title">🥧 व्यय श्रेणी विश्लेषण</div><canvas id="pieCanvas"></canvas><table class="data-table mt-2"><thead><tr><th>श्रेणी</th><th>राशि</th><th>%</th></tr></thead><tbody>${labels.map((l,i)=>`<tr><td class="name-active">${l}</td><td class="text-danger">₹${data[i]}</td><td>${((data[i]/total)*100).toFixed(1)}%</td></tr>`).join('')}</tbody></table></div>`;
document.getElementById('contentArea').innerHTML=html;
let ctx=document.getElementById('pieCanvas')?.getContext('2d');
if(ctx) { if(pieChart) pieChart.destroy(); pieChart = new Chart(ctx,{type:'pie',data:{labels:labels,datasets:[{data:data,backgroundColor:['#FF9933','#28a745','#dc3545','#17a2b8','#6f42c1']}]}}); }
}

// Miscellaneous Functions
function renderExpenses(){
if(!canEdit()){ document.getElementById('contentArea').innerHTML='<div class="card">❌ केवल एडमिन</div>'; return; }
let years = getDataYears();
let html=`<div class="card"><div class="card-title">💸 व्यय प्रबंधन</div><div class="flex-between"><input id="expCat" placeholder="श्रेणी" class="form-control" style="width:30%"><input id="expAmt" type="number" placeholder="राशि" class="form-control" style="width:25%"><input id="expNote" placeholder="विवरण" class="form-control" style="width:30%"><button class="btn btn-danger" onclick="addExpense()">जोड़ें</button></div><div class="filter-bar mt-2"><select id="expenseYearFilter" onchange="renderExpenseList()"><option value="all">सभी वर्ष</option>${years.map(y=>`<option value="${y}">${y}</option>`).join('')}</select><input type="text" id="expenseCategoryFilter" placeholder="श्रेणी खोजें" class="form-control" style="width:150px" onkeyup="renderExpenseList()"></div><div id="expList" class="table-wrapper mt-2"></div></div>`;
document.getElementById('contentArea').innerHTML=html; renderExpenseList();
}
function addExpense(){
if(!canEdit()) return;
let category = document.getElementById('expCat').value; let amount = parseFloat(document.getElementById('expAmt').value);
if(!category || isNaN(amount) || amount<=0) return;
let e={id:Date.now(), category:category, amount:amount, note:document.getElementById('expNote').value, date:new Date().toISOString().slice(0,10), deleted:false};
appData.expenses.push(e); saveToLocalStorage(); renderExpenseList(); showToast("✅ व्यय जोड़ा"); refreshDashboardCharts();
}
function renderExpenseList(){

function renderEventAttendance() {
let events = appData.events.filter(e=>!e.deleted);
let eventOptions = events.map(e=>`<option value="${e.id}">${e.name} (${e.date})</option>`).join('');
let fines = appData.fines || []; let totalFine = fines.reduce((s,f)=>s+f.amount,0);
let html = `<div class="card"><div class="card-title">📋 आयोजन उपस्थिति एवं जुर्माना</div><div class="balance-card"><h3>कुल जुर्माना राशि: ₹${totalFine}</h3></div><div class="flex-between"><select id="attendanceEvent" class="form-control" style="width:200px">${eventOptions}</select><button class="btn btn-primary" onclick="loadEventAttendance()">लोड करें</button>${canEdit()?`<button class="btn btn-success" onclick="saveEventAttendance()">उपस्थिति सेव करें</button>`:''}</div><div id="attendanceList"></div><div class="mt-2"><h3>जुर्माना सूची</h3><div id="finesList"></div></div></div>`;
document.getElementById('contentArea').innerHTML = html; loadFinesList();
}
function loadEventAttendance() {
let eventId = document.getElementById('attendanceEvent')?.value; if(!eventId) return;
let existingAttendance = appData.eventAttendances.find(a=>a.eventId==eventId);
let members = appData.members.filter(m=>!m.hidden && m.status==='active');
let html = `<div class="table-wrapper"><table class="data-table"><thead><tr><th>सदस्य नाम</th><th>उपस्थित</th><th>जुर्माना (₹)</th></tr></thead><tbody>`;
members.forEach(m => {
let attendance = existingAttendance ? (existingAttendance.present.includes(m.id) ? true : false) : true;
let fine = existingAttendance ? (existingAttendance.fines.find(f=>f.memberId===m.id)?.amount || 0) : 0;
html += `<tr><td class="${getNameClass(m)}">${m.name}</td><td><input type="checkbox" class="attendance-cb" data-id="${m.id}" ${attendance?'checked':''}></td><td><input type="number" class="fine-input" data-id="${m.id}" value="${fine}" style="width:80px"></td></tr>`;
});
html += `</tbody></table></div><input type="hidden" id="currentEventId" value="${eventId}">`;
document.getElementById('attendanceList').innerHTML = html;
}
function saveEventAttendance() {
if(!canEdit()) return;
let eventId = document.getElementById('currentEventId')?.value; if(!eventId) { showToast("⚠️ पहले कोई आयोजन लोड करें", true); return; }
let present = []; let fines = [];
document.querySelectorAll('.attendance-cb').forEach(cb => { if(cb.checked) present.push(parseInt(cb.dataset.id)); });
document.querySelectorAll('.fine-input').forEach(inp => {
let amt = parseFloat(inp.value);
if(amt > 0) {
fines.push({ memberId: parseInt(inp.dataset.id), amount: amt });
let existingFineIndex = appData.fines.findIndex(f=>f.memberId===parseInt(inp.dataset.id) && f.eventId==eventId);
if(existingFineIndex !== -1) { appData.fines[existingFineIndex].amount = amt; }
else { appData.fines.push({ id: Date.now(), eventId: eventId, memberId: parseInt(inp.dataset.id), amount: amt, date: new Date().toISOString().slice(0,10) }); }
}
});
let existingIndex = appData.eventAttendances.findIndex(a=>a.eventId==eventId);
if(existingIndex !== -1) { appData.eventAttendances[existingIndex] = { eventId: eventId, present: present, fines: fines, updatedAt: new Date().toISOString() }; }
else { appData.eventAttendances.push({ eventId: eventId, present: present, fines: fines, createdAt: new Date().toISOString() }); }
saveToLocalStorage(); showToast("✅ उपस्थिति और जुर्माना सेव हो गया"); loadFinesList(); refreshDashboardCharts();
}
function loadFinesList() {
let fines = appData.fines || []; let membersMap = new Map(); appData.members.forEach(m => membersMap.set(m.id, m.name));
let html = `<div class="table-wrapper"><table class="data-table"><thead><tr><th>सदस्य नाम</th><th>राशि</th><th>तिथि</th><th>कार्य</th></tr></thead><tbody>`;
fines.forEach(f => {
let memberName = membersMap.get(f.memberId) || 'अज्ञात';
html += `<tr><td class="name-active">${memberName}</td><td class="fine-amount">₹${f.amount}</td><td>${f.date}</td><td>${canEdit()?`<button class="btn-sm btn-danger" onclick="deleteFine(${f.id})">हटाएं</button>`:''}</td></tr>`;
});
html += `</tbody></table></div>`;
document.getElementById('finesList').innerHTML = html || '<p>कोई जुर्माना नहीं</p>';
}
async function deleteFine(id) { if(await confirmDoubleDelete("जुर्माना")) { appData.fines = appData.fines.filter(f=>f.id!==id); saveToLocalStorage(); loadFinesList(); refreshDashboardCharts(); showToast("✅ जुर्माना हटा"); } }

function editEventItem(id) { let e = appData.events.find(x=>x.id===id); let html = `<div class="modal"><div class="modal-content"><h3>✏️ आयोजन संपादन</h3><input id="editEvName" value="${e.name}" class="form-control"><input type="date" id="editEvDate" value="${e.date}" class="form-control"><textarea id="editEvReason" placeholder="कारण *" class="form-control" required></textarea><div class="flex-between"><button class="btn btn-primary" onclick="updateEventItem(${id})">अपडेट करें</button><button class="btn btn-secondary" onclick="closeModal()">रद्द</button></div></div></div>`; document.body.insertAdjacentHTML('beforeend', html); }
function updateEventItem(id) { let e = appData.events.find(x=>x.id===id); let reason = document.getElementById('editEvReason').value; if(!reason) return; e.name = document.getElementById('editEvName').value; e.date = document.getElementById('editEvDate').value; saveToLocalStorage(); closeModal(); showToast("✅ अपडेट"); renderEventsList(); }
async function deleteEventItem(id){ if(!await confirmDoubleDelete("आयोजन")) return; let e = appData.events.find(x=>x.id===id); if(e){ appData.deletedEvents.push({ ...e, deletedAt: new Date().toISOString(), deletedBy: currentUser.name }); e.deleted=true; saveToLocalStorage(); renderEventsList(); showToast("✅ हटा"); } }

function renderRamcharitmanas(){ let years = getDataYears(); let html=`<div class="card"><div class="card-title">📖 रामचरितमानस पाठ</div>${canEdit()?`<div class="flex-between"><button class="btn btn-primary" onclick="addPath()">+ पाठ</button><button class="btn btn-info" onclick="renderRamayanReading()">रामायण पाठ प्रबंधन</button></div>`:''}<div class="filter-bar mt-2"><select id="ramYearFilter" onchange="renderRamList()"><option value="all">सभी वर्ष</option>${years.map(y=>`<option value="${y}">${y}</option>`).join('')}</select></div><div id="ramList" class="table-wrapper mt-2"></div></div>`; document.getElementById('contentArea').innerHTML=html; renderRamList(); }
function renderRamList(){ let year = document.getElementById('ramYearFilter')?.value; let filtered = appData.ramcharitmanas; if(year && year !== 'all') filtered = filtered.filter(p => new Date(p.date).getFullYear() == year); document.getElementById('ramList').innerHTML = `<table class="data-table"><thead><tr><th>तिथि</th><th>आयोजक</th><th>स्थान</th><th>कार्य</th></tr></thead><tbody>${filtered.map(p=>`<tr><td>${p.date}</td><td class="text-success">${p.organizer}</td><td class="text-danger">${p.place}</td><td>${canDelete()?`<button class="btn-sm btn-danger" onclick="deletePathItem(${p.id})">🗑️</button>`:''}<button class="btn-sm btn-info" onclick="editPathItem(${p.id})">✏️</button></td></tr>`).join('')}</tbody></table>`; }
function addPath(){ if(!canEdit()) return; let d=prompt("तिथि (YYYY-MM-DD)"), o=prompt("आयोजक"); if(d && /^\d{4}-\d{2}-\d{2}$/.test(d) && o){ appData.ramcharitmanas.push({id:Date.now(), date:d, organizer:o, place:"गुलाबपुरा", editHistory:[]}); saveToLocalStorage(); renderRamList(); showToast("✅ पाठ जुड़ा"); } }
function editPathItem(id) { let p = appData.ramcharitmanas.find(x=>x.id===id); let html = `<div class="modal"><div class="modal-content"><h3>✏️ पाठ संपादन</h3><input id="editPathDate" type="date" value="${p.date}" class="form-control"><input id="editPathOrg" value="${p.organizer}" class="form-control"><input id="editPathPlace" value="${p.place}" class="form-control"><textarea id="editPathReason" placeholder="कारण *" class="form-control" required></textarea><div class="flex-between"><button class="btn btn-primary" onclick="updatePathItem(${id})">अपडेट करें</button><button class="btn btn-secondary" onclick="closeModal()">रद्द</button></div></div></div>`; document.body.insertAdjacentHTML('beforeend', html); }
function updatePathItem(id) { let p = appData.ramcharitmanas.find(x=>x.id===id); let reason = document.getElementById('editPathReason').value; if(!reason) return; p.date = document.getElementById('editPathDate').value; p.organizer = document.getElementById('editPathOrg').value; p.place = document.getElementById('editPathPlace').value; saveToLocalStorage(); closeModal(); showToast("✅ अपडेट"); renderRamList(); }
function deletePathItem(id){ if(confirm("हटाएं?")){ appData.ramcharitmanas=appData.ramcharitmanas.filter(p=>p.id!==id); saveToLocalStorage(); renderRamList(); showToast("✅ हटा"); } }

function renderConstruction(){ let p=appData.construction?.percentage||35; let photos = appData.construction?.photos||[]; let html=`<div class="card"><div class="card-title">🏗️ निर्माण प्रगति</div><div>प्रगति: ${p}%</div><div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>${canEdit()?`<div class="flex-between mt-2"><button class="btn btn-primary" onclick="updateConst()">अपडेट</button><button class="btn-sm btn-info" onclick="addConstructionPhoto()">+ फोटो</button></div>`:''}<div class="gallery-grid mt-2">${photos.map(ph=>`<div class="gallery-item" onclick="window.open('${ph.url}','_blank')"><img src="${ph.url}"></div>`).join('')}</div></div>`; document.getElementById('contentArea').innerHTML=html; }
function updateConst(){ if(!canEdit()) return; let p=prompt("नई प्रगति %"); if(p){ appData.construction.percentage=parseInt(p); saveToLocalStorage(); renderConstruction(); showToast("✅ अपडेट"); } }
function addConstructionPhoto(){ let url=prompt("फोटो URL"); if(url){ if(!appData.construction.photos) appData.construction.photos=[]; appData.construction.photos.push({url}); saveToLocalStorage(); renderConstruction(); showToast("✅ फोटो जुड़ी"); } }

function renderMeetings(){ let years = getDataYears(); let html=`<div class="card"><div class="card-title">📅 बैठकें</div><div class="filter-bar"><select id="meetingYearFilter" onchange="renderMeetingsList()"><option value="all">सभी वर्ष</option>${years.map(y=>`<option value="${y}">${y}</option>`).join('')}</select></div>${canEdit()?`<button class="btn btn-primary mt-2" onclick="addMeeting()">+ बैठक</button>`:''}<div id="meetingsList" class="table-wrapper mt-2"></div></div>`; document.getElementById('contentArea').innerHTML=html; renderMeetingsList(); }
function renderMeetingsList(){ let year = document.getElementById('meetingYearFilter')?.value; let filtered = appData.meetings.filter(m => !m.deleted); if(year && year !== 'all') filtered = filtered.filter(m => new Date(m.date).getFullYear() == year); document.getElementById('meetingsList').innerHTML = `<table class="data-table"><thead><tr><th>बैठक</th><th>विवरण</th><th>कार्य</th></tr></thead><tbody>${filtered.map(m=>`<tr><td><strong>${m.title}</strong><br>${m.date}</td><td>${m.agenda}</td><td>${canDelete()?`<button class="btn-sm btn-danger" onclick="deleteMeetingItem(${m.id})">🗑️</button>`:''}<button class="btn-sm btn-info" onclick="editMeetingItem(${m.id})">✏️</button></td></tr>`).join('')}</tbody></table>`; }
function addMeeting(){ if(!canEdit()) return; let t=prompt("शीर्षक"), d=prompt("तिथि (YYYY-MM-DD)"), a=prompt("एजेंडा"); if(t){ if(!appData.meetings) appData.meetings=[]; appData.meetings.push({id:Date.now(), title:t, date:d, agenda:a, deleted:false}); saveToLocalStorage(); renderMeetingsList(); showToast("✅ बैठक जुड़ी"); } }
function editMeetingItem(id) { let m = appData.meetings.find(x=>x.id===id); let html = `<div class="modal"><div class="modal-content"><h3>✏️ बैठक संपादन</h3><input id="editMeetTitle" value="${m.title}" class="form-control"><input type="date" id="editMeetDate" value="${m.date}" class="form-control"><textarea id="editMeetAgenda" class="form-control">${m.agenda||''}</textarea><textarea id="editMeetReason" placeholder="कारण *" class="form-control" required></textarea><div class="flex-between"><button class="btn btn-primary" onclick="updateMeetingItem(${id})">अपडेट करें</button><button class="btn btn-secondary" onclick="closeModal()">रद्द</button></div></div></div>`; document.body.insertAdjacentHTML('beforeend', html); }
function updateMeetingItem(id) { let m = appData.meetings.find(x=>x.id===id); let reason = document.getElementById('editMeetReason').value; if(!reason) return; m.title = document.getElementById('editMeetTitle').value; m.date = document.getElementById('editMeetDate').value; m.agenda = document.getElementById('editMeetAgenda').value; saveToLocalStorage(); closeModal(); showToast("✅ अपडेट"); renderMeetingsList(); }
async function deleteMeetingItem(id){ if(!await confirmDoubleDelete("बैठक")) return; let m = appData.meetings.find(x=>x.id===id); if(m){ appData.deletedMeetings.push({ ...m, deletedAt: new Date().toISOString(), deletedBy: currentUser.name }); m.deleted=true; saveToLocalStorage(); renderMeetingsList(); showToast("✅ हटा"); } }

function renderAnnouncements(){ let html=`<div class="card"><div class="card-title">📢 घोषणाएँ</div>${canEdit()?`<button class="btn btn-primary" onclick="addAnnouncement()">+ नई</button>`:''}<div id="announcementsList" class="table-wrapper mt-2"></div></div>`; document.getElementById('contentArea').innerHTML=html; renderAnnouncementsList(); }
function renderAnnouncementsList(){ document.getElementById('announcementsList').innerHTML = `<table class="data-table"><thead><tr><th>घोषणा</th><th>कार्य</th></tr></thead><tbody>${(appData.announcements||[]).filter(a=>!a.deleted).map(a=>`<tr><td><strong>${a.title}</strong><br><small>${new Date(a.date).toLocaleDateString()}</small><p>${a.content}</p></td><td>${canDelete()?`<button class="btn-sm btn-danger" onclick="deleteAnnouncementItem(${a.id})">🗑️</button>`:''}<button class="btn-sm btn-info" onclick="editAnnouncementItem(${a.id})">✏️</button></td></tr>`).join('')}</tbody></table>`; }
function addAnnouncement(){ if(!canEdit()) return; let t=prompt("शीर्षक"), c=prompt("विवरण"); if(t){ if(!appData.announcements) appData.announcements=[]; appData.announcements.unshift({id:Date.now(), title:t, content:c, date:new Date().toISOString(), deleted:false}); saveToLocalStorage(); renderAnnouncementsList(); showToast("✅ घोषणा जुड़ी"); } }
function editAnnouncementItem(id) { let a = appData.announcements.find(x=>x.id===id); let html = `<div class="modal"><div class="modal-content"><h3>✏️ घोषणा संपादन</h3><input id="editAnnTitle" value="${a.title}" class="form-control"><textarea id="editAnnContent" class="form-control">${a.content||''}</textarea><textarea id="editAnnReason" placeholder="कारण *" class="form-control" required></textarea><div class="flex-between"><button class="btn btn-primary" onclick="updateAnnouncementItem(${id})">अपडेट करें</button><button class="btn btn-secondary" onclick="closeModal()">रद्द</button></div></div></div>`; document.body.insertAdjacentHTML('beforeend', html); }
function updateAnnouncementItem(id) { let a = appData.announcements.find(x=>x.id===id); let reason = document.getElementById('editAnnReason').value; if(!reason) return; a.title = document.getElementById('editAnnTitle').value; a.content = document.getElementById('editAnnContent').value; saveToLocalStorage(); closeModal(); showToast("✅ अपडेट"); renderAnnouncementsList(); }
async function deleteAnnouncementItem(id){ if(!await confirmDoubleDelete("घोषणा")) return; let a = appData.announcements.find(x=>x.id===id); if(a){ appData.deletedAnnouncements.push({ ...a, deletedAt: new Date().toISOString(), deletedBy: currentUser.name }); a.deleted=true; saveToLocalStorage(); renderAnnouncementsList(); showToast("✅ हटा"); } }

function renderSocialLinks() {
let html = `<div class="card"><div class="card-title">🔗 सोशल लिंक्स</div><div class="social-icons-container"><a href="${appData.settings.whatsappGroupLink || '#'}" target="_blank"><i class="fab fa-whatsapp whatsapp-icon"></i></a><a href="${appData.settings.telegramGroupLink || '#'}" target="_blank"><i class="fab fa-telegram telegram-icon"></i></a><a href="${appData.settings.facebookLink || '#'}" target="_blank"><i class="fab fa-facebook facebook-icon"></i></a><a href="${appData.settings.instagramLink || '#'}" target="_blank"><i class="fab fa-instagram instagram-icon"></i></a></div>${canEdit() ? `<button class="btn btn-primary mt-2" onclick="openSocialLinksModal()">लिंक एडिट करें</button>` : ''}</div>`;
document.getElementById('contentArea').innerHTML = html;
}
function openSocialLinksModal() { let html = `<div class="modal"><div class="modal-content"><h3>🔗 सोशल लिंक्स एडिट करें</h3><input id="editWhatsapp" placeholder="WhatsApp Group Link" value="${appData.settings.whatsappGroupLink||''}" class="form-control"><input id="editTelegram" placeholder="Telegram Group Link" value="${appData.settings.telegramGroupLink||''}" class="form-control"><input id="editFacebook" placeholder="Facebook Page Link" value="${appData.settings.facebookLink||''}" class="form-control"><input id="editInstagram" placeholder="Instagram Profile Link" value="${appData.settings.instagramLink||''}" class="form-control"><div class="flex-between"><button class="btn btn-primary" onclick="saveSocialLinks()">सेव करें</button><button class="btn btn-secondary" onclick="closeModal()">रद्द</button></div></div></div>`; document.body.insertAdjacentHTML('beforeend', html); }
function saveSocialLinks() { appData.settings.whatsappGroupLink = document.getElementById('editWhatsapp').value; appData.settings.telegramGroupLink = document.getElementById('editTelegram').value; appData.settings.facebookLink = document.getElementById('editFacebook').value; appData.settings.instagramLink = document.getElementById('editInstagram').value; saveToLocalStorage(); closeModal(); renderSocialLinks(); showToast("✅ सोशल लिंक्स सेव"); }

// Navigation Logic Setup
const navConfig = {
home: { icon: 'fa-home', label: 'होम', subs: [{id:'dashboard',label:'डैशबोर्ड',fn:renderDashboard}, {id:'gallery',label:'गैलरी',fn:renderGallery}, {id:'social',label:'सोशल ग्रुप',fn:renderSocialLinks}] },
members: { icon: 'fa-users', label: 'सदस्य', subs: [{id:'list',label:'सभी सदस्य',fn:renderMemberList}, {id:'add',label:'नया सदस्य',fn:renderAddMember}, {id:'officers',label:'पदाधिकारी',fn:renderCommittees}, {id:'priests',label:'पुजारी',fn:renderPriests}] },
finance: { icon: 'fa-rupee-sign', label: 'फंड', subs: [{id:'newDonation',label:'➕ नया दान',fn:renderNewDonation}, {id:'donations',label:'💰 भुगतान',fn:renderMemberList}, {id:'advance',label:'एडवांस',fn:renderAdvancePayment}, {id:'receipts',label:'रसीदें',fn:renderReceiptsList}, {id:'expenses',label:'व्यय',fn:renderExpenses}] },
temple: { icon: 'fa-om', label: 'मन्दिर', subs: [{id:'events',label:'आयोजन',fn:renderEvents}, {id:'ramayan',label:'रामायण',fn:renderRamcharitmanas}, {id:'construction',label:'निर्माण',fn:renderConstruction}, {id:'meetings',label:'बैठकें',fn:renderMeetings}, {id:'announcements',label:'घोषणाएँ',fn:renderAnnouncements}] },
reports: { icon: 'fa-chart-pie', label: 'रिपोर्ट्स', subs: [{id:'main',label:'सभी रिपोर्ट',fn:renderReportsMain}] },
transactions: { icon: 'fa-exchange-alt', label: 'लेनदेन', subs: [{id:'list',label:'समिति खाते',fn:renderTransactionsMain}] },
settings: { icon: 'fa-cog', label: 'सेटिंग्स', subs: [{id:'general',label:'सामान्य',fn:renderSettings}] }
};

function renderNavigation() {
let mainHtml = '';
for(let key in navConfig) { mainHtml += `<button class="main-tab ${currentMain===key?'active':''}" data-tab="${key}" onclick="switchMainTab('${key}')"><i class="fas ${navConfig[key].icon}"></i> ${navConfig[key].label}</button>`; }
document.getElementById('mainTabs').innerHTML = mainHtml; renderSubTabs();
}
function renderSubTabs() {
let conf = navConfig[currentMain]; let subHtml = '';
if(conf && conf.subs) {
if(!conf.subs.find(s=>s.id===currentSub)) currentSub = conf.subs[0].id;
conf.subs.forEach(s => { subHtml += `<button class="sub-tab ${currentSub===s.id?'active':''}" onclick="switchSubTab('${s.id}')">${s.label}</button>`; });
}
document.getElementById('subTabs').innerHTML = subHtml; renderCurrentPage();
}
function switchMainTab(tab) { if(currentMain === tab) return; pushToStack(currentMain, currentSub); currentMain = tab; renderNavigation(); }
function switchSubTab(tab) { if(currentSub === tab) return; pushToStack(currentMain, currentSub); currentSub = tab; renderSubTabs(); }
function renderCurrentPage() { let conf = navConfig[currentMain]; if(conf && conf.subs) { let sub = conf.subs.find(s=>s.id===currentSub); if(sub && sub.fn) sub.fn(); } }

function doLogin() {
let e=document.getElementById('loginEmail').value.trim(); let p=document.getElementById('loginPassword').value.trim();
let u=appData.users.find(x=>x.email===e && x.password===p);
if(u) { currentUser=u; document.getElementById('loginPage').style.display='none'; document.getElementById('appContainer').style.display='block'; document.getElementById('userName').innerText=u.name; let rt={"super_admin":"सुपर एडमिन","admin":"एडमिन","operator":"ऑपरेटर","viewer":"व्यूअर"}; document.getElementById('userRoleBadge').innerText=rt[u.role]||'यूजर'; document.getElementById('userRoleBadge').className=`role-${u.role}`; computeAdvanceAndPending(); renderNavigation(); renderCurrentPage(); addAuditLog("लॉगिन","सफल"); showToast(`🙏 स्वागत है, ${u.name} जी!`); }
else { document.getElementById('loginError').innerText="❌ गलत ईमेल या पासवर्ड"; }
}
function doLogout() { if(bulkInterval) clearInterval(bulkInterval); currentUser=null; document.getElementById('loginPage').style.display='flex'; document.getElementById('appContainer').style.display='none'; navigationStack=[]; showToast("🔓 लॉगआउट"); }

if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark');
document.getElementById('darkModeToggle')?.addEventListener('click', () => { document.body.classList.toggle('dark'); localStorage.setItem('darkMode', document.body.classList.contains('dark')); });
function shareApp() { let msg=`🚩 ${appData.settings.committeeName}\nऐप लिंक: ${window.location.href}`; if(navigator.share) navigator.share({title:"मन्दिर ऐप",text:msg}); else { navigator.clipboard.writeText(msg); showToast("📋 लिंक कॉपी"); } }
function toggleLanguage(){ let btn=document.querySelector('.lang-btn'); if(btn) btn.innerHTML=btn.innerHTML.includes('English')?'🇮🇳 हिंदी':'🇮🇳 English'; showToast("भाषा बदली"); }

loadFromLocalStorage();
</script>
