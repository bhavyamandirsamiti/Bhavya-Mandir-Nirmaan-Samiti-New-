    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        :root { --saffron: #FF9933; --gold: #D4AF37; --danger: #dc3545; --success: #28a745; --gray: #6c757d; --dark-bg: #1e1e2f; --dark-card: #2a2a3a; }
        body { background: #fef7e6; transition: 0.3s; }
        body.dark { background: var(--dark-bg); color: #e0e0e0; }
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--saffron), #cc7b00); padding: 20px; }
        .login-card { background: rgba(255,255,255,0.95); border-radius: 48px; padding: 32px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .login-card input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 60px; border: 1px solid #ddd; }
        .btn { padding: 12px 24px; border-radius: 50px; border: none; font-weight: 600; cursor: pointer; }
        .btn-primary { background: var(--saffron); color: white; }
        .btn-sm { padding: 8px 14px; font-size: 13px; }
        .app-container { display: none; }
        .header { background: linear-gradient(90deg, var(--saffron), var(--gold)); color: white; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .main-tabs { background: white; display: flex; overflow-x: auto; padding: 10px; gap: 8px; }
        body.dark .main-tabs { background: var(--dark-card); }
        .main-tab, .sub-tab { padding: 8px 16px; border-radius: 40px; background: #e9ecef; cursor: pointer; white-space: nowrap; }
        .main-tab.active, .sub-tab.active { background: var(--saffron); color: white; }
        .content-area { padding: 12px; padding-bottom: 70px; }
        .card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 15px; border-left: 4px solid var(--saffron); }
        body.dark .card { background: var(--dark-card); }
        .stats-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; }
        @media (min-width:500px){ .stats-grid { grid-template-columns: repeat(4,1fr); } }
        .stat-card { background: white; border-radius: 14px; padding: 12px; text-align: center; border-bottom: 3px solid var(--saffron); }
        .member-card, .donation-row, .expense-item { background: #fff7f0; border-radius: 12px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .modal { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 20px; padding: 18px; width: 90%; max-width: 450px; max-height: 85vh; overflow-y: auto; }
        .toast { position: fixed; bottom: 70px; left: 20px; right: 20px; background: #333; color: white; padding: 10px; border-radius: 40px; text-align: center; z-index: 1100; }
        .data-table { width: 100%; border-collapse: collapse; background: white; }
        .data-table th { background: var(--saffron); color: white; padding: 8px; }
        .data-table td { padding: 8px; border-bottom: 1px solid #eee; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
        .form-control, input, select, textarea { width: 100%; padding: 10px; border-radius: 30px; border: 1px solid #ddd; margin-bottom: 8px; }
        .role-super_admin { background: #ffd700; color: black; padding: 2px 8px; border-radius: 20px; }
        .role-admin { background: #17a2b8; color: white; }
        .role-operator { background: #28a745; color: white; }
        .role-viewer { background: #6c757d; color: white; }
        .pending-requests-badge { background: #dc3545; color: white; border-radius: 20px; padding: 2px 8px; margin-left: 8px; display: none; }
        canvas { max-height: 200px; width: 100%; }
        .checklist { max-height: 250px; overflow-y: auto; border: 1px solid #ddd; border-radius: 12px; padding: 10px; }
        .checklist-item { display: flex; align-items: center; gap: 10px; padding: 6px; }
        .progress-bar { height: 6px; background: #e0e0e0; border-radius: 10px; overflow: hidden; margin: 8px 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--saffron), var(--gold)); }
    </style>

<script>
    // ----------------------------- FIREBASE -----------------------------
    const firebaseConfig = {
        apiKey: "AIzaSyBICud2q7rygRs82aiVYHuECmJ3gA7r5BU",
        authDomain: "bhavya-mandir-samiti.firebaseapp.com",
        databaseURL: "https://bhavya-mandir-samiti-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "bhavya-mandir-samiti",
        storageBucket: "bhavya-mandir-samiti.firebasestorage.app",
        messagingSenderId: "966961147929",
        appId: "1:966961147929:web:66a3c6b92af9149024ba88"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    // ----------------------------- APP DATA -----------------------------
    let appData = {
        settings: { committeeName: "🚩 भव्य मन्दिर निर्माण समिति", committeeSubtitle: "गुलाबपुरा (मोहनगढ़)", upiId: "asryadavtkg@ybl", defaultMonthly: 200, president: "रामेश्वर शर्मा", secretary: "सुरेश अग्रवाल", logo: "", presidentMobile: "9876543210", presidentSignature: "", secretarySignature: "" },
        members: [], donations: [], expenses: [], events: [], ramcharitmanas: [], gallery: [], auditLogs: [], users: [], committees: [], pendingEdits: [], receipts: [], construction: { percentage: 35, photos: [] }, pendingLogoRequests: [], pendingRequests: [], dataChangeRequests: [], loginHistory: [], announcements: [], meetings: []
    };
    let currentUser = null, currentMain = "home", currentSub = "dashboard", navigationStack = [], charts = {};
    let dataLoaded = false, pendingLoads = 18;

    // ----------------------------- PERMISSIONS --------------------------
    function canEdit() { return currentUser && (currentUser.role === 'super_admin' || currentUser.role === 'admin'); }
    function canDelete() { return currentUser && (currentUser.role === 'super_admin' || currentUser.role === 'admin'); }
    function canSendReceipt() { return currentUser && currentUser.role !== 'viewer'; }
    function canSendBulkMessage() { return currentUser && (currentUser.role === 'super_admin' || currentUser.role === 'admin'); }
    function canSendReminder() { return currentUser && currentUser.role !== 'viewer'; }

    // ----------------------------- FIREBASE SAVE/LOAD -------------------
    function saveSettings() { database.ref('settings').set(appData.settings); }
    function saveMembers() { let obj={}; appData.members.forEach(m=>obj[m.id]=m); database.ref('members').set(obj); }
    function saveDonations() { let obj={}; appData.donations.forEach(d=>obj[d.id]=d); database.ref('donations').set(obj); }
    function saveExpenses() { let obj={}; appData.expenses.forEach(e=>obj[e.id]=e); database.ref('expenses').set(obj); }
    function saveEvents() { let obj={}; appData.events.forEach(e=>obj[e.id]=e); database.ref('events').set(obj); }
    function saveRamcharit() { let obj={}; appData.ramcharitmanas.forEach(r=>obj[r.id]=r); database.ref('ramcharitmanas').set(obj); }
    function saveGallery() { let obj={}; appData.gallery.forEach((g,i)=>obj[i]=g); database.ref('gallery').set(obj); }
    function saveAudit() { let obj={}; appData.auditLogs.forEach((l,i)=>obj[i]=l); database.ref('auditLogs').set(obj); }
    function saveUsers() { let obj={}; appData.users.forEach(u=>obj[u.id]=u); database.ref('users').set(obj); }
    function saveCommittees() { let obj={}; appData.committees.forEach(c=>obj[c.id]=c); database.ref('committees').set(obj); }
    function savePendingEdits() { let obj={}; appData.pendingEdits.forEach(e=>obj[e.id]=e); database.ref('pendingEdits').set(obj); }
    function saveReceipts() { let obj={}; appData.receipts.forEach(r=>obj[r.id]=r); database.ref('receipts').set(obj); }
    function saveConstruction() { database.ref('construction').set(appData.construction); }
    function saveLogoRequests() { let obj={}; appData.pendingLogoRequests.forEach(r=>obj[r.id]=r); database.ref('pendingLogoRequests').set(obj); }
    function savePendingRequests() { let obj={}; appData.pendingRequests.forEach((r,i)=>obj[i]=r); database.ref('pendingRequests').set(obj); }
    function saveDataChangeRequests() { let obj={}; appData.dataChangeRequests.forEach((r,i)=>obj[i]=r); database.ref('dataChangeRequests').set(obj); }
    function saveLoginHistory() { let obj={}; appData.loginHistory.forEach((h,i)=>obj[i]=h); database.ref('loginHistory').set(obj); }
    function saveAll() { saveSettings(); saveMembers(); saveDonations(); saveExpenses(); saveEvents(); saveRamcharit(); saveGallery(); saveAudit(); saveUsers(); saveCommittees(); savePendingEdits(); saveReceipts(); saveConstruction(); saveLogoRequests(); savePendingRequests(); saveDataChangeRequests(); saveLoginHistory(); }

    function loadAll() {
        database.ref('settings').on('value',s=>{if(s.val()) appData.settings={...appData.settings,...s.val()}; pendingLoads--; checkLoaded();});
        database.ref('members').on('value',s=>{appData.members=s.val()?Object.values(s.val()):[]; pendingLoads--; checkLoaded();});
        database.ref('donations').on('value',s=>{appData.donations=s.val()?Object.values(s.val()):[]; pendingLoads--; checkLoaded();});
        database.ref('expenses').on('value',s=>{appData.expenses=s.val()?Object.values(s.val()):[]; pendingLoads--; checkLoaded();});
        database.ref('events').on('value',s=>{appData.events=s.val()?Object.values(s.val()):[]; pendingLoads--; checkLoaded();});
        database.ref('ramcharitmanas').on('value',s=>{appData.ramcharitmanas=s.val()?Object.values(s.val()):[]; pendingLoads--; checkLoaded();});
        database.ref('gallery').on('value',s=>{appData.gallery=s.val()?Object.values(s.val()):[]; pendingLoads--; checkLoaded();});
        database.ref('auditLogs').on('value',s=>{appData.auditLogs=s.val()?Object.values(s.val()):[]; pendingLoads--; checkLoaded();});
        database.ref('users').on('value',s=>{if(s.val()) appData.users=Object.values(s.val()); else ensureDefaultUsers(); pendingLoads--; checkLoaded();});
        database.ref('committees').on('value',s=>{appData.committees=s.val()?Object.values(s.val()):[]; pendingLoads--; checkLoaded();});
        database.ref('pendingEdits').on('value',s=>{appData.pendingEdits=s.val()?Object.values(s.val()):[]; pendingLoads--; checkLoaded();});
        database.ref('receipts').on('value',s=>{appData.receipts=s.val()?Object.values(s.val()):[]; pendingLoads--; checkLoaded();});
        database.ref('construction').on('value',s=>{if(s.val()) appData.construction=s.val(); pendingLoads--; checkLoaded();});
        database.ref('pendingLogoRequests').on('value',s=>{appData.pendingLogoRequests=s.val()?Object.values(s.val()):[]; pendingLoads--; checkLoaded();});
        database.ref('pendingRequests').on('value',s=>{appData.pendingRequests=s.val()?Object.values(s.val()):[]; updatePendingBadge(); pendingLoads--; checkLoaded();});
        database.ref('dataChangeRequests').on('value',s=>{appData.dataChangeRequests=s.val()?Object.values(s.val()):[]; updatePendingBadge(); pendingLoads--; checkLoaded();});
        database.ref('loginHistory').on('value',s=>{appData.loginHistory=s.val()?Object.values(s.val()):[]; pendingLoads--; checkLoaded();});
        database.ref('announcements').on('value',s=>{appData.announcements=s.val()?Object.values(s.val()):[]; pendingLoads--; checkLoaded();});
        database.ref('meetings').on('value',s=>{appData.meetings=s.val()?Object.values(s.val()):[]; pendingLoads--; checkLoaded();});
    }

    function ensureDefaultUsers() {
        if(appData.users.length===0){
            appData.users=[
                {id:1,name:"सुपर एडमिन",email:"super@mandir.com",password:"super123",role:"super_admin"},
                {id:2,name:"एडमिन",email:"admin@mandir.com",password:"admin123",role:"admin"},
                {id:3,name:"ऑपरेटर",email:"operator@mandir.com",password:"oper123",role:"operator"},
                {id:4,name:"व्यूअर",email:"viewer@mandir.com",password:"view123",role:"viewer"}
            ];
            saveUsers();
        }
    }

    function checkLoaded() {
        if(pendingLoads<=0 && !dataLoaded){
            dataLoaded=true;
            if(currentUser){
                computeAdvanceAndPending();
                renderNavigation();
                renderCurrentPage();
                showToast("✅ डेटा लोड हो गया");
            } else {
                // Wait for user login
                setTimeout(()=>{ if(!currentUser) document.getElementById('contentArea').innerHTML='<div class="card">कृपया लॉगिन करें</div>'; },1000);
            }
        }
    }

    function initSampleData(){
        if(appData.members.length===0){
            appData.members=[
                {id:1001,name:"रामप्रसाद गुप्ता",father:"श्रीकृष्ण",mobile:"9876543210",village:"गुलाबपुरा",monthlyAmount:200,monthlyAmountHistory:[{amount:200,effectiveDate:"2024-01-01"}],joinDate:"2024-01-01",status:"active",advanceBalance:0,pending:0},
                {id:1002,name:"सीता देवी",father:"रामलाल",mobile:"9876543211",village:"मोहनगढ़",monthlyAmount:200,monthlyAmountHistory:[{amount:200,effectiveDate:"2024-01-15"}],joinDate:"2024-01-15",status:"active",advanceBalance:0,pending:0}
            ];
            appData.expenses=[{id:1,category:"निर्माण",amount:5000,note:"सीमेंट खरीद",date:"2024-01-05"}];
            appData.events=[{id:1,name:"राम नवमी",date:"2024-04-17"}];
            appData.committees=[{id:1,year:2024,members:[{name:"रामेश्वर शर्मा",post:"अध्यक्ष"},{name:"सुरेश अग्रवाल",post:"सचिव"}]}];
            appData.ramcharitmanas=[{id:1,date:"2024-01-08",nakshatra:"पुष्य",organizer:"रामेश्वर शर्मा",place:"गुलाबपुरा मंदिर"}];
            appData.announcements=[{id:1,title:"स्वागत है",content:"नए सदस्यों का हार्दिक अभिनंदन",date:new Date().toISOString(),pinned:true}];
            appData.meetings=[{id:1,title:"मासिक बैठक",date:"2024-05-15",agenda:"निर्माण प्रगति की समीक्षा"}];
            saveAll();
        }
    }

    // ----------------------------- HELPER FUNCTIONS ----------------------
    function getAllMonthsFromJoinTillNow(joinDate){ let join=new Date(joinDate), now=new Date(), months=['जनवरी','फरवरी','मार्च','अप्रैल','मई','जून','जुलाई','अगस्त','सितम्बर','अक्टूबर','नवम्बर','दिसम्बर'], all=[]; for(let y=join.getFullYear(); y<=now.getFullYear(); y++){ let sm=(y===join.getFullYear())?join.getMonth():0, em=(y===now.getFullYear())?now.getMonth():11; for(let m=sm; m<=em; m++) all.push({year:y, month:months[m], monthIndex:m}); } return all; }
    function getMonthlyAmountForDate(member,date){ if(!member.monthlyAmountHistory) return member.monthlyAmount; let sorted=[...member.monthlyAmountHistory].sort((a,b)=>new Date(a.effectiveDate)-new Date(b.effectiveDate)); let effective=sorted[0].amount; for(let h of sorted) if(new Date(h.effectiveDate)<=new Date(date)) effective=h.amount; return effective; }
    function computeAdvanceAndPending(){ for(let m of appData.members){ if(m.status!=='active') continue; let monthly=appData.donations.filter(d=>d.memberId===m.id && d.type==='monthly'); let advance=appData.donations.filter(d=>d.memberId===m.id && d.type==='advance'); let totalAdvance=advance.reduce((s,d)=>s+d.amount,0); let allMonths=getAllMonthsFromJoinTillNow(m.joinDate); let expected=0, paid=0; for(let mon of allMonths){ let date=new Date(mon.year, mon.monthIndex,1); expected+=getMonthlyAmountForDate(m,date); } paid=monthly.reduce((s,d)=>s+d.amount,0); let pending=expected-paid; let advBal=totalAdvance; if(advBal>0 && pending>0){ if(advBal>=pending){ advBal-=pending; pending=0; } else { pending-=advBal; advBal=0; } } m.pending=pending>0?pending:0; m.advanceBalance=advBal>0?advBal:0; } saveAll(); }
    function addAuditLog(action,details){ appData.auditLogs.unshift({action,details,user:currentUser?.name||"System",role:currentUser?.role||"System",timestamp:new Date().toISOString()}); if(appData.auditLogs.length>500) appData.auditLogs.pop(); saveAll(); }
    function showToast(msg,err=false){ let t=document.createElement('div'); t.className='toast'; t.innerText=msg; t.style.background=err?'#dc3545':'#28a745'; document.body.appendChild(t); setTimeout(()=>t.remove(),2500); }
    function closeModal(){ let m=document.querySelector('.modal'); if(m) m.remove(); }
    function goBack(){ if(navigationStack.length){ let last=navigationStack.pop(); currentMain=last.main; currentSub=last.sub; renderNavigation(); renderCurrentPage(); document.getElementById('backBtn')?document.getElementById('backBtn').style.display=navigationStack.length?'flex':'none':null; } }
    function pushToStack(main,sub){ navigationStack.push({main:currentMain,sub:currentSub}); let btn=document.getElementById('backBtn'); if(btn) btn.style.display='flex'; }

    // ----------------------------- AUTHENTICATION ------------------------
    function doLogin(){
        let email=document.getElementById('loginEmail').value;
        let pwd=document.getElementById('loginPassword').value;
        auth.signInWithEmailAndPassword(email,pwd).then(cred=>{
            let role='viewer';
            if(email==='super@mandir.com') role='super_admin';
            else if(email==='admin@mandir.com') role='admin';
            else if(email==='operator@mandir.com') role='operator';
            currentUser={id:cred.user.uid, name:email.split('@')[0], email, role};
            afterLogin();
        }).catch(err=>{ document.getElementById('loginError').innerHTML="❌ "+err.message; });
    }
    function afterLogin(){
        document.getElementById('loginPage').style.display='none';
        document.getElementById('appContainer').style.display='block';
        document.getElementById('userName').innerHTML=currentUser.name;
        let roleText={super_admin:'सुपर एडमिन',admin:'एडमिन',operator:'ऑपरेटर',viewer:'व्यूअर'}[currentUser.role];
        document.getElementById('userRoleBadge').innerHTML=roleText;
        document.getElementById('userRoleBadge').className=`role-${currentUser.role}`;
        if(appData.settings.logo) document.getElementById('committeeLogoImg').src=appData.settings.logo;
        computeAdvanceAndPending();
        appData.loginHistory.unshift({user:currentUser.name,email:currentUser.email,role:currentUser.role,timestamp:new Date().toISOString()});
        saveLoginHistory();
        renderNavigation();
        renderCurrentPage();
        addAuditLog("लॉगिन",`${currentUser.name} logged in`);
        showToast(`🙏 स्वागत है, ${currentUser.name} जी!`);
        updatePendingBadge();
    }
    function doLogout(){ auth.signOut().then(()=>{ currentUser=null; document.getElementById('loginPage').style.display='flex'; document.getElementById('appContainer').style.display='none'; navigationStack=[]; addAuditLog("लॉगआउट","User logged out"); showToast("🔓 लॉगआउट हो गया"); }); }
    function updatePendingBadge(){ let total=(appData.pendingRequests||[]).length+(appData.dataChangeRequests||[]).length; let badge=document.getElementById('pendingRequestsBadge'); if(badge){ if(total>0){ badge.style.display='inline-block'; badge.innerText=total; } else badge.style.display='none'; } }

    // ----------------------------- NAVIGATION ----------------------------
    const mainTabsList=[{id:"home",label:"🏠 होम"},{id:"members",label:"👥 सदस्य"},{id:"finance",label:"💰 वित्त"},{id:"temple",label:"🛕 मंदिर"},{id:"reports",label:"📊 रिपोर्ट"},{id:"settings",label:"⚙️ सेटिंग्स"}];
    const subTabsConfig={

    // PAYMENT MODAL (full)
    function openPaymentModal(memberId){
        if(!canSendReceipt()){ showToast("⚠️ आप दान नहीं जोड़ सकते",true); return; }
        let m=appData.members.find(x=>x.id===memberId);
        let allMonths=getAllMonthsFromJoinTillNow(m.joinDate);
        let paidMonths=appData.donations.filter(d=>d.memberId===m.id && d.type==='monthly').map(d=>({year:d.year,month:d.monthIndex}));
        let pendingMonths=allMonths.filter(mon=>!paidMonths.some(p=>p.year===mon.year && p.month===mon.monthIndex));
        if(pendingMonths.length===0){ showToast("✅ कोई बकाया नहीं"); return; }
        let years=[...new Set(pendingMonths.map(m=>m.year))].sort();
        let html=`<div class="modal"><div class="modal-content"><h3>💰 भुगतान - ${m.name}</h3><select id="payYear" class="form-control">${years.map(y=>`<option value="${y}">${y}</option>`).join('')}</select><div id="payMonths" class="checklist"></div><input type="number" id="payAmount" placeholder="राशि" value="${m.monthlyAmount}" class="form-control"><select id="payMode" class="form-control"><option>कैश</option><option>UPI</option></select><button class="btn btn-primary" onclick="processPayment(${memberId})">भुगतान करें</button><button class="btn btn-secondary" onclick="closeModal()">रद्द</button></div></div>`;
        document.body.insertAdjacentHTML('beforeend',html);
        function loadMonths(){
            let year=parseInt(document.getElementById('payYear').value);
            let monthsForYear=pendingMonths.filter(m=>m.year===year);
            let container=document.getElementById('payMonths');
            if(!container) return;
            container.innerHTML=monthsForYear.map(mon=>`<div class="checklist-item"><input type="checkbox" value="${mon.monthIndex}" class="monthCb"> <label>${mon.month} ${mon.year}</label></div>`).join('');
        }
        document.getElementById('payYear').addEventListener('change',loadMonths);
        loadMonths();
    }
    function processPayment(memberId){
        let m=appData.members.find(x=>x.id===memberId);
        let year=parseInt(document.getElementById('payYear').value);
        let selected=Array.from(document.querySelectorAll('.monthCb:checked')).map(cb=>parseInt(cb.value));
        if(selected.length===0){ showToast("कोई महीना नहीं चुना"); return; }
        let amount=parseFloat(document.getElementById('payAmount').value)||m.monthlyAmount;
        let mode=document.getElementById('payMode').value;
        let monthNames=['जनवरी','फरवरी','मार्च','अप्रैल','मई','जून','जुलाई','अगस्त','सितम्बर','अक्टूबर','नवम्बर','दिसम्बर'];
        for(let month of selected){
            appData.donations.push({id:Date.now(),memberId:m.id,memberName:m.name,type:"monthly",month:monthNames[month],monthIndex:month,year:year,amount:amount,receiptNo:"REC"+Date.now(),date:new Date().toISOString().slice(0,10),mode:mode,created_by:currentUser.name});
        }
        computeAdvanceAndPending();
        saveAll();
        closeModal();
        renderMemberList();
        renderDashboard();
        showToast(`✅ ${selected.length} महीनों का भुगतान`);
    }
    function openAdvanceModal(memberId){
        let m=appData.members.find(x=>x.id===memberId);
        let html=`<div class="modal"><div class="modal-content"><h3>⭐ एडवांस - ${m.name}</h3><input type="number" id="advAmount" placeholder="राशि" class="form-control"><select id="advMode" class="form-control"><option>कैश</option><option>UPI</option></select><button class="btn btn-primary" onclick="processAdvance(${memberId})">जमा</button><button class="btn btn-secondary" onclick="closeModal()">रद्द</button></div></div>`;
        document.body.insertAdjacentHTML('beforeend',html);
    }
    function processAdvance(memberId){
        let m=appData.members.find(x=>x.id===memberId);
        let amount=parseFloat(document.getElementById('advAmount').value);
        let mode=document.getElementById('advMode').value;
        if(isNaN(amount)) return;
        appData.donations.push({id:Date.now(),memberId:m.id,memberName:m.name,type:"advance",amount:amount,receiptNo:"ADV"+Date.now(),date:new Date().toISOString().slice(0,10),mode:mode,created_by:currentUser.name});
        computeAdvanceAndPending();
        saveAll();
        closeModal();
        renderMemberList();
        showToast(`⭐ ₹${amount} एडवांस जमा`);
    }

    // BULK IMPORT (basic)
    function renderBulkImport(){
        document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">📥 बल्क इम्पोर्ट</div><textarea id="bulkData" rows="5" placeholder="नाम,मोबाइल,राशि&#10;राम,9876543210,200" class="form-control"></textarea><button class="btn btn-primary" onclick="doBulkImport()">इम्पोर्ट</button></div>`;

    function doBulkImport(){
        let lines=document.getElementById('bulkData').value.split('\n');
        let count=0;
        for(let line of lines){
            let parts=line.split(',');
            if(parts.length>=2){
                let name=parts[0].trim(), mobile=parts[1].trim(), amount=parts[2]?parseFloat(parts[2].trim()):200;
                if(name && /^[6-9]\d{9}$/.test(mobile)){
                    appData.members.push({id:Date.now()+count,name,mobile,village:"",monthlyAmount:amount,monthlyAmountHistory:[{amount:amount,effectiveDate:new Date().toISOString().slice(0,10)}],joinDate:new Date().toISOString().slice(0,10),status:"active",advanceBalance:0,pending:0,created_by:currentUser.name});
                    count++;
                }
            }
        }
        computeAdvanceAndPending();
        saveAll();
        showToast(`${count} सदस्य जोड़े`);
        switchSub('memberList');
    }

    function renderMemberHistory(){ document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">📜 इतिहास</div><p>जल्द</p></div>`; }
    function renderCommittees(){ let html=`<div class="card"><div class="card-title">🏛️ समिति</div>${appData.committees.map(c=>`<div><strong>${c.year}</strong>: ${c.members.map(m=>`${m.post} ${m.name}`).join(', ')}</div>`).join('')}</div>`; document.getElementById('contentArea').innerHTML=html; }
    function renderChangeAmount(){ document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">💰 राशि बदलें</div><p>जल्द</p></div>`; }
    function renderDonations(){ renderPaymentPage(); }
    function renderPending(){ let pendingMems=appData.members.filter(m=>m.pending>0); let html=`<div class="card"><div class="card-title">⚠️ बकाया</div>${pendingMems.map(m=>`<div>${m.name} - ₹${m.pending} <button class="btn-sm btn-success" onclick="openPaymentModal(${m.id})">भुगतान</button></div>`).join('')}</div>`; document.getElementById('contentArea').innerHTML=html; }
    function renderReceipts(){ document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">🧾 रसीदें</div>${appData.receipts.slice(0,20).map(r=>`<div>${r.receiptNo} - ${r.memberName} - ₹${r.amount}</div>`).join('')}</div>`; }
    function renderReceiptsList(){ renderReceipts(); }
    function renderGeneralDonations(){ document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">🙏 सामान्य दान</div><button class="btn btn-primary" onclick="openGenDonation()">+ नया दान</button><div id="genDonations"></div></div>`; }
    function openGenDonation(){ let amt=prompt("राशि"); if(amt){ appData.donations.push({id:Date.now(),memberName:"अन्य",type:"general",amount:parseFloat(amt),receiptNo:"GEN"+Date.now(),date:new Date().toISOString().slice(0,10)}); saveAll(); renderGeneralDonations(); } }
    function renderAdvancePayment(){ document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">⭐ एडवांस</div><p>सदस्य सूची से एडवांस जमा करें</p></div>`; }
    function renderExpenses(){ let html=`<div class="card"><div class="card-title">💸 व्यय</div>${canEdit()?`<input id="expCat" placeholder="श्रेणी"><input id="expAmt" type="number" placeholder="राशि"><button class="btn btn-danger" onclick="addExpense()">जोड़ें</button>`:''}<div id="expList">${appData.expenses.map(e=>`<div class="expense-item">${e.category}: ₹${e.amount} <button class="btn-sm btn-danger" onclick="deleteExpense(${e.id})">🗑️</button></div>`).join('')}</div></div>`; document.getElementById('contentArea').innerHTML=html; }
    function addExpense(){ let cat=document.getElementById('expCat').value, amt=parseFloat(document.getElementById('expAmt').value); if(cat && amt){ appData.expenses.push({id:Date.now(),category:cat,amount:amt,date:new Date().toISOString().slice(0,10),created_by:currentUser.name}); saveAll(); renderExpenses(); } }
    function deleteExpense(id){ appData.expenses=appData.expenses.filter(e=>e.id!==id); saveAll(); renderExpenses(); }
    function renderLedger(){ let totalIncome=appData.donations.reduce((s,d)=>s+d.amount,0); let totalExpense=appData.expenses.reduce((s,e)=>s+e.amount,0); document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">📒 लेजर</div><p>कुल आय: ₹${totalIncome}</p><p>कुल व्यय: ₹${totalExpense}</p><p>शेष: ₹${totalIncome-totalExpense}</p></div>`; }
    function renderRamcharitmanas(){ document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">📖 रामचरितमानस</div>${appData.ramcharitmanas.map(p=>`<div>${p.date} - ${p.organizer}</div>`).join('')}</div>`; }
    function renderEvents(){ document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">🎪 आयोजन</div>${appData.events.map(e=>`<div>${e.name} (${e.date})</div>`).join('')}</div>`; }
    function renderConstruction(){ let p=appData.construction.percentage; document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">🏗️ निर्माण प्रगति ${p}%</div><div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div><button class="btn btn-primary" onclick="updateProgress()">अपडेट</button></div>`; }
    function updateProgress(){ let val=prompt("नई प्रगति %",appData.construction.percentage); if(val){ appData.construction.percentage=parseInt(val); saveConstruction(); renderConstruction(); } }
    function renderGallery(){ document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">🖼️ गैलरी</div><div class="gallery-grid">${appData.gallery.map(g=>`<img src="${g.url}" style="width:100%">`).join('')}</div></div>`; }
    function renderSocialLinks(){ document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">🔗 सोशल लिंक्स</div><a href="#">व्हाट्सएप</a> <a href="#">टेलीग्राम</a></div>`; }
    function renderGroups(){ document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">👥 ग्रुप लिंक</div><input id="whatsappLink" class="form-control"><button onclick="saveGroupLink()">सेव</button></div>`; }
    function saveGroupLink(){ showToast("सेव"); }
    function renderChannel(){ document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">📢 चैनल</div><input id="channelLink" class="form-control"><button onclick="saveChannel()">सेव</button></div>`; }
    function saveChannel(){ showToast("सेव"); }
    function renderMeetings(){ document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">📅 बैठकें</div>${appData.meetings.map(m=>`<div><strong>${m.title}</strong> (${m.date})</div>`).join('')}</div>`; }
    function renderMonthlyReport(){ document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">📅 मासिक रिपोर्ट</div><canvas id="monthlyRepChart"></canvas></div>`; let months=['जन','फर','मार्च','अप्रैल','मई','जून','जुलाई','अग','सित','अक्टू','नव','दिस']; let incomes=months.map((_,i)=>appData.donations.filter(d=>new Date(d.date).getMonth()===i).reduce((s,d)=>s+d.amount,0)); let ctx=document.getElementById('monthlyRepChart')?.getContext('2d'); if(ctx) new Chart(ctx,{type:'bar',data:{labels:months,datasets:[{label:'आय',data:incomes,backgroundColor:'#28a745'}]}}); }
    function renderYearlyReport(){ document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">📆 वार्षिक रिपोर्ट</div><canvas id="yearChart"></canvas></div>`; let years=[...new Set(appData.donations.map(d=>new Date(d.date).getFullYear()))].sort(); let yearly=years.map(y=>appData.donations.filter(d=>new Date(d.date).getFullYear()===y).reduce((s,d)=>s+d.amount,0)); let ctx=document.getElementById('yearChart')?.getContext('2d'); if(ctx) new Chart(ctx,{type:'line',data:{labels:years,datasets:[{label:'आय',data:yearly,borderColor:'#FF9933'}]}}); }
    function renderPendingReport(){ let pendingMems=appData.members.filter(m=>m.pending>0); let html=`<div class="card"><div class="card-title">⚠️ बकाया रिपोर्ट</div><table class="data-table"><tr><th>नाम</th><th>बकाया</th></tr>${pendingMems.map(m=>`<tr><td>${m.name}</td><td>₹${m.pending}</td></tr>`).join('')}</table></div>`; document.getElementById('contentArea').innerHTML=html; }
    function renderAuditReport(){ let html=`<div class="card"><div class="card-title">📋 ऑडिट लॉग</div>${appData.auditLogs.slice(0,50).map(l=>`<div>${new Date(l.timestamp).toLocaleString()} - ${l.user}: ${l.action}</div>`).join('')}</div>`; document.getElementById('contentArea').innerHTML=html; }
    function renderTrendReport(){ document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">📈 ट्रेंड</div><canvas id="trendCanvas"></canvas></div>`; let years=[...new Set(appData.donations.map(d=>new Date(d.date).getFullYear()))].sort(); let yearly=years.map(y=>appData.donations.filter(d=>new Date(d.date).getFullYear()===y).reduce((s,d)=>s+d.amount,0)); let ctx=document.getElementById('trendCanvas')?.getContext('2d'); if(ctx) new Chart(ctx,{type:'line',data:{labels:years,datasets:[{label:'दान',data:yearly}]}}); }
    function renderProfitLoss(){ let totalIncome=appData.donations.reduce((s,d)=>s+d.amount,0); let totalExpense=appData.expenses.reduce((s,e)=>s+e.amount,0); document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">📊 लाभ/हानि</div><p>आय: ₹${totalIncome}</p><p>व्यय: ₹${totalExpense}</p><p>लाभ: ₹${totalIncome-totalExpense}</p></div>`; }
    function renderGeneralSettings(){ document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">⚙️ सेटिंग्स</div><input id="setName" value="${appData.settings.committeeName}" class="form-control"><input id="setUpi" value="${appData.settings.upiId}" class="form-control"><button class="btn btn-primary" onclick="saveSettings()">सेव</button></div>`; }
    function saveSettings(){ appData.settings.committeeName=document.getElementById('setName').value; appData.settings.upiId=document.getElementById('setUpi').value; saveSettings(); showToast("✅ सेव"); }
    function renderSocialSettings(){ document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">🔗 सोशल सेटिंग्स</div><input placeholder="फेसबुक" class="form-control"><button onclick="showToast('सेव')">सेव</button></div>`; }
    function renderGoogleSheets(){ document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">📊 Google Sheets</div><button class="btn btn-primary" onclick="exportToExcel()">एक्सेल डाउनलोड</button></div>`; }
    function renderBackup(){ document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">📦 बैकअप</div><button class="btn btn-primary" onclick="exportToExcel()">बैकअप लें</button><p>डेटा Firebase में सुरक्षित है</p></div>`; }
    function renderUsers(){ renderUserManagement(); }
    function renderTheme(){ document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">🎨 थीम</div><button class="btn" onclick="document.body.classList.toggle('dark')">डार्क मोड</button></div>`; }
    function renderDigitalSignature(){ document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">🖊️ डिजिटल सिग्नेचर</div><p>जल्द आ रहा है</p></div>`; }
    function renderPaymentPage(){ renderDonations=renderDonations; }

    // Bulk WhatsApp
    let bulkInterval=null, bulkMembers=[], bulkIndex=0;
    function startBulkMessage(){ bulkMembers=appData.members.filter(m=>m.status==='active' && m.mobile); if(bulkMembers.length===0){ showToast("कोई सदस्य नहीं"); return; } bulkIndex=0; sendNextBulk(); bulkInterval=setInterval(sendNextBulk,20000); }
    function sendNextBulk(){ if(bulkIndex>=bulkMembers.length){ clearInterval(bulkInterval); bulkInterval=null; showToast("✅ सभी को भेज दिया"); return; } let m=bulkMembers[bulkIndex]; let msg=`🚩 जय श्री राम\n${m.name} जी, कृपया बकाया ₹${m.pending} जमा करें।\nUPI: ${appData.settings.upiId}`; window.open(`https://wa.me/91${m.mobile}?text=${encodeURIComponent(msg)}`,'_blank'); bulkIndex++; }
    function stopBulkMessage(){ if(bulkInterval){ clearInterval(bulkInterval); bulkInterval=null; showToast("रोका गया"); } }

    // ----------------------------- STARTUP --------------------------------
    document.getElementById('darkModeToggle')?.addEventListener('click',()=>document.body.classList.toggle('dark'));
    loadAll();
    initSampleData();
    ensureDefaultUsers();
</script>
</body>
</html>
