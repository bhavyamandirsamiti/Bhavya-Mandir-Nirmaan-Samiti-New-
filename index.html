function renderMeetings(){ let html=`<div class="card"><div class="card-title">📅 बैठकें<button class="print-btn" onclick="printMeetings()"><i class="fas fa-print"></i> प्रिंट</button></div>${canEdit()?`<button class="btn btn-primary" onclick="addMeeting()">+ बैठक</button>`:''}<div id="meetingsList"></div></div>`; document.getElementById('contentArea').innerHTML=html; renderMeetingsList(); }
function renderMeetingsList(){ document.getElementById('meetingsList').innerHTML = appData.meetings.map(m=>`<div class="member-card"><div><strong>${m.title}</strong><br>${m.date}<br>${m.agenda}</div><div>${canDelete()?`<button class="btn-sm btn-danger" onclick="deleteMeetingItem(${m.id})">🗑️</button>`:''}<button class="btn-sm btn-info" onclick="editMeetingItem(${m.id})">✏️</button></div></div>`).join(''); saveToLocalStorage(); }
function addMeeting(){ if(!canEdit()) return; let t=prompt("शीर्षक"), d=prompt("तिथि (YYYY-MM-DD)"), a=prompt("एजेंडा"); if(t){ appData.meetings.push({id:Date.now(), title:t, date:d, agenda:a, editHistory:[]}); saveToLocalStorage(); renderMeetingsList(); showToast("✅ बैठक जुड़ी"); } }
function editMeetingItem(id) { let m = appData.meetings.find(x=>x.id===id); let html = `<div class="modal"><div class="modal-content"><h3>✏️ बैठक संपादन</h3><input id="editMeetTitle" value="${m.title}" class="form-control"><input type="date" id="editMeetDate" value="${m.date}" class="form-control"><textarea id="editMeetAgenda" class="form-control">${m.agenda||''}</textarea><textarea id="editMeetReason" placeholder="बदलाव का कारण *" class="form-control" required></textarea><div class="flex-between"><button class="btn btn-primary" onclick="updateMeetingItem(${id})">अपडेट करें</button><button class="btn btn-secondary" onclick="closeModal()">रद्द</button></div></div></div>`; document.body.insertAdjacentHTML('beforeend', html); }
function updateMeetingItem(id) { let m = appData.meetings.find(x=>x.id===id); let reason = document.getElementById('editMeetReason').value; if(!reason){ showToast("⚠️ कारण लिखें", true); return; } let oldData = { title: m.title, date: m.date, agenda: m.agenda }; m.title = document.getElementById('editMeetTitle').value; m.date = document.getElementById('editMeetDate').value; m.agenda = document.getElementById('editMeetAgenda').value; let newData = { title: m.title, date: m.date, agenda: m.agenda }; addEditHistory(m, 'बैठक', oldData, newData, reason); saveToLocalStorage(); closeModal(); showToast("✅ अपडेट"); renderMeetingsList(); }
async function deleteMeetingItem(id){ if(!await confirmDoubleDelete("बैठक")) return; let m = appData.meetings.find(x=>x.id===id); if(m){ appData.deletedMeetings.push({ ...m, deletedAt: new Date().toISOString(), deletedBy: currentUser.name }); appData.meetings = appData.meetings.filter(x=>x.id!==id); saveToLocalStorage(); renderMeetingsList(); showToast("✅ बैठक हटा"); addAuditLog("DELETE_MEETING", m.title); } }
function printMeetings() { let rows = appData.meetings.map(m=>[m.title, m.date, m.agenda]); printGenericReport('बैठक सूची', ['शीर्षक', 'तिथि', 'एजेंडा'], rows); }
function renderAnnouncements(){ let html=`<div class="card"><div class="card-title">📢 घोषणाएँ<button class="print-btn" onclick="printAnnouncements()"><i class="fas fa-print"></i> प्रिंट</button></div>${canEdit()?`<button class="btn btn-primary" onclick="addAnnouncement()">+ नई</button>`:''}<div id="announcementsList"></div></div>`; document.getElementById('contentArea').innerHTML=html; renderAnnouncementsList(); }
function renderAnnouncementsList(){ document.getElementById('announcementsList').innerHTML = appData.announcements.map(a=>`<div class="member-card"><div><strong>${a.title}</strong><br><small>${new Date(a.date).toLocaleDateString()}</small><p>${a.content}</p></div><div>${canDelete()?`<button class="btn-sm btn-danger" onclick="deleteAnnouncementItem(${a.id})">🗑️</button>`:''}<button class="btn-sm btn-info" onclick="editAnnouncementItem(${a.id})">✏️</button></div></div>`).join(''); saveToLocalStorage(); }
function addAnnouncement(){ if(!canEdit()) return; let t=prompt("शीर्षक"), c=prompt("विवरण"); if(t){ appData.announcements.unshift({id:Date.now(), title:t, content:c, date:new Date().toISOString(), editHistory:[]}); saveToLocalStorage(); renderAnnouncementsList(); showToast("✅ घोषणा जुड़ी"); } }
function editAnnouncementItem(id) { let a = appData.announcements.find(x=>x.id===id); let html = `<div class="modal"><div class="modal-content"><h3>✏️ घोषणा संपादन</h3><input id="editAnnTitle" value="${a.title}" class="form-control"><textarea id="editAnnContent" class="form-control">${a.content||''}</textarea><textarea id="editAnnReason" placeholder="बदलाव का कारण *" class="form-control" required></textarea><div class="flex-between"><button class="btn btn-primary" onclick="updateAnnouncementItem(${id})">अपडेट करें</button><button class="btn btn-secondary" onclick="closeModal()">रद्द</button></div></div></div>`; document.body.insertAdjacentHTML('beforeend', html); }
function updateAnnouncementItem(id) { let a = appData.announcements.find(x=>x.id===id); let reason = document.getElementById('editAnnReason').value; if(!reason){ showToast("⚠️ कारण लिखें", true); return; } let oldData = { title: a.title, content: a.content }; a.title = document.getElementById('editAnnTitle').value; a.content = document.getElementById('editAnnContent').value; let newData = { title: a.title, content: a.content }; addEditHistory(a, 'घोषणा', oldData, newData, reason); saveToLocalStorage(); closeModal(); showToast("✅ अपडेट"); renderAnnouncementsList(); }
async function deleteAnnouncementItem(id){ if(!await confirmDoubleDelete("घोषणा")) return; let a = appData.announcements.find(x=>x.id===id); if(a){ appData.deletedAnnouncements.push({ ...a, deletedAt: new Date().toISOString(), deletedBy: currentUser.name }); appData.announcements = appData.announcements.filter(x=>x.id!==id); saveToLocalStorage(); renderAnnouncementsList(); showToast("✅ घोषणा हटा"); addAuditLog("DELETE_ANNOUNCEMENT", a.title); } }
function printAnnouncements() { let rows = appData.announcements.map(a=>[a.title, a.content, new Date(a.date).toLocaleDateString()]); printGenericReport('घोषणा सूची', ['शीर्षक', 'विवरण', 'तिथि'], rows); }
function renderLedgerReport() { let html = `<div class="card"><div class="card-title">📒 लेजर रिपोर्ट<div><button class="print-btn" onclick="printLedgerReport()"><i class="fas fa-print"></i> प्रिंट</button><button class="whatsapp-president-btn" onclick="sendLedgerToPresident()"><i class="fab fa-whatsapp"></i> अध्यक्ष को भेजें</button></div></div><div class="year-selector"><select id="ledgerYear" onchange="updateLedger()">${(function(){let opts='';for(let y=2024;y<=new Date().getFullYear()+5;y++)opts+=`<option value="${y}">${y}</option>`;return opts;})()}</select></div><div id="ledgerTable"></div></div>`; document.getElementById('contentArea').innerHTML = html; updateLedger(); }
function updateLedger(){ let year = parseInt(document.getElementById('ledgerYear').value); let months = ['जनवरी','फरवरी','मार्च','अप्रैल','मई','जून','जुलाई','अगस्त','सितम्बर','अक्टूबर','नवम्बर','दिसम्बर']; let rows='', totalInc=0, totalExp=0; for(let i=0;i<12;i++){ let inc = appData.donations.filter(d=>new Date(d.date).getMonth()===i && new Date(d.date).getFullYear()===year).reduce((s,d)=>s+d.amount,0); let exp = appData.expenses.filter(e=>new Date(e.date).getMonth()===i && new Date(e.date).getFullYear()===year).reduce((s,e)=>s+e.amount,0); totalInc+=inc; totalExp+=exp; rows += `<tr><td style="color:var(--saffron)">${months[i]}<\/td><td class="text-success">₹${inc}<\/td><td class="text-danger">₹${exp}<\/td><td class="${inc-exp>=0?'text-success':'text-danger'}">₹${inc-exp}<\/td><\/tr>`; } document.getElementById('ledgerTable').innerHTML = `<table class="data-table"><thead><th>महीना</th><th>आय</th><th>व्यय</th><th>लाभ/हानि</th></thead><tbody>${rows}</tbody><tfoot><tr style="background:#f0f0f0"><th>कुल</th><th>₹${totalInc}</th><th>₹${totalExp}</th><th>₹${totalInc-totalExp}</th><\/tr><\/tfoot><\/table>`; saveToLocalStorage(); }
function printLedgerReport() { let year = document.getElementById('ledgerYear')?.value || new Date().getFullYear(); let months = ['जनवरी','फरवरी','मार्च','अप्रैल','मई','जून','जुलाई','अगस्त','सितम्बर','अक्टूबर','नवम्बर','दिसम्बर']; let rows = []; let totalInc = 0, totalExp = 0; for(let i=0;i<12;i++){ let inc = appData.donations.filter(d=>new Date(d.date).getMonth()===i && new Date(d.date).getFullYear()==year).reduce((s,d)=>s+d.amount,0); let exp = appData.expenses.filter(e=>new Date(e.date).getMonth()===i && new Date(e.date).getFullYear()==year).reduce((s,e)=>s+e.amount,0); totalInc += inc; totalExp += exp; rows.push([months[i], '₹'+inc, '₹'+exp, '₹'+(inc-exp)]); } rows.push(['कुल', '₹'+totalInc, '₹'+totalExp, '₹'+(totalInc-totalExp)]); printGenericReport(`लेजर रिपोर्ट ${year}`, ['महीना', 'आय', 'व्यय', 'लाभ/हानि'], rows); }
function sendLedgerToPresident() { let year = document.getElementById('ledgerYear')?.value || new Date().getFullYear(); let totalInc = appData.donations.filter(d=>new Date(d.date).getFullYear()==year).reduce((s,d)=>s+d.amount,0); let totalExp = appData.expenses.filter(e=>new Date(e.date).getFullYear()==year).reduce((s,e)=>s+e.amount,0); let data = `📒 लेजर रिपोर्ट ${year}\n─────────────────\n💰 कुल आय: ₹${totalInc}\n💸 कुल व्यय: ₹${totalExp}\n⚖️ शेष: ₹${totalInc-totalExp}`; sendToPresident(`लेजर रिपोर्ट ${year}`, data); }
function renderAuditReport(){ let logs = appData.auditLogs.slice(0,100).map(l=>`<div style="padding:8px;border-bottom:1px solid #eee;font-size:12px"><i class="fas fa-history"></i> ${new Date(l.timestamp).toLocaleString()} - ${l.user} (${l.role}) : ${l.action} - ${l.details}</div>`).join(''); document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">📋 ऑडिट लॉग<button class="print-btn" onclick="printAuditLog()"><i class="fas fa-print"></i> प्रिंट</button></div>${logs||'<p>कोई लॉग नहीं</p>'}</div>`; saveToLocalStorage(); }
function printAuditLog() { let rows = appData.auditLogs.slice(0,100).map(l=>[new Date(l.timestamp).toLocaleString(), l.user, l.role, l.action, l.details]); printGenericReport('ऑडिट लॉग', ['तिथि', 'यूजर', 'रोल', 'कार्य', 'विवरण'], rows); }
function renderTrendReport(){ let html=`<div class="card"><div class="card-title">📈 ट्रेंड रिपोर्ट<div><button class="print-btn" onclick="printTrendReport()"><i class="fas fa-print"></i> प्रिंट</button><button class="whatsapp-president-btn" onclick="sendTrendReportToPresident()"><i class="fab fa-whatsapp"></i> अध्यक्ष को भेजें</button></div></div><div class="year-selector"><select id="trendYear" onchange="loadTrend()">${(function(){let opts='';for(let y=2024;y<=new Date().getFullYear()+5;y++)opts+=`<option value="${y}">${y}</option>`;return opts;})()}</select></div><canvas id="trendCanvas"></canvas></div>`; document.getElementById('contentArea').innerHTML=html; loadTrend(); }
function loadTrend(){ let year=parseInt(document.getElementById('trendYear').value); let months=['जन','फर','मार्च','अप्रैल','मई','जून','जुलाई','अग','सित','अक्टू','नव','दिस']; let incData=months.map((_,i)=>appData.donations.filter(d=>new Date(d.date).getMonth()===i && new Date(d.date).getFullYear()===year).reduce((s,d)=>s+d.amount,0)); let expData=months.map((_,i)=>appData.expenses.filter(e=>new Date(e.date).getMonth()===i && new Date(e.date).getFullYear()===year).reduce((s,e)=>s+e.amount,0)); let ctx=document.getElementById('trendCanvas')?.getContext('2d'); if(ctx) { if(trendChart) trendChart.destroy(); trendChart = new Chart(ctx,{type:'line',data:{labels:months,datasets:[{label:'आय',data:incData,borderColor:'#28a745'},{label:'व्यय',data:expData,borderColor:'#dc3545'}]}}); } saveToLocalStorage(); }
function printTrendReport() { let year = document.getElementById('trendYear')?.value || new Date().getFullYear(); let months = ['जन','फर','मार्च','अप्रैल','मई','जून','जुलाई','अग','सित','अक्टू','नव','दिस']; let rows = []; for(let i=0;i<12;i++){ let inc = appData.donations.filter(d=>new Date(d.date).getMonth()===i && new Date(d.date).getFullYear()==year).reduce((s,d)=>s+d.amount,0); let exp = appData.expenses.filter(e=>new Date(e.date).getMonth()===i && new Date(e.date).getFullYear()==year).reduce((s,e)=>s+e.amount,0); rows.push([months[i], '₹'+inc, '₹'+exp, '₹'+(inc-exp)]); } printGenericReport(`ट्रेंड रिपोर्ट ${year}`, ['महीना', 'आय', 'व्यय', 'लाभ/हानि'], rows); }
function sendTrendReportToPresident() { let year = document.getElementById('trendYear')?.value || new Date().getFullYear(); let totalInc = appData.donations.filter(d=>new Date(d.date).getFullYear()==year).reduce((s,d)=>s+d.amount,0); let totalExp = appData.expenses.filter(e=>new Date(e.date).getFullYear()==year).reduce((s,e)=>s+e.amount,0); let data = `📈 ट्रेंड रिपोर्ट ${year}\n─────────────────\n💰 कुल आय: ₹${totalInc}\n💸 कुल व्यय: ₹${totalExp}\n⚖️ शेष: ₹${totalInc-totalExp}`; sendToPresident(`ट्रेंड रिपोर्ट ${year}`, data); }
function renderExpenseChart(){ let cat={}; appData.expenses.forEach(e=>{cat[e.category]=(cat[e.category]||0)+e.amount;}); let labels=Object.keys(cat), data=Object.values(cat); let total=data.reduce((a,b)=>a+b,0); let html=`<div class="card"><div class="card-title">🥧 व्यय श्रेणी विश्लेषण<div><button class="print-btn" onclick="printExpenseChart()"><i class="fas fa-print"></i> प्रिंट</button><button class="whatsapp-president-btn" onclick="sendExpenseChartToPresident()"><i class="fab fa-whatsapp"></i> अध्यक्ष को भेजें</button></div></div><canvas id="pieCanvas"></canvas><table class="data-table mt-2"><thead><th>श्रेणी</th><th>राशि</th><th>%</th></thead><tbody>${labels.map((l,i)=>`<tr><td class="name-active">${l}<\/td><td class="text-danger">₹${data[i]}<\/td><td>${((data[i]/total)*100).toFixed(1)}%<\/td><\/tr>`).join('')}</tbody><\/table><\/div>`; document.getElementById('contentArea').innerHTML=html; let ctx=document.getElementById('pieCanvas')?.getContext('2d'); if(ctx) { if(pieChart) pieChart.destroy(); pieChart = new Chart(ctx,{type:'pie',data:{labels:labels,datasets:[{data:data,backgroundColor:['#FF9933','#28a745','#dc3545','#17a2b8','#6f42c1']}]}}); } saveToLocalStorage(); }
function printExpenseChart() { let rows = []; appData.expenses.forEach(e=>{rows.push([e.date, e.category, '₹'+e.amount, e.note||'-']);}); printGenericReport('व्यय सूची', ['तिथि', 'श्रेणी', 'राशि', 'विवरण'], rows); }
function sendExpenseChartToPresident() { let total = appData.expenses.reduce((s,e)=>s+e.amount,0); let catWise = {}; appData.expenses.forEach(e=>{catWise[e.category]=(catWise[e.category]||0)+e.amount;}); let details = Object.entries(catWise).map(([c,a])=>`${c}: ₹${a}`).join('\n'); let data = `🥧 व्यय विश्लेषण\n─────────────────\n💰 कुल व्यय: ₹${total}\n\n📊 श्रेणीवार:\n${details}`; sendToPresident('व्यय विश्लेषण', data); }

function sendYearlyReportToPresident() { let year = document.getElementById('yearlyYear')?.value || new Date().getFullYear(); let income = appData.donations.filter(d=>new Date(d.date).getFullYear()==year).reduce((s,d)=>s+d.amount,0) + appData.otherDonations.filter(d=>new Date(d.date).getFullYear()==year).reduce((s,d)=>s+d.amount,0); let expense = appData.expenses.filter(e=>new Date(e.date).getFullYear()==year).reduce((s,e)=>s+e.amount,0); let data = `📆 वार्षिक रिपोर्ट ${year}\n─────────────────\n💰 कुल आय: ₹${income}\n💸 कुल व्यय: ₹${expense}\n⚖️ शेष: ₹${income-expense}`; sendToPresident(`वार्षिक रिपोर्ट ${year}`, data); }
function renderMonthlyReport() { let years = getDataYears(); let months = ['जनवरी','फरवरी','मार्च','अप्रैल','मई','जून','जुलाई','अगस्त','सितम्बर','अक्टूबर','नवम्बर','दिसम्बर']; let currentYear = new Date().getFullYear(), currentMonth = new Date().getMonth(); let html = `<div class="card"><div class="card-title">📅 मासिक रिपोर्ट<div><button class="print-btn" onclick="printMonthlyReport()"><i class="fas fa-print"></i> प्रिंट</button><button class="whatsapp-president-btn" onclick="sendMonthlyReportToPresident()"><i class="fab fa-whatsapp"></i> अध्यक्ष को भेजें</button></div></div><div class="flex-between"><div class="year-selector"><select id="monthlyYear" onchange="updateMonthlyReport()">${years.map(y=>`<option value="${y}" ${y===currentYear?'selected':''}>${y}</option>`).join('')}</select></div><div class="month-selector"><select id="monthlyMonth" onchange="updateMonthlyReport()">${months.map((m,i)=>`<option value="${i}" ${i===currentMonth?'selected':''}>${m}</option>`).join('')}</select></div></div><div id="monthlyReportData"></div></div>`; document.getElementById('contentArea').innerHTML = html; updateMonthlyReport(); }
function updateMonthlyReport() { let year = parseInt(document.getElementById('monthlyYear').value); let month = parseInt(document.getElementById('monthlyMonth').value); let income = appData.donations.filter(d=>new Date(d.date).getFullYear()===year && new Date(d.date).getMonth()===month).reduce((s,d)=>s+d.amount,0); let expense = appData.expenses.filter(e=>new Date(e.date).getFullYear()===year && new Date(e.date).getMonth()===month).reduce((s,e)=>s+e.amount,0); let months = ['जनवरी','फरवरी','मार्च','अप्रैल','मई','जून','जुलाई','अगस्त','सितम्बर','अक्टूबर','नवम्बर','दिसम्बर']; document.getElementById('monthlyReportData').innerHTML = `<div class="stats-grid"><div class="stat-card"><div class="stat-value">₹${income}</div><div>आय</div></div><div class="stat-card"><div class="stat-value">₹${expense}</div><div>व्यय</div></div><div class="stat-card"><div class="stat-value">₹${income-expense}</div><div>शेष</div></div></div><p>महीना: ${months[month]} ${year}</p>`; saveToLocalStorage(); }
function printMonthlyReport() { let year = document.getElementById('monthlyYear')?.value || new Date().getFullYear(); let month = document.getElementById('monthlyMonth')?.value || new Date().getMonth(); let months = ['जनवरी','फरवरी','मार्च','अप्रैल','मई','जून','जुलाई','अगस्त','सितम्बर','अक्टूबर','नवम्बर','दिसम्बर']; let income = appData.donations.filter(d=>new Date(d.date).getFullYear()==year && new Date(d.date).getMonth()==month).reduce((s,d)=>s+d.amount,0); let expense = appData.expenses.filter(e=>new Date(e.date).getFullYear()==year && new Date(e.date).getMonth()==month).reduce((s,e)=>s+e.amount,0); printGenericReport(`मासिक रिपोर्ट ${months[month]} ${year}`, ['विवरण', 'राशि'], [['आय', '₹'+income], ['व्यय', '₹'+expense], ['शेष', '₹'+(income-expense)]]); }
function sendMonthlyReportToPresident() { let year = document.getElementById('monthlyYear')?.value || new Date().getFullYear(); let month = document.getElementById('monthlyMonth')?.value || new Date().getMonth(); let months = ['जनवरी','फरवरी','मार्च','अप्रैल','मई','जून','जुलाई','अगस्त','सितम्बर','अक्टूबर','नवम्बर','दिसम्बर']; let income = appData.donations.filter(d=>new Date(d.date).getFullYear()==year && new Date(d.date).getMonth()==month).reduce((s,d)=>s+d.amount,0); let expense = appData.expenses.filter(e=>new Date(e.date).getFullYear()==year && new Date(e.date).getMonth()==month).reduce((s,e)=>s+e.amount,0); let data = `📅 मासिक रिपोर्ट ${months[month]} ${year}\n─────────────────\n💰 आय: ₹${income}\n💸 व्यय: ₹${expense}\n⚖️ शेष: ₹${income-expense}`; sendToPresident(`मासिक रिपोर्ट ${months[month]} ${year}`, data); }
function renderPendingReport(){ let pending = appData.members.filter(m=>!m.hidden && m.pending>0); let total = pending.reduce((s,m)=>s+m.pending,0); document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">⚠️ बकाया रिपोर्ट<div><button class="print-btn" onclick="printPendingReport()"><i class="fas fa-print"></i> प्रिंट</button><button class="whatsapp-president-btn" onclick="sendPendingReportToPresident()"><i class="fab fa-whatsapp"></i> अध्यक्ष को भेजें</button></div></div><div class="stats-grid"><div class="stat-card"><div class="stat-value">${pending.length}</div><div>बकाया सदस्य</div></div><div class="stat-card"><div class="stat-value">₹${total}</div><div>कुल बकाया</div></div></div>${pending.map(m=>`<div class="member-card"><span class="${getNameClass(m)}">${m.name} - ₹${m.pending}</span><button class="btn-sm btn-warning" onclick="sendReminderMsg(${m.id}, false)">📱 भेजें</button><button class="btn-sm btn-secondary" onclick="openCustomReminderModal(${m.id}, false)">✏️📱</button><button class="qr-button" onclick="showPaymentQRWithNotification(${m.id}, false)"><i class="fas fa-qrcode"></i> QR</button></div>`).join('')}</div>`; saveToLocalStorage(); }
function printPendingReport() { let pending = appData.members.filter(m=>!m.hidden && m.pending>0); let rows = pending.map(m=>[m.name, m.mobile||'-', m.village||'-', '₹'+m.pending]); printGenericReport('बकाया सदस्य रिपोर्ट', ['नाम', 'मोबाइल', 'गाँव', 'बकाया राशि'], rows); }

function renderGeneralSettings(){ document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-title">⚙️ सेटिंग्स<div><button class="btn btn-primary" onclick="cloudBackup()"><i class="fas fa-cloud-upload-alt"></i> बैकअप</button><button class="btn btn-info" onclick="cloudRestore()"><i class="fas fa-cloud-download-alt"></i> रिस्टोर</button><button class="btn btn-success" onclick="exportExcel()"><i class="fas fa-file-excel"></i> एक्सेल</button><button class="btn btn-warning" onclick="backupJSON()"><i class="fas fa-download"></i> JSON</button><button class="btn btn-danger" onclick="exportEverything()"><i class="fas fa-database"></i> पूरा बैकअप</button></div></div><input id="setName" value="${appData.settings.committeeName}" class="form-control"><input id="setUpi" value="${appData.settings.upiId}" class="form-control"><input id="setPresident" value="${appData.settings.president}" class="form-control"><input id="setSec" value="${appData.settings.secretary}" class="form-control"><input id="setMobile" value="${appData.settings.presidentMobile}" class="form-control"><input type="file" id="logoUpload" accept="image/*" class="form-control"><input type="file" id="presSigFile" class="form-control"><input type="file" id="secSigFile" class="form-control"><button class="btn btn-primary" onclick="saveSettings()">सेव करें</button></div>`; }
function saveSettings(){ appData.settings.committeeName=document.getElementById('setName').value; appData.settings.upiId=document.getElementById('setUpi').value; appData.settings.president=document.getElementById('setPresident').value; appData.settings.secretary=document.getElementById('setSec').value; appData.settings.presidentMobile=document.getElementById('setMobile').value; let logoFile = document.getElementById('logoUpload').files[0]; let pf=document.getElementById('presSigFile').files[0]; let sf=document.getElementById('secSigFile').files[0]; let save=()=>{ saveToLocalStorage(); document.getElementById('headerTitle').innerHTML=appData.settings.committeeName; if(appData.settings.logo) document.getElementById('committeeLogoImg').src=appData.settings.logo; showToast("✅ सेव"); renderGeneralSettings(); }; if(logoFile){ let r=new FileReader(); r.onload=e=>{ appData.settings.logo=e.target.result; save(); }; r.readAsDataURL(logoFile); } else if(pf){ let r=new FileReader(); r.onload=e=>{ appData.settings.presidentSignature=e.target.result; if(sf){ let r2=new FileReader(); r2.onload=e2=>{ appData.settings.secretarySignature=e2.target.result; save(); }; r2.readAsDataURL(sf); }else save(); }; r.readAsDataURL(pf); } else if(sf){ let r=new FileReader(); r.onload=e=>{ appData.settings.secretarySignature=e.target.result; save(); }; r.readAsDataURL(sf); } else save(); }
function exportExcel(){ let ws=[['नाम','पिता नाम','मोबाइल','गाँव','मासिक','बकाया','एडवांस','ज्वाइन डेट']]; appData.members.forEach(m=>ws.push([m.name,m.father||'',m.mobile,m.village||'',m.monthlyAmount,m.pending||0,m.advanceBalance||0,m.joinDate])); let wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(ws),'सदस्य'); XLSX.writeFile(wb,`mandir_${new Date().toISOString().slice(0,10)}.xlsx`); showToast("📊 एक्सेल"); }
function backupJSON(){ let a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify(appData)],{type:'application/json'})); a.download='mandir_backup.json'; a.click(); showToast("बैकअप"); }
function renderUserManagement(){ if(!canEditUser()){ document.getElementById('contentArea').innerHTML='<div class="card">❌ केवल सुपर एडमिन</div>'; return; } let html=`<div class="card"><div class="card-title">👥 यूजर प्रबंधन</div><button class="btn btn-primary" onclick="openAddUserModal()">+ नया यूजर</button><div>${appData.users.map(u=>`<div class="member-card"><div><strong>${u.name}</strong><br><span class="role-${u.role}">${u.role}</span><br>${u.email}</div><div>${u.id!==currentUser.id?`<button class="btn-sm btn-danger" onclick="deleteUser(${u.id})">🗑️</button>`:''}</div></div>`).join('')}</div></div>`; document.getElementById('contentArea').innerHTML=html; }
function openAddUserModal(){ let html=`<div class="modal"><div class="modal-content"><h3>➕ नया यूजर</h3><input id="uname" placeholder="नाम" class="form-control"><input id="uemail" placeholder="ईमेल" class="form-control"><input type="password" id="upass" placeholder="पासवर्ड" class="form-control"><select id="urole"><option value="admin">एडमिन</option><option value="operator">ऑपरेटर</option><option value="viewer">व्यूअर</option></select><button class="btn btn-primary" onclick="addNewUser()">बनाएँ</button><button class="btn btn-secondary" onclick="closeModal()">रद्द</button></div></div>`; document.body.insertAdjacentHTML('beforeend',html); }

async function deleteUser(id){ if(!await confirmDoubleDelete("यूजर")) return; appData.users=appData.users.filter(u=>u.id!==id); saveToLocalStorage(); renderUserManagement(); showToast("✅ यूजर हटा"); }

function renderRecycleBin() { let html = `<div class="card"><div class="card-title">🗑️ रीसायकल बिन</div><div class="flex-between"><button class="btn btn-danger" onclick="emptyRecycleBin()">🗑️ सभी हटाएँ</button></div><div><h3>हटाए गए सदस्य</h3><div id="deletedMembersList"></div></div><div><h3>हटाए गए लेनदेन</h3><div id="deletedTransactionsList"></div></div><div><h3>हटाए गए व्यय</h3><div id="deletedExpensesList"></div></div></div>`; document.getElementById('contentArea').innerHTML = html; document.getElementById('deletedMembersList').innerHTML = (appData.deletedMembers||[]).map(m => `<div class="member-card deleted-item"><div><strong>${m.name}</strong><br>${m.mobile}<br><small>हटाया: ${new Date(m.deletedAt).toLocaleString()} by ${m.deletedBy}</small></div><div><button class="btn-sm btn-success" onclick="restoreDeletedMember(${m.id})">↩️ पुनर्स्थापित</button></div></div>`).join('') || '<p>कोई नहीं</p>'; document.getElementById('deletedTransactionsList').innerHTML = (appData.deletedTransactions||[]).map(t => `<div class="transaction-card deleted-item"><div><strong>₹${t.amount}</strong> - ${t.type==='deposit'?'जमा':'निकासी'}<br>${t.date}<br><small>हटाया: ${new Date(t.deletedAt).toLocaleString()} by ${t.deletedBy}</small></div><div><button class="btn-sm btn-success" onclick="restoreDeletedTransaction(${t.id})">↩️ पुनर्स्थापित</button></div></div>`).join('') || '<p>कोई नहीं</p>'; document.getElementById('deletedExpensesList').innerHTML = (appData.deletedExpenses||[]).map(e => `<div class="member-card deleted-item"><div><strong>${e.category}</strong> - ₹${e.amount}<br>${e.note}<br><small>हटाया: ${new Date(e.deletedAt).toLocaleString()} by ${e.deletedBy}</small></div><div><button class="btn-sm btn-success" onclick="restoreDeletedExpense(${e.id})">↩️ पुनर्स्थापित</button></div></div>`).join('') || '<p>कोई नहीं</p>'; saveToLocalStorage(); }
function restoreDeletedMember(id) { let idx = appData.deletedMembers.findIndex(m=>m.id===id); if(idx!==-1) { let restored = appData.deletedMembers[idx]; let newId = Date.now(); restored.id = newId; delete restored.deletedAt; delete restored.deletedBy; appData.members.push(restored); appData.deletedMembers.splice(idx,1); saveToLocalStorage(); showToast("✅ सदस्य पुनर्स्थापित"); renderRecycleBin(); renderMemberList(); refreshDashboardCharts(); addAuditLog("RESTORE_MEMBER", restored.name); } }
function restoreDeletedTransaction(id) { let idx = appData.deletedTransactions.findIndex(t=>t.id===id); if(idx!==-1) { let restored = appData.deletedTransactions[idx]; let newId = Date.now(); restored.id = newId; delete restored.deletedAt; delete restored.deletedBy; restored.deleted = false; appData.transactions.push(restored); appData.deletedTransactions.splice(idx,1); saveToLocalStorage(); showToast("✅ लेनदेन पुनर्स्थापित"); renderRecycleBin(); renderTransactionsMain(); refreshDashboardCharts(); addAuditLog("RESTORE_TRANSACTION", `लेनदेन ${restored.id} पुनर्स्थापित`); } }
function restoreDeletedExpense(id) { let idx = appData.deletedExpenses.findIndex(e=>e.id===id); if(idx!==-1) { let restored = appData.deletedExpenses[idx]; let newId = Date.now(); restored.id = newId; delete restored.deletedAt; delete restored.deletedBy; appData.expenses.push(restored); appData.deletedExpenses.splice(idx,1); saveToLocalStorage(); showToast("✅ व्यय पुनर्स्थापित"); renderRecycleBin(); renderExpenseList(); refreshDashboardCharts(); addAuditLog("RESTORE_EXPENSE", restored.category); } }
function emptyRecycleBin() { if(confirm("⚠️ क्या आप रीसायकल बिन को पूरी तरह खाली करना चाहते हैं? यह क्रिया अपरिवर्तनीय है!")) { appData.deletedMembers = []; appData.deletedTransactions = []; appData.deletedExpenses = []; saveToLocalStorage(); renderRecycleBin(); showToast("🗑️ रीसायकल बिन खाली कर दिया गया"); addAuditLog("EMPTY_RECYCLE_BIN", "सभी हटाए गए आइटम पूरी तरह हटाए गए"); } }
function renderTransactionsMain() { if(!canManageTransactions()){ document.getElementById('contentArea').innerHTML='<div class="card">❌ आप लेनदेन नहीं देख सकते</div>'; return; } let totalDeposit = appData.transactions.filter(t=>t.type==='deposit' && !t.deleted).reduce((s,t)=>s+t.amount,0); let totalWithdraw = appData.transactions.filter(t=>t.type==='withdraw' && !t.deleted).reduce((s,t)=>s+t.amount,0); let balance = totalDeposit - totalWithdraw; let years = getDataYears(); let months = ['सभी','जनवरी','फरवरी','मार्च','अप्रैल','मई','जून','जुलाई','अगस्त','सितम्बर','अक्टूबर','नवम्बर','दिसम्बर']; let html = `<div class="card"><div class="card-title">💰 सचिव और कोषाध्यक्ष के बीच लेनदेन<div><button class="print-btn" onclick="printTransactionsList()"><i class="fas fa-print"></i> प्रिंट</button><button class="whatsapp-president-btn" onclick="sendTransactionsToPresident()"><i class="fab fa-whatsapp"></i> अध्यक्ष को भेजें</button></div></div><div class="balance-card"><h3>चालू बैलेंस</h3><p style="font-size:32px; font-weight:bold; color:var(--saffron)">₹${balance}</p><p>कुल जमा: ₹${totalDeposit} | कुल निकासी: ₹${totalWithdraw}</p></div><div class="flex-between"><button class="btn btn-success" onclick="openTransactionModal('deposit')"><i class="fas fa-plus-circle"></i> जमा</button><button class="btn btn-danger" onclick="openTransactionModal('withdraw')"><i class="fas fa-minus-circle"></i> निकासी</button></div><div class="table-wrapper"><table class="data-table"><thead><th>तिथि</th><th>रसीद नं.</th><th>प्रकार</th><th>राशि</th><th>विवरण</th><th>कार्य</th></thead><tbody id="transactionListBody"></tbody></table></div></div>`; document.getElementById('contentArea').innerHTML = html; renderTransactionsList(); }
function renderTransactionsList() { let year = document.getElementById('transYearFilter')?.value; let month = document.getElementById('transMonthFilter')?.value; let filtered = appData.transactions.filter(t => !t.deleted); if(year && year !== 'all') filtered = filtered.filter(t => new Date(t.date).getFullYear() == year); if(month && month !== 'all') filtered = filtered.filter(t => new Date(t.date).getMonth() == month); let tbody = document.getElementById('transactionListBody'); if(!tbody) return; tbody.innerHTML = filtered.slice().reverse().map(t=>`<tr><td style="font-size:11px">${t.date}<\/td><td><span class="receipt-no">${t.receiptNo}<\/span><\/td><td class="${t.type==='deposit'?'text-success':'text-danger'}">${t.type==='deposit'?'जमा (+)':'निकासी (-)'}<\/td><td class="${t.type==='deposit'?'text-success':'text-danger'}">₹${t.amount}<\/td><td>${t.note||'-'}<\/td><td>${canDelete() ? `<button class="btn-sm btn-danger" onclick="deleteTransaction(${t.id})">🗑️</button>` : ''}<button class="btn-sm btn-info" onclick="editTransaction(${t.id})">✏️</button><\/td><\/tr>`).join(''); saveToLocalStorage(); }
function openTransactionModal(type, transactionId=null) { let t = transactionId ? appData.transactions.find(x=>x.id===transactionId) : null; let html = `<div class="modal"><div class="modal-content"><h3>${t ? (t.type==='deposit'?'💰 जमा संपादन':'💸 निकासी संपादन') : (type==='deposit'?'💰 जमा':'💸 निकासी')}</h3><input type="number" id="transAmount" placeholder="राशि" value="${t ? t.amount : ''}" class="form-control"><input type="date" id="transDate" value="${t ? t.date : new Date().toISOString().slice(0,10)}" class="form-control"><textarea id="transNote" placeholder="विवरण / कारण" class="form-control">${t ? t.note||'' : ''}</textarea><textarea id="transReason" placeholder="बदलाव का कारण *" class="form-control" ${t ? '' : 'style="display:none"'}></textarea><div class="flex-between"><button class="btn btn-primary" onclick="${t ? `updateTransaction(${t.id})` : `saveTransaction('${type}')`}">${t ? 'अपडेट करें' : 'सेव करें'}</button><button class="btn btn-secondary" onclick="closeModal()">रद्द</button></div></div></div>`; document.body.insertAdjacentHTML('beforeend', html); }
function saveTransaction(type) { let amount = parseFloat(document.getElementById('transAmount').value); let date = document.getElementById('transDate').value; let note = document.getElementById('transNote').value; if(isNaN(amount) || amount<=0){ showToast("⚠️ सही राशि डालें", true); return; } let receiptNo = `लेन-${String(appData.nextTransactionReceiptCounter++).padStart(5,'0')}`; let transaction = { id: Date.now(), type: type, amount: amount, date: date, note: note, receiptNo: receiptNo, created_by: currentUser.name, created_at: new Date().toISOString(), deleted: false, editHistory: [] }; appData.transactions.push(transaction); saveToLocalStorage(); closeModal(); generateTransactionReceipt(transaction); showToast(`✅ लेनदेन सफल! रसीद: ${receiptNo}`); renderTransactionsMain(); addAuditLog(`TRANSACTION_${type.toUpperCase()}`, `₹${amount} - ${note}`); refreshDashboardCharts(); }
function editTransaction(id) { openTransactionModal(null, id); }
function updateTransaction(id) { let t = appData.transactions.find(x=>x.id===id); let reason = document.getElementById('transReason').value; if(!reason){ showToast("⚠️ कारण लिखें", true); return; } let oldData = { amount: t.amount, date: t.date, note: t.note }; t.amount = parseFloat(document.getElementById('transAmount').value); t.date = document.getElementById('transDate').value; t.note = document.getElementById('transNote').value; let newData = { amount: t.amount, date: t.date, note: t.note }; addEditHistory(t, 'लेनदेन', oldData, newData, reason); saveToLocalStorage(); closeModal(); showToast("✅ लेनदेन अपडेट"); renderTransactionsMain(); refreshDashboardCharts(); }
function generateTransactionReceipt(transaction) { let logo = appData.settings.logo || "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23FF9933' width='100' height='100'/%3E%3Ctext x='50' y='70' font-size='60' text-anchor='middle' fill='white'%3E🚩%3C/text%3E%3C/svg%3E"; let totalDeposit = appData.transactions.filter(t=>t.type==='deposit' && !t.deleted).reduce((s,t)=>s+t.amount,0); let totalWithdraw = appData.transactions.filter(t=>t.type==='withdraw' && !t.deleted).reduce((s,t)=>s+t.amount,0); let balance = totalDeposit - totalWithdraw; let win = window.open('', '_blank'); win.document.write(`<!DOCTYPE html><html><head><title>लेनदेन रसीद ${transaction.receiptNo}</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial;padding:20px;background:#f0f0f0}.receipt{max-width:600px;margin:auto;background:white;border:2px solid var(--saffron, #FF9933);border-radius:15px;padding:25px}.header{text-align:center;border-bottom:2px solid var(--saffron, #FF9933);padding-bottom:15px;margin-bottom:15px}.logo-img{width:60px;border-radius:50%}.amount{color:#28a745;font-size:22px;font-weight:bold}.signature{margin-top:25px;display:flex;justify-content:space-between;border-top:1px dashed #ddd;padding-top:15px}@media print{body{padding:0;background:white}.receipt{border:none;padding:0}button{display:none}}</style></head><body><div class="receipt"><div class="header"><img src="${logo}" class="logo-img"><h2>${appData.settings.committeeName}</h2><p>सचिव - कोषाध्यक्ष लेनदेन</p><h3>लेनदेन रसीद</h3><strong>${transaction.receiptNo}</strong><p>${new Date(transaction.date).toLocaleDateString('hi-IN')}</p></div><p><strong>प्रकार:</strong> ${transaction.type==='deposit'?'जमा (कोषाध्यक्ष को दिया)':'निकासी (कोषाध्यक्ष से लिया)'}</p><p><strong>राशि:</strong> <span class="amount">₹${transaction.amount}</span></p><p><strong>विवरण:</strong> ${transaction.note||'-'}</p><p><strong>कुल जमा:</strong> ₹${totalDeposit}</p><p><strong>कुल निकासी:</strong> ₹${totalWithdraw}</p><p><strong>चालू बैलेंस:</strong> ₹${balance}</p><div class="signature"><div>......................<br>${appData.settings.secretary}<br>(सचिव)</div><div>......................<br>कोषाध्यक्ष</div></div><div class="footer"><p>🙏 जय श्री राम 🙏</p></div><div style="text-align:center;margin-top:20px"><button onclick="window.print()" style="background:var(--saffron, #FF9933);padding:10px 20px;border:none;border-radius:8px">🖨️ प्रिंट</button> <button onclick="window.close()">बंद</button></div></div></body></html>`); win.document.close(); }
async function deleteTransaction(id){ if(!await confirmDoubleDelete("लेनदेन")) return; let idx = appData.transactions.findIndex(t=>t.id===id); if(idx!==-1) { let deleted = { ...appData.transactions[idx], deletedAt: new Date().toISOString(), deletedBy: currentUser.name }; appData.deletedTransactions.push(deleted); appData.transactions[idx].deleted = true; saveToLocalStorage(); renderTransactionsMain(); showToast("✅ लेनदेन हटा दिया गया (रीसायकल बिन में उपलब्ध)"); addAuditLog("DELETE_TRANSACTION", `लेनदेन ${id} हटाया`); refreshDashboardCharts(); } }
function printTransactionsList() { let rows = appData.transactions.filter(t=>!t.deleted).map(t=>[t.date, t.receiptNo, t.type==='deposit'?'जमा':'निकासी', '₹'+t.amount, t.note||'-']); printGenericReport('लेनदेन सूची', ['तिथि', 'रसीद नं.', 'प्रकार', 'राशि', 'विवरण'], rows); }
function sendTransactionsToPresident() { let totalDeposit = appData.transactions.filter(t=>t.type==='deposit' && !t.deleted).reduce((s,t)=>s+t.amount,0); let totalWithdraw = appData.transactions.filter(t=>t.type==='withdraw' && !t.deleted).reduce((s,t)=>s+t.amount,0); let balance = totalDeposit - totalWithdraw; let data = `💰 लेनदेन रिपोर्ट\n─────────────────\n📥 कुल जमा: ₹${totalDeposit}\n📤 कुल निकासी: ₹${totalWithdraw}\n⚖️ चालू बैलेंस: ₹${balance}`; sendToPresident('लेनदेन रिपोर्ट', data); }
function getYearOptions() { let currentYear = new Date().getFullYear(); let opts = ''; for (let y = 2024; y <= currentYear + 5; y++) opts += `<option value="${y}">${y}</option>`; return opts; }
function getDataYears() { let currentYear = new Date().getFullYear(); let years = []; for (let y = 2024; y <= currentYear + 5; y++) years.push(y); return years; }
function forgotPassword() { let email = prompt("अपना रजिस्टर्ड ईमेल दर्ज करें:"); if(!email) return; let user = appData.users.find(u => u.email === email); if(!user) { showToast("❌ यह ईमेल रजिस्टर्ड नहीं है", true); return; } let securityNumber = prompt("सुरक्षा के लिए 10 अंकों का कोड दर्ज करें:"); if(securityNumber !== "9165463286") { showToast("❌ गलत कोड!", true); return; } let newPassword = prompt("नया पासवर्ड दर्ज करें:"); if(!newPassword) return; let confirmPassword = prompt("नया पासवर्ड दोबारा दर्ज करें:"); if(newPassword !== confirmPassword) { showToast("❌ पासवर्ड मैच नहीं कर रहे", true); return; } user.password = newPassword; saveToLocalStorage(); showToast("✅ पासवर्ड सफलतापूर्वक बदला गया!"); }
async function confirmDoubleDelete(itemName) { if(!confirm(`⚠️ क्या आप सच में "${itemName}" को हटाना चाहते हैं?`)) return false; if(!confirm(`⚠️⚠️ यह कार्य अपरिवर्तनीय है! क्या आप पक्का "${itemName}" को हटाना चाहते हैं?`)) return false; return true; }
function renderGroups() { renderSocialLinks(); }

// ==================== AUTO SAVE & DATA PERSISTENCE ====================
function startAutoSave() {
    setInterval(() => {
        if(currentUser) {
            saveToLocalStorage();
        }
    }, 30000);
}

window.addEventListener('beforeunload', () => {
    saveToLocalStorage();
});

// ==================== NAVIGATION ====================
function renderCurrentPage(){ if(!currentUser) return; 
    let pages={ 
        home:{dashboard:renderDashboard, ledgerReport:renderLedgerReport, auditLog:renderAuditReport}, 
        members:{memberList:renderMemberList, addMember:renderAddMember, memberHistory:renderMemberHistory, committees:renderCommittees, hiddenMembers:renderHiddenMembers, memberPhotoGallery:renderMemberPhotoGallery}, 
        finance:{donations:renderMemberList, expenses:renderExpenses, receiptsList:renderReceiptsList, advancePayment:renderAdvancePayment, profitLoss:renderProfitLoss, otherDonations:renderOtherDonations, ramcharitmanasReaders:renderRamcharitmanasReaders}, 
        temple:{events:renderEvents, ramcharitmanas:renderRamcharitmanas, construction:renderConstruction, gallery:renderGallery, socialLinks:renderSocialLinks, groups:renderGroups, meetings:renderMeetings, announcements:renderAnnouncements}, 
        reports:{monthlyReport:renderMonthlyReport, yearlyReport:renderYearlyReport, pendingReport:renderPendingReport, auditReport:renderAuditReport, trendReport:renderTrendReport, expenseChart:renderExpenseChart}, 
        settings:{generalSettings:renderGeneralSettings, userManagement:renderUserManagement, backup:renderBackup, digitalSignature:renderDigitalSignature, recycleBin:renderRecycleBin, mediaManager:renderMediaManager}, 
        transactions:{transactions:renderTransactionsMain},
        committee:{committeeMembers:renderCommitteeMembers, committeeTransactions:renderCommitteeTransactions},
        bulkWhatsapp:{bulkWhatsapp:renderBulkWhatsApp}
    }; 
    if(pages[currentMain] && pages[currentMain][currentSub]) pages[currentMain][currentSub](); 
    else renderDashboard(); 
}
function switchMain(id){ pushToStack(currentMain,currentSub); currentMain=id; 
    if(id==='home') currentSub='dashboard'; else if(id==='members') currentSub='memberList'; else if(id==='finance') currentSub='donations'; else if(id==='temple') currentSub='events'; else if(id==='reports') currentSub='monthlyReport'; else if(id==='settings') currentSub='generalSettings'; else if(id==='transactions') currentSub='transactions'; else if(id==='committee') currentSub='committeeMembers'; else if(id==='bulkWhatsapp') currentSub='bulkWhatsapp';
    renderNavigation(); renderCurrentPage(); 
}
function switchSub(id){ pushToStack(currentMain,currentSub); currentSub=id; renderNavigation(); renderCurrentPage(); }
function renderNavigation(){ 
    let mainTabs=[{id:"home",label:"🏠 होम"},{id:"members",label:"👥 सदस्य"},{id:"finance",label:"💰 वित्त"},{id:"temple",label:"🛕 मंदिर"},{id:"reports",label:"📊 रिपोर्ट"},{id:"transactions",label:"💳 लेनदेन"},{id:"committee",label:"🏛️ समिति"},{id:"bulkWhatsapp",label:"📨 बल्क मैसेज"},{id:"settings",label:"⚙️ सेटिंग्स"}]; 
    document.getElementById('mainTabs').innerHTML=mainTabs.map(t=>`<button class="main-tab ${currentMain===t.id?'active':''}" data-tab="${t.id}" onclick="switchMain('${t.id}')">${t.label}</button>`).join(''); 
    let subMap={ 
        home:["dashboard","ledgerReport","auditLog"], 
        members:["memberList","addMember","memberHistory","committees","hiddenMembers","memberPhotoGallery"], 
        finance:["donations","expenses","receiptsList","advancePayment","profitLoss","otherDonations","ramcharitmanasReaders"], 
        temple:["events","ramcharitmanas","construction","gallery","socialLinks","groups","meetings","announcements"], 
        reports:["monthlyReport","yearlyReport","pendingReport","auditReport","trendReport","expenseChart"], 
        settings:["generalSettings","userManagement","backup","digitalSignature","recycleBin","mediaManager"], 
        transactions:["transactions"],
        committee:["committeeMembers","committeeTransactions"],
        bulkWhatsapp:["bulkWhatsapp"]
    }; 
    let subNames={ dashboard:"📊 डैश", ledgerReport:"📒 लेजर", auditLog:"📋 ऑडिट", memberList:"👥 सदस्य", addMember:"➕ जोड़ें", memberHistory:"📜 इतिहास", committees:"🏛️ समिति", hiddenMembers:"🙈 हाइड", memberPhotoGallery:"🖼️ फोटो", donations:"💰 भुगतान", expenses:"💸 व्यय", receiptsList:"🧾 रसीदें", advancePayment:"⭐ एडवांस", profitLoss:"📊 लाभ/हानि", otherDonations:"💰 दान जमा", ramcharitmanasReaders:"📖 रामचरित पाठी", events:"🎪 आयोजन", ramcharitmanas:"📖 रामचरित", construction:"🏗️ निर्माण", gallery:"🖼️ गैलरी", socialLinks:"🔗 लिंक्स", groups:"👥 ग्रुप", meetings:"📅 बैठक", announcements:"📢 घोषणा", monthlyReport:"📅 मासिक", yearlyReport:"📆 वार्षिक", pendingReport:"⚠️ बकाया", trendReport:"📈 ट्रेंड", expenseChart:"🥧 खर्च", generalSettings:"⚙️ सेटिंग्स", userManagement:"👥 यूजर", backup:"📦 बैकअप", digitalSignature:"🖊️ सिग्नेचर", recycleBin:"🗑️ रीसायकल", mediaManager:"📷 मीडिया", transactions:"💳 लेनदेन", committeeMembers:"👥 समिति सदस्य", committeeTransactions:"💰 समिति लेनदेन", bulkWhatsapp:"📨 बल्क मैसेज" }; 
    let subs=subMap[currentMain]||["dashboard"]; 
    document.getElementById('subTabs').innerHTML=subs.map(s=>`<button class="sub-tab ${currentSub===s?'active':''}" onclick="switchSub('${s}')">${subNames[s]||s}</button>`).join(''); 
}
function addLoginHistory(){ if(currentUser) appData.loginHistory.unshift({ user:currentUser.name, email:currentUser.email, role:currentUser.role, timestamp:new Date().toISOString() }); saveToLocalStorage(); }
function doLogin(){ let user=appData.users.find(u=>u.email===document.getElementById('loginEmail').value && u.password===document.getElementById('loginPassword').value); if(user){ currentUser=user; afterLogin(); } else document.getElementById('loginError').innerHTML="❌ गलत ईमेल या पासवर्ड!"; }
function afterLogin(){ document.getElementById('loginPage').style.display='none'; document.getElementById('appContainer').style.display='block'; document.getElementById('userName').innerHTML=currentUser.name; let roleText=currentUser.role==='super_admin'?'सुपर एडमिन':(currentUser.role==='admin'?'एडमिन':(currentUser.role==='operator'?'ऑपरेटर':'व्यूअर')); document.getElementById('userRoleBadge').innerHTML=roleText; document.getElementById('userRoleBadge').className=`role-${currentUser.role}`; computeAllPending(); addLoginHistory(); renderNavigation(); renderCurrentPage(); addAuditLog("लॉगिन","सफल"); showToast(`🙏 स्वागत है, ${currentUser.name} जी!`); checkOverdueMembers(); }
function doLogout(){ if(bulkInterval) clearInterval(bulkInterval); currentUser=null; document.getElementById('loginPage').style.display='flex'; document.getElementById('appContainer').style.display='none'; navigationStack=[]; showToast("🔓 लॉगआउट"); }
if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark');
document.getElementById('darkModeToggle')?.addEventListener('click', () => { document.body.classList.toggle('dark'); localStorage.setItem('darkMode', document.body.classList.contains('dark')); });
function shareApp(){ let msg=`🚩 ${appData.settings.committeeName}\nऐप लिंक: ${window.location.href}`; if(navigator.share) navigator.share({title:"मंदिर ऐप",text:msg}); else { navigator.clipboard.writeText(msg); showToast("📋 लिंक कॉपी"); } }
function toggleLanguage(){ let btn=document.querySelector('.lang-btn'); if(btn) btn.innerHTML=btn.innerHTML.includes('English')?'🇮🇳 हिंदी':'🇮🇳 English'; showToast("भाषा बदली"); }
loadFromLocalStorage();
startAutoSave();
setInterval(() => { computeAllPending(); if(currentMain === 'home' && currentSub === 'dashboard') renderDashboard(); }, 3600000);
</script>
</body>
